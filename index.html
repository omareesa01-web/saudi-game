<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - النسخة العالمية الكاملة</title>
    <style>
        :root {
            --gold: #c1a35f;
            --gold-bright: #f3cf7a;
            --glass-transparent: rgba(0, 0, 0, 0); 
            --glass-panel: rgba(0, 0, 0, 0.82); 
            --glow: 0 0 25px rgba(193, 163, 95, 0.4);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; overflow: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .lang-bar {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            display: flex; gap: 8px; background: rgba(0,0,0,0.85);
            padding: 8px; border-radius: 30px; border: 1px solid var(--gold);
        }

        .lang-bar button {
            background: transparent; border: 1px solid var(--gold); color: white;
            padding: 5px 12px; border-radius: 20px; cursor: pointer; 
            transition: 0.3s; font-weight: bold; font-size: 0.8rem;
        }

        .lang-bar button:hover, .lang-bar button.active { background: var(--gold); color: black; }

        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .glass-panel {
            backdrop-filter: blur(20px); border: 1.5px solid var(--gold); border-radius: 30px;
            padding: 30px; width: 85%; max-width: 700px; box-shadow: var(--glow);
            text-align: center; max-height: 80vh; overflow-y: auto;
        }

        #home.glass-panel { background: var(--glass-transparent) !important; border: none !important; box-shadow: none !important; backdrop-filter: blur(0px); }
        .glass-panel:not(#home) { background: var(--glass-panel); }

        h1 { font-size: 2.8rem; color: var(--gold); margin-bottom: 10px; text-shadow: 0 0 15px black; }
        .desc { font-size: 1.1rem; color: #ccc; margin-bottom: 30px; }
        .btn-list { display: flex; flex-direction: column; gap: 12px; }
        
        .action-btn {
            background: linear-gradient(135deg, rgba(193,163,95,0.15), rgba(0,0,0,0.7));
            border: 1px solid var(--gold); padding: 18px; border-radius: 15px;
            color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .action-btn:hover { background: var(--gold); color: black; transform: scale(1.02); }

        .back-link { 
            margin-top: 25px; color: var(--gold); cursor: pointer; display: inline-block; 
            font-weight: bold; font-size: 1rem; text-decoration: none; border-bottom: 1px solid var(--gold);
        }

        .result-box {
            background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px;
            text-align: justify; line-height: 1.8; font-size: 1.1rem; border-right: 6px solid var(--gold);
        }

        [dir="ltr"] .result-box { border-right: none; border-left: 6px solid var(--gold); text-align: left; }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="lang-bar">
        <button onclick="updateLang('ar')">العربية</button>
        <button onclick="updateLang('en')">English</button>
        <button onclick="updateLang('es')">Español</button>
        <button onclick="updateLang('ru')">Русский</button>
        <button onclick="updateLang('ko')">한국어</button>
    </div>

    <div class="container">
        <div id="home" class="screen glass-panel active">
            <h1 id="L-title">ملاحم التأسيس</h1>
            <p class="desc" id="L-desc">اكتب تاريخك بيدك عبر العصور</p>
            <div class="btn-list">
                <button class="action-btn" id="L-start" onclick="showScreen('heroes')">دخول الملحمة</button>
                <button class="action-btn" id="L-lore" onclick="renderLore()">سجل الأبطال</button>
            </div>
        </div>

        <div id="heroes" class="screen glass-panel">
            <h1 id="L-hTitle">اختر القائد</h1>
            <div id="hero-btns" class="btn-list"></div>
            <a class="back-link" id="L-back1" onclick="showScreen('home')">العودة</a>
        </div>

        <div id="play" class="screen glass-panel">
            <h1 id="L-mTitle">المهمة</h1>
            <p id="quest-text" style="font-size: 1.2rem; margin: 20px 0; line-height: 1.7; text-align: justify;"></p>
            <div id="decision-btns" class="btn-list"></div>
            <a class="back-link" id="L-back2" onclick="showScreen('heroes')">الرجوع للأبطال</a>
        </div>

        <div id="result" class="screen glass-panel">
            <h1 id="L-vTitle">حكم التاريخ</h1>
            <div id="res-text" class="result-box"></div>
            <div style="margin-top:30px; display:flex; gap:20px; justify-content:center;">
                <a class="back-link" id="L-retry" onclick="showScreen('play')">تغيير القرار</a>
                <a class="back-link" id="L-home" onclick="showScreen('home')">الرئيسية</a>
            </div>
        </div>

        <div id="lore-list" class="screen glass-panel">
            <h1 id="L-lTitle">سجل الأبطال</h1>
            <div id="lore-btns" class="btn-list"></div>
            <a class="back-link" id="L-back3" onclick="showScreen('home')">العودة</a>
        </div>

        <div id="lore-det" class="screen glass-panel">
            <h1 id="det-title"></h1>
            <div id="det-content" style="font-size: 1.1rem; line-height: 2; text-align: justify; margin: 20px 0;"></div>
            <button class="action-btn" id="L-audio" onclick="playVoice()">🔊 استمع للرواية</button>
            <a class="back-link" id="L-back4" onclick="showScreen('lore-list')">رجوع</a>
        </div>
    </div>

    <script>
        const DB = {
            ar: {
                dir: 'rtl', title: "ملاحم التأسيس", desc: "اكتب تاريخك بيدك عبر العصور", start: "دخول الملحمة", lore: "سجل الأبطال", hTitle: "اختر القائد التاريخي", mTitle: "المهمة القيادية", vTitle: "حكم التاريخ", retry: "تغيير القرار", home: "الرئيسية", audio: "🔊 استمع للرواية الكاملة",
                heroes: {
                    saud: {
                        name: "الإمام محمد بن سعود",

                        d: [
                            { t: "عقد ميثاق الدرعية ونشر العلم والعدل", r: "✅ انتصار خالد! بقرارك هذا، لم تؤسس مدينة بل أسست أمة عظيمة. ميثاق الدرعية أصبح الدستور الذي جذب القبائل ووحد القلوب." },
                            { t: "تجهيز جيش ضخم وتجاهل الميثاق الفكري", r: "⚠️ نجاح عسكري مؤقت. القوة العسكرية استطاعت حماية الحدود، ولكن غياب المبادئ المشتركة جعل الدولة تواجه صعوبات داخلية أمام القوى الإقليمية." },

                            { t: "الانتظار خلف الأسوار لمراقبة حركة الحراس", r: "⚠️ نجاح جزئي بتكلفة عالية. ضاعت ميزة المباغتة، واضطررت لخوض معركة شوارع دموية خسرت فيها العديد من الرجال المخلصين." },
                            { t: "الانسحاب المؤقت لتأمين إمدادات أكبر", r: "❌ ضياع الحلم التاريخي. عرف الأعداء بوجودكم وشددوا الحراسة، وتحول حلم استعادة الرياض إلى معاناة تطلبت سنوات من الانتظار." }
                        ],
                        long: "الملك عبدالعزيز بن عبدالرحمن آل سعود، مؤسس المملكة العربية السعودية الحديثة. استعاد ملك آبائه بملحمة بطولية بدأت بفتح الرياض عام 1902م، وبنى دولة تجمع بين الأصالة والتقدم."
                    }
                }
            },
            en: {
                dir: 'ltr', title: "Founding Epics", desc: "Write history with your hands", start: "Start Epic", lore: "Heroes", hTitle: "Choose Legend", mTitle: "Mission", vTitle: "History Verdict", retry: "Retry", home: "Home", audio: "🔊 Listen",
                heroes: {
                    saud: { name: "Imam Muhammad bin Saud", q: "1727: Arabia is in chaos. Will you establish a historic pact based on knowledge and justice, or focus purely on military force?", d: [{t: "Establish the Diriyah Pact", r: "✅ Eternal Victory! You didn't just found a city, you founded a great nation. The pact became the constitution that united the tribes."}, {t: "Focus only on Military", r: "⚠️ Temporary success. Force protected borders, but without ideological unity, the state faced internal fractures."}, {t: "Focus on Trade only", r: "❌ Strategic failure. Wealth without sovereignty made Diriyah an easy target for invaders."}], long: "Founder of the First Saudi State in 1727, he made Diriyah a sanctuary for knowledge and justice." },
                    aziz: { name: "King Abdulaziz", q: "1902: 63 men at Masmak walls. Attack at dawn or retreat to wait for a larger army?", d: [{t: "Attack at dawn", r: "✅ Victory! You reclaimed Riyadh and announced the dawn of the Kingdom. This bold move ignited the unification of the land."}, {t: "Wait and monitor", r: "⚠️ Partial success. Surprise was lost, leading to a bloody street battle and many losses."}, {t: "Temporary retreat", r: "❌ Lost opportunity. The enemy reinforced security, delaying the restoration for many painful years."}], long: "Unifier of the modern Kingdom, he started his saga by capturing Masmak in a legendary feat." }
                }
            },

                dir: 'ltr', title: "Epopeyas Fundacionales", desc: "Escribe la historia con tus manos", start: "Iniciar", lore: "Héroes", hTitle: "Elige Líder", mTitle: "Misión", vTitle: "Veredicto", retry: "Reintentar", home: "Inicio", audio: "🔊 Escuchar",
                heroes: {
                    saud: { name: "Imán Muhammad bin Saud", q: "1727: Arabia está en caos. ¿Establecerás un pacto histórico basado en el conocimiento y la justicia, o te centrarás solo en la fuerza militar?", d: [{t: "Establecer el Pacto de Diriyah", r: "✅ ¡Victoria Eterna! No solo fundaste una ciudad, fundaste una gran nación. El pacto unió los corazones de las tribus."}, {t: "Enfoque solo Militar", r: "⚠️ Éxito temporal. La fuerza protegió las fronteras, pero sin unidad ideológica, el estado enfrentó grietas internas."}, {t: "Solo Comercio", r: "❌ Fracaso estratégico. La riqueza sin soberanía hizo a Diriyah un blanco fácil para los invasores."}], long: "Fundador del primer estado saudí en 1727, convirtió a Diriyah en un santuario para el saber." },
                    aziz: { name: "Rey Abdulaziz", q: "1902: 63 hombres frente a Masmak. ¿Atacas al amanecer o te retiras para esperar un ejército mayor?", d: [{t: "Atacar al amanecer", r: "✅ ¡Victoria! Recuperaste Riad y anunciaste el amanecer del Reino moderno. Este acto unificó la tierra."}, {t: "Esperar y vigilar", r: "⚠️ Éxito parcial. Se perdió la sorpresa, resultando en una batalla sangrienta con muchas bajas."}, {t: "Retirada temporal", r: "❌ Oportunidad perdida. El enemigo reforzó la seguridad, retrasando la restauración por años."}], long: "Unificador del Reino moderno, comenzó su saga capturando Masmak en una hazaña legendaria." }
                }
            },
            ru: {
                dir: 'ltr', title: "Эпопея Основания", desc: "Пишите историю своими руками", start: "Начать", lore: "Герои", hTitle: "Выбор героя", mTitle: "Миссия", vTitle: "Вердикт", retry: "Назад", home: "Меню", audio: "🔊 Слушать",
                heroes: {
                    saud: { name: "Имам Мухаммад бин Сауд", q: "1727: Аравия в хаосе. Заключите ли вы исторический пакт, основанный на знаниях и справедливости, или сосредоточитесь только на военной силе?", d: [{t: "Заключить Пакт Дирии", r: "✅ Вечная победа! Вы основали великую нацию. Пакт стал основой, объединившей сердца племен."}, {t: "Только военная сила", r: "⚠️ Временный успех. Сила защитила границы, но без идеологического единства государство было хрупким."}, {t: "Только торговля", r: "❌ Провал. Богатство без суверенитета сделало город легкой добычей для захватчиков."}], long: "Основатель первого государства в 1727 году, сделавший Дирию центром знаний." },
                    aziz: { name: "Король Абдул-Азиз", q: "1902: 63 человека у стен Масмака. Штурм на рассвете или отступление в ожидании армии?", d: [{t: "Штурм на рассвете", r: "✅ Победа! Вы вернули Эр-Рияд и провозгласили рассвет Королевства. Этот смелый шаг объединил земли."}, {t: "Ждать и наблюдать", r: "⚠️ Частичный успех. Эффект внезапности был потерян, что привело к тяжелым потерям в бою."}, {t: "Временное отступление", r: "❌ Упущенный шанс. Враг усилил охрану, отложив восстановление на долгие годы."}], long: "Основатель современного Королевства, начавший свой путь с легендарного взятия крепости Масмак." }
                }
            },
            ko: {
                dir: 'ltr', title: "건국 서사시", desc: "당신의 손으로 역사를 기록하세요", start: "시작", lore: "기록", hTitle: "선택", mTitle: "미션", vTitle: "역사의 판결", retry: "다시", home: "홈", audio: "🔊 듣기",
                heroes: {
                    saud: { name: "사우드 (Saud)", q: "1727년: 아라비아가 혼란에 빠졌습니다. 지식과 정의에 기초한 역사적 조약을 맺겠습니까, 아니면 군사력에만 집중하겠습니까?", d: [{t: "디리야 조약 체결", r: "✅ 영원한 승리! 당신은 단순히 도시를 세운 것이 아니라 위대한 국가를 세웠습니다. 이 조약은 부족들을 하나로 묶었습니다."}, {t: "군사력에만 집중", r: "⚠️ 일시적 성공. 군사력은 국경을 보호했지만, 사상적 통합 없이는 내부적 균열에 직면했습니다."}, {t: "무역에만 집중", r: "❌ 전략적 실패. 주권 없는 부는 침략자들에게 쉬운 표적이 되었습니다."}], long: "1727년 제1차 사우디 국가의 건국자로, 디리야를 지식과 정의의 안식처로 만들었습니다." },
                    aziz: { name: "압둘아지즈 (Abdulaziz)", q: "1902년: 63명의 병사와 마스막 성벽 앞. 새벽에 기습하겠습니까, 아니면 후퇴하여 더 큰 군대를 기다리겠습니까?", d: [{t: "새벽 기습 공격", r: "✅ 승리! 리야드를 탈환하고 현대 사우دي 왕국의 서막을 열었습니다. 이 용기 있는 결정이 땅을 통일했습니다."}, {t: "대기 및 관찰", r: "⚠️ 부분적 성공. 기습 효과를 잃어 거리 전투에서 많은 충성스러운 병사를 잃었습니다."}, {t: "일시적 후퇴", r: "❌ 기회 상실. 적들이 경비를 강화하여 탈환을 위해 수년간 더 고통스러운 기다림이 필요했습니다."}], long: "현대 사우디아라비아 왕국의 건국자로, 1902년 마스막 점령이라는 전설적인 위업으로 시작되었습니다." }
                }
            }
        };

        let lang = 'ar';
        function updateLang(l) {
            lang = l; document.body.dir = DB[l].dir;
            document.getElementById('L-title').innerText = DB[l].title;
            document.getElementById('L-desc').innerText = DB[l].desc;
            document.getElementById('L-start').innerText = DB[l].start;
            document.getElementById('L-lore').innerText = DB[l].lore;
            document.getElementById('L-hTitle').innerText = DB[l].hTitle;
            document.getElementById('L-back1').innerText = DB[l].home;
            document.getElementById('L-mTitle').innerText = DB[l].mTitle;
            document.getElementById('L-back2').innerText = DB[l].hTitle;
            document.getElementById('L-vTitle').innerText = DB[l].vTitle;
            document.getElementById('L-retry').innerText = DB[l].retry;
            document.getElementById('L-home').innerText = DB[l].home;
            document.getElementById('L-lTitle').innerText = DB[l].lore;
            document.getElementById('L-back3').innerText = DB[l].home;
            document.getElementById('L-audio').innerText = DB[l].audio;
            document.getElementById('L-back4').innerText = DB[l].lore;
            renderHeroes(); showScreen('home');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active'); window.speechSynthesis.cancel();
        }

        function renderHeroes() {
            const list = document.getElementById('hero-btns'); list.innerHTML = '';
            for(let key in DB[lang].heroes) {
                const b = document.createElement('button'); b.className = 'action-btn';
                b.innerText = DB[lang].heroes[key].name; b.onclick = () => startPlay(key);
                list.appendChild(b);
            }
        }

        function startPlay(k) {
            const h = DB[lang].heroes[k]; document.getElementById('quest-text').innerText = h.q;
            const btns = document.getElementById('decision-btns'); btns.innerHTML = '';
            h.d.forEach((dec) => {
                const b = document.createElement('button'); b.className = 'action-btn';
                b.innerText = dec.t; b.onclick = () => {
                    document.getElementById('res-text').innerText = dec.r; showScreen('result');
                };
                btns.appendChild(b);
            });
            showScreen('play');
        }

        function renderLore() {
            const list = document.getElementById('lore-btns'); list.innerHTML = '';
            for(let key in DB[lang].heroes) {
                const b = document.createElement('button'); b.className = 'action-btn';
                b.innerText = DB[lang].heroes[key].name; b.onclick = () => {
                    document.getElementById('det-title').innerText = DB[lang].heroes[key].name;
                    document.getElementById('det-content').innerText = DB[lang].heroes[key].long;
                    showScreen('lore-det');
                };
                list.appendChild(b);
            }
            showScreen('lore-list');
        }

        function playVoice() {
            const m = new SpeechSynthesisUtterance(document.getElementById('det-content').innerText);
            const v = { 'ar': 'ar-SA', 'en': 'en-US', 'es': 'es-ES', 'ru': 'ru-RU', 'ko': 'ko-KR' };
            m.lang = v[lang]; m.pitch = 0.9; m.rate = 0.9; window.speechSynthesis.speak(m);
        }

        const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d'); let pts = [];
        function initBg() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; pts = [];
            for(let i=0; i<100; i++) pts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, s: Math.random()*0.5 });
        }
        function drawBg() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(193,163,95,0.4)";
            pts.forEach(p => { p.y -= p.s; if(p.y<0) p.y=canvas.height; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); });
            requestAnimationFrame(drawBg);
        }
        window.onresize = initBg; initBg(); drawBg(); updateLang('ar');
    </script>
</body>
</html>
