<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | النسخة المختصرة</title>
    
    <style>
        :root {
            --gold-primary: #c1a35f;
            --gold-light: #f3cf7a;
            --bg-dark: #05160d;
            --glass: rgba(0, 0, 0, 0.96);
            --sword-fx: linear-gradient(90deg, transparent, #fff, var(--gold-light), transparent);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body, html {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #103a24 0%, var(--bg-dark) 100%);
            color: #fff; font-family: var(--font-main);
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        #sand-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; opacity: 0.7;
        }

        .lang-switcher {
            position: fixed; top: 15px; left: 15px; z-index: 5000; display: flex; gap: 8px;
        }

        .lang-node {
            background: var(--glass); border: 1.5px solid var(--gold-primary);
            color: var(--gold-light); padding: 6px 15px; border-radius: 20px;
            cursor: pointer; font-weight: 700; font-size: 0.85rem;
            transition: 0.3s; backdrop-filter: blur(10px);
        }

        .lang-node.active { background: var(--gold-primary); color: #000; box-shadow: 0 0 15px var(--gold-primary); }

        .app-container {
            position: relative; z-index: 100; width: 90%; max-width: 600px;
            background: var(--glass); backdrop-filter: blur(40px);
            border: 1.5px solid var(--gold-primary); border-radius: 25px;
            padding: 25px; text-align: center; box-shadow: 0 50px 150px rgba(0, 0, 0, 1);
            max-height: 85vh; overflow-y: auto; border-top: 5px solid var(--gold-primary);
        }

        .app-container::-webkit-scrollbar { width: 4px; }
        .app-container::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: 10px; }

        .screen { display: none; opacity: 0; transform: translateY(20px); transition: 0.5s ease; }
        .screen.active { display: block; opacity: 1; transform: translateY(0); }

        .hero-title { font-size: 1.8rem; color: var(--gold-primary); margin-bottom: 12px; font-weight: 900; }
        .sub-text { font-size: 1rem; color: #ccc; margin-bottom: 25px; line-height: 1.6; }

        .action-btn {
            position: relative; width: 100%;
            background: rgba(193, 163, 95, 0.05); border: 1px solid var(--gold-primary);
            padding: 12px; border-radius: 10px; color: #fff;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            transition: 0.3s; margin-bottom: 10px; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .action-btn::after {
            content: ''; position: absolute; top: 0; left: -150%;
            width: 100%; height: 100%; background: var(--sword-fx); transform: skewX(-45deg);
        }

        .action-btn:hover::after { left: 150%; transition: 0.5s; }
        .action-btn:hover { background: rgba(193, 163, 95, 0.2); transform: scale(1.01); }

        .story-panel {
            background: rgba(255, 255, 255, 0.03); padding: 18px; border-radius: 15px;
            text-align: justify; line-height: 1.8; font-size: 1.05rem;
            border-right: 5px solid var(--gold-primary); margin: 15px 0;
            color: #eee; white-space: pre-line;
        }

        [dir="ltr"] .story-panel { border-right: 0; border-left: 5px solid var(--gold-primary); }

        .footer-nav {
            display: inline-block; margin-top: 15px; color: var(--gold-light);
            text-decoration: none; font-weight: 700; cursor: pointer; font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="lang-switcher">
        <button id="ar-btn" class="lang-node active" onclick="setLanguage('ar')">العربية</button>
        <button id="en-btn" class="lang-node" onclick="setLanguage('en')">English</button>
    </div>

    <div class="app-container" id="scroll-top">
        <div id="scr-home" class="screen active">
            <h1 id="ui-title" class="hero-title">ملاحم التأسيس</h1>
            <p id="ui-desc" class="sub-text">استكشف تاريخ المملكة عبر محاكاة قرارات الأبطال.</p>
            <button id="ui-btn-start" class="action-btn" onclick="navTo('scr-heroes')">دخول الملحمة التفاعلية</button>
            <button id="ui-btn-lore" class="action-btn" onclick="initLore()">سير الأبطال التاريخية</button>
        </div>

        <div id="scr-heroes" class="screen">
            <h1 id="ui-choose" class="hero-title">اختر القائد</h1>
            <div id="hero-list"></div>
            <a id="ui-back-home" class="footer-nav" onclick="navTo('scr-home')">العودة للرئيسية</a>
        </div>

        <div id="scr-quest" class="screen">
            <h1 id="q-head" style="color: var(--gold-light); font-size: 1.3rem;"></h1>
            <div id="q-body" class="story-panel"></div>
            <div id="q-choices"></div>
            <a id="ui-cancel" class="footer-nav" onclick="navTo('scr-heroes')">تراجع</a>
        </div>

        <div id="scr-result" class="screen">
            <h1 id="ui-verdict" class="hero-title">حكم التاريخ</h1>
            <div id="res-text" class="story-panel"></div>
            <button id="ui-retry" class="action-btn" onclick="navTo('scr-heroes')">تجربة مسار آخر</button>
            <a id="ui-res-home" class="footer-nav" onclick="navTo('scr-home')">الرئيسية</a>
        </div>

        <div id="scr-lore" class="screen">
            <h1 id="ui-records" class="hero-title">سجل الخالدين</h1>
            <div id="lore-list"></div>
            <a id="ui-lore-back" class="footer-nav" onclick="navTo('scr-home')">رجوع</a>
        </div>

        <div id="scr-bio" class="screen">
            <h1 id="bio-head" class="hero-title"></h1>
            <div id="bio-content" class="story-panel"></div>
            <a id="ui-bio-back" class="footer-nav" onclick="navTo('scr-lore')">العودة للسجل</a>
        </div>
    </div>

    <script>
        // دمج البيانات التاريخية الموسعة (نفس النسخة السابقة تماماً)
        const HISTORICAL_DATA = {
            saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    title: "ميثاق الدرعية (1727م)",
                    quest: "عام 1139هـ، الدرعية بلدة صغيرة في قلب نجد، والمنطقة تعاني من فوضى عارمة. بصفتك حاكماً للدرعية، يأتيك خبر وصول الشيخ محمد بن عبدالوهاب باحثاً عن مكان ينشر فيه العلم والتوحيد. كيف ستبني أساس الدولة؟",
                    paths: [
                        { t: "عقد ميثاق تاريخي لنشر العلم والوحدة", r: "✅ قرار فاصل! بلقائك مع الشيخ في 'حي الطريف'، قلت: 'أبشر بالعزة والمنعة'. تأسست الدولة السعودية الأولى، وتوحدت نجد تحت راية واحدة لأول مرة منذ قرون." },
                        { t: "التركيز على القوة العسكرية وتحصين الدرعية فقط", r: "⚠️ قرار حذر. حماية الدرعية تمت، لكن بدون مشروع فكري، ظلت القبائل الأخرى ترى فيك مجرد منافس، وتأخر حلم الدولة الكبرى لعقود." },
                        { t: "عقد معاهدات سلام مؤقتة مع جيرانك", r: "❌ قرار ضعيف. المعاهدات مع حكام متنازعين جعلت الدرعية رهينة لمصالحهم. بمجرد شعورهم بقوتك، نقضوا العهود وهاجموا الدرعية." }
                    ],
                    bio: "الإمام محمد بن سعود (توفي 1765م). مؤسس الدولة السعودية الأولى. وحّد الدرعية وبنى سورها واستضاف الشيخ محمد بن عبدالوهاب، مما خلق كياناً سياسياً وعلمياً قوياً أمن طرق الحج والتجارة."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    title: "The Diriyah Pact (1727)",
                    quest: "In 1727, Najd was in chaos. As the ruler of Diriyah, Sheikh Muhammad bin Abdulwahab arrives seeking a home for knowledge. How will you build your state?",
                    paths: [
                        { t: "Establish a Pact for Knowledge and Unity", r: "✅ The defining moment! The First Saudi State was born. For the first time in centuries, Najd was unified under one banner." },
                        { t: "Focus solely on military fortifications", r: "⚠️ Cautious but limited. Diriyah was safe, but without a unifying ideology, the grand state was delayed." },
                        { t: "Form temporary peace treaties", r: "❌ Weak strategy. Neighbors broke treaties as soon as you grew strong, losing the chance to establish the state." }
                    ],
                    bio: "Imam Muhammad bin Saud (d. 1765). Founder of the First Saudi State. He unified Diriyah and signed the historic pact that formed the foundation of the Saudi nation."
                }
            },
            turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    title: "استعادة المجد (1824م)",
                    quest: "الرياض تحت احتلال باطش بعد سقوط الدرعية. أنت الآن في 'خلوة الحلوة' بسيفك 'الأجرب'. هل ستنتظر أم تصنع المعجزة؟",
                    paths: [
                        { t: "قيادة عملية فدائية لتطهير الرياض ليلاً", r: "✅ نصر أسطوري! بذكاء عسكري، استعدت الرياض وجعلتها عاصمة للدولة السعودية الثانية، وأعدت الأمل والسيادة للجزيرة العربية." },
                        { t: "الانتظار لجمع جيش ضخم من القبائل", r: "⚠️ فرصة ضائعة. انتظارك أعطى المحتل وقتاً لترميم الأسوار وجلب المدافع. الانتصار لاحقاً كلفك الكثير من الدماء." },
                        { t: "إرسال رسائل للقبائل للثورة من الداخل", r: "❌ فشل الخطة. المحتل اكتشف الرسائل واعتقل الوجهاء، مما نشر الخوف وظلت الرياض محتلة لسنوات إضافية." }
                    ],
                    bio: "الإمام تركي بن عبد الله (1755-1834م). مؤسس الدولة السعودية الثانية. استرد الرياض عام 1240هـ بسيفه 'الأجرب' وجعلها العاصمة الدائمة للدولة."
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    title: "The Restoration (1824)",
                    quest: "Riyadh is occupied. You are in hiding with your legendary sword 'Al-Ajrab'. Will you reclaim your legacy?",
                    paths: [
                        { t: "Lead a surprise night raid on Riyadh", r: "✅ Heroic Victory! You reclaimed Riyadh and established the Second Saudi State, restoring sovereignty to the land." },
                        { t: "Wait to gather a massive army first", r: "⚠️ Delay. The enemy fortified the city further, making the eventual liberation very costly in lives." },
                        { t: "Send letters to stir an internal revolt", r: "❌ Failed. The occupiers intercepted letters and arrested leaders, extending the occupation for years." }
                    ],
                    bio: "Imam Turki bin Abdullah. Founder of the Second Saudi State. He reclaimed Riyadh with his famous sword and rebuilt the Great Mosque."
                }
            },
            aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    title: "فتح الرياض (1902م)",
                    quest: "ليلة 5 شوال. أمامك حصن المصمك ومعك 63 رجلاً فقط. خروج 'عجلان' من الحصن فجراً هي فرصتك. ماذا ستقرر؟",
                    paths: [
                        { t: "اقتحام المصمك فور خروج عجلان", r: "✅ 'الملك لله ثم لعبد العزيز!'.. نجحت الخطة واسترددت ملك آبائك، ومن هنا انطلقت رحلة الـ 30 عاماً لتوحيد المملكة." },
                        { t: "الانتظار حتى يبتعد عجلان عن الحصن", r: "⚠️ مخاطرة كبرى. تنبه الحراس وأغلقوا البوابة. خضت معركة شوارع مكشوفة وتأخر النصر كثيراً." },
                        { t: "محاولة استمالة حراس البوابة بالوعود", r: "❌ قرار كارثي. أبلغ الحراس عجلان فوراً بمحاولتكم، وحوصرت أنت ورجالك داخل البيوت وكدتم أن تُقتلوا." }
                    ],
                    bio: "الملك عبد العزيز (1876-1953م). مؤسس المملكة العربية السعودية الحديثة. وحد الحجاز وعسير والإحساء ونجد، واكتشف النفط في عهده لتبدأ النهضة الكبرى."
                },
                en: {
                    name: "King Abdulaziz",
                    title: "Conquest of Riyadh (1902)",
                    quest: "With only 63 men against Masmak Fort, dawn is approaching. Will you storm the fort now?",
                    paths: [
                        { t: "Storm the fort as the gate opens", r: "✅ Success! You reclaimed the throne and began the journey to unify the modern Kingdom of Saudi Arabia." },
                        { t: "Wait for the Governor to move away", r: "⚠️ Risk. The guards shut the gates, forcing an open street fight and delaying the victory." },
                        { t: "Try to bribe or persuade the guards", r: "❌ Disastrous. Loyal guards reported you immediately. You and your men barely escaped with your lives." }
                    ],
                    bio: "King Abdulaziz Al Saud. Founder of modern Saudi Arabia. He unified the nation and established the state's modern institutions."
                }
            }
        };

        const INTERFACE_TEXTS = {
            ar: { title: "ملاحم التأسيس", desc: "تاريخ المملكة بقرارات الأبطال.", start: "دخول الملحمة", lore: "سير الأبطال", choose: "اختر القائد", home: "الرئيسية", cancel: "تراجع", verdict: "حكم التاريخ", retry: "تجربة مسار آخر", main: "الرئيسية", records: "سجل الخالدين", bioBack: "رجوع", dir: "rtl" },
            en: { title: "Founding Epics", desc: "Saudi history via hero decisions.", start: "Enter Epic", lore: "Bio Records", choose: "Select Leader", home: "Home", cancel: "Back", verdict: "Verdict", retry: "Retry Path", main: "Home", records: "Immortal Records", bioBack: "Back", dir: "ltr" }
        };

        let currentLang = 'ar';

        function setLanguage(lang) {
            currentLang = lang; const ui = INTERFACE_TEXTS[lang];
            document.documentElement.lang = lang; document.documentElement.dir = ui.dir; document.body.style.direction = ui.dir;
            document.getElementById('ar-btn').classList.toggle('active', lang === 'ar'); document.getElementById('en-btn').classList.toggle('active', lang === 'en');
            document.getElementById('ui-title').innerText = ui.title; document.getElementById('ui-desc').innerText = ui.desc;
            document.getElementById('ui-btn-start').innerText = ui.start; document.getElementById('ui-btn-lore').innerText = ui.lore;
            document.getElementById('ui-choose').innerText = ui.choose; document.getElementById('ui-back-home').innerText = ui.home;
            document.getElementById('ui-cancel').innerText = ui.cancel; document.getElementById('ui-verdict').innerText = ui.verdict;
            document.getElementById('ui-retry').innerText = ui.retry; document.getElementById('ui-res-home').innerText = ui.main;
            document.getElementById('ui-records').innerText = ui.records; document.getElementById('ui-lore-back').innerText = ui.main;
            document.getElementById('ui-bio-back').innerText = ui.bioBack; initHeroButtons();
        }

        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); setTimeout(() => s.style.display = 'none', 300); });
            setTimeout(() => { const t = document.getElementById(id); t.style.display = 'block'; setTimeout(() => t.classList.add('active'), 50); document.getElementById('scroll-top').scrollTop = 0; }, 350);
        }

        function initHeroButtons() {
            const c = document.getElementById('hero-list'); c.innerHTML = '';
            Object.keys(HISTORICAL_DATA).forEach(k => {
                const b = document.createElement('button'); b.className = 'action-btn'; b.innerText = HISTORICAL_DATA[k][currentLang].name; b.onclick = () => startScenario(k); c.appendChild(b);
            });
        }

        function startScenario(k) {
            const d = HISTORICAL_DATA[k][currentLang]; document.getElementById('q-head').innerText = d.title; document.getElementById('q-body').innerText = d.quest;
            const bD = document.getElementById('q-choices'); bD.innerHTML = '';
            d.paths.forEach(p => {
                const b = document.createElement('button'); b.className = 'action-btn'; b.innerText = p.t; b.onclick = () => { document.getElementById('res-text').innerText = p.r; navTo('scr-result'); }; bD.appendChild(b);
            }); navTo('scr-quest');
        }

        function initLore() {
            const c = document.getElementById('lore-list'); c.innerHTML = '';
            Object.keys(HISTORICAL_DATA).forEach(k => {
                const b = document.createElement('button'); b.className = 'action-btn'; b.innerText = HISTORICAL_DATA[k][currentLang].name; b.onclick = () => { document.getElementById('bio-head').innerText = HISTORICAL_DATA[k][currentLang].name; document.getElementById('bio-content').innerText = HISTORICAL_DATA[k][currentLang].bio; navTo('scr-bio'); }; c.appendChild(b);
            }); navTo('scr-lore');
        }

        const canvas = document.getElementById('sand-canvas'); const ctx = canvas.getContext('2d'); let dots = [];
        function createDots() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; dots = []; for (let i = 0; i < 200; i++) dots.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, speed: Math.random() * 0.3 + 0.1, op: Math.random() * 0.5 }); }
        function render() { ctx.clearRect(0, 0, canvas.width, canvas.height); dots.forEach(d => { ctx.fillStyle = `rgba(193, 163, 95, ${d.op})`; d.y -= d.speed; if (d.y < 0) d.y = canvas.height; ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2); ctx.fill(); }); requestAnimationFrame(render); }
        window.onresize = createDots; createDots(); render(); setLanguage('ar');
    </script>
</body>
</html>
