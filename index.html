<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - الإصدار النهائي للمشروع</title>
    
    <style>
        /* --- الهوية البصرية الملكية --- */
        :root {
            --gold-primary: #c1a35f;
            --gold-bright: #f3cf7a;
            --deep-green: #05160d;
            --glass-bg: rgba(0, 0, 0, 0.45);
            --glass-border: rgba(193, 163, 95, 0.35);
        }

        /* --- إعدادات الصفحة الأساسية --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- محرك الرمال المتحركة --- */
        #sand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- شريط اختيار اللغة (عربي/إنجليزي فقط) --- */
        .language-nav {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            padding: 12px 30px;
            border-radius: 50px;
            border: 1.5px solid var(--gold-primary);
            display: flex;
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .language-nav button {
            background: transparent;
            border: 1px solid transparent;
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 900;
            font-size: 1rem;
            transition: 0.5s;
            text-transform: uppercase;
        }

        .language-nav button:hover {
            background: var(--gold-primary);
            color: #000;
            box-shadow: 0 0 15px var(--gold-bright);
        }

        /* --- الحاوية الرئيسية الزجاجية --- */
        .main-container {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid var(--glass-border);
            border-radius: 45px;
            padding: 60px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            max-height: 85vh;
            overflow-y: auto;
        }

        /* --- تأثيرات الأنيميشن (تظهر ببطء وفخامة) --- */
        .active {
            display: block !important;
            animation: royalFade 1.3s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes royalFade {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.92);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        h1 {
            font-size: 3.8rem;
            color: var(--gold-primary);
            margin-bottom: 30px;
            text-shadow: 0 8px 20px rgba(0,0,0,0.6);
            font-weight: 900;
            letter-spacing: -1px;
        }

        .description {
            font-size: 1.5rem;
            color: #f0f0f0;
            margin-bottom: 50px;
            line-height: 1.9;
        }

        /* --- الأزرار الكبيرة التفاعلية --- */
        .action-button {
            width: 100%;
            background: linear-gradient(145deg, rgba(193, 163, 95, 0.2), rgba(0, 0, 0, 0.8));
            border: 2.5px solid var(--gold-primary);
            padding: 28px;
            border-radius: 25px;
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .action-button:hover {
            background: var(--gold-primary);
            color: #000;
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 20px 40px rgba(193, 163, 95, 0.5);
        }

        /* --- لوحة النصوص (سيرة ذاتية / نتائج) --- */
        .content-panel {
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 30px;
            text-align: justify;
            line-height: 2.4;
            font-size: 1.3rem;
            border-right: 12px solid var(--gold-primary);
            margin-top: 40px;
            color: #ffffff;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        [dir="ltr"] .content-panel {
            border-right: none;
            border-left: 12px solid var(--gold-primary);
            text-align: left;
        }

        .footer-link {
            display: inline-block;
            margin-top: 50px;
            color: var(--gold-bright);
            text-decoration: none;
            font-weight: 900;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.4s;
            border-bottom: 3px solid transparent;
        }

        .footer-link:hover {
            color: #fff;
            border-bottom-color: #fff;
            letter-spacing: 2px;
        }

        /* --- السكرول بار المخصص --- */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.4); }

        .screen { display: none; }
    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="language-nav">
        <button onclick="updateApp('ar')">العربية</button>
        <button onclick="updateApp('en')">ENGLISH</button>
    </div>

    <div class="main-container">
        
        <div id="scr-home" class="screen active">
            <h1 id="lbl-home-title">ملاحم التأسيس</h1>
            <p class="description" id="lbl-home-desc">سجل تاريخي تفاعلي يروي قصة الأمجاد السعودية عبر القرون</p>
            <button class="action-button" id="lbl-btn-start" onclick="nav('scr-heroes')">دخول الملحمة الكبرى</button>
            <button class="action-button" id="lbl-btn-lore" onclick="initLore()">سجل الخالدين</button>
        </div>

        <div id="scr-heroes" class="screen">
            <h1 id="lbl-hero-title">اختر القائد التاريخي</h1>
            <div id="hero-grid"></div>
            <a class="footer-link" id="lbl-back-home" onclick="nav('scr-home')">عودة للرئيسية</a>
        </div>

        <div id="scr-mission" class="screen">
            <h1 id="lbl-mission-title">المهمة التاريخية</h1>
            <div id="mission-text" class="content-panel"></div>
            <div id="decision-grid"></div>
            <a class="footer-link" id="lbl-back-hero" onclick="nav('scr-heroes')">انسحاب للقائمة</a>
        </div>

        <div id="scr-result" class="screen">
            <h1 id="lbl-result-title">حكم التاريخ</h1>
            <div id="result-text" class="content-panel"></div>
            <div style="display: flex; gap: 40px; justify-content: center;">
                <a class="footer-link" id="lbl-retry" onclick="nav('scr-mission')">تغيير المسار</a>
                <a class="footer-link" id="lbl-final-home" onclick="nav('scr-home')">الرئيسية</a>
            </div>
        </div>

        <div id="scr-lore-list" class="screen">
            <h1 id="lbl-lore-title">تاريخ العظماء</h1>
            <div id="lore-grid"></div>
            <a class="footer-link" id="lbl-back-lore" onclick="nav('scr-home')">عودة</a>
        </div>

        <div id="scr-bio" class="screen">
            <h1 id="bio-title" style="color: var(--gold-bright);"></h1>
            <div id="bio-body" class="content-panel"></div>
            <a class="footer-link" id="lbl-back-to-list" onclick="nav('scr-lore-list')">العودة للسجل</a>
        </div>

    </div>

    <script>
        // --- قاعدة البيانات المطولة (عربي + إنجليزي فقط) ---
        const GameData = {
            ar: {
                dir: 'rtl', hT: "ملاحم التأسيس", hD: "رحلة تفاعلية عبر محطات التاريخ السعودي المجيد، من فجر التأسيس إلى عصر التوحيد.", bS: "دخول الملحمة الكبرى", bL: "سجل الخالدين", hH: "اختر القائد التاريخي", mH: "المهمة التاريخية", rH: "حكم التاريخ النهائي", back: "العودة", retry: "تغيير المسار التاريخي", home: "الرئيسية", lH: "تاريخ العظماء",
                heroes: {
                    saud: {
                        name: "الإمام محمد بن سعود",
                        q: "عام 1727م: الدرعية تواجه تحديات كبرى في نجد. هل تختار تأسيس ميثاق تاريخي يقوم على العلم والوحدة والسيادة لتكون الدرعية عاصمة لدولة كبرى، أم تكتفي بحماية مدينتك عسكرياً دون طموح التوسع؟",
                        d: [
                            { t: "عقد ميثاق الدرعية والوحدة", r: "✅ انتصار تاريخي خالد! بقرارك الحكيم، أسست الدولة السعودية الأولى التي نشرت الأمن والعدل في أنحاء الجزيرة العربية، وصنعت تاريخاً يفتخر به الأحفاد." },
                            { t: "التركيز على حماية الدرعية فقط", r: "⚠️ نجاح محدود. استطعت حماية مدينتك لسنوات، لكن غياب الرؤية الموحدة جعل المنطقة تظل في حالة صراع وتشتت لعقود طويلة." }
                        ],
                        bio: "الإمام محمد بن سعود بن محمد بن مقرن، هو مؤسس الدولة السعودية الأولى (1139هـ / 1727م). قائد فذ جعل من الدرعية منطلقاً لتوحيد معظم أجزاء الجزيرة العربية تحت راية واحدة، متميزاً بالحكمة والعدل والرؤية البعيدة."
                    },
                    turki: {
                        name: "الإمام تركي بن عبد الله",
                        q: "بعد سقوط الدرعية، الرياض تحت قبضة المحتلين. تخرج من مغارة 'عليا' وحيداً بسيفك 'الأجرب'. هل تباغت الحصون الآن رغم قلة العدد، أم تبتعد لجمع المزيد من الأنصار لسنوات؟",
                        d: [
                            { t: "اقتحام الرياض بسيف الأجرب", r: "✅ عودة الأمل! بفضل شجاعتك، استعدت الرياض وأسست الدولة السعودية الثانية. سيفك أصبح رمزاً لاسترداد الحق المسلوب وإحياء ملك الآباء." },
                            { t: "الانسحاب لجمع الأنصار", r: "❌ ضياع اللحظة التاريخية. استغل المحتلون تأخرك لتحصين المدينة، مما جعل مهمة التحرير لاحقاً أكثر صعوبة ودموية." }
                        ],
                        bio: "الإمام تركي بن عبدالله بن محمد آل سعود، هو مؤسس الدولة السعودية الثانية (1240هـ / 1824م). قائد شجاع تمكن بذكائه وسيفه 'الأجرب' من استعادة الرياض وتوحيد نجد بعد سنوات من الاضطراب."
                    },
                    aziz: {
                        name: "الملك عبد العزيز",
                        q: "ليلة 15 يناير 1902م: تقف مع 63 بطلاً أمام أسوار المصمك. الفجر يقترب والفرصة قد لا تتكرر أبداً. هل تقتحم الحصن الآن بإيمان وثبات لتسترد ملك آبائك، أم تنسحب وتنتظر لسنوات؟",
                        d: [
                            { t: "اقتحام المصمك مع الفجر", r: "✅ الله أكبر! بفتحة المصمك، أعلنت فجر الدولة السعودية الحديثة. بدأت رحلة الـ 30 عاماً لتوحيد المملكة العربية السعودية تحت راية التوحيد والنهضة." },
                            { t: "الانسحاب لانتظار مدد خارجي", r: "❌ ضياع الحلم التاريخي. كشف الأعداء وجودكم وشددوا الحراسة، وظلت الرياض بعيدة المنال لسنوات طويلة من الانتظار المرير." }
                        ],
                        bio: "الملك عبدالعزيز بن عبدالرحمن آل سعود، هو مؤسس المملكة العربية السعودية الحديثة. قائد تاريخي عبقري وحد القلوب والأرض، وحول الشتات إلى كيان عظيم وقوة عالمية يشار لها بالبنان."
                    }
                }
            },
            en: {
                dir: 'ltr', hT: "Founding Epics", hD: "An interactive journey through the milestones of Saudi history, from the dawn of foundation to the era of unification.", bS: "Enter the Great Epic", bL: "Eternal Records", hH: "Choose Your Leader", mH: "Historical Mission", rH: "Final Verdict", back: "Back", retry: "Change Path", home: "Home", lH: "History of Heroes",
                heroes: {
                    saud: {
                        name: "Imam Muhammad bin Saud",
                        q: "1727 AD: Diriyah faces great challenges. Will you establish a historical pact for unity and knowledge to found a great state, or limit yourself to military defense only?",
                        d: [
                            { t: "Establish the Pact of Unity", r: "✅ Eternal Victory! With your wisdom, you founded the First Saudi State, spreading security and justice across Arabia and creating a legacy for generations." },
                            { t: "Focus on military defense only", r: "⚠️ Limited Success. You protected the city, but without a shared vision, the region remained fragmented for decades." }
                        ],
                        bio: "Imam Muhammad bin Saud is the founder of the First Saudi State (1727 AD). A visionary leader who made Diriyah the starting point for unifying Arabia under one banner of justice and peace."
                    },
                    turki: {
                        name: "Imam Turki bin Abdullah",
                        q: "After the fall of Diriyah, Riyadh is occupied. You emerge from the cave with your sword 'Al-Ajrab'. Will you storm the city now despite the odds, or wait for years?",
                        d: [
                            { t: "Storm Riyadh with Al-Ajrab", r: "✅ Hope Restored! Thanks to your courage, you reclaimed Riyadh and founded the Second Saudi State, making your sword a symbol of justice." },
                            { t: "Withdraw to wait for more men", r: "❌ Opportunity Lost. The occupiers reinforced the city, making liberation much harder and bloodier later on." }
                        ],
                        bio: "Imam Turki bin Abdullah is the founder of the Second Saudi State (1824 AD). A brave leader who reclaimed Riyadh and reunited Najd with his legendary courage and tactical brilliance."
                    },
                    aziz: {
                        name: "King Abdulaziz",
                        q: "January 15, 1902: You stand with 63 heroes before Masmak walls. Dawn is near. Will you attack now to reclaim your kingdom, or retreat and wait?",
                        d: [
                            { t: "Attack Masmak at Dawn", r: "✅ Success! You reclaimed Riyadh and started the 30-year journey of unifying the modern Kingdom of Saudi Arabia under peace and progress." },
                            { t: "Retreat to seek more support", r: "❌ History Delayed. The enemy discovered your presence, and Riyadh remained occupied for many more years of bitter waiting." }
                        ],
                        bio: "King Abdulaziz bin Abdulrahman Al Saud is the founder of the modern Kingdom of Saudi Arabia. A genius leader who united hearts and land, transforming fragmentation into a powerful global nation."
                    }
                }
            }
        };

        let activeLanguage = 'ar';
        let currentHeroKey = null;

        // وظائف التحكم في الشاشات
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // تحديث لغة التطبيق
        function updateApp(lang) {
            activeLanguage = lang;
            const d = GameData[lang];
            document.body.dir = d.dir;

            // تحديث النصوص
            document.getElementById('lbl-home-title').innerText = d.hT;
            document.getElementById('lbl-home-desc').innerText = d.hD;
            document.getElementById('lbl-btn-start').innerText = d.bS;
            document.getElementById('lbl-btn-lore').innerText = d.bL;
            document.getElementById('lbl-hero-title').innerText = d.hH;
            document.getElementById('lbl-mission-title').innerText = d.mH;
            document.getElementById('lbl-result-title').innerText = d.rH;
            document.getElementById('lbl-back-home').innerText = d.back;
            document.getElementById('lbl-back-hero').innerText = d.back;
            document.getElementById('lbl-retry').innerText = d.retry;
            document.getElementById('lbl-final-home').innerText = d.home;
            document.getElementById('lbl-lore-title').innerText = d.lH;
            document.getElementById('lbl-back-lore').innerText = d.back;
            document.getElementById('lbl-back-to-list').innerText = d.back;

            buildHeroes();
            nav('scr-home');
        }

        // بناء قائمة الأبطال
        function buildHeroes() {
            const list = document.getElementById('hero-grid');
            list.innerHTML = '';
            const heroes = GameData[activeLanguage].heroes;
            for(let key in heroes) {
                const btn = document.createElement('button');
                btn.className = 'action-button';
                btn.innerText = heroes[key].name;
                btn.onclick = () => startMission(key);
                list.appendChild(btn);
            }
        }

        // بدء المهمة
        function startMission(key) {
            currentHeroKey = key;
            const h = GameData[activeLanguage].heroes[key];
            document.getElementById('mission-text').innerText = h.q;
            const grid = document.getElementById('decision-grid');
            grid.innerHTML = '';
            h.d.forEach(dec => {
                const b = document.createElement('button');
                b.className = 'action-button';
                b.innerText = dec.t;
                b.onclick = () => {
                    document.getElementById('result-text').innerText = dec.r;
                    nav('scr-result');
                };
                grid.appendChild(b);
            });
            nav('scr-mission');
        }

        // بناء سجل الخالدين
        function initLore() {
            const grid = document.getElementById('lore-grid');
            grid.innerHTML = '';
            const heroes = GameData[activeLanguage].heroes;
            for(let key in heroes) {
                const b = document.createElement('button');
                b.className = 'action-button';
                b.innerText = heroes[key].name;
                b.onclick = () => {
                    document.getElementById('bio-title').innerText = heroes[key].name;
                    document.getElementById('bio-body').innerText = heroes[key].bio;
                    nav('scr-bio');
                };
                grid.appendChild(b);
            }
            nav('scr-lore-list');
        }

        // --- محرك الرمال الذهبية (كود مفصل) ---
        const canvas = document.getElementById('sand-canvas');
        const ctx = canvas.getContext('2d');
        let sandParticles = [];

        function setupCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            sandParticles = [];
            for(let i=0; i<200; i++) {
                sandParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2.8,
                    speed: Math.random() * 0.8 + 0.2
                });
            }
        }

        function animateSand() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(193, 163, 95, 0.5)";
            sandParticles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) {
                    p.y = canvas.height;
                    p.x = Math.random() * canvas.width;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animateSand);
        }

        window.onresize = setupCanvas;
        setupCanvas();
        animateSand();
        updateApp('ar');
    </script>
</body>
</html>
