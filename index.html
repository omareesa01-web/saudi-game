<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | الإصدار الموسوعي الزجاجي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* [1] CSS ARCHITECTURE: VARIABLES */
        :root {
            --royal-green: #0D2E1C;
            --gold-primary: #D4AF37;
            --gold-bright: #FFD700;
            --gold-soft: #F9E29C;
            --pure-white: #FFFFFF;
            /* Glassmorphism Settings */
            --glass-bg: rgba(13, 46, 28, 0.75);
            --glass-blur: blur(22px);
            --glass-border: rgba(212, 175, 55, 0.4);
            --shadow-epic: rgba(0, 0, 0, 0.7);
            /* Speed Settings */
            --trans-fast: 0.3s;
            --trans-hero: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* [2] GLOBAL RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--royal-green);
            font-family: 'Cairo', sans-serif;
            color: var(--pure-white);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* [3] SAND PARTICLE ENGINE CANVAS */
        #sand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 5;
            pointer-events: none;
        }

        /* [4] LANGUAGE HUB UI */
        .lang-hub {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
            display: flex;
            gap: 12px;
        }

        .lang-node {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.85rem;
            transition: var(--trans-fast);
            backdrop-filter: blur(5px);
        }

        .lang-node.active {
            background: var(--gold-primary);
            color: var(--royal-green);
            box-shadow: 0 0 20px var(--gold-bright);
        }

        /* [5] MAIN COMPACT GLASS CONTAINER (360px) */
        .app-frame {
            position: relative;
            z-index: 100;
            width: 360px; /* القائمة صغيرة ولمومة كما طلبت */
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-top: 6px solid var(--gold-primary);
            border-radius: 40px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 30px 90px var(--shadow-epic);
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .app-frame::-webkit-scrollbar {
            display: none;
        }

        /* [6] SCREEN TRANSITIONS */
        .ui-screen {
            display: none;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity var(--trans-hero), transform var(--trans-hero);
        }

        .ui-screen.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* [7] TEXT TYPOGRAPHY */
        .title-gold {
            font-size: 1.7rem;
            font-weight: 900;
            color: var(--gold-bright);
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .desc-main {
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 35px;
            opacity: 0.85;
            font-weight: 400;
        }

        /* [8] THE SWORD FLASH BUTTON ENGINE (لمعة السيف) */
        .btn-epic {
            position: relative;
            width: 100%;
            padding: 18px 10px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid var(--gold-primary);
            border-radius: 20px;
            color: var(--pure-white);
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* تأثير لمعة نصل السيف */
        .btn-epic::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg, 
                transparent, 
                rgba(255, 215, 0, 0.4), 
                rgba(255, 255, 255, 0.2), 
                transparent
            );
            transform: skewX(-25deg);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-epic:hover {
            border-color: var(--gold-bright);
            background: rgba(212, 175, 55, 0.15);
            transform: scale(1.02);
        }

        .btn-epic:hover::after {
            left: 150%; /* اللمعة تمر بسرعة خاطفة */
        }

        /* [9] CONTENT BOXES (Historical Lore) */
        .lore-box {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 25px;
            padding: 25px;
            margin: 20px 0;
            text-align: justify;
            line-height: 2.1;
            font-size: 0.9rem;
            border-right: 5px solid var(--gold-primary);
            white-space: pre-line;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
        }

        [dir="ltr"] .lore-box {
            border-right: 0;
            border-left: 5px solid var(--gold-primary);
            text-align: left;
        }

        .nav-back {
            display: inline-block;
            margin-top: 25px;
            color: var(--gold-bright);
            cursor: pointer;
            font-weight: 800;
            font-size: 0.9rem;
            text-decoration: underline;
            text-underline-offset: 8px;
        }

        .nav-back:hover {
            color: var(--pure-white);
        }
    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="lang-hub">
        <div id="ln-ar" class="lang-node active" onclick="TitanEngine.setLang('ar')">العربية</div>
        <div id="ln-en" class="lang-node" onclick="TitanEngine.setLang('en')">English</div>
    </div>

    <div class="app-frame">
        
        <div id="scr-gate" class="ui-screen active">
            <h1 class="title-gold" id="ui-g-h">ملاحم التأسيس</h1>
            <p class="desc-main" id="ui-g-d">عِش تفاصيل التاريخ السعودي العظيم. اتخذ قرارات القادة وخلّد سيرة الأمجاد في سجل الخالدين.</p>
            <button class="btn-epic" id="ui-btn-start" onclick="TitanEngine.nav('scr-select')">ابدأ الملحمة</button>
            <button class="btn-epic" id="ui-btn-arch" onclick="TitanEngine.nav('scr-arch')">سجل الخالدين</button>
        </div>

        <div id="scr-select" class="ui-screen">
            <h1 class="title-gold" id="ui-s-h">اختر القائد</h1>
            <div id="hero-list-container"></div>
            <a class="nav-back" id="ui-b-1" onclick="TitanEngine.nav('scr-gate')">رجوع</a>
        </div>

        <div id="scr-quest" class="ui-screen">
            <h1 id="q-title" style="color: var(--gold-bright); font-size: 1.4rem; margin-bottom: 20px;"></h1>
            <div id="q-body" class="lore-box"></div>
            <div id="q-options"></div>
            <a class="nav-back" id="ui-b-2" onclick="TitanEngine.nav('scr-select')">تراجع</a>
        </div>

        <div id="scr-verdict" class="ui-screen">
            <h1 class="title-gold" id="ui-v-h">حكم التاريخ</h1>
            <div id="verdict-body" class="lore-box"></div>
            <button class="btn-epic" id="ui-btn-again" onclick="TitanEngine.nav('scr-select')">مسار جديد</button>
        </div>

        <div id="scr-arch" class="ui-screen">
            <h1 class="title-gold" id="ui-a-h">سجل الخالدين</h1>
            <div id="arch-list-container"></div>
            <a class="nav-back" id="ui-b-3" onclick="TitanEngine.nav('scr-gate')">الرئيسية</a>
        </div>

        <div id="scr-bio" class="ui-screen">
            <h1 id="bio-title" class="title-gold"></h1>
            <div id="bio-body" class="lore-box"></div>
            <a class="nav-back" id="ui-b-4" onclick="TitanEngine.nav('scr-arch')">العودة للسجل</a>
        </div>

    </div>

    <script>
        /* [1] THE MASSIVE ARCHIVE - الأرشيف التاريخي الموسع لتطويل الكود */
        const MASTER_DATA = {
            imam_mohammad: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    q_h: "فجر التأسيس (1727م)",
                    q_b: "أنت في الدرعية عام 1139هـ. المنطقة تعاني من الفرقة. يأتيك الشيخ محمد بن عبدالوهاب طالباً النصرة لنشر التوحيد وتأسيس دولة قوية.\n\nهل تعقد ميثاق الدرعية التاريخي؟",
                    opts: [
                        { l: "عقد الميثاق وتأسيس الدولة", r: "✅ 'أبشر بالعز والتمكين'.. بهذه الكلمات بدأت الدولة السعودية الأولى. بقرارك هذا، تحولت الدرعية لعاصمة سياسية وعلمية كبرى، ووحدت نجد والحجاز لأول مرة منذ قرون." },
                        { l: "الاكتفاء بحماية الشيخ فقط", r: "⚠️ القرار حافظ على الأمن المحلي، لكن فرصة بناء دولة عظمى ضاعت، وبقيت الجزيرة مشتتة لسنوات إضافية." }
                    ],
                    bio: "• مؤسس الدولة السعودية الأولى (يوم التأسيس).\n\n• إنجازاته:\n1. توحيد شطري الدرعية تحت حكم واحد.\n2. بناء سور الدرعية العظيم.\n3. تأمين طرق الحج والتجارة.\n4. استضافة العلماء وجعل الدرعية مركزاً للفكر الإسلامي.\n\n• إرثه: وضع حجر الأساس لكل أمجاد الوطن الحالية."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    q_h: "Founding Dawn (1727)",
                    q_b: "In Diriyah, 1727 AD. The land is divided. A scholar seeks your alliance to unify the peninsula and establish a law-based state.\n\nDo you form the Historic Diriyah Pact?",
                    opts: [
                        { l: "Form the Pact & State", r: "✅ 'Be promised glory and empowerment'.. With these words, the First Saudi State began. Diriyah became a great political and educational capital." },
                        { l: "Provide Protection Only", r: "⚠️ Security was granted, but the chance to build a vast nation was lost, leaving the land fragmented for years." }
                    ],
                    bio: "• Founder of the First Saudi State (Founding Day).\n\n• Achievements:\n1. Unified Diriyah districts.\n2. Built the Great Wall of Diriyah.\n3. Secured Hajj and trade routes.\n4. Established a hub for knowledge.\n\n• Legacy: Laid the foundation for all modern Saudi glory."
                }
            },
            imam_turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    q_h: "ملحمة الاسترداد (1240هـ)",
                    q_b: "بعد سقوط الدرعية، أنت الآن في 'خلوة الحلوة' ومعك سيفك 'الأجرب' وعدد قليل من الأبطال. الحامية الأجنبية تحتل الرياض.\n\nهل تباغت الحامية لاستعادة ملك آبائك؟",
                    opts: [
                        { l: "مباغتة الحامية الآن", r: "✅ نصر تاريخي! استعدت الرياض وأعلنت قيام الدولة السعودية الثانية (1824م). أثبتّ أن الحق السعودي لا يموت بسيفك الأجرب وشجاعتك النادرة." },
                        { l: "الانتظار لجمع القبائل", r: "❌ كُشف موقعك من الجواسيس، فحصن العدو الرياض، مما جعل التحرير لاحقاً أكثر صعوبة ومرارة." }
                    ],
                    bio: "• بطل الاستعادة ومؤسس الدولة الثانية.\n\n• إنجازاته:\n1. تطهير نجد من القوات الأجنبية.\n2. اتخاذ الرياض عاصمة دائمية لآل سعود.\n3. إعادة بناء قصر الحكم وجامع الإمام تركي.\n\n• رمزه: سيفه 'الأجرب' الذي صار مضرباً للمثل في الشجاعة."
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    q_h: "The Restoration (1824)",
                    q_b: "After the fall of Diriyah, you are in hiding with your sword 'Al-Ajrab'. The foreign garrison occupies Riyadh.\n\nDo you launch a surprise attack to reclaim your throne?",
                    opts: [
                        { l: "Launch Surprise Raid", r: "✅ Historic Victory! You reclaimed Riyadh and founded the Second Saudi State (1824). You proved Saudi rights never die." },
                        { l: "Wait for Reinforcements", r: "❌ Spies revealed your location. The enemy fortified Riyadh, making the eventual liberation much harder." }
                    ],
                    bio: "• Hero of Restoration & Founder of the 2nd State.\n\n• Achievements:\n1. Cleared Najd of foreign forces.\n2. Established Riyadh as the capital.\n3. Rebuilt the Justice Palace.\n\n• Symbol: His sword 'Al-Ajrab', a legend of bravery."
                }
            },
            king_abdulaziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    q_h: "فتح الرياض (1319هـ)",
                    q_b: "في ليلة 4 شوال، تقف مع 63 بطلاً خلف أسوار الرياض. بوابة المصمك ستفتح الآن لخروج الحاكم. اللحظة حاسمة.\n\nهل تقتحم البوابة فوراً؟",
                    opts: [
                        { l: "اقتحام المصمك الآن", r: "✅ 'الملك لله ثم لعبد العزيز'.. بهذه الصرخة استعدت الرياض وبدأ فجر المملكة الحديثة. وحدت البلاد والقلوب تحت راية التوحيد." },
                        { l: "التراجع لتغيير الخطة", r: "⚠️ ضاعت فرصة المباغتة. الحامية تحصنت بالداخل وتأخر توحيد المملكة لسنوات عديدة من الكفاح." }
                    ],
                    bio: "• المؤسس العظيم للمملكة العربية السعودية.\n\n• إنجازاته:\n1. استعادة الرياض في عملية عسكرية مذهلة.\n2. توحيد كافة أقاليم المملكة (1351هـ).\n3. بدء عصر النفط والنهضة التعليمية.\n4. تأسيس الوزارات والأنظمة الحديثة.\n\n• إرثه: بنى وطناً شامخاً يجمع بين الأصالة والتطور."
                },
                en: {
                    name: "King Abdulaziz",
                    q_h: "Conquest of Riyadh (1902)",
                    q_b: "On the night of Jan 15, you stand with 63 heroes behind Riyadh walls. The Masmak gate is about to open. This is the moment.\n\nDo you storm the gate now?",
                    opts: [
                        { l: "Storm Masmak Now", r: "✅ 'Kingdom for God, then for Abdulaziz'.. Riyadh was reclaimed, starting the dawn of the modern Kingdom and unifying the nation." },
                        { l: "Retreat to Plan", r: "⚠️ The element of surprise was lost. The garrison fortified, delaying the unification for many years of struggle." }
                    ],
                    bio: "• The Great Founder of Saudi Arabia.\n\n• Achievements:\n1. Reclaimed Riyadh in a daring raid.\n2. Unified the Kingdom in 1932.\n3. Started the oil and education era.\n4. Established modern government systems."
                }
            }
        };

        const UI_LABELS = {
            ar: { g_h: "ملاحم التأسيس", g_d: "عِش تفاصيل التاريخ السعودي العظيم. اتخذ قرارات القادة وخلّد سيرة الأمجاد.", s_h: "اختر القائد", v_h: "حكم التاريخ", a_h: "سجل الخالدين", b: "رجوع", start: "ابدأ الملحمة", arch: "سجل الخالدين", again: "مسار جديد", dir: "rtl" },
            en: { g_h: "Founding Epics", g_d: "Live the details of great Saudi history. Shape the legacy with your decisions.", s_h: "Select Hero", v_h: "The Verdict", a_h: "Immortal Archive", b: "Back", start: "Start", arch: "Archive", again: "New Path", dir: "ltr" }
        };

        /* [2] TITAN LOGIC ENGINE */
        const TitanEngine = {
            lang: 'ar',
            init() {
                this.setLang('ar');
                SandSystem.run();
            },
            setLang(l) {
                this.lang = l;
                const ui = UI_LABELS[l];
                document.documentElement.dir = ui.dir;
                document.querySelectorAll('.lang-node').forEach(n => n.classList.remove('active'));
                document.getElementById('ln-' + l).classList.add('active');
                
                document.getElementById('ui-g-h').innerText = ui.g_h;
                document.getElementById('ui-g-d').innerText = ui.g_d;
                document.getElementById('ui-btn-start').innerText = ui.start;
                document.getElementById('ui-btn-arch').innerText = ui.arch;
                document.getElementById('ui-s-h').innerText = ui.s_h;
                document.getElementById('ui-v-h').innerText = ui.v_h;
                document.getElementById('ui-a-h').innerText = ui.a_h;
                document.getElementById('ui-btn-again').innerText = ui.again;
                for(let i=1; i<=4; i++) document.getElementById('ui-b-'+i).innerText = ui.b;
                this.renderContent();
            },
            nav(id) {
                const screens = document.querySelectorAll('.ui-screen');
                screens.forEach(s => { 
                    s.classList.remove('active'); 
                    setTimeout(() => s.style.display = 'none', 300); 
                });
                setTimeout(() => { 
                    const target = document.getElementById(id);
                    target.style.display = 'block'; 
                    setTimeout(() => target.classList.add('active'), 50); 
                }, 350);
            },
            renderContent() {
                const hL = document.getElementById('hero-list-container');
                const aL = document.getElementById('arch-list-container');
                hL.innerHTML = ''; aL.innerHTML = '';
                Object.keys(MASTER_DATA).forEach(key => {
                    const data = MASTER_DATA[key][this.lang];
                    const b1 = document.createElement('button'); b1.className = 'btn-epic'; b1.innerText = data.name; b1.onclick = () => this.openQuest(key); hL.appendChild(b1);
                    const b2 = document.createElement('button'); b2.className = 'btn-epic'; b2.innerText = data.name; b2.onclick = () => this.openBio(key); aL.appendChild(b2);
                });
            },
            openQuest(key) {
                const d = MASTER_DATA[key][this.lang];
                document.getElementById('q-title').innerText = d.q_h;
                document.getElementById('q-body').innerText = d.q_b;
                const optsBox = document.getElementById('q-options'); optsBox.innerHTML = '';
                d.opts.forEach(o => {
                    const b = document.createElement('button'); b.className = 'btn-epic'; b.innerText = o.l;
                    b.onclick = () => { document.getElementById('verdict-body').innerText = o.r; this.nav('scr-verdict'); };
                    optsBox.appendChild(b);
                });
                this.nav('scr-quest');
            },
            openBio(key) {
                const d = MASTER_DATA[key][this.lang];
                document.getElementById('bio-title').innerText = d.name;
                document.getElementById('bio-body').innerText = d.bio;
                this.nav('scr-bio');
            }
        };

        /* [3] VISUALS: SAND SYSTEM */
        const SandSystem = {
            canvas: document.getElementById('sand-canvas'),
            ctx: null, grains: [],
            run() {
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                for(let i=0; i<350; i++) this.grains.push({ x:Math.random()*this.canvas.width, y:Math.random()*this.canvas.height, s:Math.random()*1.8, v:Math.random()*0.4+0.1, o:Math.random()*0.5 });
                this.animate();
                window.onresize = () => this.resize();
            },
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; },
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.fillStyle = '#FFD700';
                this.grains.forEach(g => {
                    g.x += g.v;
                    if(g.x > this.canvas.width) g.x = -5;
                    this.ctx.globalAlpha = g.o;
                    this.ctx.beginPath(); this.ctx.arc(g.x, g.y, g.s, 0, Math.PI*2); this.ctx.fill();
                });
                requestAnimationFrame(() => this.animate());
            }
        };

        window.onload = () => TitanEngine.init();
    </script>
</body>
</html>
