<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | The Founding Epic</title>
    
    <style>
        :root {
            --saudi-green: #006C35; 
            --light-green: #00843D;
            --glow-green: #22C55E;
            --deep-green: #062113;
            --forest-black: #010a05;
            --glass-bg: rgba(0, 32, 16, 0.97); 
            --glass-border: rgba(34, 197, 94, 0.4);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--deep-green) 0%, var(--forest-black) 100%);
            color: #ffffff; font-family: var(--font-main);
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        #titan-engine-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

        .app-container {
            position: relative; z-index: 100; width: 90%; max-width: 440px;
            background: var(--glass-bg); backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border); border-top: 6px solid var(--saudi-green);
            border-radius: 30px; padding: 30px 20px; text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8); max-height: 85vh; overflow-y: auto;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-container::-webkit-scrollbar { width: 3px; }
        .app-container::-webkit-scrollbar-thumb { background: var(--saudi-green); }

        .main-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 10px; text-shadow: 0 0 15px var(--glow-green); }
        .description-text { font-size: 0.9rem; line-height: 1.5; color: #aaa; margin-bottom: 25px; }

        /* نظام الأزرار المدمج */
        .btn-epic {
            position: relative; width: 100%; padding: 16px; margin-bottom: 12px;
            background: linear-gradient(135deg, var(--saudi-green), var(--deep-green));
            border: 1px solid var(--glow-green); border-radius: 15px;
            color: #ffffff; font-size: 0.95rem; font-weight: 800; cursor: pointer; 
            transition: 0.3s; overflow: hidden;
        }
        
        .btn-epic::after {
            content: ""; position: absolute; top: -50%; left: -150%;
            width: 40%; height: 200%; background: rgba(255, 255, 255, 0.3);
            transform: rotate(35deg); filter: blur(5px);
        }
        
        .btn-epic:hover::after { left: 150%; transition: 0.7s; }
        .btn-epic:hover { transform: scale(1.02); background: var(--light-green); }

        .lore-box {
            background: rgba(0, 0, 0, 0.5); border-radius: 20px; padding: 25px;
            margin: 15px 0; text-align: justify; line-height: 1.8; font-size: 0.95rem;
            color: #e0e0e0; border-right: 5px solid var(--saudi-green);
            white-space: pre-line; box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
        }

        .lang-switcher {
            position: absolute; top: 15px; right: 20px; 
            background: rgba(255,255,255,0.1); padding: 5px 12px;
            border-radius: 20px; font-size: 0.75rem; cursor: pointer;
            border: 1px solid var(--glass-border); z-index: 110;
        }

        .back-nav { display: inline-block; margin-top: 15px; color: var(--glow-green); cursor: pointer; font-weight: 800; font-size: 0.85rem; }
        
        .screen { display: none; opacity: 0; transition: 0.4s ease; }
        .screen.active { display: block; opacity: 1; }
        
        /* تحسين مظهر قائمة المواقف المدمجة */
        .scenario-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    </style>
</head>
<body>

    <div class="lang-switcher" onclick="toggleLang()" id="langBtn">English</div>
    <canvas id="titan-engine-canvas"></canvas>

    <div class="app-container" id="app-scroller">
        
        <div id="screen-gate" class="screen active">
            <h1 class="main-title" data-ar="ملاحم التأسيس" data-en="Founding Epics">ملاحم التأسيس</h1>
            <p class="description-text" data-ar="عش تجربة القادة العظماء واتخذ قراراتك المصيرية." data-en="Live the experience of great leaders and make destiny-shaping decisions.">عش تجربة القادة العظماء واتخذ قراراتك المصيرية.</p>
            <button class="btn-epic" onclick="navigateTo('screen-selection')" data-ar="ابدأ الملحمة" data-en="Start the Epic">ابدأ الملحمة</button>
            <button class="btn-epic" onclick="navigateTo('screen-archive')" data-ar="أرشيف الخالدين" data-en="Immortal Archive">أرشيف الخالدين</button>
        </div>

        <div id="screen-selection" class="screen">
            <h1 class="main-title" data-ar="اختر القائد" data-en="Select Leader">اختر القائد</h1>
            <div id="hero-injection"></div>
            <a class="back-nav" onclick="navigateTo('screen-gate')" data-ar="رجوع" data-en="Back">رجوع</a>
        </div>

        <div id="screen-scenarios" class="screen">
            <h1 class="main-title" data-ar="المواقف التاريخية" data-en="Historical Scenarios">المواقف التاريخية</h1>
            <div id="scenario-injection" class="scenario-grid"></div>
            <a class="back-nav" onclick="navigateTo('screen-selection')" data-ar="تغيير القائد" data-en="Change Leader">تغيير القائد</a>
        </div>

        <div id="screen-quest" class="screen">
            <h1 id="q-title" style="color: var(--glow-green); font-size: 1.3rem; margin-bottom: 10px;"></h1>
            <div id="q-text" class="lore-box"></div>
            <div id="q-actions"></div>
            <a class="back-nav" onclick="navigateTo('screen-scenarios')" data-ar="تراجع" data-en="Go Back">تراجع</a>
        </div>

        <div id="screen-result" class="screen">
            <h1 class="main-title" data-ar="حكم التاريخ" data-en="History's Verdict">حكم التاريخ</h1>
            <div id="res-text" class="lore-box"></div>
            <button class="btn-epic" onclick="navigateTo('screen-quest')" data-ar="تجربة قرار آخر" data-en="Try Another Decision">تجربة قرار آخر</button>
            <a class="back-nav" onclick="navigateTo('screen-scenarios')" data-ar="العودة للمواقف" data-en="Back to Scenarios">العودة للمواقف</a>
        </div>

        <div id="screen-archive" class="screen">
            <h1 class="main-title" data-ar="سجل الخالدين" data-en="Immortal Record">سجل الخالدين</h1>
            <div id="arch-injection"></div>
            <a class="back-nav" onclick="navigateTo('screen-gate')" data-ar="رجوع" data-en="Back">رجوع</a>
        </div>

        <div id="screen-bio" class="screen">
            <h1 id="bio-name" class="main-title"></h1>
            <div id="bio-content" class="lore-box"></div>
            <a class="back-nav" onclick="navigateTo('screen-archive')" data-ar="رجوع للأرشيف" data-en="Back to Archive">رجوع للأرشيف</a>
        </div>
    </div>

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = currentLang === 'ar' ? 'English' : 'عربي';
            updateStaticTexts();
            buildGrids();
        }

        function updateStaticTexts() {
            document.querySelectorAll('[data-' + currentLang + ']').forEach(el => {
                el.innerText = el.getAttribute('data-' + currentLang);
            });
        }

        function navigateTo(id) {
            document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
            const target = document.getElementById(id);
            target.style.display = 'block';
            setTimeout(() => target.classList.add('active'), 50);
            document.getElementById('app-scroller').scrollTop = 0;
        }

        function buildGrids() {
            const hPoint = document.getElementById('hero-injection');
            const aPoint = document.getElementById('arch-injection');
            hPoint.innerHTML = ''; aPoint.innerHTML = '';

            Object.keys(EPIC_DATA).forEach(key => {
                const hBtn = document.createElement('button');
                hBtn.className = 'btn-epic';
                hBtn.innerText = EPIC_DATA[key].name[currentLang];
                hBtn.onclick = () => showScenarios(key);
                hPoint.appendChild(hBtn);

                const aBtn = document.createElement('button');
                aBtn.className = 'btn-epic';
                aBtn.innerText = EPIC_DATA[key].name[currentLang];
                aBtn.onclick = () => {
                    document.getElementById('bio-name').innerText = EPIC_DATA[key].name[currentLang];
                    document.getElementById('bio-content').innerText = EPIC_DATA[key].bio[currentLang];
                    navigateTo('screen-bio');
                };
                aPoint.appendChild(aBtn);
            });
        }

        function showScenarios(heroKey) {
            window.activeHero = heroKey;
            const sPoint = document.getElementById('scenario-injection');
            sPoint.innerHTML = '';
            EPIC_DATA[heroKey].scenarios.forEach((sc, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = sc.title[currentLang];
                btn.onclick = () => loadQuest(idx);
                sPoint.appendChild(btn);
            });
            navigateTo('screen-scenarios');
        }

        function loadQuest(idx) {
            window.activeScenarioIdx = idx;
            const sc = EPIC_DATA[window.activeHero].scenarios[idx];
            document.getElementById('q-title').innerText = sc.title[currentLang];
            document.getElementById('q-text').innerText = sc.story[currentLang];
            const aPoint = document.getElementById('q-actions');
            aPoint.innerHTML = '';
            sc.choices.forEach(ch => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = ch.l[currentLang];
                btn.onclick = () => {
                    document.getElementById('res-text').innerText = ch.r[currentLang];
                    navigateTo('screen-result');
                };
                aPoint.appendChild(btn);
            });
            navigateTo('screen-quest');
        }

        // Particle System
        const canvas = document.getElementById('titan-engine-canvas');
        const ctx = canvas.getContext('2d');
        let ps = [];
        class P {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.v = (Math.random()-0.5)*0.3; }
            u() { this.x+=this.v; if(this.x>canvas.width)this.x=0; ctx.beginPath(); ctx.arc(this.x,this.y,1,0,Math.PI*2); ctx.fillStyle='#22C55E'; ctx.globalAlpha=0.2; ctx.fill(); }
        }
        function init() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; ps=[]; for(let i=0;i<100;i++) ps.push(new P()); }
        function loop() { ctx.clearRect(0,0,canvas.width,canvas.height); ps.forEach(p=>p.u()); requestAnimationFrame(loop); }
        window.onresize=init; init(); loop(); buildGrids();
    </script>
</body>
</html>
