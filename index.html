<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ملحمة التأسيس - النسخة العالمية الكاملة</title>
    <style>
        :root { --gold: #c1a35f; --dark: #05160d; --glass: rgba(0, 0, 0, 0.96); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--dark); font-family: 'Segoe UI', Tahoma, sans-serif; color: white; overflow: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, var(--dark) 100%); z-index: -2; }
        
        /* شريط اللغات العلوي */
        .lang-bar { position: fixed; top: 10px; left: 10px; z-index: 100; display: flex; gap: 5px; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 12px; border: 1px solid var(--gold); }
        .lang-bar button { background: transparent; border: 1px solid var(--gold); color: white; font-size: 0.75rem; cursor: pointer; border-radius: 5px; padding: 5px 10px; }

        .screen { display: none; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 20px; text-align: center; }
        .active { display: flex; animation: ultraEntrance 0.8s ease-out forwards; }
        @keyframes ultraEntrance { 0% { opacity: 0; transform: scale(0.95); filter: blur(10px); } 100% { opacity: 1; transform: scale(1); filter: blur(0); } }

        .card { background: var(--glass); border: 1px solid var(--gold); padding: 35px; border-radius: 35px; max-width: 750px; width: 92%; box-shadow: 0 0 80px rgba(193, 163, 95, 0.2); backdrop-filter: blur(40px); position: relative; border-bottom: 6px solid var(--gold); max-height: 85vh; overflow-y: auto; }
        .option-btn { background: linear-gradient(145deg, rgba(193, 163, 95, 0.1), rgba(0,0,0,0.4)); border: 1px solid rgba(193, 163, 95, 0.4); color: white; padding: 18px; margin: 12px 0; border-radius: 20px; cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: bold; transition: all 0.3s; display: block; }
        .option-btn:hover { background: var(--gold); color: black; transform: translateY(-3px); }
        
        .result-box { padding: 25px; border-right: 5px solid var(--gold); background: rgba(255,255,255,0.06); margin-top: 20px; text-align: right; line-height: 1.8; border-radius: 10px 0 0 10px; }
        [dir="ltr"] .result-box { text-align: left; border-right: none; border-left: 5px solid var(--gold); border-radius: 0 10px 10px 0; }
        
        .back-link { margin-top: 25px; color: var(--gold); cursor: pointer; font-weight: bold; text-decoration: underline; display: inline-block; font-size: 1.1rem; margin-inline: 15px; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button onclick="setLang('ar')">العربية</button>
        <button onclick="setLang('en')">English</button>
        <button onclick="setLang('es')">Español</button>
        <button onclick="setLang('ru')">Русский</button>
        <button onclick="setLang('ko')">한국어</button>
    </div>

    <canvas id="bg-canvas"></canvas>
    <div class="overlay"></div>

    <div id="main-menu" class="screen active">
        <h1 id="m-title" style="font-size: 3.5rem; color: var(--gold);">ملاحم التأسيس</h1>
        <p id="m-desc" style="color: #aaa; margin-bottom: 30px;">استرجع تاريخ الأبطال بقراراتك المصيرية</p>
        <button id="m-btn-start" class="option-btn" style="width: 320px;" onclick="navigateTo('game-engine')">دخول الملحمة</button>
        <button id="m-btn-lore" class="option-btn" style="width: 320px;" onclick="navigateTo('lore-engine')">سجل الأبطال</button>
    </div>

    <div id="game-engine" class="screen">
        <div class="card" id="game-card">
            </div>
    </div>

    <div id="lore-engine" class="screen">
        <div class="card">
            <h1 id="l-title" style="color: var(--gold);">سجل الملاحم</h1>
            <div id="lore-body" style="line-height: 2.2; text-align: justify; font-size: 1.25rem; margin-bottom: 25px;">
                اختر بطلاً لاستعادة فصول ملحمته..
            </div>
            <div id="lore-btns">
                <button id="l-btn-saud" class="option-btn" onclick="openLore('saud')"></button>
                <button id="l-btn-turki" class="option-btn" onclick="openLore('turki')"></button>
                <button id="l-btn-aziz" class="option-btn" onclick="openLore('aziz')"></button>
            </div>
            <div id="audio-ctrl" style="display:none;">
                <button id="btn-speak" class="option-btn" style="border-style: dashed;" onclick="speakLore()">🔊 استمع للملحمة</button>
            </div>
            <a id="l-back-btn" class="back-link" onclick="navigateTo('main-menu')">العودة</a>
        </div>
    </div>

    <script>
        let currentLang = 'ar';
        
        // قاعدة بيانات اللغات والقرارات الكاملة
        const UI = {
            ar: { start: "دخول الملحمة", lore: "سجل الأبطال", choose: "اختر القائد", back: "العودة للخلف", listen: "🔊 استمع للملحمة", history: "حكم التاريخ", mission: "مهمة القائد" },
            en: { start: "Enter Epic", lore: "Heroes Record", choose: "Choose Leader", back: "Go Back", listen: "🔊 Listen to Epic", history: "History's Verdict", mission: "Leader's Mission" },
            es: { start: "Entrar", lore: "Héroes", choose: "Elegir Líder", back: "Regresar", listen: "🔊 Escuchar", history: "Veredicto", mission: "Misión" },
            ru: { start: "Войти", lore: "Герои", choose: "Выбрать лидера", back: "Назад", listen: "🔊 Слушать", history: "Вердикт", mission: "Миссия" },
            ko: { start: "시작", lore: "영웅 기록", choose: "리더 선택", back: "뒤로 가기", listen: "🔊 듣기", history: "역사의 판결", mission: "미션" }
        };

        const HEROES = {
            saud: {
                name: { ar: "الإمام محمد بن سعود", en: "Imam Muhammad bin Saud", es: "Imam Muhammad", ru: "Имам Мухаммад", ko: "이맘 무함마드" },
                q: { ar: "تحدي الدرعية: ميثاق التأسيس يحتاج ثباتاً، ماذا تختار؟", en: "Diriyah Challenge: The pact needs stability, what do you choose?", es: "Desafío Diriyah: ¿Qué eliges?", ru: "Вызов Дирии: Что вы выберете?", ko: "디리야 챌린지: 무엇을 선택하시겠습니까?" },
                opts: [
                    { t: { ar: "عقد ميثاق الدرعية ونشر العلم", en: "Sign the pact and spread knowledge" }, r: { ar: "✅ بقرارك الحكيم، وضعت حجر الزاوية لأعظم وحدة.", en: "✅ Your wisdom laid the foundation for unity." } },
                    { t: { ar: "التركيز على التجارة فقط", en: "Focus only on trade" }, r: { ar: "⚠️ ازدهرت الدرعية اقتصادياً لكن افتقدت للروح الفكرية.", en: "⚠️ Prospered economically but lacked spiritual depth." } },
                    { t: { ar: "بناء جيش ضخم وتأجيل الميثاق", en: "Build army and delay the pact" }, r: { ar: "⚠️ القوة بدون ميثاق أدت لنزاعات داخلية.", en: "⚠️ Power without a pact led to internal strife." } }
                ]
            },
            turki: {
                name: { ar: "الإمام تركي بن عبد الله", en: "Imam Turki bin Abdullah", es: "Imam Turki", ru: "Имам Турки", ko: "이맘 투르키" },
                q: { ar: "تحدي الاستعادة: كيف تعيد هيبة الدولة السعودية الثانية؟", en: "Restoration: How to restore the prestige of the state?", es: "Restauración: ¿Cómo restaurar el prestigio?", ru: "Восстановление: Как вернуть престиж?", ko: "복원: 어떻게 위신을 회복하시겠습니까?" },
                opts: [
                    { t: { ar: "العدل والضرب بيد من حديد بسيف الأجرب", en: "Justice with Al-Ajrab sword" }, r: { ar: "✅ أعدت الهيبة والوقار للدولة والرياض.", en: "✅ You restored prestige to the state and Riyadh." } },
                    { t: { ar: "المهادنة مع المتمردين", en: "Negotiate with rebels" }, r: { ar: "⚠️ أدى لضعف الدولة في سنواتها الأولى.", en: "⚠️ Led to weakness in the early years." } },
                    { t: { ar: "تحصين الرياض فقط", en: "Fortify only Riyadh" }, r: { ar: "⚠️ تسبب في ضياع الأقاليم البعيدة.", en: "⚠️ Caused the loss of distant regions." } }
                ]
            },
            aziz: {
                name: { ar: "الملك عبد العزيز", en: "King Abdulaziz", es: "Rey Abdulaziz", ru: "Король Абдулазиз", ko: "압둘아지즈 국왕" },
                q: { ar: "تحدي التوحيد: كيف تجمع شتات القبائل في وطن واحد؟", en: "Unification: How to unite tribes into one nation?", es: "Unificación: ¿Cómo unir a las tribus?", ru: "Объединение: Как объединить племена?", ko: "통합: 부족들을 어떻게 통합하시겠습니까?" },
                opts: [
                    { t: { ar: "مشروع الهجر وتوطين البادية", en: "The Hijar project for settlement" }, r: { ar: "✅ عبقري! حولت المحاربين إلى بناة وطن.", en: "✅ Genius! You turned warriors into nation builders." } },
                    { t: { ar: "الاعتماد على القوة العسكرية فقط", en: "Military force only" }, r: { ar: "⚠️ القوة وحدها لا تبني حباً أو استقراراً.", en: "⚠️ Force alone doesn't build love or stability." } },
                    { t: { ar: "انتظار المعاهدات الدولية", en: "Wait for international treaties" }, r: { ar: "⚠️ كان سيجعل أجزاء من الوطن تحت الانتداب.", en: "⚠️ Would have left parts of the country under mandate." } }
                ]
            }
        };

        const LORE_DB = {
            saud: { ar: "في عام 1727م، أعلن الإمام محمد بن سعود ولادة الدولة السعودية الأولى من الدرعية، ميثاق العلم والعدل الذي جمع القلوب.", en: "In 1727, Imam Muhammad bin Saud announced the birth of the first Saudi state from Diriyah..." },
            turki: { ar: "في 1824م، وبسيفه الأجرب، أعاد الإمام تركي بن عبدالله الرياض وجعلها عاصمة الصمود للدولة الثانية.", en: "In 1824, with his sword Al-Ajrab, Imam Turki restored Riyadh..." },
            aziz: { ar: "في 1902م، فتح الملك عبدالعزيز أبواب المصمك ليعلن فجر التوحيد، ملاحم بطولية وحدت القلوب قبل الأرض.", en: "In 1902, King Abdulaziz opened the doors of Masmak to announce the dawn of unification..." }
        };

        function setLang(l) {
            currentLang = l;
            document.body.dir = (l === 'ar' ? 'rtl' : 'ltr');
            updateUI();
            if(document.getElementById('game-engine').classList.contains('active')) navigateTo('game-engine');
            if(document.getElementById('lore-engine').classList.contains('active')) navigateTo('lore-engine');
        }

        function updateUI() {
            const t = UI[currentLang];
            document.getElementById('m-btn-start').innerText = t.start;
            document.getElementById('m-btn-lore').innerText = t.lore;
            document.getElementById('l-title').innerText = t.lore;
            document.getElementById('l-back-btn').innerText = t.back;
            document.getElementById('l-btn-saud').innerText = HEROES.saud.name[currentLang] || HEROES.saud.name.en;
            document.getElementById('l-btn-turki').innerText = HEROES.turki.name[currentLang] || HEROES.turki.name.en;
            document.getElementById('l-btn-aziz').innerText = HEROES.aziz.name[currentLang] || HEROES.aziz.name.en;
            document.getElementById('btn-speak').innerText = t.listen;
        }

        function navigateTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.speechSynthesis.cancel();
            if(id === 'game-engine') renderHeroSelection();
            if(id === 'lore-engine') {
                document.getElementById('lore-btns').style.display = 'block';
                document.getElementById('audio-ctrl').style.display = 'none';
                document.getElementById('lore-body').innerText = (currentLang === 'ar' ? "اختر بطلاً لقراءة ملحمته.." : "Choose a hero to read their epic..");
            }
        }

        function renderHeroSelection() {
            const t = UI[currentLang];
            const card = document.getElementById('game-card');
            card.innerHTML = `
                <h1 style="color:var(--gold);">${t.choose}</h1>
                <button class="option-btn" onclick="startHeroLife('saud')">${HEROES.saud.name[currentLang] || HEROES.saud.name.en}</button>
                <button class="option-btn" onclick="startHeroLife('turki')">${HEROES.turki.name[currentLang] || HEROES.turki.name.en}</button>
                <button class="option-btn" onclick="startHeroLife('aziz')">${HEROES.aziz.name[currentLang] || HEROES.aziz.name.en}</button>
                <a class="back-link" onclick="navigateTo('main-menu')">${t.back}</a>
            `;
        }

        function startHeroLife(id) {
            const h = HEROES[id];
            const t = UI[currentLang];
            const card = document.getElementById('game-card');
            let optsHtml = h.opts.map((o, idx) => `
                <button class="option-btn" onclick="showResult('${id}', ${idx})">${o.t[currentLang] || o.t.ar}</button>
            `).join('');

            card.innerHTML = `
                <h1 style="color:var(--gold);">${t.mission}</h1>
                <p style="font-size:1.3rem; line-height:1.6;">${h.q[currentLang] || h.q.ar}</p>
                ${optsHtml}
                <a class="back-link" onclick="renderHeroSelection()">${t.back}</a>
            `;
        }

        function showResult(heroId, optIdx) {
            const res = HEROES[heroId].opts[optIdx].r;
            const t = UI[currentLang];
            const card = document.getElementById('game-card');
            card.innerHTML = `
                <h1 style="color:var(--gold);">${t.history}</h1>
                <div class="result-box">${res[currentLang] || res.ar}</div>
                <a class="back-link" onclick="startHeroLife('${heroId}')">${t.back}</a>
                <a class="back-link" onclick="navigateTo('main-menu')">${currentLang === 'ar' ? 'الرئيسية' : 'Home'}</a>
            `;
        }

        function openLore(id) {
            const text = LORE_DB[id][currentLang] || LORE_DB[id].ar;
            document.getElementById('lore-body').innerText = text;
            document.getElementById('lore-btns').style.display = 'none';
            document.getElementById('audio-ctrl').style.display = 'block';
        }

        function speakLore() {
            window.speechSynthesis.cancel();
            const text = document.getElementById('lore-body').innerText;
            const msg = new SpeechSynthesisUtterance(text);
            const langMap = { ar: 'ar-SA', en: 'en-US', es: 'es-ES', ru: 'ru-RU', ko: 'ko-KR' };
            msg.lang = langMap[currentLang];
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        // --- محرك الكانفاس ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle { constructor() { this.reset(); } reset() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*2+1; this.speedX = Math.random()*0.4-0.2; this.speedY = Math.random()*0.4-0.2; this.opacity = Math.random()*0.5; } update() { this.x += this.speedX; this.y += this.speedY; if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height) this.reset(); } draw() { ctx.fillStyle = `rgba(193, 163, 95, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); } }
        for(let i=0; i<70; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animate); }
        animate();

        setLang('ar');
    </script>
</body>
</html>
