<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - 3 خيارات عشوائية</title>
    <style>
        :root { --gold: #c1a35f; --green: #064d2b; --red: #ff4d4d; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #052c19; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0a6b3d 0%, #052c19 100%); z-index: -1; }
        .cloud-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 100; display: flex; justify-content: center; align-items: center; animation: openGate 2s forwards ease-in-out; }
        @keyframes openGate { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; transform: scale(1.2); filter: blur(10px); } }
        .container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { background: rgba(0, 0, 0, 0.85); border: 2px solid var(--gold); padding: 30px; border-radius: 20px; max-width: 600px; width: 100%; backdrop-filter: blur(15px); text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        h1 { color: var(--gold); font-size: 1.8rem; margin-bottom: 10px; }
        .story-text { font-size: 1.1rem; line-height: 1.7; margin-bottom: 25px; }
        .btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 14px; margin: 8px 0; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: black; transform: scale(1.02); }
        .result-box { display: none; padding: 20px; border-right: 5px solid var(--gold); background: rgba(255,255,255,0.05); margin-top: 20px; text-align: right; border-radius: 5px; }
        .lose-style { border-right-color: var(--red); color: var(--red); }
        .back-btn { background: #333; color: white; border: 1px solid #666; padding: 12px 25px; border-radius: 8px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="cloud-gate"><h2 style="color: #333;">قدر الدولة بين يديك..</h2></div>
    <div class="bg-gradient"></div>

    <div class="container">
        <div class="card" id="game-card">
            <h1 id="title">ملاحم التأسيس</h1>
            <p id="desc" class="story-text">اختر القائد لتواجه 3 خيارات مصيرية، كل خيار يحمل 3 نهايات عشوائية لعام 2026:</p>
            
            <div id="options-container">
                <button class="btn" onclick="loadCharacter('saud')">الإمام محمد بن سعود</button>
                <button class="btn" onclick="loadCharacter('turki')">الإمام تركي بن عبد الله</button>
                <button class="btn" onclick="loadCharacter('abdulaziz')">الملك عبد العزيز</button>
            </div>

            <div id="result-box" class="result-box"></div>
            <button id="reset-btn" class="back-btn" style="display:none;" onclick="location.reload()">العودة للتاريخ</button>
        </div>
    </div>

    <script>
        const data = {
            saud: {
                title: "الإمام محمد بن سعود",
                story: "الدرعية في بداياتها.. كيف سترسم طريق التأسيس؟",
                options: [
                    { text: "ميثاق الدرعية الفكري والعلمي", res: [
                        "✅ 2026: الدرعية هي العاصمة الثقافية للعالم، ومشاريع العلم جعلت شبابنا يقودون ناسا!",
                        "✅ 2026: بفضل الميثاق، المجتمع السعودي هو الأقوى تلاحماً، ونحتفل بيوم التأسيس كأعظم ذكرى.",
                        "❌ 2026: انشغلت بالفكر وأهملت السلاح، فضعفت هيبة الدولة واندثر الحلم قبل اكتماله."
                    ]},
                    { text: "تحصين الدرعية وبناء جيش عظيم", res: [
                        "✅ 2026: قوتك جعلت حدودنا جداراً منيعاً، واليوم نملك أقوى قوة ردع في الشرق الأوسط.",
                        "⚠️ 2026: جيشك حمى الدولة، لكن غياب العلم جعلنا نعتمد على التقنيات الخارجية بالكامل.",
                        "❌ 2026: تحولت الدولة لثكنة عسكرية، فجفّ الاقتصاد وهرب التجار، واليوم تعاني الدولة من الفقر."
                    ]},
                    { text: "تأمين طرق التجارة والقوافل", res: [
                        "✅ 2026: السعودية هي المركز اللوجستي الأول عالمياً، والدرعية ممر يربط قارات الأرض.",
                        "✅ 2026: ثراء الدولة بفضل التجارة جعل 'صندوق الاستثمارات' الأقوى في التاريخ.",
                        "❌ 2026: ركزت على المال ونسيت الأمن، فنهبت العصابات القوافل وسقطت هيبة الدولة سريعاً."
                    ]}
                ]
            },
            turki: {
                title: "الإمام تركي بن عبد الله",
                story: "بعد استعادة الرياض.. ما هي خطتك لتثبيت الدولة الثانية؟",
                options: [
                    { text: "إعادة إعمار الرياض كعاصمة دائمة", res: [
                        "✅ 2026: الرياض هي مدينة المستقبل 'إكسبو 2030'، وواحدة من أكبر اقتصاديات مدن العالم.",
                        "✅ 2026: قصر الحكم الذي بنيته لا يزال رمزاً للعدل والقوة أمام العالم أجمع.",
                        "❌ 2026: انغلق العالم داخل الرياض، فاستقلت الأقاليم الأخرى وتمزق شمل الدولة في الطريق لعام 2026."
                    ]},
                    { text: "بسط الأمن بسيف 'الأجرب' في كل مكان", res: [
                        "✅ 2026: نحن نعيش في أكثر دول العالم أماناً، حيث يسير المسافر من جدة لنيوم بلا خوف.",
                        "✅ 2026: هيبة 'الأجرب' جعلت العالم يحترم سيادة المملكة وقراراتها السياسية اليوم.",
                        "❌ 2026: القسوة في بسط الأمن ولدت ضغينة، فانقلبت القبائل ضد الحكم وضاع الاستقرار للأبد."
                    ]},
                    { text: "توطيد العلاقات مع الأقاليم المجاورة", res: [
                        "✅ 2026: بفضل دبلوماسيتك، السعودية اليوم هي قائدة العالم العربي والإسلامي بلا منازع.",
                        "✅ 2026: الوحدة الوطنية التي أسستها هي 'جبل طويق' الذي لا يهتز أمام الأزمات العالمية.",
                        "❌ 2026: وثقت في حلفاء الغدر، فخانو العهود وسقطت الدولة في فخ المؤامرات الخارجية."
                    ]}
                ]
            },
            abdulaziz: {
                title: "الملك عبد العزيز",
                story: "المملكة بدأت تتوحد.. ما هي ركيزة الدولة الحديثة؟",
                options: [
                    { text: "توطين البادية ونشر التعليم", res: [
                        "✅ 2026: بفضل التعليم، المواطن السعودي هو الثروة الحقيقية التي تبني نيوم وذا لاين.",
                        "✅ 2026: تحولنا من حياة البادية إلى ريادة الفضاء في أقل من قرن.. معجزة بشرية!",
                        "❌ 2026: أهملت الاقتصاد وركزت على التعليم النظري فقط، فخرج جيل عاطل لا يجد ما يأكله."
                    ]},
                    { text: "استخراج النفط والبحث عن الثروات", res: [
                        "✅ 2026: أرامكو هي عملاق الطاقة العالمي، وأموال النفط بنت لنا مدناً تضاهي الخيال.",
                        "✅ 2026: ثروة النفط جعلت السعودية عضو 'G20' والمتحكم في توازن الاقتصاد العالمي.",
                        "❌ 2026: اعتمدت على النفط ونسيت الزراعة والصناعة، فانهار الاقتصاد عندما ظهرت الطاقة البديلة."
                    ]},
                    { text: "جلب التقنية والبرقيات والاتصالات", res: [
                        "✅ 2026: السعودية هي الرقم 1 في الحكومة الرقمية عالمياً، وكل خدماتنا بلمسة زر.",
                        "✅ 2026: بصيرتك التقنية جعلتنا اليوم ننافس في الذكاء الاصطناعي ونبني مدناً ذكية كلياً.",
                        "❌ 2026: أدخلت التقنية بلا حماية، فاخترق الأعداء أنظمة الدولة وعطلوا حياتنا في 2026."
                    ]}
                ]
            }
        };

        function loadCharacter(key) {
            const char = data[key];
            document.getElementById('title').innerText = char.title;
            document.getElementById('desc').innerText = char.story;
            let html = "";
            char.options.forEach((opt, idx) => {
                html += `<button class="btn" onclick="showResult('${key}', ${idx})">${opt.text}</button>`;
            });
            document.getElementById('options-container').innerHTML = html;
        }

        function showResult(key, optIdx) {
            const results = data[key].options[optIdx].res;
            const finalRes = results[Math.floor(Math.random() * results.length)];
            
            document.getElementById('options-container').style.display = 'none';
            document.getElementById('desc').style.display = 'none';
            
            const rb = document.getElementById('result-box');
            rb.style.display = 'block';
            rb.innerHTML = `<strong>النتيجة التاريخية (سيناريو 2026):</strong><br><br>${finalRes}`;
            
            if (finalRes.includes('❌')) {
                rb.classList.add('lose-style');
                document.getElementById('reset-btn').innerText = "لقد سقطت الدولة.. حاول إصلاح التاريخ";
            } else {
                rb.classList.remove('lose-style');
                document.getElementById('reset-btn').innerText = "عودة للقائمة الرئيسية";
            }
            document.getElementById('reset-btn').style.display = 'inline-block';
        }
    </script>
</body>
</html>
