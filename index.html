<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | الإصدار النهائي الفخم</title>
    
    <style>
        /* --- 1. المحرك البصري والألوان --- */
        :root {
            --gold-primary: #c1a35f;
            --gold-light: #f3cf7a;
            --bg-dark: #05160d;
            --glass-strong: rgba(0, 0, 0, 0.94);
            --sword-fx: linear-gradient(90deg, transparent, #fff, var(--gold-light), transparent);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body, html {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #103a24 0%, var(--bg-dark) 100%);
            color: #fff; font-family: var(--font-main);
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* --- 2. محرك الرمل عالي الجودة --- */
        #sand-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; opacity: 0.85;
        }

        /* --- 3. تبديل اللغات الاحترافي --- */
        .lang-switcher {
            position: fixed; top: 20px; left: 20px; z-index: 5000; display: flex; gap: 10px;
        }

        .lang-node {
            background: rgba(0,0,0,0.6); border: 1.5px solid var(--gold-primary);
            color: var(--gold-light); padding: 8px 18px; border-radius: 30px;
            cursor: pointer; font-weight: 800; font-size: 0.85rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px); box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .lang-node:hover { transform: scale(1.1); background: var(--gold-primary); color: #000; }
        .lang-node.active { background: var(--gold-primary); color: #000; box-shadow: 0 0 20px var(--gold-primary); }

        /* --- 4. الحاوية الرئيسية (تصميم رشيق وعالي الجودة) --- */
        .app-container {
            position: relative; z-index: 100; width: 92%; max-width: 650px;
            background: var(--glass-strong); backdrop-filter: blur(50px);
            border: 1.5px solid var(--gold-primary); border-radius: 30px;
            padding: 30px; text-align: center; 
            box-shadow: 0 40px 120px rgba(0, 0, 0, 1), inset 0 0 20px rgba(193, 163, 95, 0.1);
            max-height: 88vh; overflow-y: auto; border-top: 6px solid var(--gold-primary);
        }

        .app-container::-webkit-scrollbar { width: 5px; }
        .app-container::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: 10px; }

        /* --- 5. منطق الشاشات --- */
        .screen { display: none; opacity: 0; transform: translateY(25px); transition: 0.6s ease-out; }
        .screen.active { display: block; opacity: 1; transform: translateY(0); }

        .hero-title { 
            font-size: 2.2rem; color: var(--gold-primary); margin-bottom: 15px; 
            font-weight: 900; text-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        .sub-text { font-size: 1.05rem; color: #dcdcdc; margin-bottom: 30px; line-height: 1.8; }

        /* --- 6. أزرار ضربة السيف (عالية الجودة) --- */
        .action-btn {
            position: relative; width: 100%;
            background: linear-gradient(135deg, rgba(193, 163, 95, 0.1), rgba(0,0,0,0.4));
            border: 1px solid var(--gold-primary); padding: 14px; border-radius: 12px;
            color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: 0.3s; margin-bottom: 12px; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .action-btn::after {
            content: ''; position: absolute; top: 0; left: -150%;
            width: 100%; height: 100%; background: var(--sword-fx); transform: skewX(-45deg);
        }

        .action-btn:hover::after { left: 150%; transition: 0.6s ease-in-out; }
        .action-btn:hover { 
            background: rgba(193, 163, 95, 0.25); transform: translateY(-2px);
            border-color: #fff; box-shadow: 0 8px 20px rgba(193, 163, 95, 0.3);
        }

        /* --- 7. لوحة القصة الموسعة --- */
        .story-panel {
            background: rgba(255, 255, 255, 0.04); padding: 25px; border-radius: 20px;
            text-align: justify; line-height: 2.1; font-size: 1.15rem;
            border-right: 6px solid var(--gold-primary); margin: 20px 0;
            color: #f5f5f5; white-space: pre-line;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
        }

        [dir="ltr"] .story-panel { border-right: 0; border-left: 6px solid var(--gold-primary); }

        .footer-nav {
            display: inline-block; margin-top: 20px; color: var(--gold-light);
            text-decoration: none; font-weight: 800; cursor: pointer; font-size: 0.95rem;
            transition: 0.3s;
        }
        .footer-nav:hover { color: #fff; text-shadow: 0 0 10px var(--gold-primary); }
    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="lang-switcher">
        <button id="ar-btn" class="lang-node active" onclick="setLanguage('ar')">العربية</button>
        <button id="en-btn" class="lang-node" onclick="setLanguage('en')">English</button>
    </div>

    <div class="app-container" id="scroll-top">
        
        <div id="scr-home" class="screen active">
            <h1 id="ui-title" class="hero-title">ملاحم التأسيس</h1>
            <p id="ui-desc" class="sub-text">استكشف تاريخ المملكة العربية السعودية من خلال محاكاة قرارات الأبطال الذين بنوا هذا الوطن العظيم.</p>
            <button id="ui-btn-start" class="action-btn" onclick="navTo('scr-heroes')">دخول الملحمة التفاعلية</button>
            <button id="ui-btn-lore" class="action-btn" onclick="initLore()">سير الأبطال التاريخية</button>
        </div>

        <div id="scr-heroes" class="screen">
            <h1 id="ui-choose" class="hero-title">اختر القائد</h1>
            <div id="hero-list"></div>
            <a id="ui-back-home" class="footer-nav" onclick="navTo('scr-home')">العودة للرئيسية</a>
        </div>

        <div id="scr-quest" class="screen">
            <h1 id="q-head" style="color: var(--gold-light);"></h1>
            <div id="q-body" class="story-panel"></div>
            <div id="q-choices"></div>
            <a id="ui-cancel" class="footer-nav" onclick="navTo('scr-heroes')">تراجع</a>
        </div>

        <div id="scr-result" class="screen">
            <h1 id="ui-verdict" class="hero-title">حكم التاريخ</h1>
            <div id="res-text" class="story-panel"></div>
            <button id="ui-retry" class="action-btn" onclick="navTo('scr-heroes')">تجربة مسار آخر</button>
            <a id="ui-res-home" class="footer-nav" onclick="navTo('scr-home')">الرئيسية</a>
        </div>

        <div id="scr-lore" class="screen">
            <h1 id="ui-records" class="hero-title">سجل الخالدين</h1>
            <div id="lore-list"></div>
            <a id="ui-lore-back" class="footer-nav" onclick="navTo('scr-home')">رجوع</a>
        </div>

        <div id="scr-bio" class="screen">
            <h1 id="bio-head" class="hero-title"></h1>
            <div id="bio-content" class="story-panel"></div>
            <a id="ui-bio-back" class="footer-nav" onclick="navTo('scr-lore')">العودة للسجل</a>
        </div>

    </div>

    <script>
        const HISTORICAL_DATA = {
            saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    title: "ميثاق الدرعية (1727م)",
                    quest: "عام 1139هـ، الدرعية بلدة صغيرة في قلب نجد، والمنطقة تعاني من فوضى عارمة، حروب قبلية لا تنتهي، وطرق تجارة غير آمنة. بصفتك حاكماً للدرعية، طموحك يتجاوز حدود الأسوار. \n\n يأتيك خبر وصول الشيخ محمد بن عبدالوهاب باحثاً عن مكان ينشر فيه العلم والتوحيد. كيف ستبني أساس الدولة؟",
                    paths: [
                        { t: "عقد ميثاق تاريخي لنشر العلم والوحدة", r: "✅ قرار تاريخي! بلقائك مع الشيخ في 'حي الطريف'، قلت جملتك الشهيرة: 'أبشر ببلاد خير من بلادك، وأبشر بالعزة والمنعة'. \n\n النتيجة: تأسست الدولة السعودية الأولى، وتوحدت نجد تحت راية واحدة لأول مرة منذ قرون، وتحولت الدرعية إلى عاصمة سياسية وعلمية يهابها الجميع." },
                        { t: "التركيز على القوة العسكرية وتحصين الدرعية فقط", r: "⚠️ قرار حذر لكنه محدود. استطعت حماية الدرعية وجعلها قلعة منيعة، لكن بدون مشروع فكري وعلمي يجمع القلوب، ظلت القبائل الأخرى ترى فيك مجرد منافس على السلطة، وتأخر حلم الدولة الكبرى لعقود طويلة." },
                        { t: "عقد معاهدات سلام مؤقتة مع حكام الأقاليم المجاورة", r: "❌ قرار أضعف هيبتك. المعاهدات مع حكام متنازعين جعلت الدرعية رهينة لمصالحهم المتقلبة. بمجرد شعورهم بقوتك، نقضوا العهود وهاجموا الدرعية، مما أدى لضياع فرصة التأسيس في ذلك الوقت." }
                    ],
                    bio: "الإمام محمد بن سعود بن محمد بن مقرن (توفي 1765م). \n\n هو مؤسس الدولة السعودية الأولى. تولى الحكم في ظروف استثنائية، لكنه كان يملك رؤية واضحة لبناء كيان سياسي مستقل. أهم إنجازاته: \n 1. توحيد شطري الدرعية. \n 2. بناء سور الدرعية الكبير. \n 3. استضافة الشيخ محمد بن عبدالوهاب وتوقيع 'اتفاق الدرعية' التاريخي. \n 4. تأمين طرق الحج والتجارة في قلب الجزيرة العربية."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    title: "The Diriyah Pact (1727)",
                    quest: "In 1727, Diriyah was a small town. The region was in chaos. As the ruler, Sheikh Muhammad bin Abdulwahab arrived seeking a home for knowledge. How will you build the foundation of your state?",
                    paths: [
                        { t: "Establish a Pact for Knowledge and Unity", r: "✅ The defining moment! In At-Turaif, you founded the First Saudi State. Najd was unified, and Diriyah became a political and educational capital." },
                        { t: "Focus solely on military fortifications", r: "⚠️ A cautious move. You protected Diriyah, but without a unifying ideology, the dream of a grand state was delayed for decades." },
                        { t: "Form temporary peace treaties with neighbors", r: "❌ A weak strategy. These rulers changed minds quickly. Once they felt your growing power, they broke the treaties and attacked." }
                    ],
                    bio: "Imam Muhammad bin Saud (died 1765). \n\n The founder of the First Saudi State. Key Achievements: \n 1. Unified the districts of Diriyah. \n 2. Built the great wall of Diriyah. \n 3. Signed the 'Diriyah Pact', the state's foundation. \n 4. Secured pilgrimage and trade routes."
                }
            },
            turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    title: "استعادة المجد (1824م)",
                    quest: "بعد سقوط الدرعية، الرياض تحت احتلال حاميات أجنبية باطشة. أنت الآن في 'خلوة الحلوة'، ليس معك سوى إيمانك وسيفك الشهير 'الأجرب' وعدد قليل من المخلصين. التاريخ يناديك لاستعادة إرث أجدادك.",
                    paths: [
                        { t: "قيادة عملية فدائية لتطهير الرياض ليلاً", r: "✅ نصر أسطوري! بذكاء عسكري فذ، استطعت التسلل للرياض وطرد الحاميات الأجنبية بجيش صغير جداً. \n\n النتيجة: أعلنت الرياض عاصمة للدولة السعودية الثانية، وأعدت الأمل والسيادة للجزيرة العربية، وأثبتّ أن الحق لا يموت." },
                        { t: "الانتظار في جنوب نجد لجمع جيش ضخم", r: "⚠️ فرصة ضائعة. انتظارك الطويل أعطى المحتل وقتاً لترميم أسوار الرياض وجلب المدافع. عندما هاجمت لاحقاً، واجهت مقاومة عنيفة جداً كلفتك أعز رجالك." },
                        { t: "إرسال رسائل للقبائل للثورة من الداخل أولاً", r: "❌ فشل الخطة. المحتل اكتشف الرسائل وقام بحملة اعتقالات واسعة للوجهاء، مما جعل الناس يخشون الانضمام إليك، وظلت الرياض تحت الاحتلال لسنوات إضافية." }
                    ],
                    bio: "الإمام تركي بن عبد الله آل سعود (1755-1834م). \n\n مؤسس الدولة السعودية الثانية وبطل استعادة المجد. أهم إنجازاته: \n 1. استعادة الرياض عام 1240هـ وتطهيرها من الاحتلال. \n 2. اختيار الرياض عاصمة للدولة بدلاً من الدرعية. \n 3. إعادة بناء الجامع الكبير وقصر الحكم. \n 4. صاحب السيف الأسطوري 'الأجرب'."
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    title: "The Restoration (1824)",
                    quest: "Riyadh is occupied. You are in hiding with your faith, your sword 'Al-Ajrab', and a few loyal men. Will you wait or reclaim your legacy?",
                    paths: [
                        { t: "Lead a surprise night raid on Riyadh", r: "✅ A legendary victory! Riyadh became the capital of the Second Saudi State, restoring hope and sovereignty to the land." },
                        { t: "Wait to gather a massive army first", r: "⚠️ A lost opportunity. Your long wait allowed the occupiers to fortify Riyadh, making the liberation very costly." },
                        { t: "Send letters to stir an internal revolution", r: "❌ Plan failed. The occupiers intercepted the letters and arrested local leaders, extending the occupation for years." }
                    ],
                    bio: "Imam Turki bin Abdullah (1755-1834). \n\n Founder of the Second Saudi State. He reclaimed Riyadh and made it the permanent capital, rebuilding the city's heart."
                }
            },
            aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    title: "فتح الرياض (1902م)",
                    quest: "ليلة 5 شوال 1319هـ. الجو بارد جداً، وأنت تقف على مشارف الرياض معك 63 رجلاً فقط، وأمامك حصن المصمك المنيع. أنت الآن في بيت قريب من الحصن تنتظر بزوغ الفجر وخروج الحاكم 'عجلان'. ماذا ستقرر؟",
                    paths: [
                        { t: "اقتحام المصمك فور خروج عجلان من البوابة", r: "✅ 'الملك لله ثم لعبد العزيز!'.. نجحت الخطة ببراعة، واسترددت ملك آبائك، ومن تلك اللحظة انطلقت رحلة الـ 30 عاماً لتوحيد كافة أرجاء المملكة العربية السعودية الحديثة." },
                        { t: "الانتظار حتى يبتعد عجلان عن الحصن لمهاجمته", r: "⚠️ مخاطرة كبرى. تنبه الحراس لوجودكم وأغلقوا أبواب المصمك. اضطررت لخوض معركة شوارع مكشوفة، وظل الحصن صامداً في تلك الليلة وتأخر النصر." },
                        { t: "محاولة استمالة حراس البوابة بالمال أو الوعود", r: "❌ قرار كارثي. الحراس أبلغوا عجلان فوراً بمحاولتكم. تعرضت أنت ورجالك للحصار داخل البيوت، وكدتم أن تُقتلوا لولا فضل الله ثم انسحابكم السريع." }
                    ],
                    bio: "الملك عبد العزيز آل سعود (1876-1953م). \n\n مؤسس المملكة العربية السعودية الحديثة. أهم إنجازاته: \n 1. استعادة الرياض في عمر الـ 26 عاماً. \n 2. توحيد كافة مناطق المملكة عام 1932م. \n 3. اكتشاف النفط وبداية النهضة الكبرى. \n 4. توطين البادية وبناء مؤسسات الدولة."
                },
                en: {
                    name: "King Abdulaziz",
                    title: "Conquest of Riyadh (1902)",
                    quest: "With only 63 men against Masmak Fort, dawn is approaching. The Governor leaves the fort daily. This is your only chance. What is your call?",
                    paths: [
                        { t: "Storm the fort as soon as the gate opens", r: "✅ Success! You reclaimed the throne, starting a 30-year journey to unify the modern Kingdom of Saudi Arabia." },
                        { t: "Wait for the Governor to move away", r: "⚠️ High risk. The guards noticed you and shut the gates. You were forced into a street fight, delaying the victory." },
                        { t: "Try to bribe or persuade the gate guards", r: "❌ A disastrous decision. The guards reported you immediately. You and your men barely escaped with your lives." }
                    ],
                    bio: "King Abdulaziz Al Saud (1876-1953). \n\n The founder of modern Saudi Arabia. He unified the nation and established the state's modern era of prosperity."
                }
            }
        };

        const INTERFACE_TEXTS = {
            ar: { title: "ملاحم التأسيس", desc: "تاريخ المملكة بقرارات الأبطال.", start: "دخول الملحمة التفاعلية", lore: "سير الأبطال التاريخية", choose: "اختر القائد", home: "الرئيسية", cancel: "تراجع", verdict: "حكم التاريخ", retry: "تجربة مسار آخر", main: "الرئيسية", records: "سجل الخالدين", bioBack: "رجوع", dir: "rtl" },
            en: { title: "Founding Epics", desc: "Saudi history via hero decisions.", start: "Enter Interactive Epic", lore: "Historical Bio Records", choose: "Select Leader", home: "Home", cancel: "Back", verdict: "Verdict", retry: "Retry Path", main: "Home", records: "Immortal Records", bioBack: "Back", dir: "ltr" }
        };

        let currentLang = 'ar';

        function setLanguage(lang) {
            currentLang = lang; const ui = INTERFACE_TEXTS[lang];
            document.documentElement.lang = lang; document.documentElement.dir = ui.dir; document.body.style.direction = ui.dir;
            document.getElementById('ar-btn').classList.toggle('active', lang === 'ar'); document.getElementById('en-btn').classList.toggle('active', lang === 'en');
            document.getElementById('ui-title').innerText = ui.title; document.getElementById('ui-desc').innerText = ui.desc;
            document.getElementById('ui-btn-start').innerText = ui.start; document.getElementById('ui-btn-lore').innerText = ui.lore;
            document.getElementById('ui-choose').innerText = ui.choose; document.getElementById('ui-back-home').innerText = ui.home;
            document.getElementById('ui-cancel').innerText = ui.cancel; document.getElementById('ui-verdict').innerText = ui.verdict;
            document.getElementById('ui-retry').innerText = ui.retry; document.getElementById('ui-res-home').innerText = ui.main;
            document.getElementById('ui-records').innerText = ui.records; document.getElementById('ui-lore-back').innerText = ui.main;
            document.getElementById('ui-bio-back').innerText = ui.bioBack; initHeroButtons();
        }

        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); setTimeout(() => s.style.display = 'none', 400); });
            setTimeout(() => { const t = document.getElementById(id); t.style.display = 'block'; setTimeout(() => t.classList.add('active'), 50); document.getElementById('scroll-top').scrollTop = 0; }, 450);
        }

        function initHeroButtons() {
            const c = document.getElementById('hero-list'); c.innerHTML = '';
            Object.keys(HISTORICAL_DATA).forEach(k => {
                const b = document.createElement('button'); b.className = 'action-btn'; b.innerText = HISTORICAL_DATA[k][currentLang].name; b.onclick = () => startScenario(k); c.appendChild(b);
            });
        }

        function startScenario(k) {
            const d = HISTORICAL_DATA[k][currentLang]; document.getElementById('q-head').innerText = d.title; document.getElementById('q-body').innerText = d.quest;
            const bD = document.getElementById('q-choices'); bD.innerHTML = '';
            d.paths.forEach(p => {
                const b = document.createElement('button'); b.className = 'action-btn'; b.innerText = p.t; b.onclick = () => { document.getElementById('res-text').innerText = p.r; navTo('scr-result'); }; bD.appendChild(b);
            }); navTo('scr-quest');
        }

        function initLore() {
            const c = document.getElementById('lore-list'); c.innerHTML = '';
            Object.keys(HISTORICAL_DATA).forEach(k => {
                const b = document.createElement('button'); b.className = 'action-btn'; b.innerText = HISTORICAL_DATA[k][currentLang].name; b.onclick = () => { document.getElementById('bio-head').innerText = HISTORICAL_DATA[k][currentLang].name; document.getElementById('bio-content').innerText = HISTORICAL_DATA[k][currentLang].bio; navTo('scr-bio'); }; c.appendChild(b);
            }); navTo('scr-lore');
        }

        /* --- محرك الرمل النهائي --- */
        const canvas = document.getElementById('sand-canvas'); const ctx = canvas.getContext('2d'); let dots = [];
        function createDots() { 
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; dots = []; 
            for (let i = 0; i < 320; i++) dots.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2 + 0.3, speed: Math.random() * 0.4 + 0.1, op: Math.random() * 0.6 + 0.2 }); 
        }
        function render() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            dots.forEach(d => { ctx.fillStyle = `rgba(193, 163, 95, ${d.op})`; d.y -= d.speed; if (d.y < 0) d.y = canvas.height; ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2); ctx.fill(); }); 
            requestAnimationFrame(render); 
        }
        window.onresize = createDots; createDots(); render(); setLanguage('ar');
    </script>
</body>
</html>
