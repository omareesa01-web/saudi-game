<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - النسخة المرئية</title>
    <style>
        :root { --gold: #c1a35f; --green: #064d2b; --dark: #052c19; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--dark); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        /* نظام الخلفيات المتغيرة */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background-size: cover; background-position: center; transition: 1s ease-in-out; filter: brightness(0.4); }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, var(--dark) 90%); z-index: -1; }

        .screen { display: none; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 20px; text-align: center; box-sizing: border-box; }
        .active { display: flex; }

        .card { background: rgba(0, 0, 0, 0.7); border: 1px solid var(--gold); padding: 30px; border-radius: 20px; max-width: 600px; width: 100%; backdrop-filter: blur(8px); }
        
        h1 { color: var(--gold); font-size: 2rem; margin-bottom: 20px; }
        .story-text { font-size: 1.1rem; line-height: 1.7; margin-bottom: 20px; }

        .main-btn { background: transparent; border: 2px solid var(--gold); color: var(--gold); padding: 15px 30px; margin: 10px; border-radius: 12px; cursor: pointer; font-size: 1.3rem; font-weight: bold; transition: 0.3s; width: 200px; }
        .main-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }

        .game-btn { background: rgba(193, 163, 95, 0.1); border: 1px solid var(--gold); color: white; padding: 12px; margin: 8px 0; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.3s; }
        .game-btn:hover { background: var(--gold); color: black; }

        .back-link { margin-top: 15px; color: var(--gold); cursor: pointer; font-size: 0.9rem; opacity: 0.7; }
        .back-link:hover { opacity: 1; }
    </style>
</head>
<body>
    <div id="dynamic-bg" class="bg-layer" style="background-image: url('default_bg.jpg');"></div>
    <div class="bg-overlay"></div>

    <div id="start-screen" class="screen active">
        <h1>ملاحم التأسيس</h1>
        <button class="main-btn" onclick="showScreen('game-screen')">لـعـب</button>
        <button class="main-btn" onclick="showScreen('history-screen')">قـصـة</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="card">
            <h1 id="game-title">اختر القائد</h1>
            <p id="game-desc" class="story-text">كل قرار تتخذه يرسم ملامح عام 2026..</p>
            <div id="options-container">
                <button class="game-btn" onclick="loadGame('saud')">الإمام محمد بن سعود</button>
                <button class="game-btn" onclick="loadGame('turki')">الإمام تركي بن عبد الله</button>
                <button class="game-btn" onclick="loadGame('abdulaziz')">الملك عبد العزيز</button>
            </div>
            <div id="result-box" style="display:none;" class="story-text"></div>
            <div class="back-link" onclick="location.reload()">العودة للقائمة</div>
        </div>
    </div>

    <div id="history-screen" class="screen">
        <div class="card">
            <h1 id="history-title">قصص الأبطال</h1>
            <div id="history-content" class="story-text">تعرف على تاريخ أجدادك..</div>
            <div id="history-menu">
                <button class="game-btn" onclick="readHistory('saud')">قصة الإمام محمد بن سعود</button>
                <button class="game-btn" onclick="readHistory('turki')">قصة الإمام تركي بن عبد الله</button>
                <button class="game-btn" onclick="readHistory('abdulaziz')">قصة الملك عبد العزيز</button>
            </div>
            <div class="back-link" onclick="showScreen('start-screen')">رجوع</div>
        </div>
    </div>

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        const gameData = {
            saud: [
                { s: "تحدي العلم: الدرعية تحتاج لأساس فكري قوي..", img: "saud_ilm.gif", opt: [{t:"ميثاق الدرعية", r:"✅ 2026: منارة ثقافية عالمية!"}, {t:"تجاهل العلم", r:"⚠️ 2026: تعثر المسار الفكري."}] },
                { s: "تحدي الحدود: الأعداء يحيطون بالدرعية..", img: "saud_border.gif", opt: [{t:"بناء الأسوار", r:"✅ 2026: وطن آمن ومستقر."}, {t:"ترك الحدود مكشوفة", r:"⚠️ 2026: تأثر استقرار الوطن."}] }
            ],
            turki: [
                { s: "تحدي الأمن: الفوضى في الطرقات بعد استعادة الرياض..", img: "turki_security.gif", opt: [{t:"سيف الأجرب والعدل", r:"✅ 2026: ملاذ آمن لكل العالم."}, {t:"التهاون في الأمن", r:"⚠️ 2026: تعثر مسار الأمان."}] },
                { s: "تحدي العاصمة: الرياض تحتاج هوية معمارية..", img: "turki_build.gif", opt: [{t:"بناء قصر الحكم", r:"✅ 2026: عاصمة القرار العالمي."}, {t:"تأجيل البناء", r:"⚠️ 2026: تأخر تطور المدينة."}] }
            ],
            abdulaziz: [
                { s: "تحدي الوحدة: المملكة شاسعة وتحتاج لربط القلوب..", img: "aziz_unity.gif", opt: [{t:"توطين البادية", r:"✅ 2026: مجتمع متلاحم كجبل طويق."}, {t:"تجاهل المناطق البعيدة", r:"⚠️ 2026: تعثر توازن التنمية."}] },
                { s: "تحدي النهضة: العلم والتكنولوجيا في بدايتها..", img: "aziz_tech.gif", opt: [{t:"حفر آبار النفط", r:"✅ 2026: قوة اقتصادية عظمى."}, {t:"رفض التقنيات", r:"⚠️ 2026: فجوة تقنية مع العالم."}] }
            ]
        };

        function loadGame(who) {
            const stories = gameData[who];
            const randomStory = stories[Math.floor(Math.random() * stories.length)];
            
            // تغيير الخلفية
            document.getElementById('dynamic-bg').style.backgroundImage = `url('${randomStory.img}')`;
            
            document.getElementById('game-title').innerText = "مهمة التاريخ";
            document.getElementById('game-desc').innerText = randomStory.s;
            let html = "";
            randomStory.opt.forEach(o => {
                html += `<button class="game-btn" onclick="showResult('${o.r}')">${o.t}</button>`;
            });
            document.getElementById('options-container').innerHTML = html;
        }

        function showResult(res) {
            document.getElementById('options-container').style.display = 'none';
            const box = document.getElementById('result-box');
            box.style.display = 'block';
            box.innerText = res;
        }

        function readHistory(who) {
            // هنا يمكن إضافة نظام الصور للقصة أيضاً بنفس الطريقة
            const hData = {
                saud: "بدأ الإمام محمد بن سعود رحلة التأسيس من الدرعية عام 1727...",
                turki: "استعاد الإمام تركي بن عبد الله الرياض وأرسى قواعد الدولة الثانية...",
                abdulaziz: "وحد الملك عبد العزيز شتات الجزيرة ليصنع وطناً عظيماً..."
            };
            document.getElementById('history-content').innerText = hData[who];
            document.getElementById('history-menu').style.display = 'none';
        }
    </script>
</body>
</html>
