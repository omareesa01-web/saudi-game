<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - القصص المتغيرة</title>
    <style>
        :root { --gold: #c1a35f; --green: #064d2b; --red: #ff4d4d; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #052c19; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0a6b3d 0%, #052c19 100%); z-index: -1; }
        .container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { background: rgba(0, 0, 0, 0.85); border: 2px solid var(--gold); padding: 30px; border-radius: 20px; max-width: 600px; width: 100%; backdrop-filter: blur(15px); text-align: center; }
        h1 { color: var(--gold); font-size: 1.8rem; margin-bottom: 10px; }
        .story-text { font-size: 1.1rem; line-height: 1.7; margin-bottom: 25px; }
        .btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 14px; margin: 8px 0; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: black; }
        .result-box { display: none; padding: 20px; border-right: 5px solid var(--gold); background: rgba(255,255,255,0.05); margin-top: 20px; text-align: right; }
        .lose-style { border-right-color: var(--red); color: var(--red); }
        .back-btn { background: #333; color: white; border: 1px solid #666; padding: 12px 25px; border-radius: 8px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="card" id="game-card">
            <h1 id="title">ملاحم التأسيس</h1>
            <p id="desc" class="story-text">في كل مرة تختار قائداً، سيضعك القدر أمام تحدٍ تاريخي مختلف..</p>
            <div id="options-container">
                <button class="btn" onclick="loadCharacter('saud')">الإمام محمد بن سعود</button>
                <button class="btn" onclick="loadCharacter('turki')">الإمام تركي بن عبد الله</button>
                <button class="btn" onclick="loadCharacter('abdulaziz')">الملك عبد العزيز</button>
            </div>
            <div id="result-box" class="result-box"></div>
            <button id="reset-btn" class="back-btn" style="display:none;" onclick="location.reload()">العودة للتاريخ</button>
        </div>
    </div>

    <script>
        const characters = {
            saud: [
                {
                    story: "تحدي العلم: الدرعية في بداياتها وتحتاج لأساس فكري قوي، ماذا تفعل؟",
                    options: [
                        { text: "عقد ميثاق الدرعية لنشر المعرفة", res: "✅ 2026: الدرعية أصبحت منارة ثقافية عالمية!" },
                        { text: "إهمال العلم والتركيز على الزراعة فقط", res: "❌ 2026: ضاعت هوية الدولة وأصبحت مجرد واحة منسية." },
                        { text: "فرض ضرائب قاسية لبناء المدارس", res: "❌ 2026: ثار الشعب وسقطت الدرعية قبل أن يكتمل بناؤها." }
                    ]
                },
                {
                    story: "تحدي الحدود: القبائل المجاورة تهدد أمن الدرعية، كيف تتصرف؟",
                    options: [
                        { text: "بناء أسوار الدرعية العظيمة", res: "✅ 2026: بفضل صمودك، نحن اليوم نعيش في وطن آمن ومستقر." },
                        { text: "الهجوم المفاجئ على كل الجيران", res: "❌ 2026: دخلت في حروب استنزاف جعلت الدولة فقيرة وضعيفة." },
                        { text: "ترك الحدود مفتوحة لكسب ثقة التجار", res: "❌ 2026: دخل الأعداء متنكرين ودمروا العاصمة من الداخل." }
                    ]
                }
            ],
            turki: [
                {
                    story: "تحدي الأمن: بعد استعادة الرياض، الفوضى ما زالت في الطرقات، ما قرارك؟",
                    options: [
                        { text: "استخدام سيف الأجرب لبسط العدل", res: "✅ 2026: السعودية اليوم هي الملاذ الآمن لكل العالم." },
                        { text: "إعطاء الأمان للمجرمين ليتوبوا", res: "❌ 2026: زادت العصابات وسقطت هيبة الدولة في 2026." },
                        { text: "بناء السجون فقط دون نشر الوعي", res: "❌ 2026: الدولة غارقة في الفساد والظلم." }
                    ]
                },
                {
                    story: "تحدي العاصمة: الرياض مدمرة وتحتاج إعادة بناء، ماذا تبدأ به؟",
                    options: [
                        { text: "بناء قصر الحكم والمسجد الجامع", res: "✅ 2026: الرياض اليوم هي عاصمة القرار العالمي وإكسبو 2030." },
                        { text: "بناء قصور خاصة للحاشية فقط", res: "❌ 2026: انفصل الشعب عن القيادة وانهارت الدولة." },
                        { text: "ترك الرياض والانتقال لمكان أبعد", res: "❌ 2026: تشتت الشمل وضاعت العاصمة التاريخية." }
                    ]
                }
            ],
            abdulaziz: [
                {
                    story: "تحدي التوحيد: القبائل متفرقة والجزيرة ممزقة، كيف تجمعهم؟",
                    options: [
                        { text: "توطين البادية وبناء الهجر للتعليم", res: "✅ 2026: بفضل الوحدة، نحن اليوم جبل طويق الذي لا ينكسر." },
                        { text: "شراء الولاءات بالمال فقط", res: "❌ 2026: عندما نفد المال، انقلب الجميع وضاع الوطن." },
                        { text: "القوة العسكرية دون تفاهم", res: "❌ 2026: الدولة تعيش في صراعات قبلية مريرة حتى اليوم." }
                    ]
                },
                {
                    story: "تحدي المستقبل: ظهرت بوادر وجود النفط والتقنيات، ما أولوياتك؟",
                    options: [
                        { text: "جلب المهندسين وحفر أول بئر", res: "✅ 2026: أرامكو هي عملاق العالم وصندوقنا الاستثماري هو الأقوى." },
                        { type: "win", text: "بناء أول خط برقية للاتصالات", res: "✅ 2026: نحن اليوم رواد التقنية والذكاء الاصطناعي." },
                        { text: "منع التقنيات خوفاً من التغيير", res: "❌ 2026: نعيش في عزلة تكنولوجية وفقر مدقع." }
                    ]
                }
            ]
        };

        function loadCharacter(key) {
            const characterStories = characters[key];
            const randomStory = characterStories[Math.floor(Math.random() * characterStories.length)];
            
            document.getElementById('title').innerText = randomStory.story.split(':')[0];
            document.getElementById('desc').innerText = randomStory.story;
            
            let html = "";
            randomStory.options.forEach((opt, idx) => {
                html += `<button class="btn" onclick="showResult('${opt.res.replace(/'/g, "\\'")}')">${opt.text}</button>`;
            });
            document.getElementById('options-container').innerHTML = html;
        }

        function showResult(resultText) {
            document.getElementById('options-container').style.display = 'none';
            document.getElementById('desc').style.display = 'none';
            const rb = document.getElementById('result-box');
            rb.style.display = 'block';
            rb.innerHTML = `<strong>النتيجة في 2026:</strong><br><br>${resultText}`;
            
            if (resultText.includes('❌')) {
                rb.classList.add('lose-style');
                document.getElementById('reset-btn').innerText = "لقد سقطت الدولة.. حاول إصلاح التاريخ";
            }
            document.getElementById('reset-btn').style.display = 'inline-block';
        }
    </script>
</body>
</html>
