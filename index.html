<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>ملحمة التأسيس</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- خط عربي -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Particles.js -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    :root {
      --saudi-green: #006C35;
      --saudi-green-light: #00b85a;
      --bg-dark: #02140a;
      --text-light: #ffffff;
      --border-radius: 18px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Cairo", sans-serif;
      background: radial-gradient(circle at top, #024d28 0, #02140a 40%, #000);
      color: var(--text-light);
      min-height: 100vh;
      overflow: hidden;
    }

    #particles-js {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: auto;
      padding: 28px 20px 40px;
    }

    /* اللغة */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .lang-toggle {
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.4);
      padding: 4px;
      border-radius: 999px;
      box-shadow: 0 0 12px rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
    }

    .lang-btn {
      border: 1px solid var(--saudi-green);
      background: transparent;
      padding: 6px 16px;
      border-radius: 999px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    .lang-btn.active {
      background: rgba(0,108,53,0.9);
      box-shadow:
        0 0 8px var(--saudi-green-light),
        0 0 16px rgba(0,184,90,0.7);
      font-weight: 700;
      text-shadow:
        0 0 6px var(--saudi-green-light),
        0 0 12px rgba(0,184,90,0.9);
    }

    /* الشاشات */
    .screen {
      display: none;
      opacity: 0;
      transform: translateY(24px) scale(0.97);
      transition:
        opacity 0.45s ease,
        transform 0.45s ease,
        filter 0.45s ease;
      background: linear-gradient(145deg, rgba(0,0,0,0.7), rgba(0,40,20,0.9));
      border-radius: 24px;
      padding: 26px 20px 30px;
      border: 1px solid rgba(0,108,53,0.6);
      box-shadow:
        0 0 18px rgba(0,0,0,0.9),
        0 0 24px rgba(0,108,53,0.4);
      backdrop-filter: blur(10px);
    }

    .screen.active {
      display: block;
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: drop-shadow(0 0 12px rgba(0,184,90,0.4));
      animation: glowPulse 2.5s infinite ease-in-out;
    }

    @keyframes glowPulse {
      0%   { box-shadow: 0 0 10px rgba(0,184,90,0.4); }
      50%  { box-shadow: 0 0 22px rgba(0,184,90,0.9); }
      100% { box-shadow: 0 0 10px rgba(0,184,90,0.4); }
    }

    .screen-title {
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 14px;
      text-shadow:
        0 0 6px var(--saudi-green-light),
        0 0 18px rgba(0,184,90,0.9);
    }

    .screen-subtitle {
      text-align: center;
      font-size: 16px;
      margin-bottom: 26px;
      opacity: 0.95;
      color: #e6fff3;
      text-shadow: 0 0 4px rgba(0,0,0,0.9);
      line-height: 1.7;
    }

    /* الأزرار الكبيرة */
    .btn {
      width: 100%;
      padding: 18px 20px;
      margin-bottom: 14px;
      border-radius: 18px;
      border: 1px solid var(--saudi-green);
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition:
        background 0.25s ease,
        box-shadow 0.25s ease,
        transform 0.2s ease;
      box-shadow:
        0 0 6px rgba(0,108,53,0.4),
        inset 0 0 0 rgba(0,0,0,0);
      text-align: center;
      text-shadow: 0 0 4px rgba(0,0,0,0.9);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 0 16px var(--saudi-green-light);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(0,108,53,0.95), rgba(0,184,90,0.9));
      box-shadow:
        0 0 10px var(--saudi-green-light),
        0 0 20px rgba(0,184,90,0.8);
    }

    .btn-ghost {
      background: transparent;
      border-style: dashed;
      opacity: 0.85;
    }

    .list {
      margin-top: 10px;
    }

    .link {
      display: block;
      text-align: center;
      margin-top: 12px;
      color: #b8ffe0;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-size: 15px;
    }

    .link:hover {
      color: var(--saudi-green-light);
      text-shadow: 0 0 6px var(--saudi-green-light);
    }

    /* نافذة النتيجة */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      width: 88%;
      max-width: 360px;
      background: radial-gradient(circle at top, #03351c, #020f09);
      border-radius: 20px;
      border: 1px solid rgba(0,184,90,0.7);
      box-shadow:
        0 0 18px rgba(0,184,90,0.8),
        0 0 26px rgba(0,0,0,0.9);
      padding: 18px 16px 16px;
      color: #eafff5;
      text-align: center;
      animation: modalIn 0.3s ease-out;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(18px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 10px;
      text-shadow:
        0 0 6px var(--saudi-green-light),
        0 0 14px rgba(0,184,90,0.9);
    }

    .modal-section-title {
      font-size: 15px;
      font-weight: 700;
      margin-top: 8px;
      margin-bottom: 4px;
      color: #b8ffe0;
    }

    .modal-text {
      font-size: 15px;
      line-height: 1.8;
      margin-bottom: 6px;
    }

    .modal-tag {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .tag-good {
      color: #00ffb3;
      border-color: #00ffb3;
      box-shadow: 0 0 10px rgba(0,255,179,0.6);
    }

    .tag-medium {
      color: #ffd966;
      border-color: #ffd966;
      box-shadow: 0 0 10px rgba(255,217,102,0.6);
    }

    .tag-bad {
      color: #ff6b6b;
      border-color: #ff6b6b;
      box-shadow: 0 0 10px rgba(255,107,107,0.6);

  </style>
</head>

langButtons.forEach(btn => {
  btn.onclick = () => {
    langButtons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const lang = btn.dataset.lang;
    switchLanguage(lang);
  };
});

function switchLanguage(lang) {
  document.querySelectorAll("[data-ar]").forEach(el => {
    el.textContent = el.dataset[lang];
  });
}

/* ------------------ التنقل بين الشاشات ------------------ */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  const target = document.getElementById("screen-" + id);
  setTimeout(() => target.classList.add("active"), 20);
}

document.getElementById("btn-start").onclick = () => showScreen("leader");
document.getElementById("btn-archive").onclick = () => showScreen("archive");
document.getElementById("btn-back-from-leader").onclick = () => showScreen("home");
document.getElementById("btn-back-from-archive").onclick = () => {
  document.getElementById("bio-container").style.display = "none";
  showScreen("home");
};
document.getElementById("link-change-leader").onclick = () => showScreen("leader");
document.getElementById("btn-back-to-scenarios").onclick = () => showScreen("scenario");

/* ------------------ اختيار القائد ------------------ */
document.querySelectorAll(".leader-btn").forEach(btn => {
  btn.onclick = () => {
    const leader = btn.dataset.leader;
    const list = document.getElementById("scenario-list");
    list.innerHTML = "";

    scenarios[leader].forEach(scenario => {
      const b = document.createElement("button");
      b.className = "btn";
      b.textContent = scenario;
      b.onclick = () => loadScenario(scenario);
      list.appendChild(b);
    });

    showScreen("scenario");
  };
});

/* ------------------ تحميل القصة ------------------ */
function loadScenario(name) {
  const data = scenarioStories[name];

  document.getElementById("story-title").textContent = name;
  document.getElementById("story-text").textContent = data.story;

  const box = document.getElementById("choices-container");
  box.innerHTML = "";

  data.choices.forEach(choice => {
    const c = document.createElement("button");
    c.className = "btn btn-primary";
    c.textContent = choice.text;
    c.onclick = () => showResult(choice);
    box.appendChild(c);
  });

  showScreen("story");
}

/* ------------------ نافذة النتيجة ------------------ */
function showResult(choice) {
  document.getElementById("result-past").textContent = choice.past;
  document.getElementById("result-today").textContent = choice.today;

  const tag = document.getElementById("result-tag");
  tag.textContent =
    choice.tag === "good" ? "قرار ممتاز" :
    choice.tag === "medium" ? "قرار متوسط" :
    "قرار سيء";

  tag.className = "modal-tag " +
    (choice.tag === "good" ? "tag-good" :
     choice.tag === "medium" ? "tag-medium" :
     "tag-bad");

  document.getElementById("result-modal").classList.add("active");
}

document.getElementById("btn-close-result").onclick = () => {
  document.getElementById("result-modal").classList.remove("active");
};

/* ------------------ الأرشيف ------------------ */
document.querySelectorAll(".archive-leader-btn").forEach(btn => {
  btn.onclick = () => {
    const key = btn.dataset.leader;
    const bio = leadersBio[key];

    document.getElementById("bio-name").textContent = bio.name;
    document.getElementById("bio-dates").textContent = bio.dates;
    document.getElementById("bio-text").textContent = bio.text;

    document.getElementById("bio-container").style.display = "block";
  };
});

    opacity: { value: 0.25, random: true },
