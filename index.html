<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | الإصدار الموسوعي الشامل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* [CSS ARCHITECTURE - SECTION 1: ROOT VARIABLES]
           تعريف المتغيرات الأساسية للمشروع لسهولة التعديل 
        */
        :root {
            --royal-green-dark: #092014;
            --royal-green-medium: #0D2E1C;
            --royal-green-light: #16422C;
            --gold-classic: #C5A028;
            --gold-metallic: #D4AF37;
            --gold-bright: #FFD700;
            --gold-soft: #F9E29C;
            --pure-white: #FFFFFF;
            --glass-bg: rgba(13, 46, 28, 0.98);
            --shadow-intensity: rgba(0, 0, 0, 0.85);
            --main-font: 'Cairo', sans-serif;
            --transition-epic: 0.55s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* [SECTION 2: GLOBAL RESET & BODY] 
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--royal-green-dark);
            font-family: var(--main-font);
            color: var(--pure-white);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* [SECTION 3: SAND PARTICLE CANVAS] 
        */
        #sand-engine-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            opacity: 0.7;
        }

        /* [SECTION 4: LANGUAGE SWITCHER UI] 
        */
        .language-control-panel {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;
            display: flex;
            gap: 12px;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .lang-trigger {
            background: transparent;
            border: 2px solid var(--gold-metallic);
            color: var(--gold-metallic);
            padding: 10px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.9rem;
            transition: all 0.4s ease;
        }

        .lang-trigger.is-active {
            background: var(--gold-metallic);
            color: var(--royal-green-dark);
            box-shadow: 0 0 20px var(--gold-bright);
        }

        /* [SECTION 5: MAIN APP FRAMEWORK] 
        */
        .app-container-frame {
            position: relative;
            z-index: 100;
            width: 410px;
            background: var(--glass-bg);
            border: 2px solid var(--gold-metallic);
            border-top: 12px solid var(--gold-metallic);
            border-radius: 50px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 40px 100px var(--shadow-intensity);
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
        }

        .app-container-frame::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        /* [SECTION 6: SCREEN MANAGEMENT SYSTEM] 
        */
        .ui-screen {
            display: none;
            opacity: 0;
            transform: scale(0.95) translateY(25px);
            transition: opacity var(--transition-epic), transform var(--transition-epic);
        }

        .ui-screen.is-visible {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* [SECTION 7: TYPOGRAPHY & HEADINGS] 
        */
        .epic-header-title {
            font-size: 2.3rem;
            font-weight: 900;
            color: var(--gold-bright);
            margin-bottom: 25px;
            letter-spacing: -1px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }

        .epic-description {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 40px;
            color: rgba(255,255,255,0.85);
            font-weight: 400;
        }

        /* [SECTION 8: THE GOLDEN SWORD BUTTON ENGINE] 
        */
        .epic-action-button {
            position: relative;
            width: 100%;
            padding: 22px 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2.5px solid var(--gold-metallic);
            border-radius: 25px;
            color: var(--pure-white);
            font-size: 1.15rem;
            font-weight: 800;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Sword Icon Animation */
        .epic-action-button::before {
            content: '⚔️';
            position: absolute;
            left: -50px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            transition: all 0.5s ease;
            opacity: 0;
        }

        .epic-action-button:hover {
            padding-left: 45px;
            background: var(--gold-metallic);
            color: var(--royal-green-dark);
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4);
        }

        .epic-action-button:hover::before {
            left: 20px;
            opacity: 1;
        }

        /* [SECTION 9: CONTENT BOXES & LORE] 
        */
        .historical-lore-box {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 35px;
            padding: 35px;
            margin: 25px 0;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.05rem;
            color: var(--pure-white);
            border-right: 10px solid var(--gold-metallic);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4);
            white-space: pre-line;
        }

        [dir="ltr"] .historical-lore-box {
            border-right: 0;
            border-left: 10px solid var(--gold-metallic);
            text-align: left;
        }

        .back-nav-trigger {
            display: inline-block;
            margin-top: 30px;
            color: var(--gold-bright);
            cursor: pointer;
            font-weight: 900;
            text-decoration: underline;
            text-underline-offset: 10px;
            transition: 0.3s ease;
        }

        .back-nav-trigger:hover {
            color: var(--pure-white);
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

    <canvas id="sand-engine-canvas"></canvas>

    <div class="language-control-panel">
        <button id="lang-ar-node" class="lang-trigger is-active" onclick="TitanCore.updateLanguage('ar')">العربية</button>
        <button id="lang-en-node" class="lang-trigger" onclick="TitanCore.updateLanguage('en')">English</button>
    </div>

    <div class="app-container-frame">
        
        <div id="screen-gate" class="ui-screen is-visible">
            <h1 class="epic-header-title" id="ui-label-gate-title">ملاحم التأسيس</h1>
            <p class="epic-description" id="ui-label-gate-desc">استكشف أعظم لحظات التاريخ السعودي من خلال أرشيف تفاعلي يجسد كفاح القادة وبناء الدولة.</p>
            <button class="epic-action-button" id="ui-btn-gate-start" onclick="TitanCore.navigate('screen-selection')">ابدأ الرحلة</button>
            <button class="epic-action-button" id="ui-btn-gate-archive" onclick="TitanCore.navigate('screen-archive')">سجل الخالدين</button>
        </div>

        <div id="screen-selection" class="ui-screen">
            <h1 class="epic-header-title" id="ui-label-selection-title">اختر القائد</h1>
            <div id="dynamic-hero-list">
                </div>
            <a class="back-nav-trigger" id="ui-nav-back-1" onclick="TitanCore.navigate('screen-gate')">العودة للرئيسية</a>
        </div>

        <div id="screen-quest" class="ui-screen">
            <h1 id="quest-header-title" style="color: var(--gold-bright); font-size: 1.6rem; margin-bottom: 20px;"></h1>
            <div id="quest-main-lore" class="historical-lore-box"></div>
            <div id="quest-options-container">
                </div>
            <a class="back-nav-trigger" id="ui-nav-back-2" onclick="TitanCore.navigate('screen-selection')">تراجع</a>
        </div>

        <div id="screen-verdict" class="ui-screen">
            <h1 class="epic-header-title" id="ui-label-verdict-title">حكم التاريخ</h1>
            <div id="verdict-result-lore" class="historical-lore-box"></div>
            <button class="epic-action-button" id="ui-btn-verdict-retry" onclick="TitanCore.navigate('screen-selection')">مسار جديد</button>
            <a class="back-nav-trigger" id="ui-nav-back-3" onclick="TitanCore.navigate('screen-gate')">الرئيسية</a>
        </div>

        <div id="screen-archive" class="ui-screen">
            <h1 class="epic-header-title" id="ui-label-archive-title">سجل الخالدين</h1>
            <div id="dynamic-archive-list">
                </div>
            <a class="back-nav-trigger" id="ui-nav-back-4" onclick="TitanCore.navigate('screen-gate')">العودة</a>
        </div>

        <div id="screen-biography" class="ui-screen">
            <h1 id="bio-hero-title" class="epic-header-title"></h1>
            <div id="bio-hero-content" class="historical-lore-box"></div>
            <a class="back-nav-trigger" id="ui-nav-back-5" onclick="TitanCore.navigate('screen-archive')">العودة للسجل</a>
        </div>

    </div>

    <script>
        /**
         * [PART 1: EXTENDED DATA REPOSITORY - الأرشيف الضخم]
         * تم تفصيل البيانات بشكل غير مسبوق لزيادة حجم الكود وثرائه المعرفي.
         */
        const ARCHIVE_DATABASE = {
            imam_mohammad_saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    title: "مؤسس الدولة السعودية الأولى",
                    q_header: "ميثاق الدرعية (1139هـ / 1727م)",
                    q_lore: "أنت الآن في الدرعية، المدينة التي ورثت حكمها عن آبائك. المنطقة تعاني من التشتت والضعف والفرقة.\n\nيصل الشيخ محمد بن عبدالوهاب إلى الدرعية، حاملاً دعوة لتصحيح العقيدة ونشر التوحيد وبناء دولة قوية تقوم على الشريعة.\n\nهل تضع يدك في يده لتبدأ 'يوم التأسيس' العظيم؟",
                    choices: [
                        { label: "عقد الميثاق التاريخي", result: "✅ 'أبشر بالعز والتمكين'.. بهذه العبارة الخالدة بدأت أعظم وحدة سياسية في تاريخ الجزيرة العربية الحديث. بقرارك هذا، تحولت الدرعية من بلدة إلى عاصمة دولة ممتدة، وانطلقت جيوش التوحيد لتأمين الأمن ونشر العلم، وصنعتم التاريخ الذي نفخر به اليوم في يوم التأسيس." },
                        { label: "توفير الأمان دون تحالف", result: "⚠️ نال الشيخ الحماية، لكن الحلم ببناء دولة موحدة لم يتحقق. بقيت الجزيرة العربية تعاني من الحروب القبلية والصراعات المشتتة لسنوات طويلة إضافية." }
                    ],
                    biography: `
• عهد التأسيس (1139هـ / 1727م):
الإمام محمد بن سعود هو القائد الحكيم الذي أسس الدولة السعودية الأولى.

• المبادئ السياسية:
1. الوحدة الوطنية فوق الانتماء القبلي.
2. بناء نظام اقتصادي قوي يعتمد على تأمين طرق التجارة.
3. دعم العلم والعلماء وجعل الدرعية وجهة للمثقفين.

• أهم الإنجازات العمرانية:
- بناء "حي الطريف" الذي يعد اليوم موقعاً للتراث العالمي (اليونسكو).
- تشييد سور الدرعية العظيم لحماية العاصمة من الغارات الخارجية.
- تنظيم شؤون المدينة وتقسيم الأحياء وتطوير الزراعة في وادي حنيفة.

• الإرث التاريخي:
ترك الإمام محمد دولة قوية صمدت أمام أعظم القوى في ذلك الوقت، ووضع القواعد الأصيلة للحكم السعودي القائم على العدل والحكمة.`
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    title: "Founder of the First Saudi State",
                    q_header: "The Diriyah Pact (1727 AD)",
                    q_lore: "You are in Diriyah, the city you inherited from your ancestors. The region is suffering from fragmentation, weakness, and division.\n\nSheikh Muhammad bin Abdul Wahab arrives in Diriyah, carrying a call to reform the faith, spread monotheism, and build a strong state based on law.\n\nDo you join hands with him to begin the great 'Founding Day'?",
                    choices: [
                        { label: "Form the Historic Alliance", result: "✅ 'Be promised glory and empowerment'.. With this immortal phrase, the greatest political unit in the modern history of the Arabian Peninsula began. With your decision, Diriyah transformed from a town into a state capital, and the armies of unification set out to secure peace and spread knowledge." },
                        { label: "Offer Safety Without Alliance", result: "⚠️ The Sheikh received protection, but the dream of building a unified nation was not realized. The peninsula continued to suffer from tribal wars and scattered conflicts for many more years." }
                    ],
                    biography: `
• The Founding Era (1727 AD):
Imam Muhammad bin Saud is the wise leader who established the First Saudi State.

• Political Principles:
1. National unity above tribal affiliation.
2. Building a strong economic system by securing trade routes.
3. Supporting knowledge and scholars, making Diriyah a destination for intellectuals.

• Major Architectural Achievements:
- Built the 'At-Turaif' district, now a UNESCO World Heritage site.
- Constructed the Great Wall of Diriyah to protect the capital.
- Organized the city's affairs and developed agriculture in Wadi Hanifa.

• Historical Legacy:
Imam Muhammad left a strong state that stood firm against the greatest powers of that time, laying the authentic foundations for Saudi rule based on justice.`
                }
            },
            imam_turki_abdullah: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    title: "مؤسس الدولة السعودية الثانية",
                    q_header: "ملحمة السيف الأجرب (1240هـ)",
                    q_lore: "بعد سقوط الدرعية، عاشت البلاد سنوات عجاف تحت الاحتلال والظلم. أنت الآن الإمام تركي، تقف في 'خلوة الحلوة' ومعك سيفك 'الأجرب' الذي وصفته في قصيدك.\n\nهل تباغت الحامية الأجنبية في الرياض بـ 40 رجلاً فقط لتعيد ملك آبائك؟",
                    choices: [
                        { label: "الهجوم واستعادة الرياض", result: "✅ الله أكبر! بقرارك الشجاع ومباغتتك للعدو، سقط حصن المصمك القديم وهربت الحامية. أعلنت قيام الدولة السعودية الثانية واتخذت من الرياض عاصمة دائمة، وأعدت الاستقرار والأمان للبلاد بعد سنوات من الفوضى." },
                        { label: "الانتظار لجمع المزيد من العتاد", result: "❌ أدى التأخير إلى كشف موقعك من قِبل الجواسيس، فقام العدو بتعزيز دفاعات الرياض، مما جعل عملية التحرير لاحقاً أكثر صعوبة وتكلفة في الأرواح." }
                    ],
                    biography: `
• عهد الاستعادة (1240هـ / 1824م):
الإمام تركي بن عبدالله بن محمد بن سعود، هو بطل الصمود الذي لم يستسلم لسقوط الدولة الأولى.

• كفاحه العسكري:
- قاد المقاومة الشعبية لسنوات من الجبال والكهوف.
- اشتهر بسيفه "الأجرب" الذي أصبح رمزاً للقوة والتحرير.
- استطاع بذكائه العسكري طرد القوات الأجنبية من نجد تماماً.

• إنجازاته السياسية:
1. تأسيس الدولة السعودية الثانية وعاصمتها الرياض.
2. إعادة بناء قصر الحكم وجعله مركزاً للقرار السياسي والعدل.
3. بناء جامع الإمام تركي بن عبدالله الذي لا يزال معلماً بارزاً في الرياض.

• صفاته:
عُرف بالتقوى، الشجاعة، والعدل بين الناس، وكان شاعراً بليغاً يصف حال بلاده ومجده.`
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    title: "Founder of the Second Saudi State",
                    q_header: "The Saga of the Al-Ajrab Sword",
                    q_lore: "After the fall of Diriyah, the country lived through years of occupation and injustice. You are now Imam Turki, standing in 'Khilwat Al-Hilwa' with your sword 'Al-Ajrab'.\n\nDo you surprise the foreign garrison in Riyadh with only 40 men to restore your ancestors' kingdom?",
                    choices: [
                        { label: "Attack and Reclaim Riyadh", result: "✅ Allahu Akbar! With your brave decision, the old fort fell and the garrison fled. You declared the establishment of the Second Saudi State, made Riyadh the permanent capital, and restored stability to the land." },
                        { label: "Wait to Gather More Equipment", result: "❌ The delay led to your location being revealed by spies, so the enemy reinforced Riyadh's defenses, making the liberation process later more difficult and costly." }
                    ],
                    biography: `
• The Era of Restoration (1824 AD):
Imam Turki bin Abdullah is the hero of steadfastness who did not surrender to the fall of the first state.

• Military Struggle:
- Led the popular resistance for years from mountains and caves.
- Famous for his sword 'Al-Ajrab', which became a symbol of strength and liberation.
- Successfully expelled foreign forces from Najd completely through military brilliance.

• Political Achievements:
1. Established the Second Saudi State with Riyadh as its capital.
2. Rebuilt the Justice Palace (Qasr Al-Hukm).
3. Constructed the Imam Turki bin Abdullah Mosque.

• Qualities:
He was known for piety, courage, and justice among people. He was also a silver-tongued poet.`
                }
            },
            king_abdulaziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    title: "موحد المملكة العربية السعودية",
                    q_header: "ملحمة فتح الرياض (1319هـ)",
                    q_lore: "أنت الملك الشاب عبد العزيز بن عبد الرحمن، تقف تحت أسوار الرياض في ليلة الرابع من شوال. الفجر يقترب وبوابة المصمك ستفتح الآن لخروج 'عجلان' حكام الرياض.\n\nالقرار مصيري: هل تقتحم البوابة فوراً في مواجهة مباشرة؟",
                    choices: [
                        { label: "اقتحام المصمك الآن", result: "✅ 'الملك لله ثم لعبد العزيز'.. بهذه الصرخة المدوية، استعدت الرياض وبدأت ملحمة توحيد المملكة التي استمرت 30 عاماً. بقرارك هذا، صنعت وطناً شامخاً يجمع الشتات، وبدأت عصر النهضة الحديثة." },
                        { label: "التراجع لتغيير الخطة", result: "⚠️ ضاعت فرصة المباغتة، وعلم الحاكم بوجودك، فدخلت في حصار طويل ومعارك استنزفت رجالك، وتأخر توحيد البلاد لسنوات عديدة." }
                    ],
                    biography: `
• المؤسس العظيم (1293هـ - 1373هـ):
الملك عبدالعزيز بن عبدالرحمن آل سعود، صقر الجزيرة وموحد شتاتها.

• رحلة التوحيد:
- انطلق من الكويت بـ 63 رجلاً فقط لاستعادة ملك آبائه.
- قضى أكثر من ثلاثين عاماً في توحيد أقاليم البلاد (نجد، الحجاز، عسير، الأحساء).
- أعلن توحيد البلاد تحت اسم "المملكة العربية السعودية" في عام 1351هـ (1932م).

• النهضة الشاملة:
1. اكتشاف النفط وبدء العصر الصناعي والاقتصادي.
2. توطين البادية وتحويلهم من حياة التنقل إلى الاستقرار والإعمار.
3. تأسيس الوزارات، والأنظمة الإدارية، وسك العملة السعودية.
4. مد خطوط البرق والهاتف وبناء المطارات والموانئ.

• سياسته:
اتسمت سياسته بالحكمة، الشجاعة، والتوازن بين الأصالة والمعاصرة، مما جعل المملكة دولة ذات ثقل سياسي وعالمي كبير.`
                },
                en: {
                    name: "King Abdulaziz",
                    title: "Unifier of the Kingdom of Saudi Arabia",
                    q_header: "The Conquest of Riyadh (1902 AD)",
                    q_lore: "You are the young King Abdulaziz, standing under the walls of Riyadh on the night of the 4th of Shawwal. Dawn is approaching and the Masmak gate is about to open.\n\nThe decision is critical: Do you storm the gate immediately in a direct confrontation?",
                    choices: [
                        { label: "Storm Masmak Now", result: "✅ 'Kingdom for God, then for Abdulaziz'.. With this resounding cry, Riyadh was reclaimed and the 30-year epic of unifying the Kingdom began. You created a towering nation." },
                        { label: "Retreat to Change the Plan", result: "⚠️ The opportunity for surprise was lost, and the ruler learned of your presence, leading to a long siege and battles that drained your men." }
                    ],
                    biography: `
• The Great Founder (1876 - 1953):
King Abdulaziz bin Abdulrahman Al Saud, the falcon of the peninsula and the unifier of its fragments.

• Unification Journey:
- Set out from Kuwait with only 63 men to restore his ancestors' kingdom.
- Spent over thirty years unifying the regions (Najd, Hejaz, Asir, Al-Ahsa).
- Declared the unification under the name 'Kingdom of Saudi Arabia' in 1932.

• Comprehensive Renaissance:
1. Oil discovery and the start of the industrial and economic era.
2. Settling the nomads and transforming them into stable citizens.
3. Establishing ministries and administrative systems.
4. Building airports, ports, and telecommunication lines.

• Policy:
His policy was characterized by wisdom, courage, and a balance between tradition and modernity.`
                }
            }
        };

        const UI_TEXTS = {
            ar: {
                gate_title: "ملاحم التأسيس",
                gate_desc: "استكشف أعظم لحظات التاريخ السعودي من خلال أرشيف تفاعلي يجسد كفاح القادة وبناء الدولة.",
                btn_start: "ابدأ الملحمة",
                btn_archive: "سجل الخالدين",
                select_title: "اختر القائد",
                verdict_title: "حكم التاريخ",
                archive_title: "سجل الخالدين",
                btn_retry: "مسار جديد",
                back: "رجوع",
                dir: "rtl"
            },
            en: {
                gate_title: "Founding Epics",
                gate_desc: "Explore the greatest moments of Saudi history through an interactive archive of struggle and state-building.",
                btn_start: "Start Journey",
                btn_archive: "Immortal Archive",
                select_title: "Select Leader",
                verdict_title: "Historical Verdict",
                archive_title: "Immortal Archive",
                btn_retry: "New Path",
                back: "Back",
                dir: "ltr"
            }
        };

        /**
         * [PART 2: CORE APPLICATION LOGIC]
         */
        const TitanCore = {
            currentLang: 'ar',

            init() {
                console.log("Titan Engine Initialized...");
                this.updateLanguage('ar');
                SandVisuals.start();
            },

            updateLanguage(langCode) {
                this.currentLang = langCode;
                const langData = UI_TEXTS[langCode];
                
                // Update HTML Metadata
                document.documentElement.dir = langData.dir;
                document.documentElement.lang = langCode;

                // Toggle Button States
                document.querySelectorAll('.lang-trigger').forEach(btn => btn.classList.remove('is-active'));
                document.getElementById(`lang-${langCode}-node`).classList.add('is-active');

                // Update UI Labels
                document.getElementById('ui-label-gate-title').innerText = langData.gate_title;
                document.getElementById('ui-label-gate-desc').innerText = langData.gate_desc;
                document.getElementById('ui-btn-gate-start').innerText = langData.btn_start;
                document.getElementById('ui-btn-gate-archive').innerText = langData.btn_archive;
                document.getElementById('ui-label-selection-title').innerText = langData.select_title;
                document.getElementById('ui-label-verdict-title').innerText = langData.verdict_title;
                document.getElementById('ui-label-archive-title').innerText = langData.archive_title;
                document.getElementById('ui-btn-verdict-retry').innerText = langData.btn_retry;
                
                // Update Back Buttons
                for(let i=1; i<=5; i++) {
                    const el = document.getElementById(`ui-nav-back-${i}`);
                    if(el) el.innerText = langData.back;
                }

                this.renderDynamicContent();
            },

            navigate(screenID) {
                const allScreens = document.querySelectorAll('.ui-screen');
                allScreens.forEach(s => {
                    s.classList.remove('is-visible');
                    setTimeout(() => { s.style.display = 'none'; }, 300);
                });

                setTimeout(() => {
                    const target = document.getElementById(screenID);
                    target.style.display = 'block';
                    setTimeout(() => { target.classList.add('is-visible'); }, 50);
                }, 350);
            },

            renderDynamicContent() {
                const heroList = document.getElementById('dynamic-hero-list');
                const archList = document.getElementById('dynamic-archive-list');
                heroList.innerHTML = '';
                archList.innerHTML = '';

                Object.keys(ARCHIVE_DATABASE).forEach(key => {
                    const heroData = ARCHIVE_DATABASE[key][this.currentLang];
                    
                    // Create Selection Button
                    const selBtn = document.createElement('button');
                    selBtn.className = 'epic-action-button';
                    selBtn.innerText = heroData.name;
                    selBtn.onclick = () => this.launchQuest(key);
                    heroList.appendChild(selBtn);

                    // Create Archive Button
                    const arcBtn = document.createElement('button');
                    arcBtn.className = 'epic-action-button';
                    arcBtn.innerText = heroData.name;
                    arcBtn.onclick = () => this.showBiography(key);
                    archList.appendChild(arcBtn);
                });
            },

            launchQuest(heroKey) {
                const quest = ARCHIVE_DATABASE[heroKey][this.currentLang];
                document.getElementById('quest-header-title').innerText = quest.q_header;
                document.getElementById('quest-main-lore').innerText = quest.q_lore;
                
                const container = document.getElementById('quest-options-container');
                container.innerHTML = '';

                quest.choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'epic-action-button';
                    btn.innerText = choice.label;
                    btn.onclick = () => {
                        document.getElementById('verdict-result-lore').innerText = choice.result;
                        this.navigate('screen-verdict');
                    };
                    container.appendChild(btn);
                });

                this.navigate('screen-quest');
            },

            showBiography(heroKey) {
                const bio = ARCHIVE_DATABASE[heroKey][this.currentLang];
                document.getElementById('bio-hero-title').innerText = bio.name;
                document.getElementById('bio-hero-content').innerText = bio.biography;
                this.navigate('screen-biography');
            }
        };

        /**
         * [PART 3: VISUALS - SAND PARTICLE ENGINE]
         */
        const SandVisuals = {
            canvas: document.getElementById('sand-engine-canvas'),
            ctx: null,
            particles: [],
            total: 350,

            start() {
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                this.build();
                this.render();
                window.addEventListener('resize', () => this.resize());
            },

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },

            build() {
                this.particles = [];
                for(let i=0; i < this.total; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 1.8 + 0.2,
                        speed: Math.random() * 0.5 + 0.1,
                        opacity: Math.random() * 0.6
                    });
                }
            },

            render() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.fillStyle = '#FFD700';
                
                this.particles.forEach(p => {
                    p.x += p.speed;
                    if(p.x > this.canvas.width) p.x = -10;
                    
                    this.ctx.globalAlpha = p.opacity;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                });
                
                requestAnimationFrame(() => this.render());
            }
        };

        // Launch Core Engine on Load
        window.onload = () => TitanCore.init();

    </script>
</body>
</html>
