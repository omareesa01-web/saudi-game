<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس </title>
    
    <style>
        :root {
            --gold-main: #c1a35f;
            --gold-light: #f3cf7a;
            --deep-green: #05160d;
            --glass-bg: rgba(0, 0, 0, 0.8);
            --glass-border: rgba(193, 163, 95, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            color: #ffffff; font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        #sand-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .lang-switcher {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            display: flex; gap: 8px;
        }

        .btn-lang {
            background: var(--glass-bg); border: 1px solid var(--gold-main);
            color: var(--gold-light); padding: 6px 14px; border-radius: 20px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
            backdrop-filter: blur(10px); font-size: 0.85rem;
        }

        .btn-lang.active { background: var(--gold-main); color: #000; }

        .app-wrapper {
            position: relative; z-index: 10; width: 90%; max-width: 600px; /* صغرنا العرض هنا */
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1.5px solid var(--glass-border); border-radius: 30px; padding: 30px; /* صغرنا الحشو */
            text-align: center; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            max-height: 85vh; overflow-y: auto;
        }

        .screen { display: none; opacity: 0; transform: translateY(20px); transition: 0.5s ease-out; }
        .screen.fade-in { display: block; opacity: 1; transform: translateY(0); }

        h1 { font-size: 2.2rem; color: var(--gold-main); margin-bottom: 15px; font-weight: 800; }
        .description { font-size: 1.1rem; color: #d0d0d0; margin-bottom: 30px; line-height: 1.6; }

        .btn-action {
            width: 100%; background: linear-gradient(145deg, rgba(193, 163, 95, 0.1), rgba(0, 0, 0, 0.7));
            border: 1px solid var(--gold-main); padding: 15px; border-radius: 12px;
            color: white; font-size: 1.05rem; font-weight: 700; cursor: pointer;
            transition: 0.3s; margin-bottom: 12px;
        }

        .btn-action:hover { background: var(--gold-main); color: #000; transform: translateY(-3px); }

        .story-panel {
            background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 20px;
            text-align: justify; line-height: 1.8; font-size: 1.1rem;
            border-right: 6px solid var(--gold-main); margin: 20px 0; color: #eee;
        }

        .nav-link { display: inline-block; margin-top: 20px; color: var(--gold-light); text-decoration: none; font-weight: 700; cursor: pointer; font-size: 1rem; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--gold-main); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="lang-switcher">
        <button id="btn-ar" class="btn-lang active" onclick="setAppLanguage('ar')">عربي</button>
        <button id="btn-en" class="btn-lang" onclick="setAppLanguage('en')">English</button>
    </div>

    <div class="app-wrapper">
        
        <div id="scr-home" class="screen" style="display: block;">
            <h1 id="txt-title">ملاحم التأسيس</h1>
            <p id="txt-desc" class="description">سجل تاريخي ناطق يروي أمجاد المملكة العربية السعودية عبر العصور</p>
            <button id="btn-start" class="btn-action" onclick="navTo('scr-heroes')">دخول الملحمة</button>
            <button id="btn-lore" class="btn-action" onclick="showLore()">سير الأبطال</button>
        </div>

        <div id="scr-heroes" class="screen">
            <h1 id="txt-hero-head">اختر القائد</h1>
            <div id="hero-list"></div>
            <a id="lnk-home" class="nav-link" onclick="navTo('scr-home')">العودة للرئيسية</a>
        </div>

        <div id="scr-mission" class="screen">
            <h1 id="ui-mission-title" style="font-size: 1.8rem;"></h1>
            <div id="ui-mission-desc" class="story-panel"></div>
            <div id="ui-btns-area"></div>
            <a id="lnk-cancel" class="nav-link" onclick="stopAudioAndGoBack()">إلغاء والعودة</a>
        </div>

        <div id="scr-result" class="screen">
            <h1 id="txt-res-head">حكم التاريخ</h1>
            <div id="ui-result-body" class="story-panel"></div>
            <a id="lnk-res-home" class="nav-link" onclick="navTo('scr-home')">الرئيسية</a>
        </div>

        <div id="scr-lore" class="screen">
            <h1 id="txt-lore-head">سجل العظماء</h1>
            <div id="ui-lore-list"></div>
            <a id="lnk-lore-back" class="nav-link" onclick="navTo('scr-home')">رجوع</a>
        </div>

        <div id="scr-bio" class="screen">
            <h1 id="ui-bio-name"></h1>
            <div id="ui-bio-text" class="story-panel"></div>
            <a id="lnk-bio-back" class="nav-link" onclick="navTo('scr-lore')">العودة للسجل</a>
        </div>

    </div>

    <script>
        let currentLang = 'ar';
        let audioPlayer = null;

        const Interface = {
            ar: { title: "ملاحم التأسيس", desc: "سجل تاريخي ناطق يروي أمجاد المملكة العربية السعودية عبر العصور", start: "دخول الملحمة", lore: "سير الأبطال", choose: "اختر القائد", home: "الرئيسية", cancel: "إلغاء والعودة", judge: "حكم التاريخ", records: "سجل العظماء", back: "رجوع", backLore: "العودة للسجل", dir: "rtl" },
            en: { title: "Founding Epics", desc: "A narrative historical record of Saudi Arabia's glory", start: "Enter Epic", lore: "Heroes Hall", choose: "Select Leader", home: "Home", cancel: "Cancel & Return", judge: "History's Verdict", records: "Great Archive", back: "Back", backLore: "Back to Records", dir: "ltr" }
        };

        const Characters = {
            saud: {
                ar: {
                    name: "الإمام محمد بن سعود", title: "ميثاق الدرعية الخالد (1727م)",
                    quest: "نحن في عام 1727م، الدرعية واحة خضراء في قلب نجد، لكنها تعيش في عالم يملؤه التشتت والصراعات القبلية والفقر والجهل. بصفتك الحاكم الشاب الطموح، أدركت بذكائك أن القوة العسكرية وحدها لا تبني أمة مستقرة، وأن الوحدة القائمة على مبادئ راسخة هي السبيل الوحيد للأمن والازدهار. هل تختار عقد ميثاق تاريخي قائم على الدعوة للعلم والعدل والوحدة لتكون الدرعية عاصمة لدولة كبرى تجمع شتات العرب، أم تكتفي بتعزيز الأسوار وحماية تجارتك وأهل مدينتك عسكرياً؟",
                    choices: [
                        { t: "عقد ميثاق الوحدة وبناء الدولة", r: "✅ انتصار تاريخي خالد! بقرارك الشجاع، تأسست الدولة السعودية الأولى. بفضل رؤيتك، تحولت القبائل المتناحرة إلى كيان سياسي مهاب، وعمّ الأمن أرجاء الجزيرة العربية بعد عقود من الفوضى." },
                        { t: "حماية حدود الدرعية فقط", r: "⚠️ نجاح محدود. استطعت حماية مدينتك لسنوات، لكن نجد ظلت غارقة في الصراعات، وضاعت فرصة بناء دولة كبرى تجمع الكلمة وترفع راية العلم." },
                        { t: "تأجيل التحالف لتقوية الجيش", r: "🛡️ موقف حذر. حافظت على توازن القوى مؤقتاً، لكنك أخرت فجر الوحدة لسنوات طويلة، مما منح الأعداء فرصة لتقوية نفوذهم." }
                    ],
                    bio: "الإمام محمد بن سعود، مؤسس الدولة السعودية الأولى. حول الدرعية من إمارة صغيرة إلى عاصمة لدولة مترامية الأطراف قامت على العدل."
                },
                en: {
                    name: "Imam Muhammad bin Saud", title: "The Diriyah Pact (1727)",
                    quest: "The year is 1727. Diriyah is an oasis in Najd, but the region is plagued by fragmentation. As a young leader, you realize that true strength lies in unity. Will you sign a historic pact to unite the Arabian tribes and make Diriyah the capital of a great state, or will you focus only on fortifying your own walls to protect local trade?",
                    choices: [
                        { t: "Sign the Pact & Build the State", r: "✅ Historic Victory! Your decision established the First Saudi State, bringing security after decades of chaos." },
                        { t: "Focus on Local Defense", r: "⚠️ Limited Success. You protected your city, but the region remained fragmented and the opportunity for greatness was missed." },
                        { t: "Delay the Decision", r: "🛡️ Cautious Move. You maintained temporary stability but delayed national unity for years." }
                    ],
                    bio: "Imam Muhammad bin Saud, the founder of the First Saudi State. He laid the foundation for Saudi history."
                }
            },
            turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله", title: "سيف الأجرب واستعادة الحق",
                    quest: "بعد سقوط الدرعية الأليم، ظن الجميع أن آل سعود قد غابوا عن المشهد للأبد. الرياض ترزح تحت وطأة الحاميات الأجنبية. خرجت أنت من مغارة 'عليا' وحيداً بسيفك 'الأجرب'. القرار المصيري بيدك: هل تباغت الحصون في الرياض بعملية جريئة رغم قلة رجالك، أم تبتعد لسنوات طويلة لجمع الأنصار والعتاد خوفاً من قوة العدو؟",
                    choices: [
                        { t: "باغت الرياض بالسيف فوراً", r: "✅ عودة الفارس المظفر! استعدت الرياض وجعلتها عاصمة للدولة السعودية الثانية. سيفك 'الأجرب' أصبح رمزاً لاسترداد السيادة، وبنيت دولة قوية أعادت العدل والهيبة." },
                        { t: "الانسحاب لجمع الأنصار لسنوات", r: "❌ ضياع اللحظة. استغل المحتلون تأخرك وقاموا بتحصين الرياض بمدافع إضافية، مما جعل مهمة التحرير لاحقاً شبه مستحيلة." },
                        { t: "بدء حرب استنزاف سريّة", r: "⚔️ استراتيجية طويلة. أرهقت حاميات العدو بضربات متفرقة، لكن استرداد الحكم استغرق وقتاً طويلاً كاد أن يطفئ شعلة الأمل." }
                    ],
                    bio: "الإمام تركي بن عبدالله آل سعود، مؤسس الدولة السعودية الثانية. استطاع بسيفه 'الأجرب' أن يعيد بناء الدولة من وسط الركام."
                },
                en: {
                    name: "Imam Turki bin Abdullah", title: "Al-Ajrab Sword",
                    quest: "After the fall of Diriyah, Riyadh was occupied. You emerged from the 'Alia' cave alone with your sword 'Al-Ajrab'. Will you launch a surprise attack on Riyadh now despite having few men, or retreat for years to gather a massive army?",
                    choices: [
                        { t: "Attack Riyadh Immediately", r: "✅ The Hero's Return! You recaptured Riyadh and established the Second Saudi State. Your sword 'Al-Ajrab' became a symbol of sovereignty." },
                        { t: "Withdraw to Gather Forces", r: "❌ Opportunity Lost. The occupiers reinforced Riyadh, making future liberation almost impossible." },
                        { t: "Start a War of Attrition", r: "⚔️ Long-term Strategy. You exhausted the enemy, but reclaiming the throne took much longer than expected." }
                    ],
                    bio: "Imam Turki bin Abdullah, the restorer of Saudi sovereignty and founder of the Second Saudi State."
                }
            },
            aziz: {
                ar: {
                    name: "الملك عبد العزيز", title: "فجر المصمك وتوحيد المملكة",
                    quest: "ليلة 15 يناير 1902م، تقف أنت يا عبدالعزيز مع 63 رجلاً فقط أمام قصر المصمك الحصين. الفجر يوشك على البزوغ والفرصة التاريخية قد تضيع للأبد. هل تقتحم الحصن الآن بقلب لا يعرف الخوف لتسترد ملك أجدادك وتعلن فجر عهد جديد، أم تنسحب وتنتظر لسنوات أخرى طلباً للمدد والتحالفات الخارجية بعيداً عن الرياض؟",
                    choices: [
                        { t: "اقتحم المصمك مع خيوط الفجر", r: "✅ الله أكبر! بفتحة المصمك، أعلنت للعالم أن 'الملك لله ثم لعبدالعزيز'. بدأت منذ تلك اللحظة ملحمة توحيد المملكة العربية السعودية، وحولت الشتات إلى وطن عظيم وقوة عالمية." },
                        { t: "التراجع لانتظار المدد", r: "❌ تبدد الحلم. كشف الأعداء أمركم وشددوا الحراسة، وظل ملك آبائك بعيد المنال لسنوات طويلة، وبقي الوطن يعاني من الانقسام لفترة أطول." },
                        { t: "محاصرة المدينة ببطء", r: "🛡️ حصار تكتيكي. أدى لاستنزاف حامية المصمك ببطء، لكنه كلفك خسارة عنصر المفاجأة الأسطوري الذي كان سيحسم الأمر في دقائق." }
                    ],
                    bio: "الملك عبدالعزيز آل سعود، المؤسس العظيم للمملكة العربية السعودية الحديثة. القائد الذي وحد القلوب قبل الأرض."
                },
                en: {
                    name: "King Abdulaziz", title: "The Dawn of Masmak",
                    quest: "January 15, 1902. You stand with 63 men before Masmak Fortress. Will you storm the fortress now to reclaim your ancestors' throne, or withdraw and wait for foreign support away from Riyadh?",
                    choices: [
                        { t: "Storm Masmak at Dawn", r: "✅ Victory! You declared 'The Kingdom is for God, then Abdulaziz,' starting the journey to unify Saudi Arabia and build a modern nation." },
                        { t: "Withdraw and Wait", r: "❌ The Dream Faded. The enemies discovered you, and Riyadh remained lost for many years." },
                        { t: "Lay a Siege", r: "🛡️ Cautious Siege. You exhausted the garrison, but lost the element of surprise, making the battle much longer." }
                    ],
                    bio: "King Abdulaziz Al Saud, the visionary founder of the modern Kingdom of Saudi Arabia."
                }
            }
        };

        function setAppLanguage(lang) {
            currentLang = lang;
            const t = Interface[lang];
            document.documentElement.lang = lang; document.documentElement.dir = t.dir;
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-desc').innerText = t.desc;
            document.getElementById('btn-start').innerText = t.start;
            document.getElementById('btn-lore').innerText = t.lore;
            document.getElementById('txt-hero-head').innerText = t.choose;
            document.getElementById('lnk-home').innerText = t.home;
            document.getElementById('lnk-cancel').innerText = t.cancel;
            document.getElementById('txt-res-head').innerText = t.judge;
            document.getElementById('lnk-res-home').innerText = t.home;
            document.getElementById('txt-lore-head').innerText = t.records;
            document.getElementById('lnk-lore-back').innerText = t.home;
            document.getElementById('lnk-bio-back').innerText = t.backLore;
            document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            buildHeroScreen();
        }

        function navTo(id) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => { s.classList.remove('fade-in'); setTimeout(() => s.style.display = 'none', 300); });
            setTimeout(() => {
                const target = document.getElementById(id);
                target.style.display = 'block';
                setTimeout(() => target.classList.add('fade-in'), 50);
            }, 350);
        }

        function buildHeroScreen() {
            const list = document.getElementById('hero-list');
            list.innerHTML = '';
            for(let key in Characters) {
                const b = document.createElement('button');
                b.className = 'btn-action';
                b.innerText = Characters[key][currentLang].name;
                b.onclick = () => {
                    const char = Characters[key][currentLang];
                    document.getElementById('ui-mission-title').innerText = char.title;
                    document.getElementById('ui-mission-desc').innerText = char.quest;
                    if(audioPlayer) audioPlayer.pause();
                    audioPlayer = new Audio(`${key}_${currentLang}.mp3`);
                    audioPlayer.play().catch(() => console.log("Audio not found"));
                    const btns = document.getElementById('ui-btns-area');
                    btns.innerHTML = '';
                    char.choices.forEach(choice => {
                        const cb = document.createElement('button');
                        cb.className = 'btn-action'; cb.innerText = choice.t;
                        cb.onclick = () => {
                            document.getElementById('ui-result-body').innerText = choice.r;
                            if(audioPlayer) audioPlayer.pause();
                            navTo('scr-result');
                        };
                        btns.appendChild(cb);
                    });
                    navTo('scr-mission');
                };
                list.appendChild(b);
            }
        }

        function showLore() {
            const container = document.getElementById('ui-lore-list');
            container.innerHTML = '';
            for(let key in Characters) {
                const b = document.createElement('button');
                b.className = 'btn-action';
                b.innerText = Characters[key][currentLang].name;
                b.onclick = () => {
                    document.getElementById('ui-bio-name').innerText = Characters[key][currentLang].name;
                    document.getElementById('ui-bio-text').innerText = Characters[key][currentLang].bio;
                    navTo('scr-bio');
                };
                container.appendChild(b);
            }
            navTo('scr-lore');
        }

        function stopAudioAndGoBack() { if(audioPlayer) audioPlayer.pause(); navTo('scr-heroes'); }

        const canvas = document.getElementById('sand-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            dots = [];
            for(let i=0; i<120; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, v: Math.random()*0.2+0.1});
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(193, 163, 95, 0.3)";
            dots.forEach(d => { d.y -= d.v; if(d.y < 0) d.y = canvas.height; ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animate);
        }
        window.onresize = resize; resize(); animate(); setAppLanguage('ar');
    </script>
</body>
</html>
