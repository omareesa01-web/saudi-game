<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | الرمال الذهبية</title>
    
    <style>
        /* [1] CSS ROOT - مصفوفة الألوان والخطوط */
        :root {
            --gold-primary: #c1a35f;
            --gold-glow: #f3cf7a;
            --gold-deep: #8e733b;
            --sand-dark: #664d2e; /* لون الرمال الغامق الجديد */
            --bg-golden: #a67c52; /* لون الخلفية الذهبي الصحراوي الجديد */
            --deep-black: #010402;
            --glass-bg: rgba(13, 46, 28, 0.98); /* خلفية القوائم الخضراء الملكية */
            --glass-border: rgba(193, 163, 95, 0.6);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --transition-smooth: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            --pure-white: #ffffff;
        }

        /* [2] GLOBAL STYLES - تصفير الإعدادات */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            outline: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--bg-golden) 0%, #825e3a 100%); /* الخلفية ذهبية عميقة */
            color: var(--pure-white);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* [3] SAND ENGINE CANVAS - خلفية تأثير الرمال */
        #sand-engine-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            opacity: 0.7; /* لشفافية الرمل */
        }

        /* [4] LANGUAGE HUB - واجهة اللغات */
        .language-hub {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
            display: flex;
            gap: 15px;
        }

        .lang-btn {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.8rem;
            transition: 0.4s;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .lang-btn.active {
            background: var(--gold-primary);
            color: #000;
            box-shadow: 0 0 30px var(--gold-primary);
        }

        /* [5] MAIN COMPACT APP - القائمة الرشيقة باللون الأخضر الملكي */
        .app-container {
            position: relative;
            z-index: 100;
            width: 90%;
            max-width: 410px;
            background: var(--glass-bg); /* الخلفية خضراء كما طلبت */
            backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border);
            border-top: 7px solid var(--gold-primary);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 100px 200px rgba(0,0,0,0.8);
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .app-container::-webkit-scrollbar { display: none; }

        /* [6] SCREEN MANAGEMENT - إدارة الشاشات */
        .screen {
            display: none;
            opacity: 0;
            transform: scale(0.9) translateY(40px);
            transition: all var(--transition-smooth);
        }

        .screen.active {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* كلمة ملاحم التأسيس تظل ذهبية */
        .main-title {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--gold-primary); 
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(193, 163, 95, 0.5);
            letter-spacing: -1px;
        }

        /* النصوص باللون الأبيض */
        .description-text {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--pure-white); 
            margin-bottom: 35px;
            opacity: 0.95;
        }

        /* [7] TITAN BUTTONS - الأزرار الفاخرة */
        .btn-epic {
            position: relative;
            width: 100%;
            padding: 18px;
            margin-bottom: 18px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(0,0,0,0.4));
            border: 1px solid var(--gold-primary);
            border-radius: 20px;
            color: var(--pure-white);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            overflow: hidden;
            transition: 0.5s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-epic:hover {
            transform: translateY(-5px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(0,0,0,0.6));
            border-color: var(--gold-glow);
            box-shadow: 0 15px 30px rgba(193, 163, 95, 0.3);
        }

        .btn-epic::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.8s;
        }

        .btn-epic:hover::before {
            left: 100%;
        }

        /* [8] LORE BOX - لوحة المحتوى خضراء وكلامها أبيض */
        .lore-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 25px;
            padding: 30px;
            margin: 25px 0;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.05rem;
            color: var(--pure-white);
            border-right: 8px solid var(--gold-primary);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
            white-space: pre-line;
        }

        [dir="ltr"] .lore-box {
            border-right: 0;
            border-left: 8px solid var(--gold-primary);
        }

        .back-nav {
            display: inline-block;
            margin-top: 30px;
            color: var(--gold-glow);
            cursor: pointer;
            font-weight: 800;
            font-size: 0.9rem;
            transition: 0.3s;
            text-decoration: underline;
            text-underline-offset: 5px;
        }

        .back-nav:hover {
            color: var(--pure-white);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <canvas id="sand-engine-canvas"></canvas>

    <div class="language-hub">
        <div id="btn-ar" class="lang-btn active" onclick="setGlobalLang('ar')">AR</div>
        <div id="btn-en" class="lang-btn" onclick="setGlobalLang('en')">EN</div>
    </div>

    <div class="app-container" id="app-scroller">
        
        <div id="screen-gate" class="screen active">
            <h1 class="main-title" id="t-gate-h">ملاحم التأسيس</h1>
            <p class="description-text" id="t-gate-d">انغمس في أعماق التاريخ السعودي، وكن القائد الذي يصنع المجد بقراراته الشجاعة.</p>
            <button class="btn-epic" id="t-btn-start" onclick="navigateTo('screen-selection')">ابدأ الرحلة الملحمية</button>
            <button class="btn-epic" id="t-btn-archive" onclick="navigateTo('screen-archive')">الأرشيف التاريخي</button>
        </div>

        <div id="screen-selection" class="screen">
            <h1 class="main-title" id="t-select-h">اختر القائد</h1>
            <div id="hero-injection-point"></div>
            <a class="back-nav" onclick="navigateTo('screen-gate')">العودة للرئيسية</a>
        </div>

        <div id="screen-quest" class="screen">
            <h1 id="quest-title-header" style="color: var(--gold-glow); font-size: 1.5rem; margin-bottom: 20px;"></h1>
            <div id="quest-content-box" class="lore-box"></div>
            <div id="quest-actions-container"></div>
            <a class="back-nav" onclick="navigateTo('screen-selection')">تراجع عن القرار</a>
        </div>

        <div id="screen-result" class="screen">
            <h1 id="main-title" class="main-title" id="t-res-h">حكم التاريخ</h1>
            <div id="result-text-box" class="lore-box"></div>
            <button class="btn-epic" onclick="navigateTo('screen-selection')">تجربة مسار جديد</button>
            <a class="back-nav" onclick="navigateTo('screen-gate')">الرئيسية</a>
        </div>

        <div id="screen-archive" class="screen">
            <h1 class="main-title" id="t-arch-h">سجل الخالدين</h1>
            <div id="arch-injection-point"></div>
            <a class="back-nav" onclick="navigateTo('screen-gate')">الرجوع</a>
        </div>

        <div id="screen-biography" class="screen">
            <h1 id="bio-hero-name" class="main-title"></h1>
            <div id="bio-content-box" class="lore-box"></div>
            <a class="back-nav" onclick="navigateTo('screen-archive')">العودة للسجل</a>
        </div>

    </div>

    <script>
        /* [S1] DATA ARCHIVE - نفس البيانات الدسمة */
        const EPIC_DATA = {
            m_saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    epic_title: "يوم ميثاق الدرعية التاريخي",
                    story_full: "في عام 1139هـ (1727م)، تولى الإمام محمد بن سعود الحكم في الدرعية. كانت المنطقة تعاني من تشتت سياسي وصراعات قبلية. \n\n يأتيك الشيخ محمد بن عبدالوهاب باحثاً عن قاعدة آمنة لنشر دعوة التوحيد والعلم. أنت الآن أمام قرار سيغير وجه التاريخ: هل تستقبل الشيخ وتتحمل تبعات المواجهة مع القوى الكبرى، أم تفضل السلامة والبقاء كحاكم محلي؟",
                    decisions: [
                        { label: "عقد الميثاق التاريخي ونصرة العلم", feedback: "✅ 'أبشر ببلاد خير من بلادك، وأبشر بالعزة والمنعة'. بهذه الكلمات، وضعت حجر الأساس للدولة السعودية الأولى. اتحدت القبائل تحت رايتك، وتحولت الدرعية إلى عاصمة لدولة عظيمة امتدت في أرجاء الجزيرة العربية." },
                        { label: "توفير الحماية للشيخ دون تحالف سياسي", feedback: "⚠️ قرار حذر. الشيخ وجد الأمان، لكن الدولة لم تنطلق بقوة الوحدة. بقيت الدرعية قوية ولكنها لم تصبح عاصمة لدولة كبرى في ذلك الوقت." },
                        { label: "طلب استشارة حكماء المنطقة قبل القرار", feedback: "❌ أدى التردد إلى تسرب الخبر للخصوم، فقاموا بالضغط على الدرعية اقتصادياً، مما أخر مشروع التأسيس لسنوات طويلة." }
                    ],
                    biography: "الإمام محمد بن سعود. المؤسس الأول للدولة السعودية. تميز برؤية ثاقبة وشجاعة في اتخاذ القرارات المصيرية."
                },
                en: { name: "Imam Muhammad bin Saud", epic_title: "The Great Diriyah Pact", story_full: "In 1727, a scholar arrives seeking alliance. Your choice defines the nation.", decisions: [{ label: "Form the Alliance", feedback: "✅ Success! You founded the First Saudi State." },{ label: "Asylum only", feedback: "⚠️ Vision delayed." },{ label: "Consult others", feedback: "❌ Mission stalled." }], biography: "The First Founder." }
            },
            i_turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    epic_title: "ملحمة استعادة الرياض",
                    story_full: "بعد سقوط الدرعية، أنت الآن الإمام تركي بن عبد الله، مختبئ في 'خلوة الحلوة' بجبل طويق. \n\n معك سيفك الأسطوري 'الأجرب' وعزيمة لا تلين. الرياض تحت سيطرة الحاميات الأجنبية. هل تباغتهم بـ 40 رجلاً فقط في جوف الليل، أم تنتظر سنوات لجمع جيش يفوقهم عدداً؟",
                    decisions: [
                        { label: "قيادة هجوم فدائي ليلي مباغت", feedback: "✅ نصر من الله! استطعت طرد الحاميات الأجنبية وأعلنت قيام الدولة السعودية الثانية، وأصبحت الرياض منذ ذلك اليوم العاصمة الخالدة." },
                        { label: "الانسحاب للجنوب لجمع القبائل", feedback: "⚠️ استغرقت الرحلة سنوات، وعزز المحتل حصونه، مما جعل التحرير لاحقاً أصعب وأكثر دموية." },
                        { label: "إرسال رسائل تهديد للمحتل أولاً", feedback: "❌ كشفت الرسائل مكان تواجدك، مما اضطرك للدخول في مواجهات جانبية استنزفت قوتك." }
                    ],
                    biography: "الإمام تركي بن عبد الله. مؤسس الدولة السعودية الثانية وبطل الاستعادة وصاحب السيف الأجرب."
                },
                en: { name: "Imam Turki bin Abdullah", epic_title: "The Restoration", story_full: "Riyadh is occupied. You have 'Al-Ajrab'. Strike now or build an army?", decisions: [{ label: "Surprise night raid", feedback: "✅ Victory! Riyadh liberated." },{ label: "Gather more tribes", feedback: "⚠️ Delayed and bloodier." },{ label: "Send warnings", feedback: "❌ Location compromised." }], biography: "Founder of 2nd State." }
            },
            k_aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    epic_title: "ليلة فتح المصمك التاريخية",
                    story_full: "في ليلة 5 شوال 1319هـ، وقفت عند أسوار الرياض بـ 63 رجلاً فقط. حلم استعادة ملك الآباء والأجداد يقترب من الحقيقة. \n\n الحاكم عجلان داخل حصن المصمك المنيع، وسيخرج عند الفجر. هل تقتحم الحصن في اللحظة التي تفتح فيها البوابة، أم تهاجم المدينة أولاً لتشتيت الأنظار؟",
                    decisions: [
                        { label: "اقتحام المصمك لحظة فتح البوابة", feedback: "✅ 'الملك لله ثم لعبد العزيز!'.. ببطولة رجالك المخلصين، تم فتح المصمك وبدأ توحيد المملكة العربية السعودية الحديثة." },
                        { label: "تطويق المدينة وقطع الإمدادات", feedback: "⚠️ خطة جيدة، لكنها أخرت إعلان النصر لعدة أشهر بسبب صمود الحصن." },
                        { label: "مباغتة عجلان في منزله خارج الحصن", feedback: "❌ فشلت الخطة لأن عجلان كان قد انتقل للحصن مسبقاً، مما نبه الحراس." }
                    ],
                    biography: "الملك عبد العزيز آل سعود. المؤسس العظيم الذي وحد البلاد تحت راية التوحيد وبدأ عصر النهضة."
                },
                en: { name: "King Abdulaziz", epic_title: "The Conquest", story_full: "63 men vs the fort. Dawn is near. Your plan?", decisions: [{ label: "Storm the fort", feedback: "✅ Triumph! Modern Kingdom born." },{ label: "Besiege the city", feedback: "⚠️ Delayed victory." },{ label: "Ambush governor", feedback: "❌ Element of surprise lost." }], biography: "The Great Unifier." }
            }
        };

        const LOCALIZATION = {
            ar: { g_h: "ملاحم التأسيس", g_d: "بوابتك التفاعلية لتجربة التاريخ السعودي العظيم بقراراتك القيادية.", s_h: "اختر القائد", r_h: "حكم التاريخ", a_h: "سجل الخالدين", dir: "rtl" },
            en: { g_h: "Founding Epics", g_d: "Experience the grand Saudi history through your leadership.", s_h: "Select Leader", r_h: "The Verdict", a_h: "Immortal Archive", dir: "ltr" }
        };

        /* [S2] APP LOGIC */
        let currentLanguage = 'ar';

        function setGlobalLang(l) {
            currentLanguage = l;
            const t = LOCALIZATION[l];
            document.documentElement.lang = l; document.documentElement.dir = t.dir;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + l).classList.add('active');
            document.getElementById('t-gate-h').innerText = t.g_h;
            document.getElementById('t-gate-d').innerText = t.g_d;
            document.getElementById('t-select-h').innerText = t.s_h;
            document.getElementById('t-res-h').innerText = t.r_h;
            document.getElementById('t-arch-h').innerText = t.a_h;
            rebuildInteractiveGrids();
        }

        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                setTimeout(() => { s.style.display = 'none'; }, 450);
            });
            setTimeout(() => {
                const target = document.getElementById(screenId);
                target.style.display = 'block';
                setTimeout(() => { target.classList.add('active'); }, 50);
                document.getElementById('app-scroller').scrollTop = 0;
            }, 500);
        }

        function rebuildInteractiveGrids() {
            const heroContainer = document.getElementById('hero-injection-point');
            const archContainer = document.getElementById('arch-injection-point');
            heroContainer.innerHTML = ''; archContainer.innerHTML = '';
            Object.keys(EPIC_DATA).forEach(key => {
                const hBtn = document.createElement('button'); hBtn.className = 'btn-epic';
                hBtn.innerText = EPIC_DATA[key][currentLanguage].name;
                hBtn.onclick = () => startHeroQuest(key); heroContainer.appendChild(hBtn);
                const aBtn = document.createElement('button'); aBtn.className = 'btn-epic';
                aBtn.innerText = EPIC_DATA[key][currentLanguage].name;
                aBtn.onclick = () => showHeroBio(key); archContainer.appendChild(aBtn);
            });
        }

        function startHeroQuest(heroKey) {
            const data = EPIC_DATA[heroKey][currentLanguage];
            document.getElementById('quest-title-header').innerText = data.epic_title;
            document.getElementById('quest-content-box').innerText = data.story_full;
            const actionArea = document.getElementById('quest-actions-container'); actionArea.innerHTML = '';
            data.decisions.forEach(dec => {
                const btn = document.createElement('button'); btn.className = 'btn-epic';
                btn.innerText = dec.label;
                btn.onclick = () => { document.getElementById('result-text-box').innerText = dec.feedback || dec.r; navigateTo('screen-result'); };
                actionArea.appendChild(btn);
            });
            navigateTo('screen-quest');
        }

        function showHeroBio(heroKey) {
            const data = EPIC_DATA[heroKey][currentLanguage];
            document.getElementById('bio-hero-name').innerText = data.name;
            document.getElementById('bio-content-box').innerText = data.biography;
            navigateTo('screen-biography');
        }

        /* [S3] SAND ENGINE - محرك الرمال الذهبية الداكنة */
        const canvas = document.getElementById('sand-engine-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.1; // حجم حبات الرمل
                this.speedX = (Math.random() - 0.5) * 0.3; // حركة جانبية خفيفة
                this.speedY = (Math.random() * 0.5) + 0.1; // حركة لأسفل (تساقط)
                this.color = '#664d2e'; // لون ذهبي غامق (بني صحراوي)
                this.opacity = Math.random() * 0.6 + 0.1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                // إعادة التدوير من الأعلى عند الوصول للأسفل
                if (this.y > canvas.height) {
                    this.y = -5;
                    this.x = Math.random() * canvas.width;
                }
                // الارتداد من الجوانب
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.globalAlpha = this.opacity; ctx.fill();
            }
        }

        function initEngine() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particlesArray = [];
            for (let i = 0; i < 350; i++) particlesArray.push(new Particle()); // كثافة رمل عالية
        }

        function handleParticles() {
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update(); particlesArray[i].draw();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            handleParticles(); requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initEngine);
        initEngine(); animate(); setGlobalLang('ar');
        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
