<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ملحمة التأسيس - الإصدار الملكي الشامل</title>
    <style>
        :root { --gold: #c1a35f; --gold-glow: rgba(193, 163, 95, 0.6); --dark: #05160d; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--dark); font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: white; overflow: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, #000 100%); z-index: -2; }

        /* شريط اللغات */
        .lang-switcher {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            display: flex; gap: 8px; background: rgba(0,0,0,0.8);
            padding: 10px; border-radius: 12px; border: 1px solid var(--gold);
        }
        .lang-switcher button {
            background: transparent; border: 1px solid var(--gold); color: white;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: 0.3s;
        }
        .lang-switcher button:hover { background: var(--gold); color: black; }

        .screen { display: none; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 20px; text-align: center; }
        .active { display: flex; animation: glassFade 0.6s ease-out; }

        @keyframes glassFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* البطاقة الزجاجية كما في الصور */
        .card { 
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid var(--gold); 
            padding: 40px; border-radius: 35px; 
            max-width: 800px; width: 90%; 
            box-shadow: 0 0 40px var(--gold-glow);
            backdrop-filter: blur(20px);
            max-height: 85vh; overflow-y: auto;
            position: relative;
        }

        .option-btn {
            background: transparent;
            border: 1px solid rgba(193, 163, 95, 0.5);
            color: white; padding: 18px; margin: 12px 0; border-radius: 20px;
            cursor: pointer; width: 100%; font-size: 1.2rem; font-weight: 500;
            transition: all 0.3s;
        }
        .option-btn:hover { 
            background: var(--gold); color: black; 
            box-shadow: 0 0 20px var(--gold-glow);
            transform: translateY(-3px);
        }

        .result-text { 
            padding: 25px; background: rgba(255,255,255,0.05); 
            border-radius: 15px; line-height: 1.8; font-size: 1.2rem; margin: 20px 0;
            border-right: 5px solid var(--gold); text-align: right;
        }
        [dir="ltr"] .result-text { text-align: left; border-right: none; border-left: 5px solid var(--gold); }

        .back-btn { 
            margin-top: 25px; color: var(--gold); cursor: pointer; 
            text-decoration: none; font-size: 1.1rem; font-weight: bold;
            display: inline-block; transition: 0.3s;
        }
        .back-btn:hover { opacity: 0.7; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button onclick="changeLang('ar')">العربية</button>
        <button onclick="changeLang('en')">English</button>
        <button onclick="changeLang('es')">Español</button>
        <button onclick="changeLang('ru')">Русский</button>
        <button onclick="changeLang('ko')">한국어</button>
    </div>

    <canvas id="bg-canvas"></canvas>
    <div class="overlay"></div>

    <div id="sc-main" class="screen active">
        <div class="card">
            <h1 id="t-main-title" style="font-size: 3.5rem; color: var(--gold);">ملاحم التأسيس</h1>
            <p id="t-main-desc" style="font-size: 1.3rem; color: #ccc;">اكتب تاريخك بيدك عبر العصور</p>
            <button id="b-start" class="option-btn" onclick="go('sc-heroes')">دخول الملحمة</button>
            <button id="b-lore" class="option-btn" onclick="renderLoreList()">سجل الأبطال</button>
        </div>
    </div>

    <div id="sc-heroes" class="screen">
        <div class="card">
            <h1 id="t-hero-title" style="color: var(--gold);">اختر القائد التاريخي</h1>
            <div id="hero-list"></div>
            <a id="b-back-main" class="back-btn" onclick="go('sc-main')">العودة للرئيسية</a>
        </div>
    </div>

    <div id="sc-play" class="screen">
        <div class="card">
            <h1 id="t-play-mission" style="color: var(--gold);">المهمة القيادية</h1>
            <p id="t-play-quest" style="font-size: 1.4rem; line-height: 1.8;"></p>
            <div id="play-options"></div>
            <a id="b-back-hero" class="back-btn" onclick="go('sc-heroes')">العودة للخلف</a>
        </div>
    </div>

    <div id="sc-res" class="screen">
        <div class="card">
            <h1 id="t-res-title" style="color: var(--gold);">حكم التاريخ</h1>
            <div id="t-res-content" class="result-text"></div>
            <a id="b-retry" class="back-btn" onclick="go('sc-play')">تغيير القرار</a>
            <a id="b-home" class="back-btn" onclick="go('sc-main')">الرئيسية</a>
        </div>
    </div>

    <div id="sc-lore-list" class="screen">
        <div class="card">
            <h1 id="t-lore-title" style="color: var(--gold);">سجل الخالدين</h1>
            <div id="lore-buttons"></div>
            <a id="b-lore-back" class="back-btn" onclick="go('sc-main')">العودة للرئيسية</a>
        </div>
    </div>

    <div id="sc-lore-detail" class="screen">
        <div class="card">
            <h1 id="t-det-title" style="color: var(--gold);">التفاصيل التاريخية</h1>
            <div id="t-det-content" style="font-size: 1.3rem; line-height: 2.2; text-align: justify; margin: 20px 0;"></div>
            <button id="b-audio" class="option-btn" onclick="speak()">🔊 استمع بصوت ملكي</button>
            <a id="b-det-back" class="back-btn" onclick="go('sc-lore-list')">العودة للقائمة</a>
        </div>
    </div>

    <script>
        const DB = {
            ar: {
                dir: 'rtl', main: "ملاحم التأسيس", desc: "اكتب تاريخك بيدك عبر العصور", start: "دخول الملحمة", lore: "سجل الأبطال",
                hTitle: "اختر القائد التاريخي", back: "العودة للرئيسية", backH: "العودة للخلف", mission: "المهمة القيادية",
                res: "حكم التاريخ", retry: "تغيير القرار", home: "الرئيسية", lTitle: "سجل الخالدين", audio: "🔊 استمع بصوت ملكي",
                heroes: {
                    saud: { name: "الإمام محمد بن سعود", q: "عام 1727م، الدرعية تحتاج ميثاقاً يجمع القلوب، ماذا تختار؟", 
                           o1: "عقد ميثاق الدرعية التاريخي", r1: "✅ قرار حكيم! لقد أسست الدولة السعودية الأولى على العلم والأمن.",
                           o2: "التركيز على التجارة وإهمال الميثاق", r2: "⚠️ بقيت الدرعية مجرد سوق تجاري ولم تقم الدولة الكبرى.",
                           lore: "في عام 1727م، أعلن الإمام محمد بن سعود تأسيس الدولة السعودية الأولى من الدرعية، جاعلاً منها منارة للعلم والأمن، وموحداً للقبائل تحت راية واحدة." },

                           o2: "Esperar apoyo de Kuwait", r2: "⚠️ La sorpresa fue la clave; el retraso perdió la oportunidad histórica.",

                }
            },
            ru: {
                dir: 'ltr', main: "Эпопея Основания", desc: "Пишите историю своими руками", start: "Войти в Эпопею", lore: "Реестр Героев",
                hTitle: "Выберите Лидера", back: "На главную", backH: "Назад", mission: "Миссия Лидера",
                res: "Вердикт Истории", retry: "Изменить решение", home: "Главная", lTitle: "Реестр Бессмертных", audio: "🔊 Слушать величественный голос",
                heroes: {
                    saud: { name: "Имам Мухаммад бин Сауд", q: "1727 год, Дирия нуждается в пакте. Что вы выберете?", 
                           o1: "Заключить исторический пакт Дирии", r1: "✅ Мудрое решение! Вы основали Первое Саудовское государство на знаниях и безопасности.",
                           o2: "Сосредоточиться только на торговле", r2: "⚠️ Дирия осталась лишь рынком, и великое государство не возникло.",
                           lore: "В 1727 году имам Мухаммад бин Сауд объявил об основании Первого Саудовского государства, сделав Дирию центром безопасности." },
                    turki: { name: "Имам Турки бин Абдалла", q: "Рияд разрушен. Выйдете ли вы со своим мечом Аль-Аджраб?", 
                            o1: "Вернуть Рияд и восстановить справедливость", r1: "✅ Герой восстановления! Вы вернули Второе Саудовское государство.",
                            o2: "Уйти из Неджда", r2: "⚠️ Шанс вернуть королевство предков был упущен.",
                            lore: "Имам Турки бин Абдалла, основатель Второго Саудовского государства в 1824 году, прославился своим мечом «Аль-Аджраб»." },
                    aziz: { name: "Король Абдул-Азиз", q: "1902 год, штурм крепости Масмак. Вы ведете атаку?", 
                           o1: "Штурмовать Масмак и начать новую эру", r1: "✅ Рассвет Великой Саудовской Аравии! Вы объединили страну.",
                           o2: "Ждать подкрепления", r2: "⚠️ Внезапность была ключом; задержка упустила исторический шанс.",
                           lore: "Король Абдул-Азиз объединил Королевство Саудовская Аравия, начав свой путь со штурма Масмака в 1902 году." }
                }
            },
            ko: {
                dir: 'ltr', main: "건국 서사시", desc: "시대를 초월한 역사를 기록하십시오", start: "에픽 입장", lore: "영웅 기록",
                hTitle: "역사적 리더를 선택하십시오", back: "홈으로", backH: "뒤로", mission: "리더십 미션",
                res: "역사의 판결", retry: "결정 변경", home: "홈", lTitle: "불멸의 기록", audio: "🔊 웅장한 목소리로 듣기",
                heroes: {
                    saud: { name: "이맘 무함마드 빈 사우드", q: "1727년, 디리야는 마음을 모을 서약이 필요합니다. 무엇을 선택하시겠습니까?", 
                           o1: "역사적인 디리야 서약 체결", r1: "✅ 현명한 결정입니다! 지식과 안보 위에 제1차 사우디 국가를 세웠습니다.",
                           o2: "무역에만 집중하고 서약 무시", r2: "⚠️ 디리야는 단순한 시장으로 남았고 큰 국가는 세워지지 않았습니다.",
                           lore: "1727년, 이맘 무함마드 빈 사우드는 디리야에서 제1차 사우디 국가의 건국을 선포했습니다." },
                    turki: { name: "이맘 투르키 빈 압둘라", q: "리야드가 파괴되었습니다. 알-아지랍 검을 들고 나가시겠습니까?", 
                            o1: "리야드 탈환 및 정의 회복", r1: "✅ 복구의 영웅! 제2차 사우دي 국가와 통치 위엄을 되찾았습니다.",
                            o2: "나즈드에서 퇴각", r2: "⚠️ 조상의 왕국을 되찾을 기회를 놓쳤습니다.",
                            lore: "이맘 투르키 빈 압둘라는 1824년 제2차 사우디 국가를 건국한 인물로 유명합니다." },
                    aziz: { name: "압둘아지즈 국왕", q: "1902년 마스막 점령의 밤, 역사적인 공격을 이끄시겠습니까?", 
                           o1: "마스막을 점령하고 새로운 새벽을 선포", r1: "✅ 위대한 사우디아라비아의 새벽! 나라를 통일하고 영광의 왕국을 건설했습니다.",
                           o2: "지원군을 기다림", r2: "⚠️ 기습이 승리의 열쇠였습니다. 지체하여 역사적 기회를 놓쳤습니다.",
                           lore: "압둘아지즈 국왕은 1902년 마스막 점령을 시작으로 30년 동안 사우디아라비아 왕국을 통일했습니다." }
                }
            }
        };

        let lang = 'ar';
        let curH = '';

        function changeLang(l) {
            lang = l;
            document.body.dir = DB[l].dir;
            document.getElementById('t-main-title').innerText = DB[l].main;
            document.getElementById('t-main-desc').innerText = DB[l].desc;
            document.getElementById('b-start').innerText = DB[l].start;
            document.getElementById('b-lore').innerText = DB[l].lore;
            document.getElementById('t-hero-title').innerText = DB[l].hTitle;
            document.getElementById('b-back-main').innerText = DB[l].back;
            document.getElementById('t-play-mission').innerText = DB[l].mission;
            document.getElementById('b-back-hero').innerText = DB[l].backH;
            document.getElementById('t-res-title').innerText = DB[l].res;
            document.getElementById('b-retry').innerText = DB[l].retry;
            document.getElementById('b-home').innerText = DB[l].home;
            document.getElementById('t-lore-title').innerText = DB[l].lTitle;
            document.getElementById('b-lore-back').innerText = DB[l].back;
            document.getElementById('t-det-title').innerText = DB[l].lTitle;
            document.getElementById('b-audio').innerText = DB[l].audio;
            document.getElementById('b-det-back').innerText = DB[l].backH;
            renderHeroList();
            go('sc-main');
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.speechSynthesis.cancel();
        }

        function renderHeroList() {
            const list = document.getElementById('hero-list');
            list.innerHTML = '';
            for(let key in DB[lang].heroes) {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = DB[lang].heroes[key].name;
                btn.onclick = () => startPlay(key);
                list.appendChild(btn);
            }
        }

        function startPlay(key) {
            curH = key;
            const h = DB[lang].heroes[key];
            document.getElementById('t-play-quest').innerText = h.q;
            const opts = document.getElementById('play-options');
            opts.innerHTML = `
                <button class="option-btn" onclick="showRes(1)">${h.o1}</button>
                <button class="option-btn" onclick="showRes(2)">${h.o2}</button>
            `;
            go('sc-play');
        }

        function showRes(i) {
            document.getElementById('t-res-content').innerText = DB[lang].heroes[curH]['r'+i];
            go('sc-res');
        }

        function renderLoreList() {
            const list = document.getElementById('lore-buttons');
            list.innerHTML = '';
            for(let key in DB[lang].heroes) {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = DB[lang].heroes[key].name;
                btn.onclick = () => showLoreDetail(key);
                list.appendChild(btn);
            }
            go('sc-lore-list');
        }

        function showLoreDetail(key) {
            curH = key;
            document.getElementById('t-det-content').innerText = DB[lang].heroes[key].lore;
            go('sc-lore-detail');
        }

        function speak() {
            const msg = new SpeechSynthesisUtterance(document.getElementById('t-det-content').innerText);
            msg.lang = (lang=='ar'?'ar-SA':lang=='es'?'es-ES':lang=='ru'?'ru-RU':lang=='ko'?'ko-KR':'en-GB');
            msg.pitch = 0.6; msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        // الخلفية المتحركة
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        function initBg() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let p = [];
            for(let i=0; i<80; i++) p.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2});
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "rgba(193, 163, 95, 0.3)";
                p.forEach(i => {
                    i.y -= 0.5; if(i.y<0) i.y=canvas.height;
                    ctx.beginPath(); ctx.arc(i.x, i.y, i.r, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
        initBg();
    </script>
</body>
</html>
