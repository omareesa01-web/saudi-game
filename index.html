<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | الإصدار البرمجي الكامل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* [1] نظام المتغيرات الشامل (CSS Variables) */
        :root {
            --royal-green-bg: #0D2E1C;   /* اللون الأخضر الملكي الأساسي */
            --royal-green-panel: rgba(13, 46, 28, 0.98);
            --gold-primary: #D4AF37;     /* ذهبي معدني كلاسيكي */
            --gold-light: #FFD700;       /* ذهبي لامع للجزيئات والنصوص */
            --pure-white: #FFFFFF;
            --shadow-epic: 0 40px 100px rgba(0, 0, 0, 0.8);
            --transition-main: 0.6s cubic-bezier(0.2, 1, 0.3, 1);
            --font-family: 'Cairo', sans-serif;
        }

        /* [2] إعدادات الصفحة العامة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--royal-green-bg);
            font-family: var(--font-family);
            color: var(--pure-white);
            overflow: hidden; /* لمنع السكرول الخارجي */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* [3] محرك الرمال الذهبية (The Sand Engine) */
        #sand-particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* [4] واجهة تبديل اللغات */
        .lang-switcher-hub {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;
            display: flex;
            gap: 15px;
        }

        .lang-node {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.9rem;
            transition: 0.4s all ease;
            backdrop-filter: blur(10px);
        }

        .lang-node.active-lang {
            background: var(--gold-primary);
            color: var(--royal-green-bg);
            box-shadow: 0 0 25px var(--gold-light);
            transform: scale(1.05);
        }

        /* [5] الهيكل الرئيسي للتطبيق (App Framework) */
        .main-application-frame {
            position: relative;
            z-index: 100;
            width: 90%;
            max-width: 430px;
            background: var(--royal-green-panel);
            border: 1px solid var(--gold-primary);
            border-top: 10px solid var(--gold-primary); /* شريط علوي فخم */
            border-radius: 50px;
            padding: 55px 40px;
            text-align: center;
            box-shadow: var(--shadow-epic);
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: none; /* إخفاء السكرول في فيرفوكس */
        }

        .main-application-frame::-webkit-scrollbar {
            display: none; /* إخفاء السكرول في كروم */
        }

        /* [6] نظام الشاشات (Screen System) */
        .screen-container {
            display: none;
            opacity: 0;
            transform: translateY(30px) scale(0.98);
            transition: opacity var(--transition-main), transform var(--transition-main);
        }

        .screen-container.active-screen {
            display: block;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* [7] العناصر النصية */
        .title-epic {
            font-size: 2.4rem;
            font-weight: 900;
            color: var(--gold-light);
            margin-bottom: 25px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            line-height: 1.2;
        }

        .description-text {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 45px;
            opacity: 0.9;
            font-weight: 400;
        }

        /* [8] الأزرار الملحمية (Epic Buttons) */
        .btn-universal {
            position: relative;
            width: 100%;
            padding: 22px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(0,0,0,0.3));
            border: 2px solid var(--gold-primary);
            border-radius: 25px;
            color: var(--pure-white);
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .btn-universal:hover {
            transform: translateY(-7px);
            background: var(--gold-primary);
            color: var(--royal-green-bg);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
        }

        /* [9] صناديق المحتوى والأرشيف */
        .content-display-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 35px;
            padding: 35px;
            margin: 30px 0;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.1rem;
            color: var(--pure-white);
            border-right: 8px solid var(--gold-primary);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
            white-space: pre-line;
        }

        [dir="ltr"] .content-display-box {
            border-right: 0;
            border-left: 8px solid var(--gold-primary);
            text-align: left;
        }

        .navigation-back-link {
            display: inline-block;
            margin-top: 35px;
            color: var(--gold-light);
            cursor: pointer;
            font-weight: 900;
            text-decoration: underline;
            text-underline-offset: 10px;
            transition: 0.3s;
        }

        .navigation-back-link:hover {
            color: var(--pure-white);
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

    <canvas id="sand-particles-canvas"></canvas>

    <div class="lang-switcher-hub">
        <div id="lang-btn-ar" class="lang-node active-lang" onclick="TitanApp.setLanguage('ar')">العربية</div>
        <div id="lang-btn-en" class="lang-node" onclick="TitanApp.setLanguage('en')">English</div>
    </div>

    <div class="main-application-frame" id="app-viewport">
        
        <div id="scr-gate" class="screen-container active-screen">
            <h1 class="title-epic" id="txt-gate-h">ملاحم التأسيس</h1>
            <p class="description-text" id="txt-gate-d">صناعة المجد تبدأ بقرار. هل أنت مستعد لقيادة تاريخك وترك أثرك في سجل الخالدين؟</p>
            <button class="btn-universal" id="txt-btn-start" onclick="TitanApp.navigate('scr-selection')">ابدأ الملحمة</button>
            <button class="btn-universal" id="txt-btn-archive" onclick="TitanApp.navigate('scr-archive')">سجل الخالدين</button>
        </div>

        <div id="scr-selection" class="screen-container">
            <h1 class="title-epic" id="txt-select-h">اختر القائد</h1>
            <div id="hero-list-container">
                </div>
            <a class="navigation-back-link" id="txt-back-1" onclick="TitanApp.navigate('scr-gate')">العودة للبوابة</a>
        </div>

        <div id="scr-quest" class="screen-container">
            <h1 id="quest-header-title" style="color: var(--gold-light); font-size: 1.7rem; margin-bottom: 20px;"></h1>
            <div id="quest-body-text" class="content-display-box"></div>
            <div id="quest-options-hub">
                </div>
            <a class="navigation-back-link" id="txt-back-2" onclick="TitanApp.navigate('scr-selection')">تراجع</a>
        </div>

        <div id="scr-verdict" class="screen-container">
            <h1 class="title-epic" id="txt-verdict-h">حكم التاريخ</h1>
            <div id="verdict-result-text" class="content-display-box"></div>
            <button class="btn-universal" id="txt-btn-retry" onclick="TitanApp.navigate('scr-selection')">مسار جديد</button>
            <a class="navigation-back-link" id="txt-back-3" onclick="TitanApp.navigate('scr-gate')">الرئيسية</a>
        </div>

        <div id="scr-archive" class="screen-container">
            <h1 class="title-epic" id="txt-archive-h">سجل الخالدين</h1>
            <div id="archive-list-container">
                </div>
            <a class="navigation-back-link" id="txt-back-4" onclick="TitanApp.navigate('scr-gate')">رجوع</a>
        </div>

        <div id="scr-biography" class="screen-container">
            <h1 id="bio-hero-name" class="title-epic"></h1>
            <div id="bio-hero-content" class="content-display-box"></div>
            <a class="navigation-back-link" id="txt-back-5" onclick="TitanApp.navigate('scr-archive')">العودة للسجل</a>
        </div>

    </div>

    <script>
        /**
         * مستودع البيانات المركزي (The Core Database)
         * يحتوي على كامل المعلومات التاريخية باللغتين بشكل مفصل.
         */
        const DATA_HUB = {
            imam_mohammad: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    q_title: "يوم ميثاق الدرعية (1139هـ)",
                    q_story: "الدرعية في انتظار قرارك. الشيخ محمد بن عبدالوهاب يطلب تحالفك لنشر التوحيد وبناء دولة قوية. \n\nهل تعقد الميثاق التاريخي وتبدأ مرحلة التأسيس؟",
                    choices: [
                        { label: "عقد الميثاق ونصرة التوحيد", result: "✅ 'أبشر بالعز والتمكين'.. بهذا القرار ولدت الدولة السعودية الأولى، وأصبحت الدرعية مركزاً للعلم والقوة في الجزيرة العربية." },
                        { label: "توفير الحماية فقط", result: "⚠️ نال الشيخ الأمان، لكن الدولة بقيت مجرد إمارة محدودة التأثير، وتأخرت الوحدة الوطنية الكبرى." }
                    ],
                    biography: "• المؤسس الأول للدولة السعودية (1727م).\n• الشخصية: قائد حكيم ذو نظرة سياسية ثاقبة.\n• الإنجازات:\n- توحيد الدرعية وبناء سورها العظيم.\n- تأمين طرق التجارة وقوافل الحجيج.\n- وضع أسس الحكم السعودي القائم على العدل."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    q_title: "The Diriyah Pact (1727)",
                    q_story: "Diriyah awaits your decision. A scholar seeks your alliance to unify the land under law and faith. \n\nDo you form the historic pact to start the founding era?",
                    choices: [
                        { label: "Form the Great Alliance", result: "✅ Success! The First Saudi State was born, and Diriyah became a global center for knowledge and power." },
                        { label: "Offer Protection Only", result: "⚠️ Security was granted, but the dream of a unified nation stayed within the city walls." }
                    ],
                    biography: "• Founder of the First Saudi State (1727).\n• Key Achievements:\n- Unified Diriyah and secured the central regions.\n- Established safe pilgrimage and trade routes.\n- Built the legendary wall of Diriyah."
                }
            },
            imam_turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    q_title: "ملحمة السيف الأجرب",
                    q_story: "الرياض تحت الاحتلال، ومعك سيفك 'الأجرب' و40 رجلاً فقط في 'خلوة الحلوة'. \n\nهل تباغت الحامية الأجنبية وتعلن قيام الدولة الثانية؟",
                    choices: [
                        { label: "اقتحام الرياض ومباغتة العدو", result: "✅ نصر مؤزر! استعدت عاصمة الآباء وأعلنت قيام الدولة السعودية الثانية، وأعدت هيبة الحكم السعودي." },
                        { label: "الانتظار لجمع المزيد من الرجال", result: "❌ أدى التأخير إلى كشف موقعك، وعزز العدو تحصيناته في الرياض، مما جعل التحرير لاحقاً أصعب بكثير." }
                    ],
                    biography: "• بطل استرداد المجد ومؤسس الدولة السعودية الثانية.\n• القصة: قاد المقاومة الوطنية لسنوات حتى طرد الغزاة.\n• الإنجازات:\n- جعل الرياض العاصمة الدائمة والسياسية للدولة.\n- إعادة الاستقرار والأمان للجزيرة العربية.\n- بناء جامع الإمام تركي وقصر الحكم."
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    q_title: "The Saga of the Sword",
                    q_story: "Riyadh is occupied. You have your sword 'Al-Ajrab' and 40 loyal men in hiding. \n\nDo you raid the garrison to restore the Saudi legacy?",
                    choices: [
                        { label: "Launch the Surprise Attack", result: "✅ Victory! You liberated Riyadh and officially founded the Second Saudi State." },
                        { label: "Wait for more reinforcements", result: "❌ The delay allowed the enemy to discover your location, and Riyadh's defenses were strengthened." }
                    ],
                    biography: "• Founder of the Second Saudi State.\n• Hero of the sword 'Al-Ajrab'.\n• Established Riyadh as the permanent capital of the nation."
                }
            },
            king_aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    q_title: "فتح حصن المصمك",
                    q_story: "أنت الآن عند أسوار الرياض، ومعك 63 بطلاً. الفجر يقترب وبوابة المصمك ستفتح الآن. \n\nهل تقتحم البوابة فوراً في مغامرة فدائية؟",
                    choices: [
                        { label: "اقتحام المصمك الآن", result: "✅ 'الملك لله ثم لعبد العزيز'.. بهذه الصيحة بدأ فجر المملكة العربية السعودية الحديثة التي نعيش أمجادها اليوم." },
                        { label: "التراجع والحصار من الخارج", result: "⚠️ ضاعت فرصة المباغتة، ودخلت في حصار طويل استنزف قواك وتأخر توحيد البلاد لسنوات." }
                    ],
                    biography: "• المؤسس العظيم للمملكة العربية السعودية.\n• القصة: وحد البلاد والقلوب تحت راية التوحيد.\n• الإنجازات:\n- استعادة الرياض عام 1319هـ.\n- إعلان توحيد المملكة عام 1351هـ.\n- إطلاق أول نهضة شاملة (التعليم، الصحة، النفط)."
                },
                en: {
                    name: "King Abdulaziz",
                    q_title: "Conquering Masmak",
                    q_story: "You are at the gates of Riyadh with 63 heroes. The Masmak gate is about to open at dawn. \n\nDo you storm the fort immediately?",
                    choices: [
                        { label: "Storm the Fort Now", result: "✅ Triumph! With this victory, the modern era of Saudi Arabia began." },
                        { label: "Lay a long siege", result: "⚠️ Surprise element lost. The battle became a long struggle, delaying the unification for years." }
                    ],
                    biography: "• The Founder of the modern Kingdom of Saudi Arabia.\n• Key Achievements:\n- Captured Riyadh in 1902.\n- Unified all regions under one flag in 1932.\n- Initiated the modern oil and education era."
                }
            }
        };

        const UI_TEXTS = {
            ar: { g_h: "ملاحم التأسيس", g_d: "صناعة المجد تبدأ بقرار. هل أنت مستعد لقيادة تاريخك؟", s_h: "اختر القائد", v_h: "حكم التاريخ", a_h: "سجل الخالدين", b: "رجوع", retry: "مسار جديد", start: "ابدأ الملحمة", arch: "سجل الخالدين", dir: "rtl" },
            en: { g_h: "Founding Epics", g_d: "Glory starts with a choice. Are you ready to lead your history?", s_h: "Select Leader", v_h: "The Verdict", a_h: "Immortal Archive", b: "Back", retry: "Try Again", start: "Start the Epic", arch: "Archive", dir: "ltr" }
        };

        /**
         * محرك التشغيل الرئيسي (The App Controller)
         */
        const TitanApp = {
            currentLang: 'ar',

            init() {
                this.setLanguage('ar');
                SandEngine.start();
            },

            setLanguage(lang) {
                this.currentLang = lang;
                const ui = UI_TEXTS[lang];
                document.documentElement.dir = ui.dir;
                
                // تحديث حالة الأزرار
                document.querySelectorAll('.lang-node').forEach(el => el.classList.remove('active-lang'));
                document.getElementById('lang-btn-' + lang).classList.add('active-lang');

                // تحديث النصوص
                document.getElementById('txt-gate-h').innerText = ui.g_h;
                document.getElementById('txt-gate-d').innerText = ui.g_d;
                document.getElementById('txt-btn-start').innerText = ui.start;
                document.getElementById('txt-btn-archive').innerText = ui.arch;
                document.getElementById('txt-select-h').innerText = ui.s_h;
                document.getElementById('txt-verdict-h').innerText = ui.v_h;
                document.getElementById('txt-archive-h').innerText = ui.a_h;
                document.getElementById('txt-btn-retry').innerText = ui.retry;
                for(let i=1; i<=5; i++) document.getElementById('txt-back-'+i).innerText = ui.b;

                this.renderLists();
            },

            navigate(screenId) {
                const screens = document.querySelectorAll('.screen-container');
                screens.forEach(s => {
                    s.classList.remove('active-screen');
                    setTimeout(() => { s.style.display = 'none'; }, 300);
                });

                setTimeout(() => {
                    const target = document.getElementById(screenId);
                    target.style.display = 'block';
                    setTimeout(() => { target.classList.add('active-screen'); }, 50);
                    document.getElementById('app-viewport').scrollTop = 0;
                }, 350);
            },

            renderLists() {
                const hList = document.getElementById('hero-list-container');
                const aList = document.getElementById('archive-list-container');
                hList.innerHTML = ''; aList.innerHTML = '';

                Object.keys(DATA_HUB).forEach(key => {
                    const hero = DATA_HUB[key][this.currentLang];
                    
                    // توليد أزرار الاختيار
                    const btnH = document.createElement('button');
                    btnH.className = 'btn-universal';
                    btnH.innerText = hero.name;
                    btnH.onclick = () => this.startQuest(key);
                    hList.appendChild(btnH);

                    // توليد أزرار الأرشيف
                    const btnA = document.createElement('button');
                    btnA.className = 'btn-universal';
                    btnA.innerText = hero.name;
                    btnA.onclick = () => this.viewBio(key);
                    aList.appendChild(btnA);
                });
            },

            startQuest(key) {
                const q = DATA_HUB[key][this.currentLang];
                document.getElementById('quest-header-title').innerText = q.q_title;
                document.getElementById('quest-body-text').innerText = q.q_story;
                const optionsHub = document.getElementById('quest-options-hub');
                optionsHub.innerHTML = '';

                q.choices.forEach(c => {
                    const b = document.createElement('button');
                    b.className = 'btn-universal';
                    b.innerText = c.label;
                    b.onclick = () => {
                        document.getElementById('verdict-result-text').innerText = c.result;
                        this.navigate('scr-verdict');
                    };
                    optionsHub.appendChild(b);
                });
                this.navigate('scr-quest');
            },

            viewBio(key) {
                const b = DATA_HUB[key][this.currentLang];
                document.getElementById('bio-hero-name').innerText = b.name;
                document.getElementById('bio-hero-content').innerText = b.biography;
                this.navigate('scr-biography');
            }
        };

        /**
         * محرك الرمال الهادئة (The Visual Sand Engine)
         * تم تفصيل الكود ليشرح كيفية حركة الجزيئات.
         */
        const SandEngine = {
            canvas: document.getElementById('sand-particles-canvas'),
            ctx: null,
            particles: [],
            pCount: 400,

            start() {
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                this.createParticles();
                this.animate();
                window.addEventListener('resize', () => this.resize());
            },

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },

            createParticles() {
                this.particles = [];
                for(let i=0; i<this.pCount; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 1.5 + 0.5,
                        speed: Math.random() * 0.4 + 0.1, // سرعة بطيئة جداً
                        opacity: Math.random() * 0.6
                    });
                }
            },

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.particles.forEach(p => {
                    p.x += p.speed; // حركة أفقية هادئة
                    if (p.x > this.canvas.width) p.x = -10;
                    
                    this.ctx.globalAlpha = p.opacity;
                    this.ctx.fillStyle = '#FFD700';
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                });
                requestAnimationFrame(() => this.animate());
            }
        };

        // تشغيل التطبيق عند التحميل
        window.onload = () => TitanApp.init();
    </script>
</body>
</html>
