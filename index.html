<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس </title>
    
    <style>
        /* [1] CSS ROOT - مصفوفة ألوان العلم السعودي */
        :root {
            --saudi-green: #006C35; /* لون العلم الرسمي */
            --light-green: #00843D;
            --glow-green: #22C55E;
            --deep-green: #062113;
            --forest-black: #010a05;
            --glass-bg: rgba(0, 30, 15, 0.95); /* خلفية خضراء عميقة */
            --glass-border: rgba(34, 197, 94, 0.4);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --transition-smooth: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* [2] GLOBAL STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            outline: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--deep-green) 0%, var(--forest-black) 100%);
            color: #ffffff;
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* [3] TITAN ENGINE CANVAS */
        #titan-engine-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* [4] LANGUAGE HUB */
        .language-hub {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
            display: flex;
            gap: 15px;
        }

        .lang-btn {
            background: rgba(0, 40, 20, 0.9);
            border: 1px solid var(--glow-green);
            color: var(--glow-green);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.8rem;
            transition: 0.4s;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .lang-btn.active {
            background: var(--saudi-green);
            color: #fff;
            box-shadow: 0 0 30px var(--glow-green);
        }

        /* [5] MAIN COMPACT APP - القوائم باللون الأخضر */
        .app-container {
            position: relative;
            z-index: 100;
            width: 90%;
            max-width: 410px;
            background: var(--glass-bg);
            backdrop-filter: blur(60px);
            border: 1px solid var(--glass-border);
            border-top: 7px solid var(--saudi-green);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 100px 200px rgba(0,0,0,1), inset 0 0 40px rgba(34,197,94,0.1);
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .app-container::-webkit-scrollbar { display: none; }

        /* [6] SCREEN MANAGEMENT */
        .screen {
            display: none;
            opacity: 0;
            transform: scale(0.9) translateY(40px);
            transition: all var(--transition-smooth);
        }

        .screen.active {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--glow-green);
            letter-spacing: -1px;
        }

        .description-text {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #e0e0e0;
            margin-bottom: 35px;
        }

        /* [7] TITAN BUTTONS - أزرار خضراء */
        .btn-epic {
            position: relative;
            width: 100%;
            padding: 18px;
            margin-bottom: 18px;
            background: linear-gradient(135deg, var(--saudi-green), var(--deep-green));
            border: 1px solid var(--glow-green);
            border-radius: 20px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            overflow: hidden;
            transition: 0.5s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-epic:hover {
            transform: translateY(-5px) scale(1.02);
            background: var(--light-green);
            box-shadow: 0 20px 40px rgba(0, 108, 53, 0.4);
        }

        .btn-epic::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.8s;
        }

        .btn-epic:hover::before {
            left: 100%;
        }

        /* [8] LORE BOX */
        .lore-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 30px;
            margin: 25px 0;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.05rem;
            color: #ffffff;
            border-right: 8px solid var(--saudi-green);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            white-space: pre-line;
        }

        [dir="ltr"] .lore-box {
            border-right: 0;
            border-left: 8px solid var(--saudi-green);
        }

        .back-nav {
            display: inline-block;
            margin-top: 30px;
            color: var(--glow-green);
            cursor: pointer;
            font-weight: 800;
            font-size: 0.9rem;
            transition: 0.3s;
            text-decoration: underline;
            text-underline-offset: 5px;
        }

        .back-nav:hover {
            color: #fff;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <canvas id="titan-engine-canvas"></canvas>

    <div class="language-hub">
        <div id="btn-ar" class="lang-btn active" onclick="setGlobalLang('ar')">AR</div>
        <div id="btn-en" class="lang-btn" onclick="setGlobalLang('en')">EN</div>
    </div>

    <div class="app-container" id="app-scroller">
        
        <div id="screen-gate" class="screen active">
            <h1 class="main-title" id="t-gate-h">ملاحم التأسيس</h1>
            <p class="description-text" id="t-gate-d">انغمس في أعماق التاريخ السعودي، وكن القائد الذي يصنع المجد بقراراته الشجاعة.</p>
            <button class="btn-epic" id="t-btn-start" onclick="navigateTo('screen-selection')">ابدأ الرحلة الملحمية</button>
            <button class="btn-epic" id="t-btn-archive" onclick="navigateTo('screen-archive')">الأرشيف التاريخي</button>
        </div>

        <div id="screen-selection" class="screen">
            <h1 class="main-title" id="t-select-h">اختر القائد</h1>
            <div id="hero-injection-point"></div>
            <a class="back-nav" onclick="navigateTo('screen-gate')">العودة للرئيسية</a>
        </div>

        <div id="screen-quest" class="screen">
            <h1 id="quest-title-header" style="color: var(--glow-green); font-size: 1.5rem; margin-bottom: 20px;"></h1>
            <div id="quest-content-box" class="lore-box"></div>
            <div id="quest-actions-container"></div>
            <a class="back-nav" onclick="navigateTo('screen-selection')">تراجع عن القرار</a>
        </div>

        <div id="screen-result" class="screen">
            <h1 class="main-title" id="t-res-h">حكم التاريخ</h1>
            <div id="result-text-box" class="lore-box"></div>
            <button class="btn-epic" onclick="navigateTo('screen-selection')">تجربة مسار جديد</button>
            <a class="back-nav" onclick="navigateTo('screen-gate')">الرئيسية</a>
        </div>

        <div id="screen-archive" class="screen">
            <h1 class="main-title" id="t-arch-h">سجل الخالدين</h1>
            <div id="arch-injection-point"></div>
            <a class="back-nav" onclick="navigateTo('screen-gate')">الرجوع</a>
        </div>

        <div id="screen-biography" class="screen">
            <h1 id="bio-hero-name" class="main-title"></h1>
            <div id="bio-content-box" class="lore-box"></div>
            <a class="back-nav" onclick="navigateTo('screen-archive')">العودة للسجل</a>
        </div>

    </div>

    <script>
        const EPIC_DATA = {
            m_saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    epic_title: "يوم ميثاق الدرعية التاريخي",
                    story_full: "في عام 1139هـ (1727م)، تولى الإمام محمد بن سعود الحكم في الدرعية. كانت المنطقة تعاني من تشتت سياسي وصراعات قبلية. \n\n يأتيك الشيخ محمد بن عبدالوهاب باحثاً عن قاعدة آمنة لنشر دعوة التوحيد والعلم. هل تعقد الميثاق؟",
                    decisions: [
                        { label: "عقد الميثاق التاريخي ونصرة العلم", feedback: "✅ 'أبشر ببلاد خير من بلادك'. وضعت حجر الأساس للدولة السعودية الأولى وتحولت الدرعية لعاصمة الوحدة." },
                        { label: "توفير الحماية للشيخ دون تحالف", feedback: "⚠️ نال الشيخ الأمان، لكن الدولة لم تنطلق بقوة الوحدة الكبرى في حينها." }
                    ],
                    biography: "الإمام محمد بن سعود (توفي 1765م). المؤسس الأول للدولة السعودية. حول الدرعية من بلدة صغيرة إلى مركز سياسي وعلمي عالمي."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    epic_title: "The Great Diriyah Pact",
                    story_full: "In 1727, Imam Muhammad bin Saud took power. A scholar arrives seeking alliance. Your choice defines the nation.",
                    decisions: [
                        { label: "Form the Historic Alliance", feedback: "✅ Success! You founded the First Saudi State." },
                        { label: "Provide asylum only", feedback: "⚠️ Safety was granted, but the grand vision was delayed." }
                    ],
                    biography: "The first founder of the Saudi State, known for the historic Diriyah Pact."
                }
            },
            i_turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    epic_title: "ملحمة استعادة الرياض",
                    story_full: "أنت الآن الإمام تركي، ومعك سيفك 'الأجرب'. الرياض محتلة. هل تباغتهم بـ 40 رجلاً في جوف الليل؟",
                    decisions: [
                        { label: "قيادة هجوم فدائي مباغت", feedback: "✅ نصر من الله! استعدت الرياض وأعلنت قيام الدولة السعودية الثانية." },
                        { label: "الانسحاب لجمع جيش أكبر", feedback: "⚠️ استغرقت المهمة سنوات، وعزز المحتل حصونه، مما جعل التحرير أصعب." }
                    ],
                    biography: "مؤسس الدولة السعودية الثانية وبطل الاستعادة. يرمز سيفه 'الأجرب' إلى القوة والعدل."
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    epic_title: "The Restoration of Riyadh",
                    story_full: "Riyadh is occupied. Do you strike now with 40 men or wait?",
                    decisions: [
                        { label: "Lead a surprise night raid", feedback: "✅ Victory! You established the Second Saudi State." },
                        { label: "Wait to gather more tribes", feedback: "⚠️ The delay allowed the enemy to fortify." }
                    ],
                    biography: "Founder of the Second Saudi State and owner of 'Al-Ajrab' sword."
                }
            },
            k_aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    epic_title: "ليلة فتح المصمك التاريخية",
                    story_full: "في ليلة 5 شوال 1319هـ، وقفت عند أسوار الرياض بـ 63 رجلاً. هل تقتحم المصمك عند الفجر؟",
                    decisions: [
                        { label: "اقتحام المصمك لحظة فتح البوابة", feedback: "✅ 'الملك لله ثم لعبد العزيز!'.. تم فتح المصمك وبدأ فجر توحيد المملكة الحديثة." },
                        { label: "تطويق المدينة أولاً", feedback: "⚠️ خطة جيدة، لكنها أخرت الحسم وسمحت للحامية بالتحصن." }
                    ],
                    biography: "المؤسس العظيم للمملكة العربية السعودية. وحد البلاد وأرسى قواعد الأمن والتنمية."
                },
                en: {
                    name: "King Abdulaziz",
                    epic_title: "The Conquest of Masmak",
                    story_full: "With 63 men, you stand at Riyadh's walls. Do you storm it at dawn?",
                    decisions: [
                        { label: "Storm the fort at dawn", feedback: "✅ Triumph! You reclaimed Riyadh and began the modern Kingdom." },
                        { label: "Besiege the city first", feedback: "⚠️ A tactical move, but delayed the founding victory." }
                    ],
                    biography: "The Great Founder of KSA, who unified the nation under one flag."
                }
            }
        };

        const LOCALIZATION = {
            ar: { g_h: "ملاحم التأسيس", g_d: "بوابتك التفاعلية لتجربة التاريخ السعودي العظيم بقراراتك القيادية.", s_h: "اختر القائد", r_h: "حكم التاريخ", a_h: "سجل الخالدين", b_h: "العودة", dir: "rtl" },
            en: { g_h: "Founding Epics", g_d: "Experience the grand Saudi history through your leadership.", s_h: "Select Leader", r_h: "The Verdict", a_h: "Immortal Archive", b_h: "Back", dir: "ltr" }
        };

        let currentLanguage = 'ar';

        function setGlobalLang(l) {
            currentLanguage = l;
            const t = LOCALIZATION[l];
            document.documentElement.dir = t.dir;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + l).classList.add('active');
            document.getElementById('t-gate-h').innerText = t.g_h;
            document.getElementById('t-gate-d').innerText = t.g_d;
            document.getElementById('t-select-h').innerText = t.s_h;
            document.getElementById('t-res-h').innerText = t.r_h;
            document.getElementById('t-arch-h').innerText = t.a_h;
            rebuildInteractiveGrids();
        }

        function navigateTo(screenId) {
            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach(s => {
                s.classList.remove('active');
                setTimeout(() => { s.style.display = 'none'; }, 450);
            });
            setTimeout(() => {
                const target = document.getElementById(screenId);
                target.style.display = 'block';
                setTimeout(() => { target.classList.add('active'); }, 50);
                document.getElementById('app-scroller').scrollTop = 0;
            }, 500);
        }

        function rebuildInteractiveGrids() {
            const heroContainer = document.getElementById('hero-injection-point');
            const archContainer = document.getElementById('arch-injection-point');
            heroContainer.innerHTML = '';
            archContainer.innerHTML = '';
            Object.keys(EPIC_DATA).forEach(key => {
                const hBtn = document.createElement('button');
                hBtn.className = 'btn-epic';
                hBtn.innerText = EPIC_DATA[key][currentLanguage].name;
                hBtn.onclick = () => startHeroQuest(key);
                heroContainer.appendChild(hBtn);
                const aBtn = document.createElement('button');
                aBtn.className = 'btn-epic';
                aBtn.innerText = EPIC_DATA[key][currentLanguage].name;
                aBtn.onclick = () => showHeroBio(key);
                archContainer.appendChild(aBtn);
            });
        }

        function startHeroQuest(heroKey) {
            const data = EPIC_DATA[heroKey][currentLanguage];
            document.getElementById('quest-title-header').innerText = data.epic_title;
            document.getElementById('quest-content-box').innerText = data.story_full;
            const actionArea = document.getElementById('quest-actions-container');
            actionArea.innerHTML = '';
            data.decisions.forEach(dec => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = dec.label;
                btn.onclick = () => {
                    document.getElementById('result-text-box').innerText = dec.feedback;
                    navigateTo('screen-result');
                };
                actionArea.appendChild(btn);
            });
            navigateTo('screen-quest');
        }

        function showHeroBio(heroKey) {
            const data = EPIC_DATA[heroKey][currentLanguage];
            document.getElementById('bio-hero-name').innerText = data.name;
            document.getElementById('bio-content-box').innerText = data.biography;
            navigateTo('screen-biography');
        }

        /* TITAN PHYSICS ENGINE - جزيئات خضراء */
        const canvas = document.getElementById('titan-engine-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.1;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.color = Math.random() > 0.8 ? '#22C55E' : '#006C35';
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
            }
        }

        function initEngine() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesArray = [];
            for (let i = 0; i < 350; i++) particlesArray.push(new Particle());
        }

        function handleParticles() {
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                for (let j = i + 1; j < particlesArray.length; j++) {
                    const dx = particlesArray[i].x - particlesArray[j].x;
                    const dy = particlesArray[i].y - particlesArray[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 80) {
                        ctx.beginPath();
                        ctx.strokeStyle = particlesArray[i].color;
                        ctx.lineWidth = 0.2;
                        ctx.globalAlpha = 1 - (dist / 80);
                        ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
                        ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            handleParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initEngine);
        initEngine();
        animate();
        setGlobalLang('ar');
        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
