<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ملحمة التأسيس - محاكي تاريخي</title>

<style>
/* -----------------------------------------------------------
   🟩 1) الإعدادات العامة + الثيم الداكن + الألوان السعودية
----------------------------------------------------------- */
:root {
    --saudi-green: #006c35;
    --royal-gold: #d4af37;
    --deep-dark: #0a0f0c;
    --glass-bg: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.15);
    --text-light: #e8e8e8;
    --danger: #ff4d4d;
    --success: #00ff9c;
}

body {
    margin: 0;
    font-family: "Cairo", sans-serif;
    background: var(--deep-dark);
    color: var(--text-light);
    overflow-x: hidden;
}

/* -----------------------------------------------------------
   🟩 2) خلفية Particles بسيطة باستخدام CSS Animation
----------------------------------------------------------- */
.particles {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
}

.particles span {
    position: absolute;
    width: 4px;
    height: 4px;
    background: var(--saudi-green);
    border-radius: 50%;
    animation: float 10s linear infinite;
    opacity: 0.4;
}

@keyframes float {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(-120vh) scale(0.5); }
}

/* -----------------------------------------------------------
   🟩 3) الحاوية الرئيسية + تأثير Glassmorphism
----------------------------------------------------------- */
.container {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 900px;
    margin: 60px auto;
    padding: 30px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0, 255, 100, 0.1);
    transition: 0.4s;
}

/* -----------------------------------------------------------
   🟩 4) الأزرار + تأثيرات النجاح والفشل
----------------------------------------------------------- */
button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    background: var(--saudi-green);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00994a;
}

.shake {
    animation: shake 0.4s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-8px); }
    100% { transform: translateX(0); }
}

.glow {
    animation: glow 1s ease-out;
}

@keyframes glow {
    0% { box-shadow: 0 0 0px var(--success); }
    100% { box-shadow: 0 0 25px var(--success); }
}

/* -----------------------------------------------------------
   🟩 5) الأرشيف العائم (Bio Cards)
----------------------------------------------------------- */
.archive-card {
    position: fixed;
    top: 50%;
    right: -400px;
    transform: translateY(-50%);
    width: 350px;
    padding: 20px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 15px;
    backdrop-filter: blur(10px);
    transition: 0.5s;
    z-index: 10;
}

.archive-card.show {
    right: 20px;
}

.archive-card h3 {
    color: var(--royal-gold);
}

/* -----------------------------------------------------------
   🟩 6) زر تغيير اللغة
----------------------------------------------------------- */
.lang-switch {
    position: fixed;
    top: 20px;
    left: 20px;
    background: var(--royal-gold);
    color: black;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    z-index: 20;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- -----------------------------------------------------------
     🟩 Particles Background
----------------------------------------------------------- -->
<div class="particles" id="particles"></div>

<!-- -----------------------------------------------------------
     🟩 زر تغيير اللغة
----------------------------------------------------------- -->
<div class="lang-switch" onclick="toggleLanguage()">EN</div>

<!-- -----------------------------------------------------------
     🟩 الأرشيف العائم
----------------------------------------------------------- -->
<div class="archive-card" id="archiveCard">
    <h3 id="archiveName"></h3>
    <p id="archiveText"></p>
</div>

<!-- -----------------------------------------------------------
     🟩 الحاوية الرئيسية
----------------------------------------------------------- -->
<div class="container" id="app"></div>

<script>
/* -----------------------------------------------------------
   🟩 1) إنشاء Particles عشوائية
----------------------------------------------------------- */
for (let i = 0; i < 60; i++) {
    const p = document.createElement("span");
    p.style.left = Math.random() * 100 + "%";
    p.style.animationDelay = Math.random() * 10 + "s";
    p.style.animationDuration = 8 + Math.random() * 10 + "s";
    document.getElementById("particles").appendChild(p);
}

/* -----------------------------------------------------------
   🟩 2) إدارة اللغة (عربي / إنجليزي)
----------------------------------------------------------- */
let currentLang = "ar";

function toggleLanguage() {
    currentLang = currentLang === "ar" ? "en" : "ar";
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";
    document.querySelector(".lang-switch").textContent = currentLang === "ar" ? "EN" : "AR";
    renderHome();
}

/* -----------------------------------------------------------
   🟩 3) قاعدة بيانات القادة + السيناريوهات + الأرشيف
----------------------------------------------------------- */
const leaders = {
    "mohammed": {
        name_ar: "الإمام محمد بن سعود",
        name_en: "Imam Mohammed bin Saud",
        archive_ar: `
نشأ الإمام محمد بن سعود في بيئة تتسم بالصلابة والقيادة، 
وكانت الدرعية في عهده نواة حلم أكبر من حدود المكان. 
امتلك رؤية سياسية واضحة، وإرادة لا تلين، وقدرة على جمع الناس حول مشروع دولة 
تقوم على الاستقرار والعدل والنهضة.
        `,
        archive_en: `
Imam Mohammed bin Saud grew up in an environment of leadership and resilience. 
Under his rule, Diriyah became the nucleus of a vision far greater than its borders. 
He possessed political clarity, unshakable will, and the ability to unite people 
around a state built on justice, stability, and progress.
        `,
        scenarios: [
            {
                title_ar: "التحالف التاريخي",
                story_ar: `
في ليلة هادئة من ليالي الدرعية، وقف الإمام محمد بن سعود أمام مفترق طرق. 
كانت الدعوة الإصلاحية قد وصلت إليه، ومعها فرصة لتغيير مسار الجزيرة العربية. 
لكن التحالف يعني مسؤولية ضخمة، وقد يجر معه خصومات قبل أن يجلب الاستقرار.
                `,
                options_ar: [
                    { text: "إبرام التحالف فوراً", correct: true, result: "يبدأ عهد جديد من الوحدة والاستقرار." },
                    { text: "التردد وانتظار الظروف", correct: false, result: "تضيع الفرصة التاريخية ويزداد نفوذ الخصوم." }
                ]
            },
            {
                title_ar: "تأمين الدرعية",
                story_ar: `
كانت الدرعية محاطة بقبائل متنافسة، وكل خطوة خاطئة قد تشعل حرباً. 
جلس الإمام يفكر: هل يبدأ بتقوية التحصينات أم يركز على بناء التحالفات؟
                `,
                options_ar: [
                    { text: "تعزيز التحصينات أولاً", correct: true, result: "تصبح الدرعية حصناً منيعاً." },
                    { text: "إهمال الدفاع والتركيز على السياسة", correct: false, result: "تتعرض الدرعية لهجمات مفاجئة." }
                ]
            }
        ]
    },

    /* -----------------------------------------------------------
       🟩 الإمام تركي بن عبدالله
----------------------------------------------------------- */
    "turki": {
        name_ar: "الإمام تركي بن عبدالله",
        name_en: "Imam Turki bin Abdullah",
        archive_ar: `
كان الإمام تركي بن عبدالله قائداً فذاً أعاد الأمل بعد سنوات من التشتت. 
امتاز بالشجاعة والدهاء العسكري، واستطاع أن يعيد الرياض إلى الحكم السعودي 
بخطط محكمة وروح لا تعرف الهزيمة.
        `,
        archive_en: `
Imam Turki bin Abdullah was a remarkable leader who restored hope after years of fragmentation. 
He reclaimed Riyadh with strategic brilliance and unmatched courage.
        `,
        scenarios: [
            {
                title_ar: "استعادة الرياض",
                story_ar: `
بعد سنوات من الغياب، عاد الإمام تركي إلى الرياض متخفياً. 
كانت المدينة تحت سيطرة خصوم شرسين، وأي خطأ يعني نهاية المحاولة. 
وقف أمام خيارين مصيريين.
                `,
                options_ar: [
                    { text: "الهجوم الليلي المباغت", correct: true, result: "تسقط الرياض سريعاً بفضل عنصر المفاجأة." },
                    { text: "التفاوض مع الخصوم", correct: false, result: "يستغل الخصوم الوقت ويقلبون الموازين." }
                ]
            }
        ]
    },

    /* -----------------------------------------------------------
       🟩 الملك عبدالعزيز
----------------------------------------------------------- */
    "abdulaziz": {
        name_ar: "الملك عبدالعزيز",
        name_en: "King Abdulaziz",
        archive_ar: `
كان الملك عبدالعزيز قائداً استثنائياً جمع بين الحكمة والقوة. 
قاد رحلة توحيد شاقة، واجه فيها الصحراء والخصوم والظروف القاسية، 
حتى أسس دولة حديثة تقوم على الأمن والعدل والتنمية.
        `,
        archive_en: `
King Abdulaziz was an extraordinary leader who united the Arabian Peninsula 
through wisdom, strength, and strategic brilliance.
        `,
        scenarios: [
            {
                title_ar: "فتح الرياض",
                story_ar: `
في فجر يوم حاسم، وقف الملك عبدالعزيز أمام أسوار الرياض. 
كانت لحظة لا تشبه أي لحظة أخرى: إما استعادة المجد، أو خسارة كل شيء. 
الرجال ينتظرون إشارته.
                `,
                options_ar: [
                    { text: "اقتحام القصر عبر البوابة الرئيسية", correct: false, result: "يُكشف الهجوم ويفشل المخطط." },
                    { text: "التسلل عبر البساتين", correct: true, result: "يصل الرجال إلى الداخل دون أن يشعر بهم أحد." }
                ]
            }
        ]
    }
};

/* -----------------------------------------------------------
   🟩 4) إدارة الحالة + واجهة المستخدم
----------------------------------------------------------- */
function renderHome() {
    const app = document.getElementById("app");
    app.innerHTML = "";

    const title = currentLang === "ar" ? "اختر قائدك" : "Choose Your Leader";

    app.innerHTML = `<h1 style="color:var(--royal-gold); text-align:center">${title}</h1>`;

    Object.keys(leaders).forEach(id => {
        const leader = leaders[id];
        const name = currentLang === "ar" ? leader.name_ar : leader.name_en;

        const btn = document.createElement("button");
        btn.textContent = name;
        btn.onclick = () => renderLeader(id);
        app.appendChild(btn);
    });
}

function renderLeader(id) {
    const leader = leaders[id];
    const app = document.getElementById("app");

    const title = currentLang === "ar" ? "السيناريوهات" : "Scenarios";

    app.innerHTML = `
        <h2 style="color:var(--royal-gold)">${currentLang === "ar" ? leader.name_ar : leader.name_en}</h2>
        <button onclick="showArchive('${id}')">${currentLang === "ar" ? "عرض السيرة" : "Show Archive"}</button>
        <h3>${title}</h3>
    `;

    leader.scenarios.forEach((sc, index) => {
        const btn = document.createElement("button");
        btn.textContent = currentLang === "ar" ? sc.title_ar : sc.title_en || sc.title_ar;
        btn.onclick = () => renderScenario(id, index);
        app.appendChild(btn);
    });
}

function renderScenario(id, index) {
    const sc = leaders[id].scenarios[index];
    const app = document.getElementById("app");

    app.innerHTML = `
        <h2 style="color:var(--royal-gold)">${currentLang === "ar" ? sc.title_ar : sc.title_en || sc.title_ar}</h2>
        <p>${currentLang === "ar" ? sc.story_ar : sc.story_en || sc.story_ar}</p>
    `;

    sc.options_ar.forEach(opt => {
        const btn = document.createElement("button");
        btn.textContent = currentLang === "ar" ? opt.text : opt.text_en || opt.text;
        btn.onclick = () => handleOption(btn, opt);
        app.appendChild(btn);
    });
}

function handleOption(btn, opt) {
    if (opt.correct) {
        btn.classList.add("glow");
        alert(opt.result);
    } else {
        btn.classList.add("shake");
        alert(opt.result);
    }
}

/* -----------------------------------------------------------
   🟩 5) عرض الأرشيف العائم
----------------------------------------------------------- */
function showArchive(id) {
    const card = document.getElementById("archiveCard");
    const leader = leaders[id];

    document.getElementById("archiveName").textContent =
        currentLang === "ar" ? leader.name_ar : leader.name_en;

    document.getElementById("archiveText").textContent =
        currentLang === "ar" ? leader.archive_ar : leader.archive_en;

    card.classList.add("show");

    setTimeout(() => card.classList.remove("show"), 12000);
}

/* -----------------------------------------------------------
   🟩 6) تشغيل الصفحة
----------------------------------------------------------- */
renderHome();
</script>

</body>
</html>
