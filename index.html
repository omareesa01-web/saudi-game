    <style>
        :root {
            --saudi-green: #006C35; 
            --light-green: #00843D;
            --glow-green: #22C55E;
            --deep-green: #062113;
            --forest-black: #010a05;
            --glass-bg: rgba(0, 30, 15, 0.96); 
            --glass-border: rgba(34, 197, 94, 0.45);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --transition-smooth: 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body, html {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--deep-green) 0%, var(--forest-black) 100%);
            color: #ffffff; font-family: var(--font-main);
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        #titan-engine-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

        .language-hub { position: fixed; top: 15px; left: 15px; z-index: 1000; display: flex; gap: 8px; }
        .lang-btn {
            background: rgba(0, 40, 20, 0.9); border: 1px solid var(--glow-green);
            color: var(--glow-green); padding: 6px 12px; border-radius: 20px;
            cursor: pointer; font-weight: 900; transition: 0.3s; font-size: 0.75rem;
        }
        .lang-btn.active { background: var(--saudi-green); color: #fff; box-shadow: 0 0 15px var(--glow-green); }

        /* تصغير القائمة الرئيسية والحاوية */
        .app-container {
            position: relative; z-index: 100; width: 90%; max-width: 440px;
            background: var(--glass-bg); backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border); border-top: 6px solid var(--saudi-green);
            border-radius: 30px; padding: 30px 20px; text-align: center;
            box-shadow: 0 60px 120px rgba(0,0,0,0.8); max-height: 85vh; overflow-y: auto;
        }
        .app-container::-webkit-scrollbar { width: 3px; }
        .app-container::-webkit-scrollbar-thumb { background: var(--saudi-green); }

        .main-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 12px; text-shadow: 0 0 15px var(--glow-green); }
        .description-text { font-size: 0.9rem; line-height: 1.5; color: #bbb; margin-bottom: 25px; }

        /* تأثير لمعة السيف على الخيارات */
        .btn-epic {
            position: relative; width: 100%; padding: 15px; margin-bottom: 12px;
            background: linear-gradient(135deg, var(--saudi-green), var(--deep-green));
            border: 1px solid var(--glow-green); border-radius: 15px;
            color: #ffffff; font-size: 0.95rem; font-weight: 800; cursor: pointer; 
            transition: 0.4s; overflow: hidden;
        }
        .btn-epic::after {
            content: ""; position: absolute; top: -50%; left: -150%;
            width: 40%; height: 200%; background: rgba(255, 255, 255, 0.6);
            transform: rotate(35deg); transition: 0s; filter: blur(5px);
        }
        .btn-epic:hover::after {
            left: 150%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-epic:hover { transform: scale(1.02); background: var(--light-green); border-color: #fff; }

        .lore-box {
            background: rgba(0, 0, 0, 0.5); border-radius: 20px; padding: 25px;
            margin: 15px 0; text-align: justify; line-height: 1.9; font-size: 0.95rem;
            color: #f0f0f0; border-right: 8px solid var(--saudi-green);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5); white-space: pre-line;
        }
        [dir="ltr"] .lore-box { border-right: 0; border-left: 8px solid var(--saudi-green); }

        .back-nav { display: inline-block; margin-top: 15px; color: var(--glow-green); cursor: pointer; font-weight: 800; font-size: 0.85rem; }
    </style>
</head>

        function setGlobalLang(l) {
            currentLanguage = l;
            const t = LOCALIZATION[l];
            document.documentElement.lang = l;
            document.documentElement.dir = t.dir;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + l).classList.add('active');

            document.getElementById('t-gate-h').innerText = t.g_h;
            document.getElementById('t-gate-d').innerText = t.g_d;
            document.getElementById('t-btn-start').innerText = t.start_btn;
            document.getElementById('t-btn-archive').innerText = t.arch_btn;
            document.getElementById('t-select-h').innerText = t.s_h;
            document.getElementById('t-scen-h').innerText = t.sc_h;
            document.getElementById('t-res-h').innerText = t.r_h;
            document.getElementById('t-arch-h').innerText = t.a_h;

            rebuildInteractiveGrids();
        }

        function navigateTo(screenId) {
            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach(s => { s.classList.remove('active'); setTimeout(() => { s.style.display = 'none'; }, 400); });
            setTimeout(() => {
                const target = document.getElementById(screenId);
                target.style.display = 'block';
                setTimeout(() => { target.classList.add('active'); }, 50);
                document.getElementById('app-scroller').scrollTop = 0;
            }, 450);
        }

        function rebuildInteractiveGrids() {
            const hPoint = document.getElementById('hero-injection-point');
            const aPoint = document.getElementById('arch-injection-point');
            hPoint.innerHTML = ''; aPoint.innerHTML = '';

            Object.keys(EPIC_DATA).forEach(key => {
                const hBtn = document.createElement('button');
                hBtn.className = 'btn-epic';
                hBtn.innerText = EPIC_DATA[key][currentLanguage].name;
                hBtn.onclick = () => showScenarios(key);
                hPoint.appendChild(hBtn);

                const aBtn = document.createElement('button');
                aBtn.className = 'btn-epic';
                aBtn.innerText = EPIC_DATA[key][currentLanguage].name;
                aBtn.onclick = () => {
                    document.getElementById('bio-hero-name').innerText = EPIC_DATA[key][currentLanguage].name;
                    document.getElementById('bio-content-box').innerText = EPIC_DATA[key][currentLanguage].biography;
                    navigateTo('screen-biography');
                };
                aPoint.appendChild(aBtn);
            });
        }

        function showScenarios(heroKey) {
            selectedHeroKey = heroKey;
            const sPoint = document.getElementById('scenario-injection-point');
            sPoint.innerHTML = '';
            EPIC_DATA[heroKey][currentLanguage].scenarios.forEach((sc, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = sc.title;
                btn.onclick = () => loadQuest(index);
                sPoint.appendChild(btn);
            });
            navigateTo('screen-scenarios');
        }

        function loadQuest(scIndex) {
            const sc = EPIC_DATA[selectedHeroKey][currentLanguage].scenarios[scIndex];
            document.getElementById('quest-title-header').innerText = sc.title;
            document.getElementById('quest-content-box').innerText = sc.story;
            const aContainer = document.getElementById('quest-actions-container');
            aContainer.innerHTML = '';
            sc.decisions.forEach(dec => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = dec.l;
                btn.onclick = () => {
                    document.getElementById('result-text-box').innerText = dec.f;
                    navigateTo('screen-result');
                };
                aContainer.appendChild(btn);
            });
            navigateTo('screen-quest');
        }

        // Titan Physics Engine
        const canvas = document.getElementById('titan-engine-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        class P {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2; this.vx = (Math.random()-0.5)*0.2; this.vy = (Math.random()-0.5)*0.2; }
            u() { this.x+=this.vx; this.y+=this.vy; if(this.x>canvas.width||this.x<0)this.vx*=-1; if(this.y>canvas.height||this.y<0)this.vy*=-1; }
            d() { ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fillStyle='#22C55E'; ctx.globalAlpha=0.15; ctx.fill(); }
        }
        function init() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; particles=[]; for(let i=0;i<150;i++) particles.push(new P()); }
        function loop() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.u();p.d();}); requestAnimationFrame(loop); }
        window.onresize=init; init(); loop(); setGlobalLang('ar');
    </script>
</body>
</html>
