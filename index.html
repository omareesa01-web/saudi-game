<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | الإصدار الأضخم</title>
    
    <style>
        /* --- 1. المبدأ التصميمي (Design System) --- */
        :root {
            --gold-primary: #c1a35f;
            --gold-bright: #f3cf7a;
            --gold-dark: #8e733b;
            --bg-deep: #030d08;
            --bg-gradient: radial-gradient(circle at center, #0d2e1c 0%, #05160d 50%, #020805 100%);
            --glass-base: rgba(0, 0, 0, 0.95);
            --glass-border: rgba(193, 163, 95, 0.4);
            --font-family: 'Cairo', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --sword-swipe: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), var(--gold-bright), transparent);
        }

        /* --- 2. التنسيق العام (Global Reset) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            background-image: var(--bg-gradient);
            color: #ffffff;
            font-family: var(--font-family);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 3. محرك الرمل الذهبي (Particle Engine) --- */
        #canvas-layers {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- 4. واجهة تبديل اللغات (UI Controls) --- */
        .ui-controls {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 9999;
            display: flex;
            gap: 15px;
        }

        .lang-card {
            background: rgba(0, 0, 0, 0.85);
            border: 1.5px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .lang-card:hover {
            transform: scale(1.1) translateY(-5px);
            background: var(--gold-primary);
            color: #000;
            box-shadow: 0 0 30px var(--gold-primary);
        }

        .lang-card.active {
            background: var(--gold-primary);
            color: #000;
            box-shadow: 0 0 40px rgba(193, 163, 95, 0.5);
        }

        /* --- 5. الحاوية الرئيسية (The Master Container) --- */
        .master-app {
            position: relative;
            z-index: 100;
            width: 90%;
            max-width: 680px; /* القوائم تظل صغيرة ورشيقة */
            background: var(--glass-base);
            backdrop-filter: blur(80px);
            -webkit-backdrop-filter: blur(80px);
            border: 1px solid var(--glass-border);
            border-top: 6px solid var(--gold-primary);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 80px 200px rgba(0,0,0,1);
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-primary) transparent;
        }

        .master-app::-webkit-scrollbar { width: 5px; }
        .master-app::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: 10px; }

        /* --- 6. مكونات الشاشة (Screen Modules) --- */
        .screen {
            display: none;
            opacity: 0;
            transform: scale(0.95) translateY(40px);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .screen.active {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .main-heading {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--gold-primary);
            margin-bottom: 25px;
            text-shadow: 0 10px 40px rgba(0,0,0,0.9);
            filter: drop-shadow(0 0 10px rgba(193, 163, 95, 0.3));
        }

        .description {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #ececec;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* --- 7. الأزرار التفاعلية (Action Elements) --- */
        .btn-epic {
            position: relative;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 18px;
            background: linear-gradient(135deg, rgba(193, 163, 95, 0.08), rgba(0,0,0,0.6));
            border: 1px solid var(--gold-primary);
            border-radius: 18px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .btn-epic::after {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 100%; height: 100%;
            background: var(--sword-swipe);
            transform: skewX(-45deg);
        }

        .btn-epic:hover::after { left: 150%; transition: 0.7s cubic-bezier(0.65, 0, 0.35, 1); }

        .btn-epic:hover {
            background: rgba(193, 163, 95, 0.25);
            transform: translateY(-5px);
            border-color: var(--gold-bright);
            box-shadow: 0 15px 35px rgba(193, 163, 95, 0.3), 0 0 15px rgba(193, 163, 95, 0.2);
        }

        .btn-epic:active { transform: translateY(0) scale(0.98); }

        /* --- 8. لوحة القصة العميقة (Deep Lore Panel) --- */
        .lore-panel {
            background: linear-gradient(to bottom, rgba(255,255,255,0.03), rgba(0,0,0,0.4));
            border-radius: 25px;
            padding: 35px;
            margin: 30px 0;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.3rem;
            color: #f0f0f0;
            border-right: 8px solid var(--gold-primary);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        [dir="ltr"] .lore-panel { border-right: 0; border-left: 8px solid var(--gold-primary); }

        .lore-panel::before {
            content: '“';
            position: absolute;
            top: -10px; right: 10px;
            font-size: 8rem;
            color: rgba(193, 163, 95, 0.1);
            font-family: serif;
        }

        /* --- 9. التذييل والملاحة --- */
        .nav-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--gold-bright);
            text-decoration: none;
            font-weight: 900;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            padding: 8px 20px;
            border: 1px solid transparent;
            border-radius: 30px;
        }

        .nav-link:hover {
            background: rgba(193, 163, 95, 0.1);
            border-color: var(--gold-primary);
            color: #fff;
            text-shadow: 0 0 10px var(--gold-primary);
        }
    </style>
</head>
<body>

    <canvas id="canvas-layers"></canvas>

    <div class="ui-controls">
        <div id="btn-ar" class="lang-card active" onclick="switchLanguage('ar')">العربية</div>
        <div id="btn-en" class="lang-card" onclick="switchLanguage('en')">English</div>
    </div>

    <div class="master-app" id="main-scroll">
        
        <div id="screen-home" class="screen active">
            <h1 class="main-heading" id="txt-home-title">ملاحم التأسيس</h1>
            <p class="description" id="txt-home-desc">
                انطلق في رحلة عبر الزمن لتعيش أدق تفاصيل تاريخ الدولة السعودية. 
                واجه التحديات بصفتك قائداً ملهماً، واصنع القرارات التي غيرت مجرى الجزيرة العربية.
            </p>
            <button class="btn-epic" id="txt-btn-start" onclick="navigateTo('screen-selection')">بدء الملحمة التفاعلية</button>
            <button class="btn-epic" id="txt-btn-records" onclick="loadBioArchive()">الأرشيف التاريخي للأبطال</button>
        </div>

        <div id="screen-selection" class="screen">
            <h1 class="main-heading" id="txt-select-hero">اختر القائد</h1>
            <div id="hero-grid"></div>
            <a class="nav-link" id="txt-back-home" onclick="navigateTo('screen-home')">العودة للرئيسية</a>
        </div>

        <div id="screen-quest" class="screen">
            <h1 id="quest-title" style="color: var(--gold-bright); font-size: 2rem; margin-bottom: 20px;"></h1>
            <div id="quest-content" class="lore-panel"></div>
            <div id="quest-options"></div>
            <a class="nav-link" id="txt-abort" onclick="navigateTo('screen-selection')">تراجع عن المهمة</a>
        </div>

        <div id="screen-result" class="screen">
            <h1 class="main-heading" id="txt-verdict">حكم التاريخ</h1>
            <div id="result-content" class="lore-panel"></div>
            <button class="btn-epic" id="txt-retry" onclick="navigateTo('screen-selection')">استكشاف مسار تاريخي آخر</button>
            <a class="nav-link" id="txt-exit" onclick="navigateTo('screen-home')">الخروج للرئيسية</a>
        </div>

        <div id="screen-archive" class="screen">
            <h1 class="main-heading" id="txt-archive-title">سجل الخالدين</h1>
            <div id="archive-list"></div>
            <a class="nav-link" id="txt-archive-back" onclick="navigateTo('screen-home')">العودة للرئيسية</a>
        </div>

        <div id="screen-bio" class="screen">
            <h1 id="bio-name" class="main-heading"></h1>
            <div id="bio-text" class="lore-panel"></div>
            <a class="nav-link" id="txt-bio-back" onclick="navigateTo('screen-archive')">العودة للسجل</a>
        </div>

    </div>

    <script>

        const DATABASE = {

                        { text: "Storm Masmak as the gate opens", res: "✅ 'The Kingdom is for Allah, then for Abdulaziz!'.. A cry that changed history. Your men charged, and the spear of Fahad bin Jaluwi hit the gate (mark still visible today). \n\n Result: Riyadh was reclaimed, starting a 30-year journey to unify Hejaz, Asir, and Al-Ahsa into the modern Kingdom of Saudi Arabia." },
                        { text: "Besiege the fort and cut off supplies", res: "⚠️ Good tactic, but failed. The fort had months of supplies. Reinforcements from other regions moved in to help Ajlan, forcing you to retreat." },
                        { text: "Negotiate with Ajlan for power transfer", res: "❌ Unsuccessful move. Ajlan saw weakness in your offer and used the time to set a trap. You and your men almost got captured." }
                    ],
                    bio: "King Abdulaziz Al Saud (1876-1953). \n\n The Founder of modern Saudi Arabia and a symbol of wisdom. \n\n Major Achievements: \n 1. Recaptured Riyadh with only 63 men. \n 2. Unified the country in 1932. \n 3. Discovery of oil and the start of a massive developmental era. \n 4. Established modern institutions and secured the nation."
                }
            }
        };

        const UI_TEXTS = {
            ar: { home_title: "ملاحم التأسيس", home_desc: "انطلق في رحلة عبر الزمن لتعيش أدق تفاصيل تاريخ الدولة السعودية. واجه التحديات بصفتك قائداً ملهماً، واصنع القرارات التي غيرت مجرى الجزيرة العربية.", btn_start: "بدء الملحمة التفاعلية", btn_records: "الأرشيف التاريخي للأبطال", select_hero: "اختر القائد الملحمي", back_home: "العودة للقائمة الرئيسية", abort: "تراجع عن المهمة", verdict: "حكم التاريخ والنتائج", retry: "استكشاف مسار تاريخي آخر", exit: "الخروج للرئيسية", archive_title: "سجل الخالدين", archive_back: "رجوع للرئيسية", bio_back: "العودة للسجل", dir: "rtl" },
            en: { home_title: "Founding Epics", home_desc: "Embark on a journey through time to relive the history of the Saudi state. Face challenges as an inspiring leader and make decisions that changed Arabia.", btn_start: "Start Interactive Epic", btn_records: "Heroes Archive", select_hero: "Select Epic Leader", back_home: "Back to Home", abort: "Abort Mission", verdict: "History's Verdict", retry: "Try Another Path", exit: "Exit to Home", archive_title: "Immortal Records", archive_back: "Back Home", bio_back: "Back to Archive", dir: "ltr" }
        };

        /* --- 2. منطق التطبيق (App Logic) --- */
        let currentLang = 'ar';

        function switchLanguage(lang) {
            currentLang = lang;
            const t = UI_TEXTS[lang];
            document.documentElement.lang = lang;
            document.documentElement.dir = t.dir;
            document.body.style.direction = t.dir;

            // تحديث الواجهة
            document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('txt-home-title').innerText = t.home_title;
            document.getElementById('txt-home-desc').innerText = t.home_desc;
            document.getElementById('txt-btn-start').innerText = t.btn_start;
            document.getElementById('txt-btn-records').innerText = t.btn_records;
            document.getElementById('txt-select-hero').innerText = t.select_hero;
            document.getElementById('txt-back-home').innerText = t.back_home;
            document.getElementById('txt-abort').innerText = t.abort;
            document.getElementById('txt-verdict').innerText = t.verdict;
            document.getElementById('txt-retry').innerText = t.retry;
            document.getElementById('txt-exit').innerText = t.exit;
            document.getElementById('txt-archive-title').innerText = t.archive_title;
            document.getElementById('txt-archive-back').innerText = t.archive_back;
            document.getElementById('txt-bio-back').innerText = t.bio_back;

            renderHeroGrid();
        }

        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                setTimeout(() => s.style.display = 'none', 400);
            });
            setTimeout(() => {
                const target = document.getElementById(screenId);
                target.style.display = 'block';
                setTimeout(() => target.classList.add('active'), 50);
                document.getElementById('main-scroll').scrollTop = 0;
            }, 450);
        }

        function renderHeroGrid() {
            const grid = document.getElementById('hero-grid');
            grid.innerHTML = '';
            Object.keys(DATABASE).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = DATABASE[key][currentLang].name;
                btn.onclick = () => startEpic(key);
                grid.appendChild(btn);
            });
        }

        function startEpic(key) {
            const data = DATABASE[key][currentLang];
            document.getElementById('quest-title').innerText = data.epic;
            document.getElementById('quest-content').innerText = data.story;
            
            const optionsBox = document.getElementById('quest-options');
            optionsBox.innerHTML = '';
            data.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn-epic';
                b.innerText = opt.text;
                b.onclick = () => {
                    document.getElementById('result-content').innerText = opt.res;
                    navigateTo('screen-result');
                };
                optionsBox.appendChild(b);
            });
            navigateTo('screen-quest');
        }

        function loadBioArchive() {
            const list = document.getElementById('archive-list');
            list.innerHTML = '';
            Object.keys(DATABASE).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = DATABASE[key][currentLang].name;
                btn.onclick = () => {
                    document.getElementById('bio-name').innerText = DATABASE[key][currentLang].name;
                    document.getElementById('bio-text').innerText = DATABASE[key][currentLang].bio;
                    navigateTo('screen-bio');
                };
                list.appendChild(btn);
            });
            navigateTo('screen-archive');
        }

        /* --- 3. محرك الجرافيك (Graphics Engine - The Sand & Gold) --- */
        const canvas = document.getElementById('canvas-layers');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 450; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2 + 0.5,
                    vx: Math.random() * 0.5 - 0.25,
                    vy: Math.random() * 0.5 + 0.2,
                    o: Math.random() * 0.5 + 0.2,
                    c: Math.random() > 0.8 ? '#f3cf7a' : '#c1a35f' // خلط الرمل بذهب لامع
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y -= p.vy;
                p.x += p.vx;
                if (p.y < -10) p.y = canvas.height + 10;
                if (p.x > canvas.width) p.x = 0;
                if (p.x < 0) p.x = canvas.width;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.c;
                ctx.globalAlpha = p.o;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.onresize = initParticles;
        initParticles();
        animate();
        switchLanguage('ar');

    </script>
</body>
