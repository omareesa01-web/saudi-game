<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - 300 عام من المجد</title>
    
    <style>
        /* --- الأساسيات والخطوط --- */
        :root {
            --gold-main: #c1a35f;
            --gold-light: #f3cf7a;
            --deep-green: #05160d;
            --glass-bg: rgba(0, 0, 0, 0.9);
            --glass-border: rgba(193, 163, 95, 0.5);
            --sword-speed: 0.4s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- تأثير ذرات الرمال المتحركة --- */
        #sand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- محول اللغات العلوي --- */
        .lang-switcher {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .btn-lang {
            background: var(--glass-bg);
            border: 1.5px solid var(--gold-main);
            color: var(--gold-light);
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            backdrop-filter: blur(15px);
            font-size: 0.9rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-lang:hover {
            background: var(--gold-main);
            color: #000;
            transform: scale(1.05);
        }

        .btn-lang.active {
            background: var(--gold-main);
            color: #000;
            box-shadow: 0 0 15px var(--gold-main);
        }

        /* --- حاوية التطبيق الرئيسية --- */
        .app-wrapper {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 630px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1.8px solid var(--glass-border);
            border-radius: 35px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.9);
            max-height: 88vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-main) transparent;
        }

        /* --- أنظمة العرض والتحريك --- */
        .screen {
            display: none;
            opacity: 0;
            transform: translateY(30px);
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .screen.fade-in {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* --- النصوص والعناوين --- */
        h1 {
            font-size: 2.3rem;
            color: var(--gold-main);
            margin-bottom: 20px;
            font-weight: 900;
            letter-spacing: 1px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }

        .description {
            font-size: 1.15rem;
            color: #e0e0e0;
            margin-bottom: 40px;
            line-height: 1.8;
            font-weight: 400;
        }

        /* --- أزرار الأكشن (مع تأثير السيف) --- */
        .btn-action {
            position: relative;
            width: 100%;
            background: linear-gradient(135deg, rgba(193, 163, 95, 0.05), rgba(255, 255, 255, 0.02));
            border: 1.2px solid var(--gold-main);
            padding: 18px;
            border-radius: 15px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            margin-bottom: 15px;
            overflow: hidden; /* ضروري لتأثير السيف */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تأثير ضربة السيف الضوئي */
        .btn-action::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 120%;
            height: 100%;
            background: linear-gradient(
                90deg, 
                transparent, 
                rgba(193, 163, 95, 0.8), 
                #fff, 
                rgba(193, 163, 95, 0.8), 
                transparent
            );
            transform: skewX(-45deg);
            transition: 0s;
        }

        .btn-action:hover::before {
            left: 150%;
            transition: var(--sword-speed) ease-in-out;
        }

        .btn-action:hover {
            background: rgba(193, 163, 95, 0.15);
            border-color: var(--gold-light);
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(193, 163, 95, 0.2);
        }

        /* --- لوحات القصة والسير الذاتية --- */
        .story-panel {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 25px;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.15rem;
            border-right: 8px solid var(--gold-main);
            border-left: 0px;
            margin: 30px 0;
            color: #f9f9f9;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
            white-space: pre-line; /* للحفاظ على فواصل الأسطر في السير */
        }

        [dir="ltr"] .story-panel {
            border-right: 0;
            border-left: 8px solid var(--gold-main);
        }

        /* --- الروابط التفاعلية --- */
        .nav-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--gold-light);
            text-decoration: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.05rem;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
            padding-bottom: 5px;
        }

        .nav-link:hover {
            color: #fff;
            border-bottom-color: var(--gold-main);
        }

        /* --- تنسيق السكرول بار --- */
        ::-webkit-scrollbar { width: 7px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: var(--gold-main); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="lang-switcher">
        <button id="btn-ar" class="btn-lang active" onclick="setAppLanguage('ar')">العربية</button>
        <button id="btn-en" class="btn-lang" onclick="setAppLanguage('en')">English</button>
    </div>

    <div class="app-wrapper" id="scroll-target">
        
        <div id="scr-home" class="screen" style="display: block;">
            <h1 id="txt-title">ملاحم التأسيس</h1>
            <p id="txt-desc" class="description">سجل تاريخي ناطق يروي أمجاد المملكة العربية السعودية عبر العصور (مشروع تفاعلي)</p>
            <button id="btn-start" class="btn-action" onclick="navTo('scr-heroes')">دخول الملحمة الكبرى</button>
            <button id="btn-lore" class="btn-action" onclick="showLore()">سير الأبطال والخالدين</button>
        </div>

        <div id="scr-heroes" class="screen">
            <h1 id="txt-hero-head">اختر القائد</h1>
            <div id="hero-list"></div>
            <a id="lnk-home" class="nav-link" onclick="navTo('scr-home')">العودة للرئيسية</a>
        </div>

        <div id="scr-mission" class="screen">
            <h1 id="ui-mission-title" style="color: var(--gold-light);"></h1>
            <div id="ui-mission-desc" class="story-panel"></div>
            <div id="ui-btns-area"></div>
            <a id="lnk-cancel" class="nav-link" onclick="stopAudioAndGoBack()">إلغاء والعودة</a>
        </div>

        <div id="scr-result" class="screen">
            <h1 id="txt-res-head">حكم التاريخ</h1>
            <div id="ui-result-body" class="story-panel"></div>
            <a id="lnk-res-home" class="nav-link" onclick="navTo('scr-home')">العودة للقائمة الرئيسية</a>
        </div>

        <div id="scr-lore" class="screen">
            <h1 id="txt-lore-head">سجل العظماء</h1>
            <div id="ui-lore-list"></div>
            <a id="lnk-lore-back" class="nav-link" onclick="navTo('scr-home')">رجوع</a>
        </div>

        <div id="scr-bio" class="screen">
            <h1 id="ui-bio-name"></h1>
            <div id="ui-bio-text" class="story-panel"></div>
            <a id="lnk-bio-back" class="nav-link" onclick="navTo('scr-lore')">العودة للسجل</a>
        </div>

    </div>

    <script>
        // --- إدارة البيانات واللغات ---
        let currentLang = 'ar';
        let audioPlayer = null;

        const Interface = {
            ar: {
                title: "ملاحم التأسيس",
                desc: "سجل تاريخي ناطق يروي أمجاد المملكة العربية السعودية عبر العصور وحكايات الأبطال الذين صنعوا المجد والوحدة.",
                start: "دخول الملحمة الكبرى",
                lore: "سير الأبطال والخالدين",
                choose: "اختر القائد"،
                home: "العودة للرئيسية",
                cancel: "إلغاء والعودة",
                judge: "حكم التاريخ",
                records: "سجل العظماء",
                back: "رجوع",
                backLore: "العودة للسجل",
                dir: "rtl"
            },
            en: {
                title: "Founding Epics",
                desc: "A narrative historical record recounting the glories of Saudi Arabia and the stories of heroes who crafted glory and unity.",
                start: "Enter Grand Epic",
                lore: "Hall of Immortals",
                choose: "Select Your Leader",
                home: "Return Home",
                cancel: "Cancel & Return",
                judge: "History's Verdict",
                records: "Great Leaders Archive",
                back: "Back",
                backLore: "Back to List",
                dir: "ltr"
            }
        };

        const Characters = {
            saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    title: "ميثاق الدرعية الخالد (1727م)",
                    quest: "نحن في عام 1727م، الدرعية واحة خضراء في قلب نجد، لكنها تعيش في عالم يملؤه التشتت والصراعات القبلية والفقر والجهل.\n\nبصفتك الحاكم الشاب الطموح، أدركت بذكائك أن القوة العسكرية وحدها لا تبني أمة مستقرة، وأن الوحدة القائمة على مبادئ راسخة هي السبيل الوحيد للأمن والازدهار.\n\nهل تختار عقد ميثاق تاريخي قائم على الدعوة للعلم والعدل والوحدة لتكون الدرعية عاصمة لدولة كبرى تجمع شتات العرب، أم تكتفي بتعزيز الأسوار وحماية تجارتك وأهل مدينتك عسكرياً؟",
                    choices: [
                        { t: "عقد ميثاق الوحدة وبناء الدولة", r: "✅ انتصار تاريخي خالد! بقرارك الشجاع، تأسست الدولة السعودية الأولى. بفضل رؤيتك، تحولت القبائل المتناحرة إلى كيان سياسي مهاب، وعمّ الأمن أرجاء الجزيرة العربية بعد عقود من الفوضى." },
                        { t: "حماية حدود الدرعية فقط عسكرياً", r: "⚠️ نجاح محدود ومؤقت. استطعت حماية مدينتك لسنوات، لكن نجد ظلت غارقة في الصراعات، وضاعت فرصة بناء دولة كبرى تجمع الكلمة وترفع راية العلم." }
                    ],
                    bio: "هو الإمام محمد بن سعود بن محمد بن مقرن، مؤسس الدولة السعودية الأولى وعميد أسرة آل سعود.\n\nوُلد في الدرعية عام 1697م ونشأ في بيت إمارة وعلم. تولى الحكم في عام 1727م في مرحلة انتقالية هامة.\n\nيُعد الإمام محمد بن سعود رجل دولة من الطراز الرفيع، حيث اشتهر بالحكمة، والعدل، والشجاعة. نجح في تحويل الدرعية من مدينة صغيرة إلى عاصمة لكيان سياسي عظيم جمع شتات القبائل العربية تحت راية واحدة لأول مرة منذ قرون.\n\nقام ببناء 'حي الطرفية' ليكون مركزاً للحكم، واهتم بتأمين طرق الحج والتجارة، مما أدى لنهضة اقتصادية وعلمية كبرى استقطبت العلماء والمفكرين، وأرسى قواعد الدولة التي استمر أثرها لقرون."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    title: "The Eternal Diriyah Pact (1727)",
                    quest: "The year is 1727. Diriyah is an oasis in Najd, but the region is plagued by fragmentation and conflict.\n\nAs a young leader, you realize that true strength lies in unity based on justice and knowledge. Will you sign a historic pact to unite the tribes, or focus only on local defense?",
                    choices: [
                        { t: "Sign the Unity Pact", r: "✅ Historic Victory! Your decision established the First Saudi State, bringing security after decades of chaos." },
                        { t: "Focus on Local Defense Only", r: "⚠️ Limited Success. You protected your city, but the region remained fragmented and the opportunity for greatness was missed." }
                    ],
                    bio: "Imam Muhammad bin Saud (1697–1765) was the visionary founder of the First Saudi State.\n\nBorn in Diriyah, he grew up in a household of leadership and learning. Taking power in 1727, he was a statesman known for his wisdom, justice, and bravery.\n\nHe successfully transformed Diriyah from a small oasis into the capital of a grand political entity, unifying the Arabian tribes for the first time in centuries.\n\nHe built the 'At-Tarafiyah' district as a governance hub and secured pilgrimage routes, leading to an economic and educational renaissance that defined the region's future."
                }
            },
            turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    title: "سيف الأجرب واستعادة الحق",
                    quest: "بعد سقوط الدرعية الأليم، ظن الجميع أن آل سعود قد غابوا عن المشهد للأبد. الرياض ترزح تحت وطأة الحاميات الأجنبية.\n\nخرجت أنت من مغارة 'عليا' وحيداً بسيفك 'الأجرب'. القرار المصيري بيدك الآن:\n\nهل تباغت الحصون في الرياض بعملية جريئة رغم قلة رجالك، أم تبتعد لسنوات طويلة لجمع الأنصار والعتاد خوفاً من قوة العدو؟",
                    choices: [
                        { t: "باغت الرياض بسيف الأجرب فوراً", r: "✅ عودة الفارس المظفر! استعدت الرياض وجعلتها عاصمة للدولة السعودية الثانية. سيفك 'الأجرب' أصبح رمزاً لاسترداد السيادة، وبنيت دولة قوية أعادت العدل والهيبة." },
                        { t: "الانسحاب لجمع الأنصار لسنوات", r: "❌ ضياع اللحظة التاريخية. استغل المحتلون تأخرك وقاموا بتحصين الرياض بمدافع إضافية، مما جعل مهمة التحرير لاحقاً شبه مستحيلة." }
                    ],
                    bio: "هو الإمام تركي بن عبدالله بن محمد آل سعود، مؤسس الدولة السعودية الثانية ومسترد الملك.\n\nبعد سقوط الدرعية، لم يستسلم لليأس، بل لجأ إلى مغارة 'عليا' ليخطط لعودة الحكم بذكاء وهدوء.\n\nاشتهر بسيفه الأسطوري 'الأجرب' الذي كان رفيقه في رحلة التحرير وبات رمزاً وطنياً للقوة والسيادة.\n\nفي عام 1824م، نجح بذكاء عسكري فذ في تحرير الرياض بجيش صغير لكنه عظيم الإيمان. يُعرف الإمام تركي بعدله المطلق بين الرعية وزهده وشجاعته النادرة، وهو الذي جعل من الرياض عاصمة دائمة للدولة."
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    title: "The Sword of Al-Ajrab",
                    quest: "After the fall of Diriyah, Riyadh was occupied. You emerged from the 'Alia' cave alone with your sword.\n\nWill you launch a surprise attack on Riyadh now despite having few men, or retreat for years to gather a massive army?",
                    choices: [
                        { t: "Attack Riyadh with Al-Ajrab", r: "✅ The Hero's Return! You recaptured Riyadh and established the Second Saudi State. Your sword became a symbol of national sovereignty." },
                        { t: "Retreat to Gather Forces", r: "❌ Opportunity Lost. The occupiers reinforced Riyadh, making future liberation almost impossible." }
                    ],
                    bio: "Imam Turki bin Abdullah (1755–1834) was the founder of the Second Saudi State.\n\nAfter the fall of Diriyah, he refused to surrender and planned his return from the 'Alia' cave. He was famous for his legendary sword 'Al-Ajrab.'\n\nIn 1824, through brilliant military tactics, he liberated Riyadh with a small but determined force. Known for his absolute justice and modesty, he established Riyadh as the permanent capital."
                }
            },
            aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    title: "فجر المصمك وتوحيد المملكة",
                    quest: "ليلة الخامس عشر من يناير عام 1902م، تقف أنت يا عبدالعزيز مع 63 رجلاً فقط أمام قصر المصمك الحصين.\n\nالفجر يوشك على البزوغ والفرصة التاريخية قد تضيع للأبد. هل تقتحم الحصن الآن بقلب لا يعرف الخوف لتسترد ملك أجدادك وتعلن فجر عهد جديد، أم تنسحب وتنتظر لسنوات أخرى طلباً للمدد؟",
                    choices: [
                        { t: "اقتحم المصمك مع خيوط الفجر", r: "✅ الله أكبر! بفتحة المصمك، أعلنت للعالم أن 'الملك لله ثم لعبدالعزيز'. بدأت منذ تلك اللحظة ملحمة توحيد المملكة العربية السعودية، وحولت الشتات إلى وطن عظيم وقوة عالمية." },
                        { t: "التراجع لانتظار المدد الخارجي", r: "❌ تبدد الحلم الكبير. كشف الأعداء أمركم وشددوا الحراسة، وظل ملك آبائك بعيد المنال لسنوات طويلة، وبقي الوطن يعاني من الانقسام." }
                    ],
                    bio: "هو الملك عبدالعزيز بن عبدالرحمن بن فيصل آل سعود، المؤسس العظيم للمملكة العربية السعودية الحديثة.\n\nوُلد في الرياض عام 1876م، وانطلق في رحلة استعادة ملك آبائه وهو في ريعان شبابه بـ 63 رجلاً فقط.\n\nفي فجر 15 يناير 1902م، نجح في فتح حصن المصمك، وهي اللحظة التي غيرت تاريخ المنطقة. قضى 30 عاماً من الكفاح لتوحيد أجزاء المملكة، محولاً الصراعات إلى وحدة وطنية صلبة.\n\nاشتهر بالدهاء السياسي، والكرم، والعفو عند المقدرة. أسس أول وزارة خارجية ودخل عصر النفط والنهضة الحديثة، تاركاً خلفه وطناً قوياً ومستقراً."
                },
                en: {
                    name: "King Abdulaziz",
                    title: "The Dawn of Masmak",
                    quest: "January 15, 1902. You stand with 63 men before Masmak Fortress. Will you storm the fortress now to reclaim your throne, or withdraw and wait for support?",
                    choices: [
                        { t: "Storm Masmak at Dawn", r: "✅ Victory! You declared 'The Kingdom is for God, then Abdulaziz,' starting the journey to unify Saudi Arabia and build a modern nation." },
                        { t: "Withdraw and Wait", r: "❌ The Dream Faded. The enemies discovered you, and Riyadh remained lost for many years." }
                    ],
                    bio: "King Abdulaziz Al Saud (1876–1953) was the legendary founder of the modern Kingdom of Saudi Arabia.\n\nBorn in Riyadh, he embarked on his mission with only 63 followers. In 1902, he successfully captured Masmak Fortress, a moment that birthed a new nation.\n\nHe spent 30 years unifying the Kingdom, transforming fragmentation into solid national unity. Known for his political savvy and mercy, he led the nation into the oil era and established modern institutions."
                }
            }
        };

        // --- محرك الوظائف البرمجية ---

        function setAppLanguage(lang) {
            currentLang = lang;
            const t = Interface[lang];
            
            // ضبط الاتجاه واللغة
            document.documentElement.lang = lang;
            document.documentElement.dir = t.dir;
            
            // تحديث النصوص الثابتة
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-desc').innerText = t.desc;
            document.getElementById('btn-start').innerText = t.start;
            document.getElementById('btn-lore').innerText = t.lore;
            document.getElementById('txt-hero-head').innerText = t.choose;
            document.getElementById('lnk-home').innerText = t.home;
            document.getElementById('lnk-cancel').innerText = t.cancel;
            document.getElementById('txt-res-head').innerText = t.judge;
            document.getElementById('lnk-res-home').innerText = t.home;
            document.getElementById('txt-lore-head').innerText = t.records;
            document.getElementById('lnk-lore-back').innerText = t.home;
            document.getElementById('lnk-bio-back').innerText = t.backLore;

            // تحديث حالة الأزرار
            document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            // إعادة بناء القوائم
            buildHeroScreen();
        }

        function navTo(id) {
            const wrapper = document.getElementById('scroll-target');
            const screens = document.querySelectorAll('.screen');
            
            // إخفاء الشاشات الحالية
            screens.forEach(s => {
                s.classList.remove('fade-in');
                setTimeout(() => s.style.display = 'none', 300);
            });

            // إظهار الشاشة المطلوبة
            setTimeout(() => {
                const target = document.getElementById(id);
                wrapper.scrollTop = 0;
                target.style.display = 'block';
                setTimeout(() => target.classList.add('fade-in'), 50);
            }, 350);
        }

        function buildHeroScreen() {
            const list = document.getElementById('hero-list');
            list.innerHTML = '';
            
            for(let key in Characters) {
                const btn = document.createElement('button');
                btn.className = 'btn-action';
                btn.innerText = Characters[key][currentLang].name;
                btn.onclick = () => launchMission(key);
                list.appendChild(btn);
            }
        }

        function launchMission(key) {
            const char = Characters[key][currentLang];
            document.getElementById('ui-mission-title').innerText = char.title;
            document.getElementById('ui-mission-desc').innerText = char.quest;
            
            // تشغيل الصوت (اختياري)
            if(audioPlayer) audioPlayer.pause();
            audioPlayer = new Audio(`${key}_${currentLang}.mp3`);
            audioPlayer.play().catch(() => console.log("Audio not provided"));

            const area = document.getElementById('ui-btns-area');
            area.innerHTML = '';
            
            char.choices.forEach(choice => {
                const cb = document.createElement('button');
                cb.className = 'btn-action';
                cb.innerText = choice.t;
                cb.onclick = () => {
                    document.getElementById('ui-result-body').innerText = choice.r;
                    if(audioPlayer) audioPlayer.pause();
                    navTo('scr-result');
                };
                area.appendChild(cb);
            });
            
            navTo('scr-mission');
        }

        function showLore() {
            const container = document.getElementById('ui-lore-list');
            container.innerHTML = '';
            
            for(let key in Characters) {
                const btn = document.createElement('button');
                btn.className = 'btn-action';
                btn.innerText = Characters[key][currentLang].name;
                btn.onclick = () => {
                    document.getElementById('ui-bio-name').innerText = Characters[key][currentLang].name;
                    document.getElementById('ui-bio-text').innerText = Characters[key][currentLang].bio;
                    navTo('scr-bio');
                };
                container.appendChild(btn);
            }
            navTo('scr-lore');
        }

        function stopAudioAndGoBack() {
            if(audioPlayer) audioPlayer.pause();
            navTo('scr-heroes');
        }

        // --- محرك الأنيميشن (Background) ---
        const canvas = document.getElementById('sand-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = [];
            for(let i=0; i<120; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5,
                    v: Math.random() * 0.3 + 0.1
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(193, 163, 95, 0.3)";
            dots.forEach(d => {
                d.y -= d.v;
                if(d.y < 0) d.y = canvas.height;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        window.onresize = initParticles;
        initParticles();
        drawParticles();

        // تشغيل التطبيق
        setAppLanguage('ar');

    </script>
</body>
</html>
