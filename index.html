<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | النسخة الكاملة</title>
    
    <style>
        :root {
            --saudi-green: #006C35; 
            --light-green: #00843D;
            --glow-green: #22C55E;
            --deep-green: #062113;
            --forest-black: #010a05;
            --glass-bg: rgba(0, 30, 15, 0.96); 
            --glass-border: rgba(34, 197, 94, 0.45);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body, html {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--deep-green) 0%, var(--forest-black) 100%);
            color: #ffffff; font-family: var(--font-main);
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        .screen { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .screen.active { display: block; opacity: 1; }

        #titan-engine-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

        .language-hub { position: fixed; top: 15px; left: 15px; z-index: 1000; display: flex; gap: 8px; }
        .lang-btn {
            background: rgba(0, 40, 20, 0.9); border: 1px solid var(--glow-green);
            color: var(--glow-green); padding: 6px 12px; border-radius: 20px;
            cursor: pointer; font-weight: 900; transition: 0.3s; font-size: 0.75rem;
        }
        .lang-btn.active { background: var(--saudi-green); color: #fff; box-shadow: 0 0 15px var(--glow-green); }

        .app-container {
            position: relative; z-index: 100; width: 90%; max-width: 440px;
            background: var(--glass-bg); backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border); border-top: 6px solid var(--saudi-green);
            border-radius: 30px; padding: 30px 20px; text-align: center;
            box-shadow: 0 60px 120px rgba(0,0,0,0.8); max-height: 85vh; 
            overflow-y: auto; scrollbar-width: none;
        }
        .app-container::-webkit-scrollbar { display: none; }

        .main-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 12px; text-shadow: 0 0 15px var(--glow-green); }
        .description-text { font-size: 0.9rem; line-height: 1.5; color: #bbb; margin-bottom: 25px; }

        .btn-epic {
            position: relative; width: 100%; padding: 15px; margin-bottom: 12px;
            background: linear-gradient(135deg, var(--saudi-green), var(--deep-green));
            border: 1px solid var(--glow-green); border-radius: 15px;
            color: #ffffff; font-size: 0.95rem; font-weight: 800; cursor: pointer; 
            transition: 0.3s;
        }
        .btn-epic:hover { transform: scale(1.02); background: var(--light-green); }

        .lore-box {
            background: rgba(0, 0, 0, 0.5); border-radius: 20px; padding: 25px;
            margin: 15px 0; text-align: justify; line-height: 1.8; font-size: 0.95rem;
            color: #f0f0f0; border-right: 8px solid var(--saudi-green);
            white-space: pre-line;
        }
        [dir="ltr"] .lore-box { border-right: 0; border-left: 8px solid var(--saudi-green); }

        .back-nav { display: inline-block; margin-top: 15px; color: var(--glow-green); cursor: pointer; font-weight: 800; font-size: 0.85rem; }
    </style>
</head>
<body>

    <canvas id="titan-engine-canvas"></canvas>

    <div class="language-hub">
        <div id="btn-ar" class="lang-btn active" onclick="setGlobalLang('ar')">AR</div>
        <div id="btn-en" class="lang-btn" onclick="setGlobalLang('en')">EN</div>
    </div>

    <div class="app-container" id="app-scroller">
        <div id="screen-gate" class="screen active">
            <h1 class="main-title" id="t-gate-h">ملاحم التأسيس</h1>
            <p class="description-text" id="t-gate-d">واجه مصيرك في تاريخ المجد السعودي.</p>
            <button class="btn-epic" id="t-btn-start" onclick="navigateTo('screen-selection')">ابدأ الرحلة</button>
            <button class="btn-epic" id="t-btn-archive" onclick="navigateTo('screen-archive')">الأرشيف</button>
        </div>

        <div id="screen-selection" class="screen">
            <h1 class="main-title" id="t-select-h">اختر القائد</h1>
            <div id="hero-injection-point"></div>
            <a class="back-nav" id="t-back-main" onclick="navigateTo('screen-gate')">رجوع</a>
        </div>

        <div id="screen-scenarios" class="screen">
            <h1 class="main-title" id="t-scen-h">اختر الموقف</h1>
            <div id="scenario-injection-point"></div>
            <a class="back-nav" id="t-back-hero" onclick="navigateTo('screen-selection')">تغيير القائد</a>
        </div>

        <div id="screen-quest" class="screen">
            <h1 id="quest-title-header" style="color: var(--glow-green); font-size: 1.3rem; margin-bottom: 15px;"></h1>
            <div id="quest-content-box" class="lore-box"></div>
            <div id="quest-actions-container"></div>
            <a class="back-nav" id="t-back-scen" onclick="navigateTo('screen-scenarios')">تراجع</a>
        </div>

        <div id="screen-result" class="screen">
            <h1 class="main-title" id="t-res-h">حكم التاريخ</h1>
            <div id="result-text-box" class="lore-box"></div>
            <button class="btn-epic" id="t-btn-retry" onclick="navigateTo('screen-quest')">تجربة قرار آخر</button>
            <a class="back-nav" id="t-back-home" onclick="navigateTo('screen-scenarios')">العودة للمواقف</a>
        </div>

        <div id="screen-archive" class="screen">
            <h1 class="main-title" id="t-arch-h">سجل الخالدين</h1>
            <div id="arch-injection-point"></div>
            <a class="back-nav" id="t-back-arch" onclick="navigateTo('screen-gate')">الرجوع</a>
        </div>

        <div id="screen-biography" class="screen">
            <h1 id="bio-hero-name" class="main-title"></h1>
            <div id="bio-content-box" class="lore-box" style="font-size: 0.9rem;"></div>
            <a class="back-nav" id="t-back-bio" onclick="navigateTo('screen-archive')">العودة للسجل</a>
        </div>
    </div>

    <script>
        const EPIC_DATA = {
            m_saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    scenarios: [
                        {
                            title: "ميثاق الدرعية (1744م)",
                            story: "وصل الشيخ محمد بن عبدالوهاب للدرعية باحثاً عن نصرة لدعوة الإصلاح. هل تعقد ميثاقاً يؤسس لدولة التوحيد؟",
                            decisions: [
                                { l: "عقد الميثاق ونصرة الدولة", f: "✅ بقرارك ولدت الدولة السعودية الأولى وتحولت الدرعية لعاصمة إقليمية." },
                                { l: "تأمين الشيخ دون تحالف سياسي", f: "⚠️ غابت القوة الموحدة التي تحمي الدعوة وتوحد القبائل." }
                            ]
                        },
                        {
                            title: "تأمين طرق التجارة",
                            story: "الدرعية تنمو اقتصادياً، لكن القوافل تتعرض للنهب. هل تسير جيوشاً لتأمين الطرق أم تكتفي بحماية حدود المدينة؟",
                            decisions: [
                                { l: "تأمين طرق القوافل بجيش قوي", f: "✅ ازدهرت التجارة وأصبحت الدرعية مركزاً اقتصادياً آمناً للجميع." },
                                { l: "الاكتفاء بحماية أسوار المدينة", f: "❌ تضررت التجارة وضعف نفوذ الدولة خارج العاصمة." }
                            ]
                        }
                    ],
                    biography: "مؤسس الدولة السعودية الأولى وباني نهضتها السياسية..."
                },
                en: { 
                    name: "Imam Muhammad bin Saud", 
                    scenarios: [
                        {
                            title: "The Diriyah Pact (1744)",
                            story: "Sheikh Muhammad bin Abdul Wahab arrived seeking support. Will you form a pact to establish the state?",
                            decisions: [
                                { l: "Form the Pact", f: "✅ The First Saudi State was born from this historic decision." },
                                { l: "Provide safety without alliance", f: "⚠️ Lacking political unity, the movement struggled to expand." }
                            ]
                        },
                        {
                            title: "Securing Trade Routes",
                            story: "Diriyah is growing, but caravans are being looted. Will you send troops to secure routes?",
                            decisions: [
                                { l: "Send troops to secure routes", f: "✅ Trade flourished and Diriyah became a safe economic hub." },
                                { l: "Protect only the city walls", f: "❌ Trade suffered and the state's influence remained limited." }
                            ]
                        }
                    ], 
                    biography: "The founder of the First Saudi State..." 
                }
            },
            i_turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    scenarios: [
                        {
                            title: "استعادة الرياض (1824م)",
                            story: "تقود المقاومة ومعك سيفك 'الأجرب'. هل تباغت الحصن بـ 40 رجلاً فقط لاستعادة ملك الأجداد؟",
                            decisions: [
                                { l: "قيادة هجوم فدائي مباغت", f: "✅ نصر من الله! استعدت الرياض وأعلنت قيام الدولة السعودية الثانية." },
                                { l: "الانتظار لجمع جيش ضخم", f: "⚠️ استغرق الأمر سنوات إضافية وزاد العدو من تحصيناته." }
                            ]
                        },
                        {
                            title: "بناء قصر الحكم",
                            story: "الرياض عادت، لكنها تحتاج لرمز سياسي. هل تبدأ ببناء قصر الحكم وتجديد السور فوراً؟",
                            decisions: [
                                { l: "بناء القصر وتجديد السور", f: "✅ استقرت الإدارة وعادت الهيبة للدولة السعودية الثانية." },
                                { l: "تأجيل البناء لحين استقرار الموارد", f: "⚠️ غياب المركزية جعل القرارات الإدارية أبطأ في البداية." }
                            ]
                        }
                    ],
                    biography: "مؤسس الدولة السعودية الثانية وبطل سيف الأجرب..."
                },
                en: { 
                    name: "Imam Turki bin Abdullah", 
                    scenarios: [
                        {
                            title: "Restoring Riyadh (1824)",
                            story: "With only 40 men and your sword 'Al-Ajrab', will you surprise the fort to reclaim your heritage?",
                            decisions: [
                                { l: "Lead a surprise attack", f: "✅ Success! The Second Saudi State began." },
                                { l: "Wait for a larger army", f: "⚠️ Delaying led to years of further struggle." }
                            ]
                        },
                        {
                            title: "Building Justice Palace",
                            story: "Riyadh is back. Should you build the Justice Palace and renew the walls immediately?",
                            decisions: [
                                { l: "Build the palace and walls", f: "✅ Stability was achieved and the state's prestige returned." },
                                { l: "Delay building", f: "⚠️ Administrative decisions became slower without a central hub." }
                            ]
                        }
                    ], 
                    biography: "The founder of the Second Saudi State..." 
                }
            },
            k_aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    scenarios: [
                        {
                            title: "فتح المصمك (1902م)",
                            story: "أنت الشاب عبد العزيز بـ 63 رجلاً عند أسوار الرياض. هل تباغت الحصن عند الفجر؟",
                            decisions: [
                                { l: "اقتحام المصمك عند الفجر", f: "✅ 'الملك لله ثم لعبد العزيز!' سقط المصمك وبدأت ملحمة التوحيد." },
                                { l: "الانسحاب لطلب الدعم", f: "❌ ضاعت فرصة المباغتة وظلت الرياض بعيدة لسنوات." }
                            ]
                        },
                        {
                            title: "توحيد الحجاز (1924م)",
                            story: "بعد نجد، الحجاز يمر بظروف صعبة. هل تدخل مكة بملابس الإحرام سلماً لتجنب إراقة الدماء؟",
                            decisions: [
                                { l: "الدخول بملابس الإحرام سلماً", f: "✅ دخلت مكة بسلام، وكسبت قلوب المسلمين في كل مكان." },
                                { l: "استخدام القوة العسكرية المباشرة", f: "⚠️ الموقف كان سيزداد تعقيداً وقد تتضرر الأماكن المقدسة." }
                            ]
                        }
                    ],
                    biography: "مؤسس المملكة العربية السعودية الحديثة..."
                },
                en: { 
                    name: "King Abdulaziz", 
                    scenarios: [
                        {
                            title: "Storming Al-Masmak (1902)",
                            story: "With 63 men, will you storm the fort at dawn to change history?",
                            decisions: [
                                { l: "Storm Al-Masmak", f: "✅ Success! The journey to unify Saudi Arabia began." },
                                { l: "Withdraw and wait", f: "❌ The opportunity was lost, delaying unity for years." }
                            ]
                        },
                        {
                            title: "Unifying Hejaz (1924)",
                            story: "Hejaz is next. Will you enter Makkah peacefully wearing Ihram to avoid bloodshed?",
                            decisions: [
                                { l: "Enter peacefully in Ihram", f: "✅ Makkah was entered peacefully, winning hearts worldwide." },
                                { l: "Use direct military force", f: "⚠️ The situation would have been more complex and risky." }
                            ]
                        }
                    ], 
                    biography: "The founder of modern Saudi Arabia..." 
                }
            }
        };

        const LOCALIZATION = {
            ar: { 
                g_h: "ملاحم التأسيس", g_d: "واجه مصيرك في تاريخ المجد السعودي.", s_h: "اختر القائد", sc_h: "اختر الموقف", r_h: "حكم التاريخ", a_h: "سجل الخالدين", 
                start_btn: "ابدأ الرحلة", arch_btn: "الأرشيف", retry_btn: "تجربة قرار آخر", back_main: "رجوع", back_hero: "تغيير القائد", back_scen: "تراجع", back_arch: "الرجوع", back_bio: "العودة للسجل", back_home: "العودة للمواقف", dir: "rtl" 
            },
            en: { 
                g_h: "Founding Epics", g_d: "Face your destiny in Saudi history.", s_h: "Select Leader", sc_h: "Select Scenario", r_h: "History's Verdict", a_h: "Archive of Heroes", 
                start_btn: "Start Journey", arch_btn: "Archive", retry_btn: "Try another decision", back_main: "Back", back_hero: "Change Leader", back_scen: "Go Back", back_arch: "Back", back_bio: "Back to Archive", back_home: "Back to Scenarios", dir: "ltr" 
            }
        };

        let currentLanguage = 'ar';
        let selectedHeroKey = null;
        let currentScenarioIndex = null;

        function setGlobalLang(l) {
            currentLanguage = l;
            const t = LOCALIZATION[l];
            document.documentElement.lang = l;
            document.documentElement.dir = t.dir;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + l).classList.add('active');

            document.getElementById('t-gate-h').innerText = t.g_h;
            document.getElementById('t-gate-d').innerText = t.g_d;
            document.getElementById('t-btn-start').innerText = t.start_btn;
            document.getElementById('t-btn-archive').innerText = t.arch_btn;
            document.getElementById('t-select-h').innerText = t.s_h;
            document.getElementById('t-scen-h').innerText = t.sc_h;
            document.getElementById('t-res-h').innerText = t.r_h;
            document.getElementById('t-arch-h').innerText = t.a_h;
            document.getElementById('t-btn-retry').innerText = t.retry_btn;
            
            document.getElementById('t-back-main').innerText = t.back_main;
            document.getElementById('t-back-hero').innerText = t.back_hero;
            document.getElementById('t-back-scen').innerText = t.back_scen;
            document.getElementById('t-back-arch').innerText = t.back_arch;
            document.getElementById('t-back-bio').innerText = t.back_bio;
            document.getElementById('t-back-home').innerText = t.back_home;

            rebuildInteractiveGrids();
        }

        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
            const target = document.getElementById(screenId);
            target.style.display = 'block';
            setTimeout(() => { target.classList.add('active'); }, 10);
            document.getElementById('app-scroller').scrollTop = 0;
        }

        function rebuildInteractiveGrids() {
            const hPoint = document.getElementById('hero-injection-point');
            const aPoint = document.getElementById('arch-injection-point');
            hPoint.innerHTML = ''; aPoint.innerHTML = '';

            Object.keys(EPIC_DATA).forEach(key => {
                const hBtn = document.createElement('button');
                hBtn.className = 'btn-epic';
                hBtn.innerText = EPIC_DATA[key][currentLanguage].name;
                hBtn.onclick = () => showScenarios(key);
                hPoint.appendChild(hBtn);

                const aBtn = document.createElement('button');
                aBtn.className = 'btn-epic';
                aBtn.innerText = EPIC_DATA[key][currentLanguage].name;
                aBtn.onclick = () => {
                    document.getElementById('bio-hero-name').innerText = EPIC_DATA[key][currentLanguage].name;
                    document.getElementById('bio-content-box').innerText = EPIC_DATA[key][currentLanguage].biography;
                    navigateTo('screen-biography');
                };
                aPoint.appendChild(aBtn);
            });
        }

        function showScenarios(heroKey) {
            selectedHeroKey = heroKey;
            const sPoint = document.getElementById('scenario-injection-point');
            sPoint.innerHTML = '';
            EPIC_DATA[heroKey][currentLanguage].scenarios.forEach((sc, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = sc.title;
                btn.onclick = () => loadQuest(index);
                sPoint.appendChild(btn);
            });
            navigateTo('screen-scenarios');
        }

        function loadQuest(scIndex) {
            currentScenarioIndex = scIndex;
            const sc = EPIC_DATA[selectedHeroKey][currentLanguage].scenarios[scIndex];
            document.getElementById('quest-title-header').innerText = sc.title;
            document.getElementById('quest-content-box').innerText = sc.story;
            const aContainer = document.getElementById('quest-actions-container');
            aContainer.innerHTML = '';
            sc.decisions.forEach(dec => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = dec.l;
                btn.onclick = () => {
                    document.getElementById('result-text-box').innerText = dec.f;
                    navigateTo('screen-result');
                };
                aContainer.appendChild(btn);
            });
            navigateTo('screen-quest');
        }

        const canvas = document.getElementById('titan-engine-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        class P {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2; this.vx = (Math.random()-0.5)*0.2; this.vy = (Math.random()-0.5)*0.2; }
            u() { this.x+=this.vx; this.y+=this.vy; if(this.x>canvas.width||this.x<0)this.vx*=-1; if(this.y>canvas.height||this.y<0)this.vy*=-1; }
            d() { ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fillStyle='#22C55E'; ctx.globalAlpha=0.15; ctx.fill(); }
        }
        function init() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; particles=[]; for(let i=0;i<150;i++) particles.push(new P()); }
        function loop() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.u();p.d();}); requestAnimationFrame(loop); }
        window.onresize=init; init(); loop(); setGlobalLang('ar');
    </script>
</body>
</html>
