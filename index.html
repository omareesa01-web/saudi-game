<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | رحلة عبر الزمن</title>
    
    <style>
        /* --- 1. إعدادات الخطوط والمتغيرات الأساسية --- */
        :root {
            --primary-gold: #c1a35f;
            --light-gold: #f3cf7a;
            --deep-green: #05160d;
            --overlay-black: rgba(0, 0, 0, 0.94);
            --border-glow: rgba(193, 163, 95, 0.6);
            --sword-slash-color: linear-gradient(90deg, transparent, #fff, var(--light-gold), transparent);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --transition-smooth: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- 2. تنسيق الهيكل العام للموقع --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--deep-green);
            background-image: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            color: #ffffff;
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 3. محرك الرمل المتحرك (Sand Animation Canvas) --- */
        #sand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.9;
        }

        /* --- 4. واجهة تبديل اللغات --- */
        .language-container {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 2000;
            display: flex;
            gap: 15px;
        }

        .lang-node {
            background: rgba(0,0,0,0.8);
            border: 2px solid var(--primary-gold);
            color: var(--light-gold);
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            transition: var(--transition-smooth);
            backdrop-filter: blur(15px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }

        .lang-node:hover {
            background: var(--primary-gold);
            color: #000;
            transform: scale(1.1);
        }

        .lang-node.active {
            background: var(--primary-gold);
            color: #000;
            box-shadow: 0 0 25px var(--primary-gold);
        }

        /* --- 5. الحاوية الزجاجية الكبرى (Main App Wrapper) --- */
        .glass-box {
            position: relative;
            z-index: 100;
            width: 92%;
            max-width: 720px;
            background: var(--overlay-black);
            backdrop-filter: blur(35px);
            border: 2px solid var(--primary-gold);
            border-radius: 30px;
            padding: 45px;
            text-align: center;
            box-shadow: 0 80px 180px rgba(0, 0, 0, 1);
            max-height: 88vh;
            overflow-y: auto;
        }

        /* --- 6. تخصيص السكرول بار --- */
        .glass-box::-webkit-scrollbar { width: 6px; }
        .glass-box::-webkit-scrollbar-thumb { background: var(--primary-gold); border-radius: 10px; }

        /* --- 7. أنظمة الشاشات والتحريك --- */
        .app-screen {
            display: none;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.7s ease;
        }

        .app-screen.visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* --- 8. العناوين والنصوص --- */
        .royal-title {
            font-size: 2.6rem;
            color: var(--primary-gold);
            margin-bottom: 20px;
            font-weight: 900;
            text-shadow: 0 5px 15px rgba(0,0,0,0.9);
        }

        .royal-desc {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 40px;
            line-height: 1.9;
        }

        /* --- 9. أزرار الأكشن مع تأثير "ضربة السيف" --- */
        .sword-btn {
            position: relative;
            width: 100%;
            background: linear-gradient(145deg, rgba(193, 163, 95, 0.1), rgba(0,0,0,0.4));
            border: 1.5px solid var(--primary-gold);
            padding: 20px;
            border-radius: 15px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s ease;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sword-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: var(--sword-slash-color);
            transform: skewX(-45deg);
        }

        .sword-btn:hover::after {
            left: 150%;
            transition: 0.45s ease-in-out;
        }

        .sword-btn:hover {
            background: rgba(193, 163, 95, 0.25);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(193, 163, 95, 0.3);
        }

        /* --- 10. لوحات النصوص التاريخية --- */
        .history-panel {
            background: rgba(255, 255, 255, 0.04);
            padding: 30px;
            border-radius: 20px;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.15rem;
            border-right: 8px solid var(--primary-gold);
            margin: 30px 0;
            color: #f0f0f0;
            white-space: pre-line;
        }

        [dir="ltr"] .history-panel {
            border-right: 0;
            border-left: 8px solid var(--primary-gold);
        }

        /* --- 11. الروابط الملاحية --- */
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--light-gold);
            text-decoration: none;
            font-weight: 800;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .back-link:hover { color: #fff; border-bottom-color: var(--primary-gold); }

    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="language-container">
        <div id="lang-ar" class="lang-node active" onclick="switchSystemLanguage('ar')">العربية</div>
        <div id="lang-en" class="lang-node" onclick="switchSystemLanguage('en')">English</div>
    </div>

    <div class="glass-box" id="main-view">
        
        <div id="screen-home" class="app-screen visible">
            <h1 class="royal-title" id="ui-title">ملاحم التأسيس</h1>
            <p class="royal-desc" id="ui-welcome">مشروع الطالب: عمر - تقنية رقمية</p>
            <button class="sword-btn" id="btn-enter" onclick="navigateTo('screen-heroes')">دخول الملحمة</button>
            <button class="sword-btn" id="btn-history" onclick="renderLoreList()">سير الأبطال والخالدين</button>
        </div>

        <div id="screen-heroes" class="app-screen">
            <h1 class="royal-title" id="ui-choose">اختر القائد</h1>
            <div id="hero-injection-point"></div>
            <a class="back-link" onclick="navigateTo('screen-home')">رجوع</a>
        </div>

        <div id="screen-quest" class="app-screen">
            <h1 id="quest-header" style="color: var(--light-gold);"></h1>
            <div id="quest-text" class="history-panel"></div>
            <div id="quest-options"></div>
            <a class="back-link" onclick="navigateTo('screen-heroes')">انسحاب</a>
        </div>

        <div id="screen-result" class="app-screen">
            <h1 class="royal-title" id="ui-verdict">حكم التاريخ</h1>
            <div id="result-text" class="history-panel"></div>
            <button class="sword-btn" onclick="navigateTo('screen-heroes')">جرب قراراً آخر</button>
            <a class="back-link" onclick="navigateTo('screen-home')">الرئيسية</a>
        </div>

        <div id="screen-lore" class="app-screen">
            <h1 class="royal-title">سجل الخالدين</h1>
            <div id="lore-injection-point"></div>
            <a class="back-link" onclick="navigateTo('screen-home')">رجوع</a>
        </div>

        <div id="screen-bio" class="app-screen">
            <h1 id="bio-name" class="royal-title"></h1>
            <div id="bio-full-text" class="history-panel"></div>
            <a class="back-link" onclick="navigateTo('screen-lore')">العودة للسجل</a>
        </div>

    </div>

    <script>
        let currentLanguage = 'ar';

        /**
         * قاعدة البيانات الكاملة - 3 خيارات لكل بطل
         */
        const DATA_STORE = {
            saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    title: "ميثاق الدرعية (1727م)",
                    quest: "أنت الآن حاكم الدرعية، نجد تعاني من التشتت والحروب. التاريخ يسألك: كيف ستبدأ رحلة بناء الدولة؟",
                    options: [
                        { t: "عقد ميثاق تاريخي مع الشيخ محمد بن عبدالوهاب", r: "✅ قرار عبقري! بهذا الميثاق جمعت بين القوة السياسية والدعوة العلمية، مما أسس الدولة السعودية الأولى لتكون أقوى كيان في تاريخ الجزيرة العربية." },
                        { t: "التركيز على تحصين أسوار الدرعية وتطوير الجيش فقط", r: "⚠️ قرار حذر. الدرعية أصبحت قلعة حصينة، لكنها ظلت مدينة مستقلة ولم تتحول إلى دولة كبرى تجمع شتات القبائل، فتأخرت الوحدة لسنوات." },
                        { t: "الانسحاب من النزاعات القبلية لضمان أمن مدينتك", r: "❌ قرار خاطئ. الانعزال جعل الدرعية هدفاً سهلاً للقوى المجاورة، وضاعت فرصة ذهبية لقيادة العرب نحو الوحدة والاستقرار." }
                    ],
                    bio: "مؤسس الدولة السعودية الأولى. جعل من الدرعية عاصمة للعلم والسياسة وبنى أول وحدة حقيقية في نجد منذ قرون."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    title: "Diriyah Pact (1727)",
                    quest: "You are the ruler of Diriyah. Najd is fragmented. How will you build a lasting state?",
                    options: [
                        { t: "Sign the Pact of Unity and Knowledge", r: "✅ Brilliant! This pact united politics and faith, launching the powerful First Saudi State." },
                        { t: "Focus solely on fortifying Diriyah", r: "⚠️ Cautious. Diriyah became safe, but the dream of a grand united nation was delayed." },
                        { t: "Withdraw from tribal conflicts", r: "❌ Mistake. Isolation made Diriyah vulnerable and lost the chance to lead the region's unity." }
                    ],
                    bio: "Founder of the First Saudi State. He established Diriyah as a center for leadership and security."
                }
            },
            turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    title: "استعادة الرياض (1824م)",
                    quest: "الرياض تحت الاحتلال الأجنبي. خرجت من مخبئك بسيفك 'الأجرب' ومعك عدد قليل من الرجال. ما هي خطتك؟",
                    options: [
                        { t: "مباغتة الحامية الأجنبية داخل الرياض ليلاً", r: "✅ انتصار مذهل! استعدت الرياض بشجاعتك، وأعلنت تأسيس الدولة السعودية الثانية التي أعادت السيادة والحق لآل سعود." },
                        { t: "الانتظار لسنوات في الجبال لجمع جيش ضخم", r: "⚠️ فرصة ضائعة. العدو استغل وقتك لتحصين الرياض بالمدافع، مما جعل استعادتها لاحقاً تكلف الكثير من الدماء." },
                        { t: "إرسال رسائل استمالة لزعماء الحامية للتفاوض", r: "❌ فشل ذريع. الحامية اعتبرت الرسائل ضعفاً، وقامت بتشديد الرقابة على الأهالي ونفيك بعيداً عن أرض أجدادك." }
                    ],
                    bio: "مؤسس الدولة السعودية الثانية. استرد ملك آبائه بسيفه الأسطوري 'الأجرب' وجعل الرياض عاصمة دائمة."
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    title: "Restoring Riyadh (1824)",
                    quest: "Riyadh is occupied. You have your sword 'Al-Ajrab'. What is your plan?",
                    options: [
                        { t: "Launch a surprise night raid", r: "✅ Victory! With courage, you reclaimed Riyadh and established the Second Saudi State." },
                        { t: "Wait for years to gather a massive army", r: "⚠️ Late. The enemy fortified the city, making the eventual liberation very costly." },
                        { t: "Negotiate with the occupiers", r: "❌ Failure. They saw it as weakness and tightened their grip on the people." }
                    ],
                    bio: "Founder of the Second Saudi State. He reclaimed his ancestors' throne with his legendary sword."
                }
            },
            aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    title: "فتح المصمك (1902م)",
                    quest: "أنت ورجالك الـ 63 أمام أسوار المصمك. التاريخ ينتظر كلمة منك قبل طلوع الفجر. ماذا ستقرر؟",
                    options: [
                        { t: "اقتحام المصمك مباشرة مع خيوط الفجر", r: "✅ 'الملك لله ثم لعبد العزيز!'.. بقرارك الجريء استعدت الرياض، وبدأت ملحمة توحيد المملكة العربية السعودية الحديثة." },
                        { t: "التراجع لمشارف الرياض وطلب مدد إضافي", r: "⚠️ قرار متأخر. كشف الأعداء أمركم في الصحراء، واضطررت للعودة للكويت والانتظار لفرصة أخرى بعد سنوات." },
                        { t: "فرض حصار على القصر لعدة أيام لإجبارهم على الاستسلام", r: "❌ خطة فاشلة. الحامية داخل المصمك تملك مؤناً لشهور، بينما رجالك في العراء بلا ماء، مما أدى لانسحابكم." }
                    ],
                    bio: "المؤسس العظيم للمملكة العربية السعودية. وحد القلوب والأرض وبنى وطناً شامخاً نفتخر به اليوم."
                },
                en: {
                    name: "King Abdulaziz",
                    title: "Opening of Masmak (1902)",
                    quest: "You are at the Masmak walls with 63 men. Dawn is coming. What is your call?",
                    options: [
                        { t: "Storm the fortress at dawn", r: "✅ Success! You reclaimed Riyadh and started the unification of the modern Kingdom." },
                        { t: "Withdraw and wait for more support", r: "⚠️ Delayed. The enemy discovered your tracks, and the opportunity was lost for years." },
                        { t: "Besiege the palace for days", r: "❌ Failed. The fort had supplies for months, while your men had none, forcing a retreat." }
                    ],
                    bio: "The Great Founder of Saudi Arabia. He unified the nation with wisdom and bravery."
                }
            }
        };

        // --- محرك الوظائف ---
        function navigateTo(id) {
            document.querySelectorAll('.app-screen').forEach(s => {
                s.classList.remove('visible');
                setTimeout(() => s.style.display = 'none', 500);
            });
            setTimeout(() => {
                const target = document.getElementById(id);
                target.style.display = 'block';
                setTimeout(() => target.classList.add('visible'), 50);
            }, 550);
        }

        function switchSystemLanguage(lang) {
            currentLanguage = lang;
            document.documentElement.lang = lang;
            document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
            document.getElementById('lang-ar').classList.toggle('active', lang === 'ar');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            renderHeroList();
        }

        function renderHeroList() {
            const container = document.getElementById('hero-injection-point');
            container.innerHTML = '';
            Object.keys(DATA_STORE).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'sword-btn';
                btn.innerText = DATA_STORE[key][currentLanguage].name;
                btn.onclick = () => startQuest(key);
                container.appendChild(btn);
            });
        }

        function startQuest(key) {
            const data = DATA_STORE[key][currentLanguage];
            document.getElementById('quest-header').innerText = data.title;
            document.getElementById('quest-text').innerText = data.quest;
            const optionsBox = document.getElementById('quest-options');
            optionsBox.innerHTML = '';
            data.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'sword-btn';
                b.innerText = opt.t;
                b.onclick = () => {
                    document.getElementById('result-text').innerText = opt.r;
                    navigateTo('screen-result');
                };
                optionsBox.appendChild(b);
            });
            navigateTo('screen-quest');
        }

        function renderLoreList() {
            const container = document.getElementById('lore-injection-point');
            container.innerHTML = '';
            Object.keys(DATA_STORE).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'sword-btn';
                btn.innerText = DATA_STORE[key][currentLanguage].name;
                btn.onclick = () => {
                    document.getElementById('bio-name').innerText = DATA_STORE[key][currentLanguage].name;
                    document.getElementById('bio-full-text').innerText = DATA_STORE[key][currentLanguage].bio;
                    navigateTo('screen-bio');
                };
                container.appendChild(btn);
            });
            navigateTo('screen-lore');
        }

        // Particle Engine
        const canvas = document.getElementById('sand-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = [];
            for(let i=0; i<300; i++) {
                dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2.5, v: Math.random()*0.4+0.1, o: Math.random()*0.7 });
            }
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            dots.forEach(d => {
                ctx.fillStyle=`rgba(193, 163, 95, ${d.o})`;
                d.y -= d.v; if(d.y < 0) d.y = canvas.height;
                ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        window.onresize = initParticles;
        initParticles(); draw(); renderHeroList();
    </script>
</body>
</html>
