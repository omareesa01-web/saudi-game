<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ملحمة التأسيس - النسخة الكاملة</title>
    <style>
        :root { --gold: #c1a35f; --dark: #052c19; --glass: rgba(0, 0, 0, 0.95); --sand: #d4b483; }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--dark); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        #dynamic-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; background-size: cover; background-position: center; transition: 1s; filter: brightness(0.3); }

        /* المجسمات المتحركة في الأسفل */
        .sand-floor { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: linear-gradient(to top, var(--sand), transparent); z-index: 10; opacity: 0.5; }
        .monument { position: fixed; bottom: 15px; width: 90px; z-index: 11; filter: drop-shadow(0 0 10px var(--gold)); transition: 3s ease-in-out; }
        #diriyah-model { right: 20px; animation: cloudMoveR 10s infinite alternate; }
        #riyadh-model { left: 20px; animation: cloudMoveL 10s infinite alternate; }

        @keyframes cloudMoveR { from { transform: translateX(0); } to { transform: translateX(30px); } }
        @keyframes cloudMoveL { from { transform: translateX(0); } to { transform: translateX(-30px); } }

        .screen { display: none; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 20px; text-align: center; }
        .active { display: flex; animation: fadeIn 0.7s forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--glass); border: 2px solid var(--gold); padding: 30px; border-radius: 25px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 50px black; }
        
        .option-btn { background: rgba(193, 163, 95, 0.15); border: 1px solid var(--gold); color: white; padding: 18px; margin: 10px 0; border-radius: 15px; cursor: pointer; width: 100%; font-size: 1.2rem; font-weight: bold; transition: 0.3s; }
        .option-btn:hover { background: var(--gold); color: black; }

        .result-box { display: none; padding: 20px; border-right: 5px solid var(--gold); background: rgba(255,255,255,0.05); margin-top: 15px; text-align: right; }
        .back-link { margin-top: 25px; color: var(--gold); cursor: pointer; font-weight: bold; display: block; text-decoration: none; }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>
    <div class="sand-floor"></div>

    <img src="https://cdn-icons-png.flaticon.com/512/8151/8151809.png" id="diriyah-model" class="monument" alt="الدرعية">
    <img src="https://cdn-icons-png.flaticon.com/512/3233/3233075.png" id="riyadh-model" class="monument" alt="الرياض">

    <div id="start-screen" class="screen active">
        <h1 style="font-size: 3rem; color: var(--gold); text-shadow: 0 0 15px var(--gold);">ملاحم التأسيس</h1>
        <button class="option-btn" style="width:280px" onclick="nav('game-screen')">ابدأ اللعب</button>
        <button class="option-btn" style="width:280px" onclick="nav('history-screen')">سجل الأبطال</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="card">
            <h1 id="g-title">اختر القائد</h1>
            <div id="g-desc" style="font-size: 1.2rem; margin-bottom: 20px;">حدد القائد لتبدأ المهمة التاريخية..</div>
            <div id="opt-cont">
                <button class="option-btn" onclick="playTask('saud')">الإمام محمد بن سعود</button>
                <button class="option-btn" onclick="playTask('turki')">الإمام تركي بن عبد الله</button>
                <button class="option-btn" onclick="playTask('abdulaziz')">الملك عبد العزيز</button>
            </div>
            <div id="res-box" class="result-box"></div>
            <a href="javascript:void(0)" class="back-link" onclick="location.reload()">العودة للرئيسية</a>
        </div>
    </div>

    <div id="history-screen" class="screen">
        <div class="card">
            <h1 id="h-title" style="color:var(--gold)">سجل الملاحم</h1>
            <div id="h-content" style="line-height: 1.8; text-align: justify; padding: 10px; font-size: 1.1rem;">اختر بطلاً لتعرف قصته الملحمية..</div>
            <div id="h-menu">
                <button class="option-btn" onclick="showStory('saud')">ملحمة التأسيس</button>
                <button class="option-btn" onclick="showStory('turki')">ملحمة الاستعادة</button>
                <button class="option-btn" onclick="showStory('abdulaziz')">ملحمة التوحيد</button>
            </div>
            <div id="audio-ui" style="display:none; margin-top:15px;">
                <button class="option-btn" style="border-style: dashed; background: rgba(255,255,255,0.1);" onclick="speak()">🔊 قراءة القصة صوتياً</button>
            </div>
            <a href="javascript:void(0)" class="back-link" onclick="nav('start-screen')">رجوع</a>
        </div>
    </div>

    <script>
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.speechSynthesis.cancel();
        }

        const db = {
            saud: {
                q: "تحدي الفكر: الدرعية في بدايتها تحتاج لميثاق يجمع القلوب، ماذا تقرر؟",
                img: "https://images.unsplash.com/photo-1590038767624-dac5740a997b?q=80&w=1000",
                opt: [
                    {t:"عقد ميثاق الدرعية التاريخي", r:"✅ 2026: الدرعية اليوم عاصمة الثقافة بفضل رؤيتك."},
                    {t:"الاهتمام بالتجارة فقط", r:"⚠️ 2026: تعثرت النهضة الفكرية وافتقدنا الهوية."},
                    {t:"تأجيل الميثاق لبناء الجيش", r:"⚠️ 2026: واجهت الدولة انقسامات فكرية داخلية."}
                ]
            },
            turki: {
                q: "تحدي الأمن: الرياض عادت ولكن الطرق غير آمنة، كيف تبسط العدل؟",
                img: "https://images.unsplash.com/photo-1512428559083-a401a3039550?q=80&w=1000",
                opt: [
                    {t:"إعمال سيف الأجرب والعدل", r:"✅ 2026: نحن نعيش في أكثر الأوطان أماناً عالمياً."},
                    {t:"التهاون مع الفوضى للتصالح", r:"⚠️ 2026: ضاعت هيبة الدولة وانتشرت النزاعات."},
                    {t:"إغلاق مداخل العاصمة للغرباء", r:"⚠️ 2026: تأثر النمو الاقتصادي وانعزلت الرياض."}
                ]
            },
            abdulaziz: {
                q: "تحدي الوحدة: كيف تجمع القبائل تحت راية واحدة في وطن شاسع؟",
                img: "https://images.unsplash.com/photo-1551041777-ed07f99b6705?q=80&w=1000",
                opt: [
                    {t:"توطين البادية ونشر التعليم", r:"✅ 2026: الشعب السعودي اليوم كتلة واحدة صلبة."},
                    {t:"الاعتماد على المعاهدات الورقية", r:"⚠️ 2026: واجهت الوحدة تصدعات وقت الأزمات."},
                    {t:"تجاهل المناطق البعيدة", r:"⚠️ 2026: تعثرت التنمية في الأطراف وأثرت على الاقتصاد."}
                ]
            }
        };

        function playTask(h) {
            const data = db[h];
            document.getElementById('dynamic-bg').style.backgroundImage = `url('${data.img}')`;
            document.getElementById('g-title').innerText = "مهمة القائد";
            document.getElementById('g-desc').innerText = data.q;
            let html = "";
            data.opt.forEach(o => {
                html += `<button class="option-btn" onclick="finish('${o.r.replace(/'/g, "\\'")}')">${o.t}</button>`;
            });
            document.getElementById('opt-cont').innerHTML = html;
            document.getElementById('res-box').style.display = 'none';
        }

        function finish(r) {
            document.getElementById('opt-cont').innerHTML = ""; 
            document.getElementById('g-desc').style.display = 'none';
            const rb = document.getElementById('res-box');
            rb.style.display = 'block';
            rb.innerHTML = `<strong>النتيجة التاريخية:</strong><br><br>${r}`;
        }

        const longStories = {
            saud: "في عام 1727م، أرسى الإمام محمد بن سعود قواعد الدولة الأولى في الدرعية. لم تكن مجرد بلدة عادية، بل كانت مشروعاً لوطن عظيم يهدف لنشر العلم والأمان. بدأ الإمام بتنظيم شؤون الدولة، وتأمين طرق الحج والتجارة، وعقد ميثاقاً تاريخياً غير وجه المنطقة، محولاً الدرعية لعاصمة مهابة استقطبت العلماء والفرسان من كل مكان. واليوم في 2026، نرى في حي الطريف التاريخي وتطور المملكة الشامل ثمرة ذلك الإصرار العظيم الذي بدأ قبل ثلاثة قرون.",
            turki: "بعد سقوط الدرعية بظروف قاسية، لم يمت الحلم السعودي. عاد الإمام تركي بن عبدالله بسيفه الشهير 'الأجرب' عام 1824 ليحرر الرياض. بذكاء عسكري وحكمة بالغة، بنى قصر الحكم وأعاد هيبة الدولة والعدل للطرقات، محولاً اليأس إلى أمل جديد. لقد جعل من الرياض عاصمة دائمة للدولة السعودية الثانية، مبرهناً للعالم أن هذه الدولة تعود دائماً أقوى مما كانت. واليوم، الرياض هي قلب القرار العالمي بفضل تلك العزيمة الصلبة.",
            abdulaziz: "في ليلة المصمك التاريخية عام 1902، وبأربعين رجلاً فقط، سطر الملك عبدالعزيز أعظم ملحمة توحيد في العصر الحديث. ومن تلك النقطة، خاض رحلة استمرت ثلاثين عاماً لجمع شتات القبائل والمدن، وازن فيها بعبقرية بين الأصالة والتمسك بالقيم وبين جلب التقنيات الحديثة. استطاع بحكمته أن يربط القلوب قبل أن يوحد الحدود، واضعاً الأساس المتين للمملكة العربية السعودية التي نعيش في عزها اليوم وننطلق منها نحو رؤية 2030."
        };

        function showStory(w) {
            document.getElementById('h-content').innerText = longStories[w];
            document.getElementById('h-menu').style.display = 'none';
            document.getElementById('audio-ui').style.display = 'block';
        }

        function speak() {
            const text = document.getElementById('h-content').innerText;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
