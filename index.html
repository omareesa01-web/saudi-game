<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس التفاعلية - الإصدار الناطق الكامل</title>
    
    <style>
        /* --- إعدادات الألوان والخطوط (CSS مفصل) --- */
        :root {
            --gold-main: #c1a35f;
            --gold-light: #f3cf7a;
            --deep-green: #05160d;
            --glass-bg: rgba(0, 0, 0, 0.5);
            --glass-border: rgba(193, 163, 95, 0.4);
            --text-white: #ffffff;
            --text-gray: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--deep-green);
            background-image: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- محرك جزيئات الرمل --- */
        #sand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- الحاوية الرئيسية (تصميم زجاجي فخم) --- */
        .app-wrapper {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 850px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 2px solid var(--glass-border);
            border-radius: 50px;
            padding: 60px;
            text-align: center;
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.8);
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-main) transparent;
        }

        /* --- أنيميشن ظهور الشاشات --- */
        .screen {
            display: none;
            opacity: 0;
        }

        .screen.active {
            display: block;
            animation: slideUpFade 1.4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(80px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* --- تنسيق النصوص --- */
        h1 {
            font-size: 4rem;
            color: var(--gold-main);
            margin-bottom: 35px;
            font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .sub-description {
            font-size: 1.6rem;
            color: var(--text-gray);
            margin-bottom: 55px;
            line-height: 1.8;
            font-weight: 300;
        }

        /* --- تصميم الأزرار (Verbose CSS) --- */
        .btn-action {
            width: 100%;
            background: linear-gradient(145deg, rgba(193, 163, 95, 0.25), rgba(0, 0, 0, 0.85));
            border: 2.5px solid var(--gold-main);
            padding: 30px;
            border-radius: 25px;
            color: #ffffff;
            font-size: 1.7rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: block;
            text-align: center;
        }

        .btn-action:hover {
            background: var(--gold-main);
            color: #000;
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 45px rgba(193, 163, 95, 0.4);
        }

        .btn-action:active {
            transform: scale(0.98);
        }

        /* --- لوحة المحتوى الصوتي والتاريخي --- */
        .story-panel {
            background: rgba(255, 255, 255, 0.08);
            padding: 45px;
            border-radius: 35px;
            text-align: justify;
            line-height: 2.4;
            font-size: 1.4rem;
            border-right: 12px solid var(--gold-main);
            margin-top: 40px;
            margin-bottom: 40px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
            color: #f8f8f8;
        }

        .audio-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: var(--gold-light);
            font-weight: bold;
            margin-top: 20px;
            font-size: 1.1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .nav-footer {
            margin-top: 50px;
            display: block;
            color: var(--gold-light);
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.4s;
            border-bottom: 2px solid transparent;
        }

        .nav-footer:hover {
            color: #fff;
            border-bottom-color: #fff;
            letter-spacing: 2px;
        }

        /* --- تخصيص السكرول بار --- */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold-main);
            border-radius: 15px;
            border: 3px solid var(--deep-green);
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="app-wrapper">
        
        <div id="scr-home" class="screen active">
            <h1>ملاحم التأسيس</h1>
            <p class="sub-description">تجربة تاريخية ناطقة تروي أمجاد المملكة العربية السعودية عبر العصور</p>
            <button class="btn-action" onclick="goTo('scr-heroes')">دخول الملحمة التفاعلية</button>
            <button class="btn-action" onclick="loadLore()">سجل سير الأبطال</button>
        </div>

        <div id="scr-heroes" class="screen">
            <h1>اختر القائد التاريخي</h1>
            <p class="sub-description" style="margin-bottom:30px;">اختر بطلاً لتستمع لقصته وتتخذ قراراته</p>
            <div id="hero-selection-area"></div>
            <a class="nav-footer" onclick="goTo('scr-home')">العودة للرئيسية</a>
        </div>

        <div id="scr-task" class="screen">
            <h1 id="task-title">المهمة الكبرى</h1>
            <div class="audio-indicator">
                <span>🔊 جاري تشغيل الراوي الصوتي...</span>
            </div>
            <div id="task-desc" class="story-panel"></div>
            <div id="decision-buttons"></div>
            <a class="nav-footer" onclick="stopAudioAndBack()">انسحاب من المهمة</a>
        </div>

        <div id="scr-result" class="screen">
            <h1>حكم التاريخ</h1>
            <div id="result-desc" class="story-panel"></div>
            <div style="display: flex; gap: 30px; justify-content: center;">
                <button class="nav-footer" style="background:none; border:none;" onclick="goTo('scr-task')">تغيير القرار</button>
                <button class="nav-footer" style="background:none; border:none;" onclick="goTo('scr-home')">الرئيسية</button>
            </div>
        </div>

        <div id="scr-lore" class="screen">
            <h1>سجل الخالدين</h1>
            <div id="lore-selection-area"></div>
            <a class="nav-footer" onclick="goTo('scr-home')">رجوع</a>
        </div>

        <div id="scr-bio" class="screen">
            <h1 id="bio-name" style="color: var(--gold-light);"></h1>
            <div id="bio-content" class="story-panel"></div>
            <a class="nav-footer" onclick="goTo('scr-lore')">العودة للسجل</a>
        </div>

    </div>

    <script>
        // --- متغيرات النظام الصوتي ---
        let globalAudio = null;

        // --- قاعدة البيانات التاريخية (موسعة جداً) ---
        const HistoryData = {
            saud: {
                name: "الإمام محمد بن سعود",
                missionTitle: "تأسيس الدولة الأولى",
                quest: "في عام 1727م، توليت مقاليد الحكم في الدرعية. الجزيرة العربية كانت تعاني من تمزق سياسي وحروب قبلية طاحنة. أمامك خياران سيشكلان مستقبل المنطقة لقرون: هل تعقد ميثاقاً تاريخياً مع العلماء والقبائل لتأسيس دولة تقوم على الوحدة العلمية والشرعية والعدل ليكون الأمن شاملاً، أم تكتفي بتعزيز القوة العسكرية لحماية حدود الدرعية فقط دون الالتفات لتوحيد المناطق المجاورة؟",
                decisions: [
                    { 
                        text: "عقد ميثاق الدرعية ونشر الوحدة الشاملة", 
                        result: "✅ انتصار تاريخي عظيم! بقرارك هذا، لم تؤسس مجرد مدينة، بل وضعت حجر الأساس للدولة السعودية الأولى. ميثاق الدرعية أصبح المنطلق لتوحيد معظم أرجاء الجزيرة العربية تحت راية واحدة، ونشرت الأمن بعد خوف، والعلم بعد جهل، لتمتد الدولة من الخليج إلى البحر الأحمر." 
                    },
                    { 
                        text: "التركيز على القوة العسكرية لحماية الدرعية فقط", 
                        result: "⚠️ نجاح محدود ومؤقت. استطعت حماية أسوار الدرعية ببراعة عسكرية، ولكن غياب مشروع الوحدة الكبرى جعل المناطق المجاورة تظل في حالة فوضى، وتأخر حلم تأسيس الدولة السعودية القوية لعدة عقود." 
                    }
                ],
                biography: "الإمام محمد بن سعود بن محمد بن مقرن (توفي عام 1765م). هو مؤسس الدولة السعودية الأولى وعميد أسرة آل سعود. حول الدرعية من إمارة صغيرة إلى عاصمة لدولة مترامية الأطراف، تميزت فترة حكمه بالاستقرار وبناء القوة السياسية والاقتصادية والتعليمية."
            },
            turki: {
                name: "الإمام تركي بن عبد الله",
                missionTitle: "استعادة المجد",
                quest: "بعد سقوط الدرعية وانتشار اليأس في النفوس، الرياض تقع تحت قبضات المحتلين والظلم يملأ الأرجاء. خرجت من مغارة 'عليا' وحيداً ومعك سيفك الشهير 'الأجرب'. الناس يرقبونك كأمل أخير. هل تباغت الحصون في الرياض الآن بعملية جريئة وخاطفة رغم قلة عدد فرسانك، أم تنسحب بعيداً لجمع المزيد من الأنصار والعتاد لعدة سنوات أخرى؟",
                decisions: [
                    { 
                        text: "اقتحام الرياض بسيف الأجرب فوراً", 
                        result: "✅ عودة الفارس المظفر! بشجاعتك الأسطورية، استعدت الرياض وأسست الدولة السعودية الثانية من قلب الرماد. سيفك 'الأجرب' أصبح رمزاً وطنياً لاسترداد الحق المسلوب، وأعدت هيبة الحكم السعودي والعدل للناس." 
                    },
                    { 
                        text: "الانسحاب لجمع الأنصار لسنوات طويلة", 
                        result: "❌ ضياع الفرصة التاريخية. استغل المحتلون تأخرك في الهجوم وقاموا بتحصين الرياض بشكل مضاعف، مما جعل أي محاولة لاحقة للتحرير تكلف الكثير من الدماء والوقت والجهد المرير." 
                    }
                ],
                biography: "الإمام تركي بن عبدالله بن محمد آل سعود (1183هـ - 1249هـ). مؤسس الدولة السعودية الثانية وبطل استعادة الرياض. اشتهر بعدله وشجاعته النادرة، وقصيدته الشهيرة في سيفه 'الأجرب' تدرس حتى اليوم كرمز للفخر والقوة."
            },
            aziz: {
                name: "الملك عبد العزيز",
                missionTitle: "فجر التوحيد",
                quest: "ليلة 15 يناير 1902م: تقف مع 63 رجلاً من أخلص أتباعك أمام أسوار قصر المصمك في الرياض. الفجر يوشك على البزوغ، والفرصة التاريخية قد لا تتكرر أبداً في حياتك. هل تقتحم الحصن الآن بإيمان راسخ وعزيمة لا تلين لتسترد ملك آبائك وأجدادك، أم تتراجع لطلب مدد أكبر من القبائل المجاورة لتأمين الهجوم؟",
                decisions: [
                    { 
                        text: "اقتحام المصمك مع خيوط الفجر الأولى", 
                        result: "✅ الله أكبر! بفتحة المصمك التاريخية، أعلنت فجر الدولة السعودية الثالثة (المملكة العربية السعودية). بدأت رحلة الـ 30 عاماً الملحمية لتوحيد هذا الكيان العظيم، وتحويل الشتات إلى وطن واحد قوي ومزدهر تحت راية التوحيد." 
                    },
                    { 
                        text: "الانسحاب وتأمين مدد أكبر من الخارج", 
                        result: "❌ تبدد الحلم التاريخي. كشف الأعداء تحركاتكم وشددوا الحراسة على المصمك والرياض، وظلت العاصمة بعيدة المنال لسنوات طويلة من الانتظار والترقب الصعب." 
                    }
                ],
                biography: "الملك عبدالعزيز بن عبدالرحمن آل سعود (1293هـ - 1373هـ). القائد العبقري وموحد المملكة العربية السعودية الحديثة. رمز الحكمة والشجاعة، استطاع بحنكته السياسية وبأسه العسكري بناء دولة عصرية أصبحت ثقلاً عالمياً."
            }
        };

        // --- وظائف التنقل (Navigation) ---
        function goTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function stopAudioAndBack() {
            if(globalAudio) {
                globalAudio.pause();
                globalAudio.currentTime = 0;
            }
            goTo('scr-heroes');
        }

        // --- بناء واجهة الأبطال ---
        function buildHeroInterface() {
            const container = document.getElementById('hero-selection-area');
            container.innerHTML = '';
            for(let key in HistoryData) {
                const btn = document.createElement('button');
                btn.className = 'btn-action';
                btn.innerText = HistoryData[key].name;
                btn.onclick = () => launchMission(key);
                container.appendChild(btn);
            }
        }

        // --- إطلاق المهمة وتشغيل الصوت ---
        function launchMission(key) {
            const hero = HistoryData[key];
            document.getElementById('task-title').innerText = hero.missionTitle;
            document.getElementById('task-desc').innerText = hero.quest;

            // تشغيل الملف الصوتي (يجب تسمية الملفات saud.mp3, turki.mp3, aziz.mp3)
            if(globalAudio) globalAudio.pause();
            globalAudio = new Audio(key + '.mp3');
            globalAudio.play().catch(e => console.log("الصوت بانتظار تفاعل المستخدم أو الملف غير موجود"));

            const btnContainer = document.getElementById('decision-buttons');
            btnContainer.innerHTML = '';
            hero.decisions.forEach(dec => {
                const b = document.createElement('button');
                b.className = 'btn-action';
                b.innerText = dec.text;
                b.onclick = () => {
                    document.getElementById('result-desc').innerText = dec.result;
                    if(globalAudio) globalAudio.pause();
                    goTo('scr-result');
                };
                btnContainer.appendChild(b);
            });
            goTo('scr-task');
        }

        // --- بناء واجهة السجل ---
        function loadLore() {
            const container = document.getElementById('lore-selection-area');
            container.innerHTML = '';
            for(let key in HistoryData) {
                const b = document.createElement('button');
                b.className = 'btn-action';
                b.innerText = HistoryData[key].name;
                b.onclick = () => {
                    document.getElementById('bio-name').innerText = HistoryData[key].name;
                    document.getElementById('bio-content').innerText = HistoryData[key].biography;
                    goTo('scr-bio');
                };
                container.appendChild(b);
            }
            goTo('scr-lore');
        }

        // --- محرك خلفية الرمل (كود مفصل) ---
        const canvas = document.getElementById('sand-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<220; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2.5 + 0.5,
                    speed: Math.random() * 0.6 + 0.1,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(193, 163, 95, ${p.opacity})`;
                p.y -= p.speed;
                if(p.y < 0) {
                    p.y = canvas.height;
                    p.x = Math.random() * canvas.width;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        window.onresize = initParticles;
        initParticles();
        drawParticles();
        buildHeroInterface();

    </script>
</body>
</html>
