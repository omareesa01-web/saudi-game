<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - النسخة الاحترافية الكاملة</title>
    <style>
        /* تعريف الألوان والثوابت */
        :root {
            --gold: #c1a35f;
            --gold-light: #f3cf7a;
            --deep-green: #103a24;
            --black-overlay: rgba(0, 0, 0, 0.9);
            --glow-effect: 0 0 30px rgba(193, 163, 95, 0.6);
        }

        /* تنسيق عام للجسم والخلفية */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: radial-gradient(circle at center, var(--deep-green) 0%, #05160d 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* كانفاس خلفية الرمل المتحرك */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* شريط اختيار اللغات العلوي */
        .lang-bar {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 40px;
            border: 2px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .lang-bar button {
            background: transparent;
            border: 1.5px solid var(--gold);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: bold;
            font-size: 15px;
        }

        .lang-bar button:hover {
            background: var(--gold);
            color: black;
            transform: translateY(-3px) scale(1.05);
        }

        /* الحاوية الرئيسية للشاشات */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }
        
        /* لوحة العرض الزجاجية */
        .glass-panel {
            backdrop-filter: blur(25px);
            border: 2.5px solid var(--gold);
            border-radius: 45px;
            padding: 50px;
            width: 85%;
            max-width: 800px;
            box-shadow: var(--glow-effect);
            text-align: center;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            background: var(--black-overlay);
        }

        /* أنيميشن دخول القائمة الرئيسية */
        #home.active {
            animation: mainEntrance 1.2s ease-out forwards;
        }

        @keyframes mainEntrance {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(100px);
                filter: blur(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }

        /* أنيميشن الأزرار في القائمة الرئيسية */
        .home-btns-anim {
            opacity: 0;
            transform: translateY(20px);
            animation: btnFadeUp 0.8s ease-out 0.5s forwards;
        }

        @keyframes btnFadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3.5rem;
            color: var(--gold);
            margin-bottom: 25px;
            text-shadow: 0 0 30px rgba(0, 0, 0, 1);
            font-weight: 900;
            letter-spacing: 1px;
        }

        .desc {
            font-size: 1.4rem;
            color: #f0f0f0;
            margin-bottom: 50px;
            line-height: 1.8;
            font-style: italic;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }
        
        /* تصميم الأزرار التفاعلية */
        .action-btn {
            background: linear-gradient(135deg, rgba(193, 163, 95, 0.3), rgba(20, 20, 20, 0.9));
            border: 2px solid var(--gold);
            padding: 24px;
            border-radius: 25px;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.5s all cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .action-btn:hover {
            background: var(--gold);
            color: black;
            transform: scale(1.04) translateY(-8px);
            box-shadow: 0 15px 35px rgba(193, 163, 95, 0.4);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .back-link { 
            margin-top: 40px;
            color: var(--gold-light);
            cursor: pointer;
            display: inline-block; 
            font-weight: 800;
            font-size: 1.3rem;
            text-decoration: none;
            border-bottom: 3px solid var(--gold);
            padding-bottom: 8px;
            transition: 0.3s ease;
        }

        .back-link:hover {
            color: white;
            border-color: white;
            transform: translateX(10px);
        }

        [dir="ltr"] .back-link:hover {
            transform: translateX(-10px);
        }

        /* صندوق النتائج */
        .result-box {
            background: rgba(255, 255, 255, 0.07);
            padding: 40px;
            border-radius: 30px;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.25rem;
            border-right: 12px solid var(--gold);
            margin-top: 25px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        [dir="ltr"] .result-box {
            border-right: none;
            border-left: 12px solid var(--gold);
            text-align: left;
        }

        .screen {
            display: none;
        }

        .active {
            display: block;
        }

        /* تخصيص السكرول بار ليناسب الفخامة */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--gold), var(--gold-light));
            border-radius: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="lang-bar">
        <button onclick="setLanguage('ar')">العربية</button>
        <button onclick="setLanguage('en')">English</button>

        <button onclick="setLanguage('ru')">Русский</button>
        <button onclick="setLanguage('ko')">한국어</button>

        <div id="home" class="screen glass-panel active">
            <h1 id="ui-main-title">ملاحم التأسيس</h1>
            <p class="desc" id="ui-main-desc">اكتب تاريخك بيدك عبر العصور والأزمان المجيدة</p>

                </div>

                </div>
            </div>
        </div>

            <a class="back-link" id="ui-back-home" onclick="goTo('home')">العودة للشاشة الرئيسية</a>
        </div>

            <h1 id="ui-mission-title">المهمة القيادية الكبرى</h1>

        <div id="result" class="screen glass-panel">

        let currentLang = 'ar';

        // وظيفة التنقل بين الشاشات مع إعادة تعيين أنيميشن القائمة
        function goTo(id) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => s.classList.remove('active'));
            
            const target = document.getElementById(id);
            target.classList.add('active');
            
            // إعادة تشغيل أنيميشن الأزرار في القائمة الرئيسية كل مرة ندخلها
            if(id === 'home') {
                const anims = document.querySelectorAll('.home-btns-anim');
                anims.forEach(a => {
                    a.style.animation = 'none';
                    a.offsetHeight; // trigger reflow
                    a.style.animation = null;
                });
            }
        }

        // تحديث واجهة المستخدم بالكامل بناءً على اللغة
        function setLanguage(l) {
            currentLang = l;
            const d = BigDatabase[l];
            document.body.dir = d.dir;

            // تحديث نصوص العناصر
            document.getElementById('ui-main-title').innerText = d.mTitle;
            document.getElementById('ui-main-desc').innerText = d.mDesc;
            document.getElementById('ui-btn-start').innerText = d.bStart;
            document.getElementById('ui-btn-lore').innerText = d.bLore;
            document.getElementById('ui-hero-title').innerText = d.hTitle;
            document.getElementById('ui-back-home').innerText = d.bHome;
            document.getElementById('ui-mission-title').innerText = d.miTitle;
            document.getElementById('ui-back-to-heroes').innerText = d.bHero;
            document.getElementById('ui-result-title').innerText = d.rTitle;
            document.getElementById('ui-btn-retry').innerText = d.retry;
            document.getElementById('ui-btn-final-home').innerText = d.fHome;
            document.getElementById('ui-lore-list-title').innerText = d.lTitle;
            document.getElementById('ui-back-from-lore').innerText = d.fHome;
            document.getElementById('ui-back-to-list').innerText = d.bList;

            renderHeroSelection();
            goTo('home');
        }

        // بناء قائمة اختيار الأبطال
        function renderHeroSelection() {
            const container = document.getElementById('hero-list-container');
            container.innerHTML = '';
            const heroes = BigDatabase[currentLang].heroes;
            for(let key in heroes) {
                const btn = document.createElement('button');
                btn.className = 'action-btn';
                btn.innerText = heroes[key].name;
                btn.onclick = () => launchMission(key);
                container.appendChild(btn);
            }
        }

        // إطلاق المهمة
        function launchMission(key) {
            const h = BigDatabase[currentLang].heroes[key];
            document.getElementById('quest-display-area').innerText = h.q;
            const container = document.getElementById('decision-list-container');
            container.innerHTML = '';
            h.d.forEach(dec => {
                const b = document.createElement('button');
                b.className = 'action-btn';
                b.innerText = dec.t;
                b.onclick = () => {
                    document.getElementById('result-display-area').innerText = dec.r;
                    goTo('result');
                };
                container.appendChild(b);
            });
            goTo('play');
        }

        // عرض سجل الأبطال
        function viewLore() {
            const container = document.getElementById('lore-btns-container');
            container.innerHTML = '';
            const heroes = BigDatabase[currentLang].heroes;
            for(let key in heroes) {
                const b = document.createElement('button');
                b.className = 'action-btn';
                b.innerText = heroes[key].name;
                b.onclick = () => {
                    document.getElementById('detail-hero-name').innerText = heroes[key].name;
                    document.getElementById('detail-hero-content').innerText = heroes[key].bio;
                    goTo('lore-details');
                };
                container.appendChild(b);
            }
            goTo('lore-list');
        }

        // نظام الرمل (Canvas Particle System) المطور
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }

        function initParticles() {
            particles = [];
            for(let i=0; i<180; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 3,
                    speed: Math.random() * 0.8 + 0.2,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(193, 163, 95, 0.6)";
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) {
                    p.y = canvas.height;
                    p.x = Math.random() * canvas.width;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.onresize = resize;
        resize();
        animate();
        setLanguage('ar');
    </script>
