<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - 2026</title>
    <style>
        :root { --gold: #c1a35f; --green: #006c35; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        .bg-flag {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Flag_of_Saudi_Arabia.svg/1200px-Flag_of_Saudi_Arabia.svg.png');
            background-size: cover; background-position: center; z-index: -1;
        }

        .clouds {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 10; display: flex; justify-content: center; align-items: center;
            animation: cloudFade 3s forwards ease-in-out;
        }
        @keyframes cloudFade {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: rgba(0,0,0,0.85); border: 1px solid var(--gold); padding: 40px; border-radius: 20px; max-width: 700px; width: 90%; backdrop-filter: blur(10px); text-align: center; box-shadow: 0 0 30px rgba(0,0,0,1); }
        
        h1 { color: var(--gold); font-size: 2.2rem; }
        .story { font-size: 1.2rem; line-height: 1.8; margin: 20px 0; text-align: justify; }
        
        .btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 15px; margin: 10px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: black; transform: scale(1.02); }
        
        #result-box { display: none; padding: 20px; border-right: 4px solid var(--gold); background: rgba(255,255,255,0.05); margin-top: 20px; text-align: justify; }
    </style>
</head>
<body>
    <div class="clouds"><h2 style="color: #333;">جاري استحضار التاريخ...</h2></div>
    <div class="bg-flag"></div>
    <div class="container">
        <div class="card" id="main-card">
            <h1 id="title">ملاحم التأسيس</h1>
            <p id="desc" class="story">اختر القائد لاستحضار تاريخه ومحاكات قراراته وصولاً لعام 2026:</p>
            <div id="options">
                <button class="btn" onclick="play('m_saud')">الإمام محمد بن سعود</button>
                <button class="btn" onclick="play('turki')">الإمام تركي بن عبد الله</button>
                <button class="btn" onclick="play('abdulaziz')">الملك عبد العزيز</button>
            </div>
            <div id="result-box"></div>
            <button id="back-btn" class="btn" style="display:none; border-color:#666; color:#666;" onclick="location.reload()">🔙 عودة للقائمة</button>
        </div>
    </div>

    <script>
        const scripts = {
            m_saud: { title: "الإمام محمد بن سعود", story: "أنت في الدرعية 1727م، أمامك خيار ميثاق الدرعية التاريخي مع العلم لبناء دولة صلبة، أو الاعتماد على القوة العسكرية وحدها.", opt: "عقد الميثاق", res: "📜 نتيجة 2026: لولا هذا الميثاق لما كانت الدرعية اليوم وجهة عالمية ولما احتفلنا بيوم التأسيس. ميثاقك هو حجر الأساس لرؤية 2030." },
            turki: { title: "الإمام تركي بن عبد الله", story: "أنت في الرياض 1824م، هل تباغت الحامية لاسترداد العاصمة بسيفك 'الأجرب' أم تنسحب لبناء جيش؟", opt: "استرداد الرياض فوراً", res: "📜 نتيجة 2026: ضربة 'الأجرب' جعلت الرياض عاصمة السعودية الأبدية، واليوم هي مركز القرار العالمي ومقر إكسبو 2030." },
            abdulaziz: { title: "الملك عبد العزيز", story: "أمام أسوار المصمك 1902م، هل تقتحم القصر مع 40 رجلاً أم تنتظر؟", opt: "اقتحام المصمك", res: "📜 نتيجة 2026: بصرخة 'الملك لله ثم لعبدالعزيز' توحدت القلوب. نحن اليوم نعيش في أمن وأمان، ونغزو الفضاء، ونقود الاقتصاد العالمي بفضل شجاعتك." }
        };

        function play(key) {
            const d = scripts[key];
            document.getElementById('title').innerText = d.title;
            document.getElementById('desc').innerText = d.story;
            document.getElementById('options').innerHTML = `<button class="btn" onclick="showRes('${key}')">${d.opt}</button>`;
        }

        function showRes(key) {
            document.getElementById('options').style.display = 'none';
            document.getElementById('desc').style.display = 'none';
            const rb = document.getElementById('result-box');
            rb.style.display = 'block';
            rb.innerText = scripts[key].res;
            document.getElementById('back-btn').style.display = 'block';
        }
    </script>
</body>
</html>
