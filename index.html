<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | الإصدار الملكي الطويل</title>
    
    <style>
        /* 1. إعدادات الألوان والمتغيرات الأساسية */
        :root {
            --saudi-green: #006C35; 
            --light-green: #00843D;
            --glow-green: #22C55E;
            --deep-green: #062113;
            --forest-black: #010a05;
            --glass-bg: rgba(0, 32, 16, 0.98); 
            --glass-border: rgba(34, 197, 94, 0.4);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --transition-speed: 0.5s;
        }

        /* 2. تصفير الإعدادات وتنسيق الجسم */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
        }

        body, html {
            width: 100%; 
            height: 100%;
            background: radial-gradient(circle at center, var(--deep-green) 0%, var(--forest-black) 100%);
            color: #ffffff; 
            font-family: var(--font-main);
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        /* 3. محرك الجسيمات الخلفي */
        #titan-engine-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 5; 
            pointer-events: none; 
        }

        /* 4. الحاوية الرئيسية للتطبيق */
        .app-container {
            position: relative; 
            z-index: 100; 
            width: 90%; 
            max-width: 440px;
            background: var(--glass-bg); 
            backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border); 
            border-top: 8px solid var(--saudi-green);
            border-radius: 35px; 
            padding: 35px 25px; 
            text-align: center;
            box-shadow: 0 60px 120px rgba(0,0,0,0.9); 
            max-height: 88vh; 
            overflow-y: auto;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* تحسين شريط التمرير */
        .app-container::-webkit-scrollbar { 
            width: 4px; 
        }
        .app-container::-webkit-scrollbar-thumb { 
            background: var(--glow-green); 
            border-radius: 10px;
        }

        /* 5. العناوين والنصوص */
        .main-title { 
            font-size: 1.9rem; 
            font-weight: 900; 
            margin-bottom: 12px; 
            text-shadow: 0 0 20px var(--glow-green); 
            color: #ffffff;
        }

        .description-text { 
            font-size: 0.95rem; 
            line-height: 1.6; 
            color: #b0b0b0; 
            margin-bottom: 30px; 
        }

        /* 6. نظام الأزرار الملحمي */
        .btn-epic {
            position: relative; 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 14px;
            background: linear-gradient(135deg, var(--saudi-green), var(--deep-green));
            border: 1px solid var(--glow-green); 
            border-radius: 16px;
            color: #ffffff; 
            font-size: 1rem; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.4s ease; 
            overflow: hidden;
            display: block;
        }
        
        /* تأثير لمعة السيف المتحركة */
        .btn-epic::after {
            content: ""; 
            position: absolute; 
            top: -50%; 
            left: -150%;
            width: 40%; 
            height: 200%; 
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(35deg); 
            filter: blur(6px);
        }
        
        .btn-epic:hover::after { 
            left: 150%; 
            transition: 0.8s; 
        }
        
        .btn-epic:hover { 
            transform: scale(1.03) translateY(-2px); 
            background: var(--light-green); 
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
        }

        /* 7. صناديق المحتوى التاريخي */
        .lore-box {
            background: rgba(0, 0, 0, 0.5); 
            border-radius: 22px; 
            padding: 25px;
            margin: 20px 0; 
            text-align: justify; 
            line-height: 1.9; 
            font-size: 1rem;
            color: #f0f0f0; 
            border-right: 6px solid var(--saudi-green);
            white-space: pre-line; 
            box-shadow: inset 0 0 25px rgba(0,0,0,0.5);
        }

        /* 8. نظام تبديل اللغة */
        .lang-switcher {
            position: absolute; 
            top: 20px; 
            right: 25px; 
            background: rgba(255,255,255,0.1); 
            padding: 6px 14px;
            border-radius: 25px; 
            font-size: 0.8rem; 
            cursor: pointer;
            border: 1px solid var(--glass-border); 
            z-index: 150;
            color: #fff;
            font-weight: bold;
            transition: 0.3s;
        }
        .lang-switcher:hover { background: var(--saudi-green); }

        /* 9. أزرار الرجوع والتنقل */
        .back-nav { 
            display: inline-block; 
            margin-top: 18px; 
            color: var(--glow-green); 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 0.9rem; 
            text-decoration: none;
            transition: 0.3s;
        }
        .back-nav:hover { letter-spacing: 1px; color: #fff; }

        /* 10. إدارة الشاشات والأنيميشن */
        .screen { 
            display: none; 
            opacity: 0; 
            transform: translateY(15px);
            transition: all 0.5s ease-out; 
        }
        
        .screen.active { 
            display: block; 
            opacity: 1; 
            transform: translateY(0);
        }

        /* تأثير الاهتزاز عند الخطأ */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake-effect { animation: shake 0.3s ease-in-out; }

        /* تأثير الوميض عند النجاح */
        @keyframes glow-up {
            0% { box-shadow: 0 0 0px var(--glow-green); }
            50% { box-shadow: 0 0 40px var(--glow-green); }
            100% { box-shadow: 0 0 0px var(--glow-green); }
        }
        .success-glow { animation: glow-up 1s ease-in-out; }

    </style>
</head>

            // إضافة تأثير بسيط عند الانتقال
            wrapper.style.transform = 'scale(0.95)';
            
            screens.forEach(s => {
                s.classList.remove('active');
                setTimeout(() => { s.style.display = 'none'; }, 300);
            });

            setTimeout(() => {
                const target = document.getElementById(screenId);
                target.style.display = 'block';
                setTimeout(() => { 
                    target.classList.add('active'); 
                    wrapper.style.transform = 'scale(1)';
                }, 50);
            }, 350);

            // تصفير التمرير
            document.getElementById('app-wrapper').scrollTop = 0;
        }

        // 4. بناء الواجهات التفاعلية (UI Generators)
        function buildApp() {
            const heroList = document.getElementById('hero-list-ui');
            const archiveList = document.getElementById('archive-list-ui');
            
            heroList.innerHTML = '';
            archiveList.innerHTML = '';

            Object.keys(DATABASE).forEach(key => {
                // توليد أزرار الاختيار
                const hBtn = document.createElement('button');
                hBtn.className = 'btn-epic';
                hBtn.innerText = DATABASE[key].name[currentLang];
                hBtn.onclick = () => showScenarios(key);
                heroList.appendChild(hBtn);

                // توليد أزرار الأرشيف
                const aBtn = document.createElement('button');
                aBtn.className = 'btn-epic';
                aBtn.innerText = DATABASE[key].name[currentLang];
                aBtn.onclick = () => showBio(key);
                archiveList.appendChild(aBtn);
            });

            updateStaticTexts();
        }

        function showScenarios(heroKey) {
            activeHero = heroKey;
            const sList = document.getElementById('scenario-list-ui');
            sList.innerHTML = '';

            DATABASE[heroKey].scenarios.forEach((scen, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = scen.title[currentLang];
                btn.onclick = () => startQuest(idx);
                sList.appendChild(btn);
            });

            navigateTo('screen-scenarios');
        }

        function startQuest(idx) {
            activeQuestIdx = idx;
            const quest = DATABASE[activeHero].scenarios[idx];
            
            document.getElementById('quest-title-ui').innerText = quest.title[currentLang];
            document.getElementById('quest-desc-ui').innerText = quest.desc[currentLang];
            
            const btnBox = document.getElementById('decision-buttons-ui');
            btnBox.innerHTML = '';

            quest.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = opt.text[currentLang];
                btn.onclick = () => showResult(opt);
                btnBox.appendChild(btn);
            });

            navigateTo('screen-quest');
        }

        function showResult(opt) {
            const resBox = document.getElementById('result-text-ui');
            const wrapper = document.getElementById('app-wrapper');
            
            resBox.innerText = opt.result[currentLang];

            // تأثيرات بصرية بناءً على نوع النتيجة
            if (opt.type === 'fail') {
                wrapper.classList.add('shake-effect');
                setTimeout(() => wrapper.classList.remove('shake-effect'), 500);
            } else if (opt.type === 'win') {
                wrapper.classList.add('success-glow');
                setTimeout(() => wrapper.classList.remove('success-glow'), 1000);
            }

            navigateTo('screen-result');
        }

        function showBio(heroKey) {
            document.getElementById('bio-name-ui').innerText = DATABASE[heroKey].name[currentLang];
            document.getElementById('bio-content-ui').innerText = DATABASE[heroKey].bio[currentLang];
            navigateTo('screen-bio');
        }

        // 5. نظام اللغة المطور
        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = currentLang === 'ar' ? 'English' : 'عربي';
            
            buildApp(); // إعادة بناء القوائم باللغة الجديدة
            
            // إذا كان المستخدم داخل سيناريو، نقوم بتحديث النصوص فوراً
            if (activeHero) {
                const sList = document.getElementById('scenario-list-ui');
                if (sList.innerHTML !== '') showScenarios(activeHero);
            }
        }

        function updateStaticTexts() {
            document.querySelectorAll('[data-' + currentLang + ']').forEach(el => {
                el.innerText = el.getAttribute('data-' + currentLang);
            });
        }

        // 6. محرك الرسوميات (Particles) - كود مفصل
        const canvas = document.getElementById('titan-engine-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.alpha = Math.random() * 0.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#22C55E';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 120; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        
        // الانطلاق
        initCanvas();
        animate();
        buildApp();

    </script>
</body>
</html>
