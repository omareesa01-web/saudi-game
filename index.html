<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | الهيكل البرمجي العملاق</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* [SECTION 2] CSS VARIABLES - الهوية البصرية */
        :root {
            /* درجات الذهبي */
            --gold-bg: #C5A059;         /* خلفية ذهبية مطفية */
            --gold-primary: #D4AF37;    /* ذهبي معدني أساسي */
            --gold-glow: #FFD700;       /* ذهبي للإضاءة */
            --gold-shadow: #8E6D2D;     /* ظل ذهبي للعاصفة */
            
            /* درجات الأخضر الملكي */
            --royal-green: #0D2E1C;     /* أخضر غامق جداً */
            --glass-bg: rgba(13, 46, 28, 0.98); 
            
            /* نصوص وإعدادات عامة */
            --pure-white: #FFFFFF;
            --font-main: 'Cairo', 'Segoe UI', sans-serif;
            --transition-epic: 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            --shadow-heavy: 0 40px 100px rgba(0, 0, 0, 0.6);
        }

        /* [SECTION 3] RESET & CORE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--gold-bg);
            font-family: var(--font-main);
            color: var(--pure-white);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* [SECTION 4] BACKGROUND ENGINE (STORM CANVAS) */
        #titan-storm-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            will-change: transform; /* تحسين أداء كرت الشاشة */
        }

        /* [SECTION 5] NAVIGATION & OVERLAYS */
        .language-switcher {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;
            display: flex;
            gap: 12px;
        }

        .lang-node {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.9rem;
            transition: 0.4s all ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .lang-node.active {
            background: var(--gold-primary);
            color: var(--royal-green);
            box-shadow: 0 0 25px var(--gold-glow);
        }

        /* [SECTION 6] THE ROYAL CONTAINER - الهيكل الرئيسي */
        .app-framework {
            position: relative;
            z-index: 100;
            width: 90%;
            max-width: 420px;
            background: var(--glass-bg);
            border: 1px solid var(--gold-primary);
            border-top: 10px solid var(--gold-primary);
            border-radius: 50px;
            padding: 50px 35px;
            text-align: center;
            box-shadow: var(--shadow-heavy);
            max-height: 88vh;
            overflow-y: auto;
            scrollbar-width: none; /* إخفاء شريط التمرير */
            animation: app-fade-in 1.2s ease-out;
        }

        .app-framework::-webkit-scrollbar { display: none; }

        @keyframes app-fade-in {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* [SECTION 7] SCREEN SYSTEM - نظام الشاشات */
        .screen-unit {
            display: none;
            opacity: 0;
            transform: scale(0.94) translateY(30px);
            transition: opacity var(--transition-epic), transform var(--transition-epic);
        }

        .screen-unit.active-screen {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* [SECTION 8] UI COMPONENTS - العناصر المرئية */
        .title-epic {
            font-size: 2.4rem;
            font-weight: 900;
            color: var(--gold-glow);
            margin-bottom: 25px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            letter-spacing: -1px;
        }

        .desc-text {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--pure-white);
            margin-bottom: 40px;
            opacity: 0.95;
            font-weight: 400;
        }

        .action-btn {
            position: relative;
            width: 100%;
            padding: 20px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(0,0,0,0.4));
            border: 1.5px solid var(--gold-primary);
            border-radius: 24px;
            color: var(--pure-white);
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            overflow: hidden;
            transition: 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .action-btn:hover {
            transform: scale(1.03) translateY(-5px);
            background: var(--gold-primary);
            color: var(--royal-green);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
        }

        /* حركات لمعان للأزرار */
        .action-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%;
            width: 20%; height: 200%;
            background: rgba(255,255,255,0.2);
            transform: rotate(30deg);
            transition: 0.7s;
        }
        .action-btn:hover::after { left: 140%; }

        /* [SECTION 9] CONTENT BOXES - صناديق القصة والأرشيف */
        .content-box {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 30px;
            padding: 30px;
            margin: 25px 0;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.1rem;
            color: var(--pure-white);
            border-right: 8px solid var(--gold-primary);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.4);
            white-space: pre-line;
        }

        [dir="ltr"] .content-box {
            border-right: 0;
            border-left: 8px solid var(--gold-primary);
        }

        .nav-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--gold-glow);
            cursor: pointer;
            font-weight: 900;
            font-size: 0.95rem;
            text-decoration: underline;
            text-underline-offset: 8px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: var(--pure-white);
            letter-spacing: 1px;
        }

        /* تحسينات للشاشات الصغيرة */
        @media (max-height: 700px) {
            .app-framework { padding: 30px 20px; }
            .title-epic { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <canvas id="titan-storm-canvas"></canvas>

    <div class="language-switcher">
        <div id="btn-ar" class="lang-node active" onclick="Core.setLanguage('ar')">ARABIC</div>
        <div id="btn-en" class="lang-node" onclick="Core.setLanguage('en')">ENGLISH</div>
    </div>

    <div class="app-framework" id="global-scroller">
        
        <div id="scr-gate" class="screen-unit active-screen">
            <h1 class="title-epic" id="ui-gate-h">ملاحم التأسيس</h1>
            <p class="desc-text" id="ui-gate-d">رحلة تفاعلية في قلب التاريخ السعودي، حيث تصنع قراراتك مجد الأمم.</p>
            <button class="action-btn" id="ui-btn-start" onclick="Core.navigate('scr-selection')">ابدأ الملحمة</button>
            <button class="action-btn" id="ui-btn-arch" onclick="Core.navigate('scr-archive')">سجل الخالدين</button>
        </div>

        <div id="scr-selection" class="screen-unit">
            <h1 class="title-epic" id="ui-select-h">اختر القائد</h1>
            <div id="hero-grid-injection"></div>
            <a class="nav-link" id="ui-back-1" onclick="Core.navigate('scr-gate')">العودة للبوابة</a>
        </div>

        <div id="scr-quest" class="screen-unit">
            <h1 id="quest-header" style="color: var(--gold-glow); font-size: 1.6rem; margin-bottom: 20px;"></h1>
            <div id="quest-body" class="content-box"></div>
            <div id="quest-footer-actions"></div>
            <a class="nav-link" id="ui-back-2" onclick="Core.navigate('scr-selection')">تغيير المسار</a>
        </div>

        <div id="scr-verdict" class="screen-unit">
            <h1 class="title-epic" id="ui-verdict-h">حكم التاريخ</h1>
            <div id="verdict-body" class="content-box"></div>
            <button class="action-btn" id="ui-btn-replay" onclick="Core.navigate('scr-selection')">تجربة قدر آخر</button>
            <a class="nav-link" id="ui-back-3" onclick="Core.navigate('scr-gate')">الرئيسية</a>
        </div>

        <div id="scr-archive" class="screen-unit">
            <h1 class="title-epic" id="ui-archive-h">سجل الخالدين</h1>
            <div id="archive-grid-injection"></div>
            <a class="nav-link" id="ui-back-4" onclick="Core.navigate('scr-gate')">الرجوع للسابق</a>
        </div>

        <div id="scr-biography" class="screen-unit">
            <h1 id="bio-title" class="title-epic"></h1>
            <div id="bio-body" class="content-box"></div>
            <a class="nav-link" id="ui-back-5" onclick="Core.navigate('scr-archive')">العودة للسجل</a>
        </div>

    </div>

    <script>
        /**
         * GLOBAL DATABASE: مصفوفة البيانات الضخمة
         * تحتوي على كافة التفاصيل التاريخية، القصص، الخيارات، والأرشيف باللغتين.
         */
        const DATA_MASTER = {
            m_saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    q_title: "يوم ميثاق التأسيس (1139هـ)",
                    q_story: "تولى الإمام محمد بن سعود الحكم في الدرعية، وكانت المنطقة تعاني من الفرقة. يأتيك الشيخ محمد بن عبدالوهاب لطلب التحالف. هل تضع يدك بيده لبناء دولة تقوم على العلم والوحدة؟",
                    choices: [
                        { text: "عقد الميثاق ونصرة الدعوة", feedback: "✅ 'أبشر ببلاد خير من بلادك'.. بهذا القرار ولدت الدولة السعودية الأولى، وتوحدت القبائل تحت راية واحدة لأول مرة منذ قرون." },
                        { text: "توفير الحماية دون ميثاق", feedback: "⚠️ حصل الشيخ على الأمان، لكن غياب الرؤية الموحدة جعل الدولة تبقى مجرد إمارة قوية داخل أسوار الدرعية فقط." }
                    ],
                    biography: "• المؤسس: الإمام محمد بن سعود بن محمد بن مقرن.\n• القصة: بطل اتسم بالحكمة والشجاعة، حول الدرعية من مدينة صغيرة إلى عاصمة دولة مترامية الأطراف.\n• الإنجازات:\n- تأسيس الدولة السعودية الأولى عام 1727م.\n- بناء سور الدرعية وتوحيد أحيائها.\n- حماية طرق التجارة والحجيج عبر الجزيرة العربية."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    q_title: "The Diriyah Pact (1727)",
                    q_story: "Imam Muhammad bin Saud took leadership. A scholar asks for your alliance to unify the people under faith and law. Do you accept?",
                    choices: [
                        { text: "Form the Alliance", feedback: "✅ Success! You founded the First Saudi State, and Diriyah became a global center for knowledge." },
                        { text: "Offer Protection Only", feedback: "⚠️ Safety was granted, but the dream of a unified nation remained within city walls." }
                    ],
                    biography: "• The First Founder: Imam Muhammad bin Saud.\n• Story: A visionary leader who transformed a small town into a powerful capital.\n• Achievements:\n- Founding the First Saudi State (1727).\n- Unifying the Arabian Peninsula's core regions.\n- Securing international trade and pilgrimage routes."
                }
            },
            i_turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    q_title: "ملحمة استرداد العاصمة",
                    q_story: "بعد سنوات من سقوط الدرعية، الرياض تحت سيطرة الغزاة. أنت الآن في 'خلوة الحلوة' بجبل طويق ومعك سيفك 'الأجرب'. هل تباغت الحامية بـ 40 رجلاً فقط؟",
                    choices: [
                        { text: "مباغتة الحصن ليلاً", feedback: "✅ 'الملك لله ثم لآل سعود'.. استعدت الرياض بذكائك وشجاعتك، وأعلنت قيام الدولة السعودية الثانية عاصمتها الرياض." },
                        { text: "الانسحاب لجمع جيش أكبر", feedback: "❌ أدى التأخير إلى كشف مكانك، واستطاع العدو تعزيز حصونه، مما جعل التحرير لاحقاً أكثر صعوبة ودموية." }
                    ],
                    biography: "• المؤسس: الإمام تركي بن عبد الله بن محمد بن سعود.\n• القصة: بطل استعادة المجد، قاد حرب عصابات ناجحة ضد الغزاة حتى استرد الرياض بسيفه 'الأجرب'.\n• الإنجازات:\n- تأسيس الدولة السعودية الثانية (1240هـ).\n- جعل الرياض العاصمة الدائمة للدولة السعودية.\n- نشر العدل والأمان وإعادة الاستقرار لنجد."
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    q_title: "Restoration of the Capital",
                    q_story: "Riyadh is occupied. You are hiding in Mount Tuwaiq with your legendary sword 'Al-Ajrab'. Do you raid the garrison with only 40 men?",
                    choices: [
                        { text: "Surprise Night Raid", feedback: "✅ Victory! You liberated Riyadh and established the Second Saudi State." },
                        { text: "Retreat to Build an Army", feedback: "❌ The delay allowed the enemy to fortify Riyadh, making the liberation much bloodier later on." }
                    ],
                    biography: "• Founder of the Second State: Imam Turki bin Abdullah.\n• Story: A resilient warrior who used strategic brilliance to expel invaders.\n• Achievements:\n- Founding the Second Saudi State.\n- Establishing Riyadh as the permanent capital.\n- Restoring peace and law across Central Arabia."
                }
            },
            k_aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    q_title: "ليلة فتح المصمك العظيم",
                    q_story: "وصلت إلى أسوار الرياض بـ 63 رجلاً فقط. الفجر يقترب، وبوابة حصن المصمك ستفتح لخروج الحاكم 'عجلان'. هل تقتحم البوابة فور فتحها أم تهاجم المدينة؟",
                    choices: [
                        { text: "اقتحام المصمك فوراً", feedback: "✅ 'الملك لله ثم لعبد العزيز'.. ببطولة خالدة، تم فتح المصمك وبدأ فجر المملكة العربية السعودية الحديثة." },
                        { text: "محاصرة أسوار المدينة", feedback: "⚠️ خطة آمنة، لكنها أدت لطول أمد الحصار وفقدان عنصر المفاجأة، مما كلفك الكثير من الوقت والموارد." }
                    ],
                    biography: "• المؤسس: الملك عبد العزيز بن عبد الرحمن آل سعود.\n• القصة: القائد العظيم الذي وحد القلوب قبل الأرض، بدأ من الصفر حتى أسس مملكة عظيمة تحت راية التوحيد.\n• الإنجازات:\n- فتح الرياض عام 1319هـ (1902م).\n- توحيد كافة أقاليم المملكة العربية السعودية.\n- البدء في نهضة التعليم والنفط والاتصالات."
                },
                en: {
                    name: "King Abdulaziz",
                    q_title: "The Battle of Masmak",
                    q_story: "Outside Riyadh with only 63 men. The Masmak Fort gate opens at dawn. Do you storm the gate immediately?",
                    choices: [
                        { text: "Storm the Fort Now", feedback: "✅ 'The Kingdom is for Allah then for Abdulaziz!'.. You conquered Masmak and began the era of modern Saudi Arabia." },
                        { text: "Besiege the City Walls", feedback: "⚠️ Safety cost you time. The element of surprise was lost, and the battle became a long struggle." }
                    ],
                    biography: "• The Great Founder: King Abdulaziz Al Saud.\n• Story: A legendary leader who unified a fragmented land into a modern, thriving Kingdom.\n• Achievements:\n- Conquest of Riyadh (1902).\n- Unification of the Kingdom of Saudi Arabia.\n- Launching the modern era of education and energy."
                }
            }
        };

        const INTERFACE_TEXT = {
            ar: { g_h: "ملاحم التأسيس", g_d: "رحلة تفاعلية في قلب التاريخ السعودي، حيث تصنع قراراتك مجد الأمم.", s_h: "اختر القائد", v_h: "حكم التاريخ", a_h: "سجل الخالدين", start: "ابدأ الملحمة", arch: "سجل الخالدين", back: "العودة", again: "تجربة مسار جديد", dir: "rtl" },
            en: { g_h: "Founding Epics", g_d: "An interactive journey through Saudi history, where your decisions create glory.", s_h: "Select Leader", v_h: "The Verdict", a_h: "Immortal Archive", start: "Start the Epic", arch: "The Archive", back: "Back", again: "Try Another Fate", dir: "ltr" }
        };

        /**
         * CORE ENGINE: المتحكم الرئيسي في التطبيق
         */
        const Core = {
            lang: 'ar',

            init() {
                this.setLanguage('ar');
                Engine.start(); // تشغيل محرك العاصفة الرملية
            },

            setLanguage(l) {
                this.lang = l;
                const ui = INTERFACE_TEXT[l];
                document.documentElement.dir = ui.dir;
                
                // تحديث أزرار اختيار اللغة
                document.querySelectorAll('.lang-node').forEach(n => n.classList.remove('active'));
                document.getElementById('btn-' + l).classList.add('active');

                // تحديث نصوص الواجهة
                document.getElementById('ui-gate-h').innerText = ui.g_h;
                document.getElementById('ui-gate-d').innerText = ui.g_d;
                document.getElementById('ui-btn-start').innerText = ui.start;
                document.getElementById('ui-btn-arch').innerText = ui.arch;
                document.getElementById('ui-select-h').innerText = ui.s_h;
                document.getElementById('ui-verdict-h').innerText = ui.v_h;
                document.getElementById('ui-archive-h').innerText = ui.a_h;
                document.getElementById('ui-btn-replay').innerText = ui.again;
                
                // تحديث أزرار العودة
                for(let i=1; i<=5; i++) { document.getElementById('ui-back-'+i).innerText = ui.back; }

                this.renderComponents();
            },

            navigate(screenId) {
                const screens = document.querySelectorAll('.screen-unit');
                screens.forEach(s => {
                    s.classList.remove('active-screen');
                    setTimeout(() => { s.style.display = 'none'; }, 400);
                });

                setTimeout(() => {
                    const target = document.getElementById(screenId);
                    target.style.display = 'block';
                    setTimeout(() => { target.classList.add('active-screen'); }, 50);
                    document.getElementById('global-scroller').scrollTop = 0;
                }, 450);
            },

            renderComponents() {
                const heroGrid = document.getElementById('hero-grid-injection');
                const archGrid = document.getElementById('archive-grid-injection');
                heroGrid.innerHTML = ''; archGrid.innerHTML = '';

                Object.keys(DATA_MASTER).forEach(key => {
                    const hero = DATA_MASTER[key][this.lang];
                    
                    // توليد أزرار القادة في شاشة الاختيار
                    const hBtn = document.createElement('button');
                    hBtn.className = 'action-btn';
                    hBtn.innerText = hero.name;
                    hBtn.onclick = () => this.startQuest(key);
                    heroGrid.appendChild(hBtn);

                    // توليد أزرار القادة في شاشة الأرشيف
                    const aBtn = document.createElement('button');
                    aBtn.className = 'action-btn';
                    aBtn.innerText = hero.name;
                    aBtn.onclick = () => this.showBiography(key);
                    archGrid.appendChild(aBtn);
                });
            },

            startQuest(key) {
                const q = DATA_MASTER[key][this.lang];
                document.getElementById('quest-header').innerText = q.q_title;
                document.getElementById('quest-body').innerText = q.q_story;
                const footer = document.getElementById('quest-footer-actions');
                footer.innerHTML = '';

                q.choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'action-btn';
                    btn.innerText = choice.text;
                    btn.onclick = () => {
                        document.getElementById('verdict-body').innerText = choice.feedback;
                        this.navigate('scr-verdict');
                    };
                    footer.appendChild(btn);
                });
                this.navigate('scr-quest');
            },

            showBiography(key) {
                const b = DATA_MASTER[key][this.lang];
                document.getElementById('bio-title').innerText = b.name;
                document.getElementById('bio-body').innerText = b.biography;
                this.navigate('scr-biography');
            }
        };

        /**
         * GRAPHICS ENGINE: محرك العاصفة الرملية الكثيفة (Titan Storm)
         * محسن للأداء لمنع أي تعليق (Lag-Free)
         */
        const Engine = {
            canvas: document.getElementById('titan-storm-canvas'),
            ctx: null,
            particles: [],
            pCount: 850, // كثافة عالية جداً لرمال الصحراء

            start() {
                this.ctx = this.canvas.getContext('2d', { alpha: true });
                this.resize();
                this.spawn();
                this.loop();
                window.addEventListener('resize', () => this.resize());
            },

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },

            spawn() {
                this.particles = [];
                for(let i=0; i<this.pCount; i++) {
                    this.particles.push(new this.Particle(this.canvas));
                }
            },

            Particle: class {
                constructor(canvas) {
                    this.canvas = canvas;
                    this.reset();
                }
                reset() {
                    // العاصفة تهب من الجانبين نحو المركز
                    this.side = Math.random() > 0.5 ? 'L' : 'R';
                    this.x = this.side === 'L' ? -Math.random() * 500 : this.canvas.width + Math.random() * 500;
                    this.y = Math.random() * this.canvas.height;
                    this.size = Math.random() * 2.5 + 0.5;
                    this.vx = this.side === 'L' ? (Math.random() * 5 + 2) : -(Math.random() * 5 + 2);
                    this.vy = (Math.random() - 0.5) * 2;
                    this.op = Math.random() * 0.5 + 0.1;
                    this.color = '#8E6D2D'; // لون رمال الصحراء الذهبي الداكن
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    // إعادة التدوير عند الخروج من حدود الشاشة
                    if (this.side === 'L' && this.x > this.canvas.width + 100) this.reset();
                    if (this.side === 'R' && this.x < -100) this.reset();
                }
                draw(ctx) {
                    ctx.globalAlpha = this.op;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            },

            loop() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for(let i=0; i<this.particles.length; i++) {
                    this.particles[i].update();
                    this.particles[i].draw(this.ctx);
                }
                requestAnimationFrame(() => this.loop());
            }
        };

        // تشغيل المحرك عند تحميل الصفحة
        window.onload = () => Core.init();
        
        // منع القائمة الافتراضية بيمين الماوس لمزيد من الاحترافية
        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
