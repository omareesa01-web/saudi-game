<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ملحمة التأسيس - نسخة الأنيميشن الكاملة</title>
    <style>
        :root { 
            --gold: #c1a35f; --dark: #052c19; --glass: rgba(0, 0, 0, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--dark); font-family: 'Segoe UI', sans-serif; 
            color: white; overflow: hidden;
        }
        
        /* تأثير الأنيميشن في الخلفية */
        #bg-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -2; background-size: cover; background-position: center; 
            transition: opacity 1.5s ease-in-out; 
            filter: brightness(0.4);
            animation: bgZoom 20s infinite alternate;
        }

        @keyframes bgZoom {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        .bg-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, transparent 20%, var(--dark) 95%); 
            z-index: -1; 
        }

        .screen { 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; padding: 20px; text-align: center; 
        }
        
        /* أنيميشن دخول الشاشات */
        .active { 
            display: flex; 
            animation: fadeInScreen 0.8s ease-out forwards; 
        }

        @keyframes fadeInScreen {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .card { 
            background: var(--glass); border: 2px solid var(--gold); 
            padding: 30px; border-radius: 20px; max-width: 650px; width: 90%; 
            backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(0,0,0,1);
            max-height: 80vh; overflow-y: auto;
        }
        
        h1 { color: var(--gold); text-shadow: 0 0 15px var(--gold); margin-bottom: 20px; }
        
        .option-btn {
            background: rgba(193, 163, 95, 0.1); border: 1px solid var(--gold);
            color: white; padding: 16px; margin: 10px 0; border-radius: 12px;
            cursor: pointer; width: 100%; font-size: 1.1rem; transition: 0.4s;
        }

        /* أنيميشن عند لمس الأزرار */
        .option-btn:active { transform: scale(0.95); background: var(--gold); }
        
        .result-box { 
            display: none; padding: 20px; border-right: 5px solid var(--gold); 
            background: rgba(255,255,255,0.05); margin-top: 15px; 
            animation: slideRight 0.5s forwards;
        }

        @keyframes slideRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .back-link { margin-top: 20px; color: #f1d38e; cursor: pointer; font-weight: bold; display: block; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div class="bg-overlay"></div>

    <div id="start-screen" class="screen active">
        <h1 style="font-size: 3rem;">ملاحم التأسيس</h1>
        <button class="option-btn" style="width:250px" onclick="nav('game-screen')">ابدأ اللعب</button>
        <button class="option-btn" style="width:250px" onclick="nav('history-screen')">قصص الأبطال</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="card">
            <h1 id="g-title">اختر القائد</h1>
            <p id="g-desc">مستقبل 2026 بين يديك..</p>
            <div id="opt-cont">
                <button class="option-btn" onclick="start('saud')">الإمام محمد بن سعود</button>
                <button class="option-btn" onclick="start('turki')">الإمام تركي بن عبد الله</button>
                <button class="option-btn" onclick="start('abdulaziz')">الملك عبد العزيز</button>
            </div>
            <div id="res-box" class="result-box"></div>
            <div class="back-link" onclick="location.reload()">العودة للرئيسية</div>
        </div>
    </div>

    <div id="history-screen" class="screen">
        <div class="card">
            <h1 id="h-title">سجل الملاحم</h1>
            <p id="h-content">اختر بطلاً لتعرف قصته الطويلة..</p>
            <div id="h-menu">
                <button class="option-btn" onclick="showLore('saud')">قصة الإمام محمد بن سعود</button>
                <button class="option-btn" onclick="showLore('turki')">قصة الإمام تركي بن عبد الله</button>
                <button class="option-btn" onclick="showLore('abdulaziz')">قصة الملك عبد العزيز</button>
            </div>
            <div class="back-link" onclick="nav('start-screen')">رجوع</div>
        </div>
    </div>

    <script>
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        const db = {
            saud: { s: "تحدي الفكر: الدرعية تحتاج ميثاقاً يجمع القلوب، ماذا تقرر؟", img: "saud_ilm.gif", opt: [{t:"عقد ميثاق الدرعية", r:"✅ 2026: الدرعية اليوم عاصمة الثقافة."}, {t:"الاهتمام بالتجارة فقط", r:"⚠️ 2026: تعثرت النهضة الفكرية."}, {t:"تأجيل الميثاق", r:"⚠️ 2026: ضعفت الهوية الوطنية."}] },
            turki: { s: "تحدي الأمن: الرياض عادت ولكن الطرق مخيفة، كيف تبسط العدل؟", img: "turki_security.gif", opt: [{t:"سيف الأجرب والعدل", r:"✅ 2026: نحن الملاذ الآمن الأول عالمياً."}, {t:"التهاون مع الفوضى", r:"⚠️ 2026: ضاعت هيبة النظام."}, {t:"إغلاق المداخل", r:"⚠️ 2026: انغلق الاقتصاد."}] },
            abdulaziz: { s: "تحدي الوحدة: كيف تجمع القبائل والمدن في وطن واحد؟", img: "aziz_unity.gif", opt: [{t:"توطين البادية والتعليم", r:"✅ 2026: نحن شعب واحد صلب كجبل طويق."}, {t:"الاعتماد على العهود", r:"⚠️ 2026: واجهت الوحدة تصدعات."}, {t:"تجاهل المناطق البعيدة", r:"⚠️ 2026: تعثر الاقتصاد."}] }
        };

        function start(w) {
            const c = db[w];
            const bg = document.getElementById('bg-layer');
            bg.style.opacity = 0; // إخفاء تدريجي للخلفية القديمة
            setTimeout(() => {
                bg.style.backgroundImage = `url('${c.img}')`;
                bg.style.opacity = 1; // ظهور تدريجي للخلفية الجديدة (Animation)
            }, 500);

            document.getElementById('g-title').innerText = "مهمة القائد";
            document.getElementById('g-desc').innerText = c.s;
            let h = "";
            c.opt.forEach(o => h += `<button class="option-btn" onclick="done('${o.r.replace(/'/g, "\\'")}')">${o.t}</button>`);
            document.getElementById('opt-cont').innerHTML = h;
            document.getElementById('res-box').style.display = 'none';
        }

        function done(r) {
            document.getElementById('opt-cont').style.display = 'none';
            document.getElementById('g-desc').style.display = 'none';
            const rb = document.getElementById('res-box');
            rb.style.display = 'block';
            rb.innerHTML = `<strong>النتيجة:</strong><br><br>${r}`;
        }

        const lore = {
            saud: "في عام 1727م، أعلن الإمام محمد بن سعود قيام الدولة السعودية الأولى من الدرعية. بدأ بتأمين الحج ونشر العلم وعقد ميثاقاً تاريخياً غير وجه المنطقة، محولاً الدرعية لمركز قوة استقطب العلماء والفرسان، مؤسساً جذوراً راسخة لوطن لا يزال ينمو منذ 300 عام.",
            turki: "بعد سقوط الدرعية، عاد الإمام تركي بن عبدالله بسيفه الأجرب عام 1824 ليحرر الرياض. بنى قصر الحكم وأعاد هيبة الدولة والعدل للطرقات، محولاً اليأس إلى أمل، جاعلاً من الرياض عاصمة دائمة للدولة السعودية الثانية وقلب الجزيرة النابض بالعدل.",
            abdulaziz: "بـ 40 رجلاً فقط، فتح الملك عبدالعزيز حصن المصمك في ليلة تاريخية عام 1902. ومن هناك خاض ملحمة 30 عاماً لتوحيد القبائل والمدن، وازن فيها بين الأصالة والتقنية، فجلب البرقيات وحفر النفط، ليصنع المملكة العربية السعودية العظمى التي نعيش في عزها اليوم."
        };

        function showLore(w) {
            document.getElementById('h-content').innerText = lore[w];
            document.getElementById('h-menu').style.display = 'none';
            document.getElementById('h-title').innerText = "ملحمة " + (w==='saud'?'التأسيس':w==='turki'?'الاستعادة':'التوحيد');
        }
    </script>
</body>
</html>
