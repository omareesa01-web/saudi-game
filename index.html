<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملاحم التأسيس | Founding Epics</title>
    
    <style>
        :root {
            --saudi-green: #006C35; 
            --light-green: #00843D;
            --glow-green: #22C55E;
            --deep-green: #062113;
            --forest-black: #010a05;
            --glass-bg: rgba(0, 30, 15, 0.96); 
            --glass-border: rgba(34, 197, 94, 0.45);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body, html {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--deep-green) 0%, var(--forest-black) 100%);
            color: #ffffff; font-family: var(--font-main);
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        .screen { display: none; opacity: 0; transition: opacity 0.5s ease; width: 100%; }
        .screen.active { display: block; opacity: 1; }

        #titan-engine-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

        .language-hub { position: fixed; top: 15px; left: 15px; z-index: 1000; display: flex; gap: 8px; }
        .lang-btn {
            background: rgba(0, 40, 20, 0.9); border: 1px solid var(--glow-green);
            color: var(--glow-green); padding: 6px 12px; border-radius: 20px;
            cursor: pointer; font-weight: 900; transition: 0.3s; font-size: 0.75rem;
        }
        .lang-btn.active { background: var(--saudi-green); color: #fff; box-shadow: 0 0 15px var(--glow-green); }

        .app-container {
            position: relative; z-index: 100; width: 90%; max-width: 440px;
            background: var(--glass-bg); backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border); border-top: 6px solid var(--saudi-green);
            border-radius: 30px; padding: 30px 20px; text-align: center;
            box-shadow: 0 60px 120px rgba(0,0,0,0.8); max-height: 85vh; 
            overflow-y: auto; overflow-x: hidden;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .app-container::-webkit-scrollbar { display: none; }

        .main-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 12px; text-shadow: 0 0 15px var(--glow-green); }
        .description-text { font-size: 0.9rem; line-height: 1.5; color: #bbb; margin-bottom: 25px; }

        .btn-epic {
            position: relative; width: 100%; padding: 15px; margin-bottom: 12px;
            background: linear-gradient(135deg, var(--saudi-green), var(--deep-green));
            border: 1px solid var(--glow-green); border-radius: 15px;
            color: #ffffff; font-size: 0.95rem; font-weight: 800; cursor: pointer; 
            transition: 0.4s; overflow: hidden; text-decoration: none; display: block;
        }
        .btn-epic:hover { transform: scale(1.02); background: var(--light-green); border-color: #fff; box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }

        .lore-box {
            background: rgba(0, 0, 0, 0.5); border-radius: 20px; padding: 25px;
            margin: 15px 0; text-align: justify; line-height: 1.9; font-size: 0.95rem;
            color: #f0f0f0; border-right: 8px solid var(--saudi-green);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5); white-space: pre-line;
        }
        [dir="ltr"] .lore-box { border-right: 0; border-left: 8px solid var(--saudi-green); text-align: left; }

        .top-back-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
            color: #fff; padding: 5px 12px; border-radius: 12px;
            font-size: 0.8rem; cursor: pointer; display: none; z-index: 150;
        }
        [dir="ltr"] .top-back-btn { right: auto; left: 20px; }
    </style>
</head>
<body>

    <canvas id="titan-engine-canvas"></canvas>

    <div class="language-hub">
        <div id="btn-ar" class="lang-btn active" onclick="setGlobalLang('ar')">AR</div>
        <div id="btn-en" class="lang-btn" onclick="setGlobalLang('en')">EN</div>
    </div>

    <div class="app-container" id="app-scroller">
        <button id="global-back-btn" class="top-back-btn" onclick="goBack()">←</button>

        <div id="screen-gate" class="screen active">
            <h1 class="main-title" id="t-gate-h">ملاحم التأسيس</h1>
            <p class="description-text" id="t-gate-d">واجه مصيرك في تاريخ المجد السعودي.</p>
            <button class="btn-epic" id="t-btn-start" onclick="navigateTo('screen-selection')">ابدأ الرحلة</button>
            <button class="btn-epic" id="t-btn-archive" onclick="navigateTo('screen-archive')">الأرشيف</button>
        </div>

        <div id="screen-selection" class="screen">
            <h1 class="main-title" id="t-select-h">اختر القائد</h1>
            <div id="hero-injection-point"></div>
        </div>

        <div id="screen-scenarios" class="screen">
            <h1 class="main-title" id="t-scen-h">اختر الموقف</h1>
            <div id="scenario-injection-point"></div>
        </div>

        <div id="screen-quest" class="screen">
            <h1 id="quest-title-header" style="color: var(--glow-green); font-size: 1.3rem; margin-bottom: 15px;"></h1>
            <div id="quest-content-box" class="lore-box"></div>
            <div id="quest-actions-container"></div>
        </div>

        <div id="screen-result" class="screen">
            <h1 class="main-title" id="t-res-h">حكم التاريخ</h1>
            <div id="result-text-box" class="lore-box"></div>
            <button class="btn-epic" id="t-btn-retry" onclick="navigateTo('screen-scenarios')">مسار آخر</button>
            <button class="btn-epic" id="t-btn-home" onclick="navigateTo('screen-gate')">الرئيسية</button>
        </div>

        <div id="screen-archive" class="screen">
            <h1 class="main-title" id="t-arch-h">سجل الخالدين</h1>
            <div id="arch-injection-point"></div>
        </div>

        <div id="screen-biography" class="screen">
            <h1 id="bio-hero-name" class="main-title"></h1>
            <div id="bio-content-box" class="lore-box" style="font-size: 0.9rem;"></div>
        </div>
    </div>

    <script>
        let navigationHistory = ['screen-gate'];

        const EPIC_DATA = {
            m_saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    scenarios: [
                        {
                            title: "ميثاق الدرعية التاريخي (1744م)",
                            story: "الجزيرة العربية تعيش في شتات سياسي. الشيخ محمد بن عبدالوهاب يصل للدرعية باحثاً عن ناصر للدعوة. هل تعقد ميثاقاً يؤسس للدولة؟",
                            decisions: [
                                { l: "عقد الميثاق ونصرة الدولة", f: "✅ 'أبشر ببلاد خير من بلادك'. ولدت الدولة السعودية الأولى وتحولت الدرعية لعاصمة مهابة." },
                                { l: "تأمين الشيخ دون تحالف سياسي", f: "⚠️ غابت القوة الموحدة التي تحمي الدعوة وتوحد القبائل." }
                            ]
                        },
                        {
                            title: "بناء أسوار الدرعية",
                            story: "التهديدات الخارجية تزداد. هل تبدأ فوراً ببناء سور عظيم يحيط بالمدينة أم تعتمد على سرعة المناورة في الصحراء؟",
                            decisions: [
                                { l: "بناء سور الدرعية العظيم", f: "✅ بفضل السور وصمود الشعب، تحطمت أحلام الغزاة عند أسوار العاصمة." },
                                { l: "الاعتماد على حرب المناورة", f: "⚠️ حققت انتصارات صغيرة لكن العاصمة ظلت عرضة للاختراق." }
                            ]
                        }
                    ],
                    biography: "المؤسس الأول للدولة السعودية الأولى (توفي 1765م). باني نهضتها السياسية وحامي حمى الدرعية."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    scenarios: [
                        {
                            title: "The Diriyah Pact (1744)",
                            story: "Arabia is fractured. Sheikh Muhammad bin Abdul Wahab seeks a partner. Do you form a historic pact?",
                            decisions: [
                                { l: "Form the Pact", f: "✅ The First Saudi State was born, and Diriyah became a powerful regional capital." },
                                { l: "Offer Protection Only", f: "⚠️ Without a political alliance, the state lacked the strength to unite the tribes." }
                            ]
                        },
                        {
                            title: "Building Diriyah Walls",
                            story: "External threats are rising. Do you build a great defensive wall or rely on desert maneuvers?",
                            decisions: [
                                { l: "Build the Great Wall", f: "✅ The walls saved the capital from numerous invasions, ensuring state stability." },
                                { l: "Rely on Maneuvers", f: "⚠️ Small victories were won, but the capital remained vulnerable to raids." }
                            ]
                        }
                    ],
                    biography: "The First Founder of the Saudi State. A wise leader who established the foundations of Saudi unity."
                }
            },
            i_turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    scenarios: [
                        {
                            title: "استعادة الرياض (1824م)",
                            story: "بعد سقوط الدرعية، الرياض تحت الاحتلال. هل تباغت الحصن بـ 40 رجلاً فقط لاستعادة ملك آبائك؟",
                            decisions: [
                                { l: "قيادة هجوم فدائي مباغت", f: "✅ نصر من الله! استعدت الرياض وأعلنت قيام الدولة السعودية الثانية بسيفك الأجرب." },
                                { l: "الانتظار لجمع جيش ضخم", f: "⚠️ استغرق الأمر سنوات إضافية من المعاناة تحت الاحتلال." }
                            ]
                        },
                        {
                            title: "بناء الرياض كعاصمة جديدة",
                            story: "الدرعية كانت ركاماً. هل تعيد إعمارها أم تعلن الرياض عاصمة جديدة وتبني حصونها؟",
                            decisions: [
                                { l: "إعلان الرياض عاصمة للدولة", f: "✅ قرار استراتيجي! أصبحت الرياض معقل العز الجديد ومركزاً لا يقهر." },
                                { l: "إعادة إعمار الدرعية المنهارة", f: "⚠️ استنزفت الموارد في أطلال يصعب حمايتها عسكرياً في ذلك الوقت." }
                            ]
                        }
                    ],
                    biography: "مؤسس الدولة السعودية الثانية. اشتهر بسيفه 'الأجرب' وبطولاته في استعادة ملك آل سعود."
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    scenarios: [
                        {
                            title: "Restoring Riyadh (1824)",
                            story: "Riyadh is occupied. Do you lead a surprise raid with 40 men or wait to gather a larger force?",
                            decisions: [
                                { l: "Lead a Surprise Raid", f: "✅ Victory! You reclaimed Riyadh and established the Second Saudi State." },
                                { l: "Wait for a Large Army", f: "⚠️ The occupation lasted longer, and the enemy reinforced their positions." }
                            ]
                        },
                        {
                            title: "Riyadh: The New Capital",
                            story: "Diriyah was in ruins. Do you rebuild it or move the capital to Riyadh?",
                            decisions: [
                                { l: "Move Capital to Riyadh", f: "✅ A historic move! Riyadh became the new heart of the Saudi nation." },
                                { l: "Rebuild Diriyah", f: "⚠️ Resources were wasted on ruins that were strategically difficult to defend." }
                            ]
                        }
                    ],
                    biography: "The founder of the Second Saudi State. A legendary leader known for his courage and the sword 'Al-Ajrab'."
                }
            },
            k_aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    scenarios: [
                        {
                            title: "فتح المصمك (1902م)",
                            story: "تقف عند أسوار الرياض بـ 63 رجلاً. هل تقتحم المصمك عند الفجر لتعيد ملك الأجداد؟",
                            decisions: [
                                { l: "اقتحام المصمك عند الفجر", f: "✅ 'الملك لله ثم لعبد العزيز!' سقط المصمك وبدأت ملحمة التوحيد الكبرى." },
                                { l: "الانسحاب لطلب الدعم", f: "❌ ضاعت فرصة المباغتة وظلت الرياض بعيدة المنال لسنوات أخرى." }
                            ]
                        },
                        {
                            title: "اكتشاف النفط (1938م)",
                            story: "المملكة تمر بظروف اقتصادية صعبة. هل توقع اتفاقية التنقيب مع الشركات الأجنبية؟",
                            decisions: [
                                { l: "توقيع اتفاقية التنقيب", f: "✅ تدفق الخير من بئر رقم 7، وانتقلت المملكة لعصر النهضة العالمي." },
                                { l: "رفض دخول الشركات", f: "⚠️ ظلت الموارد محدودة وتأخرت المملكة عن ركب التطور العقود." }
                            ]
                        }
                    ],
                    biography: "مؤسس المملكة العربية السعودية الحديثة. صقر الجزيرة وباني نهضتها المعاصرة."
                },
                en: {
                    name: "King Abdulaziz",
                    scenarios: [
                        {
                            title: "The Battle of Al-Masmak",
                            story: "With 63 men, you stand at Riyadh's walls. Do you storm the fortress at dawn?",
                            decisions: [
                                { l: "Storm the Fortress", f: "✅ 'The Kingdom is for Allah, then for Abdulaziz!' The unification of Saudi Arabia began." },
                                { l: "Withdraw and Wait", f: "❌ The surprise was lost, and the dream of return was delayed for years." }
                            ]
                        },
                        {
                            title: "Oil Discovery (1938)",
                            story: "The economy is struggling. Do you sign the oil exploration agreement with foreign firms?",
                            decisions: [
                                { l: "Sign the Agreement", f: "✅ Oil flowed from Well No. 7, transforming the nation into a global power." },
                                { l: "Refuse the Agreement", f: "⚠️ Resources remained scarce, hindering the nation's rapid development." }
                            ]
                        }
                    ],
                    biography: "The Founder of the modern Kingdom of Saudi Arabia. A visionary leader who unified the desert tribes."
                }
            }
        };

        const LOCALIZATION = {
            ar: { 
                g_h: "ملاحم التأسيس", g_d: "واجه مصيرك في تاريخ المجد السعودي.", s_h: "اختر القائد", sc_h: "اختر الموقف", r_h: "حكم التاريخ", a_h: "سجل الخالدين", 
                start_btn: "ابدأ الرحلة", arch_btn: "الأرشيف", retry_btn: "مسار آخر", home_btn: "الرئيسية", back_text: "عودة", dir: "rtl" 
            },
            en: { 
                g_h: "Founding Epics", g_d: "Face your destiny in Saudi history.", s_h: "Select Leader", sc_h: "Select Scenario", r_h: "History Verdict", a_h: "Hall of Heroes", 
                start_btn: "Start Journey", arch_btn: "Archive", retry_btn: "Try Again", home_btn: "Home", back_text: "Back", dir: "ltr" 
            }
        };

        let currentLanguage = 'ar';
        let selectedHeroKey = null;

        function setGlobalLang(l) {
            currentLanguage = l;
            const t = LOCALIZATION[l];
            document.documentElement.lang = l;
            document.documentElement.dir = t.dir;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + l).classList.add('active');
            document.getElementById('t-gate-h').innerText = t.g_h;
            document.getElementById('t-gate-d').innerText = t.g_d;
            document.getElementById('t-btn-start').innerText = t.start_btn;
            document.getElementById('t-btn-archive').innerText = t.arch_btn;
            document.getElementById('t-select-h').innerText = t.s_h;
            document.getElementById('t-scen-h').innerText = t.sc_h;
            document.getElementById('t-res-h').innerText = t.r_h;
            document.getElementById('t-arch-h').innerText = t.a_h;
            document.getElementById('t-btn-retry').innerText = t.retry_btn;
            document.getElementById('t-btn-home').innerText = t.home_btn;
            document.getElementById('global-back-btn').innerText = t.back_text;
            rebuildInteractiveGrids();
        }

        function navigateTo(screenId, storeHistory = true) {
            document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
            const target = document.getElementById(screenId);
            target.style.display = 'block';
            setTimeout(() => { target.classList.add('active'); }, 10);
            if(storeHistory) navigationHistory.push(screenId);
            document.getElementById('global-back-btn').style.display = (screenId === 'screen-gate') ? 'none' : 'block';
            document.getElementById('app-scroller').scrollTop = 0;
        }

        function goBack() {
            if (navigationHistory.length > 1) {
                navigationHistory.pop();
                navigateTo(navigationHistory[navigationHistory.length - 1], false);
            }
        }

        function rebuildInteractiveGrids() {
            const hPoint = document.getElementById('hero-injection-point');
            const aPoint = document.getElementById('arch-injection-point');
            hPoint.innerHTML = ''; aPoint.innerHTML = '';
            Object.keys(EPIC_DATA).forEach(key => {
                const name = EPIC_DATA[key][currentLanguage].name;
                const hBtn = document.createElement('button');
                hBtn.className = 'btn-epic';
                hBtn.innerText = name;
                hBtn.onclick = () => showScenarios(key);
                hPoint.appendChild(hBtn);

                const aBtn = document.createElement('button');
                aBtn.className = 'btn-epic';
                aBtn.innerText = name;
                aBtn.onclick = () => {
                    document.getElementById('bio-hero-name').innerText = name;
                    document.getElementById('bio-content-box').innerText = EPIC_DATA[key][currentLanguage].biography;
                    navigateTo('screen-biography');
                };
                aPoint.appendChild(aBtn);
            });
        }

        function showScenarios(heroKey) {
            selectedHeroKey = heroKey;
            const sPoint = document.getElementById('scenario-injection-point');
            sPoint.innerHTML = '';
            EPIC_DATA[heroKey][currentLanguage].scenarios.forEach((sc, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = sc.title;
                btn.onclick = () => loadQuest(index);
                sPoint.appendChild(btn);
            });
            navigateTo('screen-scenarios');
        }

        function loadQuest(scIndex) {
            const sc = EPIC_DATA[selectedHeroKey][currentLanguage].scenarios[scIndex];
            document.getElementById('quest-title-header').innerText = sc.title;
            document.getElementById('quest-content-box').innerText = sc.story;
            const aContainer = document.getElementById('quest-actions-container');
            aContainer.innerHTML = '';
            sc.decisions.forEach(dec => {
                const btn = document.createElement('button');
                btn.className = 'btn-epic';
                btn.innerText = dec.l;
                btn.onclick = () => {
                    document.getElementById('result-text-box').innerText = dec.f;
                    navigateTo('screen-result');
                };
                aContainer.appendChild(btn);
            });
            navigateTo('screen-quest');
        }

        const canvas = document.getElementById('titan-engine-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        class P {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2; this.vx = (Math.random()-0.5)*0.2; this.vy = (Math.random()-0.5)*0.2; }
            u() { this.x+=this.vx; this.y+=this.vy; if(this.x>canvas.width||this.x<0)this.vx*=-1; if(this.y>canvas.height||this.y<0)this.vy*=-1; }
            d() { ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fillStyle='#22C55E'; ctx.globalAlpha=0.15; ctx.fill(); }
        }
        function init() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; particles=[]; for(let i=0;i<150;i++) particles.push(new P()); }
        function loop() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.u();p.d();}); requestAnimationFrame(loop); }
        window.onresize=init; init(); loop(); setGlobalLang('ar');
    </script>
</body>
</html>
