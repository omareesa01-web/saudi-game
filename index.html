<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ملحمة التأسيس - نسخة الجوال السريعة</title>
    <style>
        :root { --gold: #c1a35f; --dark: #05160d; --glass: rgba(0, 0, 0, 0.9); }

        /* تحسين الأداء للجوال: تقليل عمليات التنعيم المعقدة */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--dark); font-family: sans-serif; 
            color: white; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #0a2a18 0%, var(--dark) 100%); 
            z-index: -2; 
        }

        .screen { display: none; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 15px; text-align: center; }
        .active { display: flex; animation: mobileFade 0.4s ease-out forwards; }

        @keyframes mobileFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--glass); border: 1px solid var(--gold); 
            padding: 25px; border-radius: 25px; width: 90%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-height: 80vh; overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* سلاسة التمرير في الآيفون */
        }

        .option-btn {
            background: #1a1a1a; border: 1px solid var(--gold);
            color: white; padding: 15px; margin: 10px 0; border-radius: 15px;
            cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: bold;
            transition: transform 0.1s; /* تقليل وقت التحول للاستجابة السريعة */
        }

        .option-btn:active { transform: scale(0.98); background: var(--gold); color: black; }

        /* --- تأثير الرمل الخفيف جداً للجوال --- */
        .sand-layer {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background-image: radial-gradient(var(--gold) 1px, transparent 1px);
            background-size: 40px 40px; /* ذرات متباعدة لراحة المعالج */
            animation: sandMove 20s linear infinite;
            opacity: 0.2;
        }

        @keyframes sandMove {
            from { transform: translateY(0); }
            to { transform: translateY(-100vh); }
        }

        .back-link { margin-top: 20px; color: var(--gold); display: inline-block; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div class="sand-layer"></div>

    <div id="main-menu" class="screen active">
        <h1 style="color: var(--gold); font-size: 2.5rem;">ملاحم التأسيس</h1>
        <button class="option-btn" onclick="go('game-engine')">دخول الملحمة</button>
        <button class="option-btn" onclick="go('lore-engine')">سجل الأبطال</button>
    </div>

    <div id="game-engine" class="screen">
        <div class="card" id="game-content">
            <h2 style="color: var(--gold);">اختر القائد</h2>
            <button class="option-btn" onclick="play('saud')">الإمام محمد بن سعود</button>
            <button class="option-btn" onclick="play('turki')">الإمام تركي بن عبد الله</button>
            <button class="option-btn" onclick="play('aziz')">الملك عبد العزيز</button>
            <a href="#" class="back-link" onclick="location.reload()">رجوع</a>
        </div>
    </div>

    <div id="lore-engine" class="screen">
        <div class="card">
            <h2 id="l-title" style="color: var(--gold);">السجل التاريخي</h2>
            <p id="l-text" style="line-height: 1.8; text-align: justify;"></p>
            <div id="l-btns">
                <button class="option-btn" onclick="read('saud')">عهد التأسيس</button>
                <button class="option-btn" onclick="read('turki')">عهد الاستعادة</button>
                <button class="option-btn" onclick="read('aziz')">عهد التوحيد</button>
            </div>
            <a href="#" class="back-link" onclick="go('main-menu')">رجوع</a>
        </div>
    </div>

    <script>
        // دالة التنقل السريع
        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        const STORIES = {
            saud: { q: "ميثاق الدرعية: كيف تجمع الناس على كلمة واحدة في عام 1727م؟", r: "عقدت الميثاق ونشرت العلم؛ فأصبحت الدرعية قلب الجزيرة النابض ومصدر قوتها." },
            turki: { q: "سيف الأجرب: الرياض عادت، كيف تثبت أركان الحكم؟", r: "بالعدل والحزم أعدت الهيبة، وصارت الرياض واحة للأمن بعد سنين من الاضطراب." },
            aziz: { q: "وحدة الوطن: كيف توحد القبائل تحت راية واحدة؟", r: "بنيت 'الهجر' وعلمت الناس، فصنعت شعباً واحداً مخلصاً لوطنه ودينه." }
        };

        function play(id) {
            const s = STORIES[id];
            const div = document.getElementById('game-content');
            div.innerHTML = `<h2 style="color:var(--gold)">القرار المصيري</h2><p>${s.q}</p>
            <button class="option-btn" onclick="res('${s.r}')">اتخاذ القرار</button>
            <a href="#" class="back-link" onclick="location.reload()">تراجع</a>`;
        }

        function res(txt) {
            document.getElementById('game-content').innerHTML = `<h2 style="color:var(--gold)">حكم التاريخ</h2><p>${txt}</p>
            <a href="#" class="back-link" onclick="location.reload()">العودة للبداية</a>`;
        }

        function read(id) {
            const texts = {
                saud: "في 1727م، وضع الإمام محمد بن سعود لبنة الدولة الأولى، جاعلاً من الدرعية منارة للعلم والحضارة، لتمتد جذورنا لثلاثة قرون من العز.",
                turki: "بشجاعة نادرة، استعاد الإمام تركي الرياض في 1824م، وأثبت بسيفه 'الأجرب' أن الدولة السعودية لا تنكسر أبداً.",
                aziz: "في 1902م، انطلقت ملحمة التوحيد بقيادة الملك عبدالعزيز، الذي جمع القلوب قبل الأراضي، ليبني مملكة شامخة نعتز بها اليوم."
            };
            document.getElementById('l-text').innerText = texts[id];
            document.getElementById('l-btns').style.display = 'none';
        }
    </script>
</body>
</html>
