<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | النسخة الإمبراطورية 5.0</title>
    
    <style>
        /* --- 1. متغيرات التصميم الفاخر (Global Variables) --- */
        :root {
            --gold-main: #c1a35f;
            --gold-light: #f3cf7a;
            --gold-dark: #8e733b;
            --bg-deep: #020804;
            --bg-accent: #0d2e1c;
            --glass-solid: rgba(0, 0, 0, 0.98);
            --glass-border: rgba(193, 163, 95, 0.35);
            --font-stack: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --shimmer: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), var(--gold-light), transparent);
            --glow-shadow: 0 0 30px rgba(193, 163, 95, 0.15);
        }

        /* --- 2. تصفير الإعدادات (The Foundation) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            background-image: radial-gradient(circle at center, var(--bg-accent) 0%, var(--bg-deep) 100%);
            color: #ffffff;
            font-family: var(--font-stack);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 3. محرك الرمل والذهب (Particle Matrix) --- */
        #fx-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.8;
        }

        /* --- 4. واجهة التحكم (Language Hub) --- */
        .ui-top-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .lang-node {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--gold-main);
            color: var(--gold-main);
            padding: 7px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.8rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .lang-node:hover {
            transform: scale(1.1) translateY(-3px);
            background: var(--gold-main);
            color: #000;
        }

        .lang-node.active {
            background: var(--gold-main);
            color: #000;
            box-shadow: 0 0 20px var(--gold-main);
        }

        /* --- 5. القائمة الرشيقة (Compact Master UI) --- */
        .compact-app {
            position: relative;
            z-index: 100;
            width: 88%;
            max-width: 420px; /* القائمة صغيرة جداً ورشيقة بناءً على طلبك */
            background: var(--glass-solid);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-top: 5px solid var(--gold-main);
            border-radius: 30px;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 50px 150px rgba(0,0,0,1), inset 0 0 20px rgba(193, 163, 95, 0.05);
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: none; /* Hide for Firefox */
        }

        .compact-app::-webkit-scrollbar { display: none; } /* Hide for Chrome/Safari */

        /* --- 6. تأثيرات الشاشات (Screen Logic) --- */
        .view {
            display: none;
            opacity: 0;
            transform: scale(0.96) translateY(25px);
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .view.active {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .header-title {
            font-size: 2.1rem;
            font-weight: 900;
            color: var(--gold-main);
            margin-bottom: 15px;
            text-shadow: 0 5px 20px rgba(0,0,0,0.8);
            letter-spacing: -0.5px;
        }

        .header-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #d1d1d1;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        /* --- 7. الأزرار الملحمية (Mini Buttons) --- */
        .btn-action {
            position: relative;
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 12px;
            background: linear-gradient(145deg, rgba(193, 163, 95, 0.12), rgba(0,0,0,0.7));
            border: 1px solid var(--gold-main);
            border-radius: 15px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-action:hover {
            background: rgba(193, 163, 95, 0.25);
            transform: translateY(-3px);
            border-color: var(--gold-light);
            box-shadow: 0 10px 25px rgba(193, 163, 95, 0.2);
        }

        .btn-action::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: var(--shimmer);
            transform: skewX(-45deg);
        }

        .btn-action:hover::after {
            left: 100%;
            transition: 0.6s;
        }

        /* --- 8. لوحة القصص (The Lore Engine) --- */
        .lore-panel {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            text-align: justify;
            line-height: 2;
            font-size: 1.05rem;
            color: #f5f5f5;
            border-right: 5px solid var(--gold-main);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
            white-space: pre-line;
        }

        [dir="ltr"] .lore-panel { border-right: 0; border-left: 5px solid var(--gold-main); }

        .nav-back {
            display: inline-block;
            margin-top: 20px;
            color: var(--gold-light);
            text-decoration: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .nav-back:hover {
            background: rgba(193, 163, 95, 0.1);
            color: #fff;
        }
    </style>
</head>
<body>

    <canvas id="fx-canvas"></canvas>

    <div class="ui-top-bar">
        <div id="btn-ar" class="lang-node active" onclick="updateLang('ar')">AR</div>
        <div id="btn-en" class="lang-node" onclick="updateLang('en')">EN</div>
    </div>

    <div class="compact-app" id="master-scroller">
        
        <div id="v-home" class="view active">
            <h1 class="header-title" id="t-home-h">ملاحم التأسيس</h1>
            <p class="header-desc" id="t-home-d">رحلة تفاعلية مهيبة في قلب تاريخ المملكة العربية السعودية بقراراتك القيادية وبطولات الأجداد.</p>
            <button class="btn-action" id="t-btn-start" onclick="routeTo('v-select')">دخول الملحمة التفاعلية</button>
            <button class="btn-action" id="t-btn-lore" onclick="showLoreArchive()">سجل الأبطال التاريخي</button>
        </div>

        <div id="v-select" class="view">
            <h1 class="header-title" id="t-select-h">اختر القائد</h1>
            <div id="hero-list-container"></div>
            <a class="nav-back" id="t-back-home" onclick="routeTo('v-home')">العودة للرئيسية</a>
        </div>

        <div id="v-quest" class="view">
            <h1 id="q-title" style="color: var(--gold-light); font-size: 1.5rem; margin-bottom: 15px;"></h1>
            <div id="q-text" class="lore-panel"></div>
            <div id="q-btns"></div>
            <a class="nav-back" id="t-back-select" onclick="routeTo('v-select')">تراجع</a>
        </div>

        <div id="v-res" class="view">
            <h1 class="header-title" id="t-res-h">حكم التاريخ</h1>
            <div id="res-box" class="lore-panel"></div>
            <button class="btn-action" id="t-btn-retry" onclick="routeTo('v-select')">تجربة مسار تاريخي آخر</button>
            <a class="nav-back" id="t-res-home" onclick="routeTo('v-home')">الرئيسية</a>
        </div>

        <div id="v-arch" class="view">
            <h1 class="header-title" id="t-arch-h">سجل الخالدين</h1>
            <div id="arch-list-container"></div>
            <a class="nav-back" id="t-arch-back" onclick="routeTo('v-home')">رجوع للرئيسية</a>
        </div>

        <div id="v-bio" class="view">
            <h1 id="b-name" class="header-title"></h1>
            <div id="b-text" class="lore-panel"></div>
            <a class="nav-back" id="t-bio-back" onclick="routeTo('v-arch')">العودة للسجل</a>
        </div>

    </div>

    <script>
        /* --- 1. قاعدة البيانات الموسعة (Comprehensive Database) --- */
        const DB = {
            saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    epic: "ميثاق الدرعية (1727م)",
                    story: "عام 1139هـ، الدرعية كانت واحة صغيرة في نجد، والمنطقة غارقة في الفوضى. بصفتك حاكماً، كانت رؤيتك تتجاوز حدود مدينتك. \n\n يأتيك الشيخ محمد بن عبدالوهاب باحثاً عن الأمان لنشر العلم. الموافقة تعني معاداة القوى المحيطة، والرفض يعني بقاء الحال كما هو. التاريخ يتوقف على كلمتك الآن.. ماذا ستقرر؟",
                    paths: [
                        { t: "عقد الميثاق ونصرة العلم", r: "✅ قرار غير وجه الجزيرة العربية! بكلمتك 'أبشر ببلاد خير من بلادك، وأبشر بالعزة والمنعة'، انطلقت الدولة السعودية الأولى. \n\n النتيجة: توحدت نجد، وأصبحت الدرعية مركزاً للقرار والعلم، وبدأت أعظم تجربة وحدة في تاريخ العرب الحديث." },
                        { t: "التركيز على حماية الدرعية فقط", r: "⚠️ قرار واقعي لكنه محدود. حافظت على أمن الدرعية، لكن المنطقة ظلت مشتتة لعقود إضافية، وضاع حلم الوحدة الكبرى في ذلك الزمن." },
                        { t: "عقد تحالفات سلام مع القوى المجاورة", r: "❌ فشل استراتيجي. القوى المجاورة نقضت العهود بمجرد شعورهم بقوتك، وهاجموا الدرعية، مما أدى لضياع فرصة التأسيس المبكر." }
                    ],
                    bio: "الإمام محمد بن سعود بن محمد بن مقرن (توفي 1765م). \n\n المؤسس الأول. بنى سور الدرعية، ووحد أحيائها، وحولها من بلدة متنازعة إلى عاصمة دولة مترامية الأطراف. يُعد رمزه الأساس في يوم التأسيس السعودي."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    epic: "The Diriyah Pact (1727)",
                    story: "In 1727, Diriyah was a small oasis in a chaotic region. As its ruler, you had a vision of unity. \n\n Sheikh Muhammad bin Abdulwahab arrives seeking refuge. Accepting him means war with neighbors; refusing means staying small. What will you do?",
                    paths: [
                        { t: "Sign the historic pact", r: "✅ You changed history! By saying 'Behold a land better than yours', you founded the First Saudi State. \n\n Result: Diriyah became a powerhouse of knowledge and unity." },
                        { t: "Protect only Diriyah's borders", r: "⚠️ A safe move. Diriyah stayed secure but small. The dream of a unified nation was delayed for generations." },
                        { t: "Seek peace with hostile neighbors", r: "❌ Strategic failure. They broke the peace once you grew strong, attacking Diriyah and halting the founding mission." }
                    ],
                    bio: "Imam Muhammad bin Saud (died 1765). \n\n The First Founder. He built Diriyah's great walls and transformed it into the capital of a vast state."
                }
            },
            turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    epic: "ملحمة استعادة السيادة (1824م)",
                    story: "بعد دمار الدرعية، كانت الرياض تحت احتلال قاسٍ. أنت الآن في 'خلوة الحلوة' بجبل طويق، وحيداً مع سيفك 'الأجرب' وعزيمتك. \n\n هل ستقود هجوماً خاطفاً ليلاً لاسترداد ملك آبائك بـ 40 رجلاً فقط، أم تنتظر سنوات لجمع جيش؟",
                    paths: [
                        { t: "اقتحام الرياض بفرقة فدائية", r: "✅ نصر من قلب اليأس! نجحت في طرد الحاميات الأجنبية وأعلنت قيام الدولة السعودية الثانية. \n\n النتيجة: أصبحت الرياض العاصمة الجديدة، وعادت هيبة آل سعود، واستعاد الناس أمنهم المسلوب بفضل سيفك 'الأجرب'." },
                        { t: "الانتظار لجمع جيش ضخم", r: "⚠️ قرار أضاع الوقت. استغل المحتل التأخير لتحصين الرياض بالمدافع، مما جعل المعركة لاحقاً دموية جداً رغم انتصارك النهائي." }
                    ],
                    bio: "الإمام تركي بن عبد الله آل سعود (1755-1834م). \n\n بطل الاستعادة ومؤسس الدولة الثانية. اشتهر بشجاعته النادرة وقصائده في سيفه الأسطوري 'الأجرب'."
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    epic: "The Restoration Epic (1824)",
                    story: "Riyadh was occupied. You were hiding in Mount Tuwaiq with your legendary sword 'Al-Ajrab'. \n\n Will you lead a surprise raid with 40 men or wait years to build a massive army?",
                    paths: [
                        { t: "Lead a surprise night raid", r: "✅ Victory against all odds! You expelled the invaders and founded the Second Saudi State. \n\n Result: Riyadh became the new capital, and the Saudi legacy was reborn." },
                        { t: "Wait to build a massive army", r: "⚠️ Time lost. The occupiers fortified the city, making the eventual battle very bloody despite your victory." }
                    ],
                    bio: "Imam Turki bin Abdullah (1755-1834). \n\n Founder of the Second Saudi State and owner of the legendary 'Al-Ajrab' sword."
                }
            },
            aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    epic: "فتح الرياض (1902م)",
                    story: "ليلة 5 شوال 1319هـ. أنت واقف عند أسوار الرياض بـ 63 رجلاً. الفجر يقترب، وعجلان حاكم الحصن سيخرج من 'المصمك' قريباً. \n\n هذه اللحظة ستحدد مصير الجزيرة العربية للقرن القادم. هل تقتحم الحصن فوراً؟",
                    paths: [
                        { t: "اقتحام المصمك لحظة فتح البوابة", r: "✅ 'الملك لله ثم لعبد العزيز!'.. ببطولة فذة، رمى فهد بن جلوي رمحه في البوابة واقتحمتم الحصن. \n\n النتيجة: استعدت ملك آبائك، ومن هذه النقطة بدأت رحلة الـ 30 عاماً لتوحيد المملكة العربية السعودية الحديثة." },
                        { t: "حصار الحصن من الخارج", r: "❌ فشل تكتيكي. الحصن كان منيعاً جداً، وتنبيه الحامية أدى لهجوم مضاد كاد أن يقضي على رجالك." }
                    ],
                    bio: "الملك عبد العزيز بن عبد الرحمن آل سعود (1876-1953م). \n\n المؤسس العظيم للمملكة العربية السعودية الحديثة. وحد البلاد تحت راية واحدة وبدأ عصر النهضة والنفط."
                },
                en: {
                    name: "King Abdulaziz",
                    epic: "Conquest of Riyadh (1902)",
                    story: "Jan 15, 1902. You are at Riyadh's walls with 63 men. Dawn is breaking at Masmak Fort. This moment decides the next century. Will you storm the fort?",
                    paths: [
                        { t: "Storm the fort as the gate opens", r: "✅ Success! 'The Kingdom is for Allah, then for Abdulaziz!' became the cry of victory. \n\n Result: You reclaimed Riyadh and began the 30-year journey of modern unification." },
                        { t: "Besiege the fort from outside", r: "❌ Failed. The fort was too strong, and the alerted guards launched a counter-attack that forced a retreat." }
                    ],
                    bio: "King Abdulaziz Al Saud (1876-1953). \n\n The Great Founder of modern Saudi Arabia. He unified the Kingdom and led its transformation."
                }
            }
        };

        const UI = {
            ar: { home_h: "ملاحم التأسيس", home_d: "رحلة تفاعلية مهيبة في قلب تاريخ المملكة بقراراتك القيادية وبطولات الأجداد.", btn_start: "بدء الملحمة التفاعلية", btn_lore: "سجل الأبطال التاريخي", select_h: "اختر القائد", back_home: "العودة للرئيسية", back_select: "تراجع", res_h: "حكم التاريخ", retry: "مسار تاريخي آخر", arch_h: "سجل الخالدين", bio_back: "العودة للسجل", dir: "rtl" },
            en: { home_h: "Founding Epics", home_d: "A grand interactive journey through Saudi history. Lead as a hero and shape the future of the nation.", btn_start: "Enter Interactive Epic", btn_lore: "Heroes Archive", select_h: "Select Your Leader", back_home: "Back to Home", back_select: "Go Back", res_h: "History's Verdict", retry: "Try Another Path", arch_h: "Immortal Records", bio_back: "Back to Archive", dir: "ltr" }
        };

        /* --- 2. محرك التطبيق (App Engine) --- */
        let lang = 'ar';

        function updateLang(l) {
            lang = l; const t = UI[l];
            document.documentElement.lang = l; document.documentElement.dir = t.dir;
            document.getElementById('btn-ar').classList.toggle('active', l === 'ar');
            document.getElementById('btn-en').classList.toggle('active', l === 'en');
            document.getElementById('t-home-h').innerText = t.home_h;
            document.getElementById('t-home-d').innerText = t.home_d;
            document.getElementById('t-btn-start').innerText = t.btn_start;
            document.getElementById('t-btn-lore').innerText = t.btn_lore;
            document.getElementById('t-select-h').innerText = t.select_h;
            document.getElementById('t-back-home').innerText = t.back_home;
            document.getElementById('t-back-select').innerText = t.back_select;
            document.getElementById('t-res-h').innerText = t.res_h;
            document.getElementById('t-btn-retry').innerText = t.retry;
            document.getElementById('t-res-home').innerText = t.back_home;
            document.getElementById('t-arch-h').innerText = t.arch_h;
            document.getElementById('t-arch-back').innerText = t.back_home;
            document.getElementById('t-bio-back').innerText = t.bio_back;
            renderGrids();
        }

        function routeTo(id) {
            document.querySelectorAll('.view').forEach(v => {
                v.classList.remove('active');
                setTimeout(() => v.style.display = 'none', 350);
            });
            setTimeout(() => {
                const target = document.getElementById(id);
                target.style.display = 'block';
                setTimeout(() => target.classList.add('active'), 50);
                document.getElementById('master-scroller').scrollTop = 0;
            }, 400);
        }

        function renderGrids() {
            const hCont = document.getElementById('hero-list-container');
            const aCont = document.getElementById('arch-list-container');
            hCont.innerHTML = ''; aCont.innerHTML = '';
            Object.keys(DB).forEach(k => {
                const b1 = document.createElement('button'); b1.className = 'btn-action';
                b1.innerText = DB[k][lang].name; b1.onclick = () => loadQuest(k);
                hCont.appendChild(b1);
                
                const b2 = document.createElement('button'); b2.className = 'btn-action';
                b2.innerText = DB[k][lang].name; b2.onclick = () => loadBio(k);
                aCont.appendChild(b2);
            });
        }

        function loadQuest(k) {
            const d = DB[k][lang]; document.getElementById('q-title').innerText = d.epic;
            document.getElementById('q-text').innerText = d.story;
            const bD = document.getElementById('q-btns'); bD.innerHTML = '';
            d.paths.forEach(p => {
                const b = document.createElement('button'); b.className = 'btn-action';
                b.innerText = p.t; b.onclick = () => { document.getElementById('res-box').innerText = p.r; routeTo('v-res'); };
                bD.appendChild(b);
            }); routeTo('v-quest');
        }

        function loadBio(k) {
            document.getElementById('b-name').innerText = DB[k][lang].name;
            document.getElementById('b-text').innerText = DB[k][lang].bio;
            routeTo('v-bio');
        }

        function showLoreArchive() { routeTo('v-arch'); }

        /* --- 3. محرك الجرافيك (FX Engine - 500+ Particles) --- */
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];

        function initFX() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            dots = [];
            for (let i = 0; i < 520; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    s: Math.random() * 1.8 + 0.2,
                    vy: Math.random() * 0.5 + 0.1,
                    vx: Math.random() * 0.4 - 0.2,
                    o: Math.random() * 0.6 + 0.1,
                    c: Math.random() > 0.85 ? '#f3cf7a' : '#c1a35f'
                });
            }
        }

        function drawFX() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dots.forEach(d => {
                d.y -= d.vy; d.x += d.vx;
                if (d.y < -5) d.y = canvas.height + 5;
                if (d.x > canvas.width) d.x = 0;
                if (d.x < 0) d.x = canvas.width;
                ctx.beginPath(); ctx.arc(d.x, d.y, d.s, 0, Math.PI * 2);
                ctx.fillStyle = d.c; ctx.globalAlpha = d.o; ctx.fill();
            });
            requestAnimationFrame(drawFX);
        }

        window.onresize = initFX;
        initFX(); drawFX(); updateLang('ar');
    </script>
