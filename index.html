<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - الإصدار الناطق الكامل</title>
    
    <style>
        :root {
            --gold-main: #c1a35f;
            --gold-light: #f3cf7a;
            --deep-green: #05160d;
            --glass-bg: rgba(0, 0, 0, 0.65);
            --glass-border: rgba(193, 163, 95, 0.4);
            --transition-speed: 0.8s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            color: #ffffff; font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        #sand-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* زر تحويل اللغة بالأعلى */
        .lang-toggle {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            background: var(--glass-bg); border: 1px solid var(--gold-main);
            color: var(--gold-light); padding: 8px 15px; border-radius: 10px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .lang-toggle:hover { background: var(--gold-main); color: #000; }

        .app-wrapper {
            position: relative; z-index: 10; width: 95%; max-width: 800px;
            background: var(--glass-bg); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border: 2px solid var(--glass-border);
            border-radius: 40px; padding: 40px; text-align: center;
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.8);
            max-height: 90vh; overflow-y: auto; overflow-x: hidden;
        }

        .screen {
            display: none; opacity: 0;
            transform: translateY(30px) scale(0.98);
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) cubic-bezier(0.19, 1, 0.22, 1);
        }

        .screen.fade-in { opacity: 1; transform: translateY(0) scale(1); }

        h1 { font-size: 3rem; color: var(--gold-main); margin-bottom: 20px; font-weight: 900; text-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .description { font-size: 1.3rem; color: #e0e0e0; margin-bottom: 40px; line-height: 1.6; }

        .btn-action {
            width: 100%; background: linear-gradient(145deg, rgba(193, 163, 95, 0.15), rgba(0, 0, 0, 0.8));
            border: 1.5px solid var(--gold-main); padding: 18px; border-radius: 15px;
            color: white; font-size: 1.2rem; font-weight: 700; cursor: pointer;
            transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); margin-bottom: 15px;
            display: block; position: relative; overflow: hidden;
        }

        .btn-action::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }

        .btn-action:hover { background: var(--gold-main); color: #000; transform: translateY(-5px); }
        .btn-action:hover::after { left: 100%; }

        .story-panel {
            background: rgba(255, 255, 255, 0.06); padding: 35px; border-radius: 25px;
            text-align: justify; line-height: 2.2; font-size: 1.25rem;
            border-right: 8px solid var(--gold-main); margin: 25px 0; color: #f0f0f0;
        }

        .audio-status { color: var(--gold-light); font-weight: bold; margin-bottom: 10px; font-size: 1rem; }
        .nav-link { display: inline-block; margin-top: 25px; color: var(--gold-light); text-decoration: none; font-weight: 800; cursor: pointer; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--gold-main); border-radius: 10px; }
    </style>
</head>
<body>

    <button class="lang-toggle" onclick="toggleLanguage()">English / عربي</button>
    <canvas id="sand-canvas"></canvas>

    <div class="app-wrapper" id="scroll-container">
        
        <div id="scr-home" class="screen" style="display: block;">
            <h1 id="txt-home-title">ملاحم التأسيس</h1>
            <p id="txt-home-desc" class="description">سجل تاريخي ناطق يروي أمجاد المملكة العربية السعودية عبر العصور (مشروع تفاعلي)</p>
            <button class="btn-action" id="txt-btn-start" onclick="navTo('scr-heroes')">دخول الملحمة الكبرى</button>
            <button class="btn-action" id="txt-btn-lore" onclick="showLore()">سير الأبطال والخالدين</button>
        </div>

        <div id="scr-heroes" class="screen">
            <h1 id="txt-hero-select">اختر القائد</h1>
            <div id="hero-list-container"></div>
            <a class="nav-link" id="txt-back-home" onclick="navTo('scr-home')">العودة للرئيسية</a>
        </div>

        <div id="scr-mission" class="screen">
            <h1 id="ui-mission-title" style="font-size: 2.2rem;"></h1>
            <div class="audio-status" id="txt-audio-status">🔊 استمع للراوي التاريخي...</div>
            <div id="ui-mission-desc" class="story-panel"></div>
            <div id="ui-decision-buttons"></div>
            <a class="nav-link" id="txt-cancel" onclick="stopAudioAndGoBack()">إلغاء والعودة</a>
        </div>

        <div id="scr-result" class="screen">
            <h1 id="txt-result-title">حكم التاريخ</h1>
            <div id="ui-result-desc" class="story-panel"></div>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <a class="nav-link" id="txt-retry" onclick="navTo('scr-mission')">تغيير القرار</a>
                <a class="nav-link" id="txt-home-link" onclick="navTo('scr-home')">الرئيسية</a>
            </div>
        </div>

        <div id="scr-lore" class="screen">
            <h1 id="txt-lore-title">سجل العظماء</h1>
            <div id="ui-lore-list"></div>
            <a class="nav-link" id="txt-lore-back" onclick="navTo('scr-home')">رجوع</a>
        </div>

        <div id="scr-bio" class="screen">
            <h1 id="ui-bio-name" style="color: var(--gold-light); font-size: 2.2rem;"></h1>
            <div id="ui-bio-body" class="story-panel"></div>
            <a class="nav-link" id="txt-bio-back" onclick="navTo('scr-lore')">العودة للسجل</a>
        </div>
    </div>

    <script>
        let currentLang = 'ar';
        let currentHero = null;

        const FullData = {
            saud: {
                name: { ar: "الإمام محمد بن سعود", en: "Imam Muhammad bin Saud" },
                title: { ar: "ميثاق الدرعية الخالد", en: "The Eternal Diriyah Pact" },
                quest: {
                    ar: "نحن في عام 1727م، الدرعية واحة خضراء في قلب نجد، لكنها تعيش في عالم يملؤه التشتت والصراعات القبلية والفقر. بصفتك الحاكم الشاب الطموح، أدركت أن القوة وحدها لا تبني أمة. التحدي أمامك الآن: هل تختار عقد ميثاق تاريخي قائم على الدعوة للعلم والعدل والوحدة لتكون الدرعية عاصمة لدولة كبرى تجمع شتات العرب، أم تكتفي بتعزيز الأسوار وحماية تجارتك وأهل مدينتك عسكرياً لضمان الاستقرار القريب دون الدخول في مخاطر بناء دولة مترامية الأطراف؟",
                    en: "It is 1727 AD, Diriyah is an oasis in the heart of Najd, but it lives in a world filled with fragmentation and poverty. As the ambitious young ruler, you realized that strength alone does not build a nation. Do you choose to form a historic pact based on knowledge and unity, or do you suffice with reinforcing the walls?"
                },
                choices: [
                    { t: {ar: "عقد ميثاق الوحدة وبناء الدولة", en: "Form the Unity Pact"}, r: {ar: "✅ انتصار تاريخي! بقرارك الشجاع، انطلق ميثاق الدرعية ليؤسس الدولة السعودية الأولى.", en: "✅ Historic Victory! The Diriyah Pact established the First Saudi State."} },
                    { t: {ar: "التركيز على حماية الدرعية فقط", en: "Focus on Protecting Diriyah"}, r: {ar: "⚠️ نجاح محدود. ظلت نجد غارقة في الصراعات، وضاعت فرصة بناء دولة كبرى.", en: "⚠️ Limited success. Najd remained divided, and the chance for a great nation was lost."} }
                ],
                bio: {
                    ar: "الإمام محمد بن سعود: هو مؤسس الدولة السعودية الأولى. اتسم حكمه بالقوة والعدل، وحول الدرعية من مجرد إمارة صغيرة إلى عاصمة لدولة مترامية الأطراف، ووضع أسس الحكم الرشيد.",
                    en: "Imam Muhammad bin Saud: The founder of the First Saudi State. His reign was marked by strength and justice, transforming Diriyah into the capital of a vast nation."
                }
            },
            turki: {
                name: { ar: "الإمام تركي بن عبد الله", en: "Imam Turki bin Abdullah" },
                title: { ar: "سيف الأجرب واستعادة الحق", en: "Al-Ajrab Sword and Reclaiming the Right" },
                quest: {
                    ar: "بعد سقوط الدرعية الأليم، ظن الجميع أن الدولة السعودية قد انتهت للأبد. الرياض والمدن النجدية ترزح تحت وطأة الحاميات الأجنبية. خرجت أنت من مغارة 'عليا' وحيداً، لا تملك إلا إيمانك وسيفك الشهير 'الأجرب'. الناس ينظرون إليك كبصيص أمل أخير. القرار المصيري بيدك الآن: هل تباغت الحصون في الرياض بعملية جريئة وخاطفة رغم قلة رجالك لتعيد إحياء ملك آبائك الآن، أم تبتعد لسنوات طويلة لجمع الأنصار والعتاد خوفاً من قوة العدو وتحصيناته؟",
                    en: "After the fall of Diriyah, everyone thought the Saudi state had ended. You emerged from the cave of 'Alya' alone with your sword 'Al-Ajrab'. Do you surprise the fortresses in Riyadh now, or do you stay away for years to gather supporters?"
                },
                choices: [
                    { t: {ar: "باغت الرياض بسيف الأجرب فوراً", en: "Surprise Riyadh Now"}, r: {ar: "✅ عودة الفارس المظفر! استعدت الرياض وجعلتها عاصمة للدولة السعودية الثانية.", en: "✅ The Triumphant Knight Returns! You recaptured Riyadh for the Second Saudi State."} },
                    { t: {ar: "الانتظار لجمع الأنصار لسنوات", en: "Wait for Years"}, r: {ar: "❌ ضياع اللحظة التاريخية. استغل المحتلون تأخرك وقاموا بتحصين الرياض.", en: "❌ Historical Moment Lost. The occupiers took advantage and fortified Riyadh."} }
                ],
                bio: {
                    ar: "الإمام تركي بن عبد الله: هو مؤسس الدولة السعودية الثانية ومحرر الرياض. اشتهر بشجاعته وبسيفه 'الأجرب' الذي أصبح رمزاً لاسترداد السيادة الوطنية والعدل بين الناس.",
                    en: "Imam Turki bin Abdullah: Founder of the Second Saudi State and the liberator of Riyadh. Famous for his courage and his sword 'Al-Ajrab'."
                }
            },
            aziz: {
                name: { ar: "الملك عبد العزيز", en: "King Abdulaziz" },
                title: { ar: "فجر المصمك والتوحيد", en: "Dawn of Masmak" },
                quest: {
                    ar: "ليلة 15 يناير 1902م، البرد قارس والهدوء يلف أسوار الرياض. تقف أنت يا عبدالعزيز مع 63 رجلاً من أخلص أتباعك أمام قصر المصمك. الحلم كبير والمخاطر أكبر. الفجر يوشك على البزوغ والفرصة التاريخية قد تضيع للأبد. هل تقتحم الحصن الآن بإيمان وعزيمة لتسترد ملك أجدادك وتعلن فجر عهد جديد، أم تنسحب وتنتظر لسنوات أخرى طلباً للمدد والتحالفات الخارجية بعيداً عن الرياض؟",
                    en: "On the night of Jan 15, 1902, you stand with 63 men in front of Masmak Palace. Dawn is about to break. Do you storm the fortress now, or do you withdraw and wait for external support?"
                },
                choices: [
                    { t: {ar: "اقتحم المصمك مع خيوط الفجر", en: "Storm Masmak Now"}, r: {ar: "✅ الله أكبر! بفتحة المصمك، بدأت ملحمة توحيد المملكة العربية السعودية.", en: "✅ Allahu Akbar! With Masmak's opening, the unification of Saudi Arabia began."} },
                    { t: {ar: "التراجع لانتظار المدد الخارجي", en: "Retreat and Wait"}, r: {ar: "❌ تبدد الحلم. كشف الأعداء أمركم وشددوا الحراسة.", en: "❌ The Dream Vanished. The enemies discovered your plan."} }
                ],
                bio: {
                    ar: "الملك عبد العزيز آل سعود: موحد المملكة العربية السعودية ومؤسس كيانها الحديث. قاد ملحمة كبرى استمرت 30 عاماً، وحد فيها القلوب والأرض، ونقل المملكة إلى عصر النهضة.",
                    en: "King Abdulaziz Al Saud: The unifier of the Kingdom of Saudi Arabia. He led a 30-year mission that united hearts and land."
                }
            }
        };

        function toggleLanguage() {
            currentLang = (currentLang === 'ar' ? 'en' : 'ar');
            document.documentElement.dir = (currentLang === 'ar' ? 'rtl' : 'ltr');
            updateStaticText();
            if(currentHero) updateMissionUI(currentHero);
            initApp(); 
        }

        function updateStaticText() {
            const t = {
                ar: { h: "ملاحم التأسيس", d: "سجل تاريخي ناطق يروي أمجاد المملكة...", s: "دخول الملحمة", l: "سير الأبطال", sel: "اختر القائد", b: "العودة للرئيسية", a: "🔊 استمع للراوي...", c: "إلغاء", res: "حكم التاريخ", ret: "تغيير القرار", home: "الرئيسية", lore: "سجل العظماء" },
                en: { h: "Founding Epics", d: "A spoken history of Saudi Arabia's glory...", s: "Enter the Epic", l: "Hero Biographies", sel: "Choose Leader", b: "Back to Home", a: "🔊 Listening to Narrator...", c: "Cancel", res: "History's Verdict", ret: "Retry Decision", home: "Home", lore: "Hall of Heroes" }
            }[currentLang];

            document.getElementById('txt-home-title').innerText = t.h;
            document.getElementById('txt-home-desc').innerText = t.d;
            document.getElementById('txt-btn-start').innerText = t.s;
            document.getElementById('txt-btn-lore').innerText = t.l;
            document.getElementById('txt-hero-select').innerText = t.sel;
            document.getElementById('txt-back-home').innerText = t.b;
            document.getElementById('txt-audio-status').innerText = t.a;
            document.getElementById('txt-cancel').innerText = t.c;
            document.getElementById('txt-result-title').innerText = t.res;
            document.getElementById('txt-retry').innerText = t.ret;
            document.getElementById('txt-home-link').innerText = t.home;
            document.getElementById('txt-lore-title').innerText = t.lore;
            document.getElementById('txt-lore-back').innerText = t.home;
            document.getElementById('txt-bio-back').innerText = t.lore;
        }

        function navTo(targetId) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => { s.classList.remove('fade-in'); setTimeout(() => { s.style.display = 'none'; }, 500); });
            setTimeout(() => {
                const target = document.getElementById(targetId);
                target.style.display = 'block';
                setTimeout(() => target.classList.add('fade-in'), 50);
            }, 550);
        }

        let audioPlayer = null;

        function updateMissionUI(key) {
            const h = FullData[key];
            document.getElementById('ui-mission-title').innerText = h.title[currentLang];
            document.getElementById('ui-mission-desc').innerText = h.quest[currentLang];
            const btnArea = document.getElementById('ui-decision-buttons');
            btnArea.innerHTML = '';
            h.choices.forEach(c => {
                const cb = document.createElement('button');
                cb.className = 'btn-action';
                cb.innerText = c.t[currentLang];
                cb.onclick = () => {
                    document.getElementById('ui-result-desc').innerText = c.r[currentLang];
                    if(audioPlayer) audioPlayer.pause();
                    navTo('scr-result');
                };
                btnArea.appendChild(cb);
            });
        }

        function initApp() {
            const list = document.getElementById('hero-list-container');
            list.innerHTML = '';
            for(let key in FullData) {
                const b = document.createElement('button');
                b.className = 'btn-action';
                b.innerText = FullData[key].name[currentLang];
                b.onclick = () => {
                    currentHero = key;
                    updateMissionUI(key);
                    if(audioPlayer) audioPlayer.pause();
                    audioPlayer = new Audio(key + '_' + currentLang + '.mp3');
                    audioPlayer.play().catch(e => console.log("Missing sound"));
                    navTo('scr-mission');
                };
                list.appendChild(b);
            }
        }

        function showLore() {
            const list = document.getElementById('ui-lore-list');
            list.innerHTML = '';
            for(let key in FullData) {
                const b = document.createElement('button');
                b.className = 'btn-action';
                b.innerText = FullData[key].name[currentLang];
                b.onclick = () => {
                    document.getElementById('ui-bio-name').innerText = FullData[key].name[currentLang];
                    document.getElementById('ui-bio-body').innerText = FullData[key].bio[currentLang];
                    navTo('scr-bio');
                };
                list.appendChild(b);
            }
            navTo('scr-lore');
        }

        function stopAudioAndGoBack() { if(audioPlayer) audioPlayer.pause(); currentHero = null; navTo('scr-heroes'); }

        const canvas = document.getElementById('sand-canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; pts = []; for(let i=0; i<180; i++) pts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, v:Math.random()*0.3+0.1}); }
        function draw() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(193, 163, 95, 0.35)"; pts.forEach(p => { p.y -= p.v; if(p.y<0) p.y=canvas.height; ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); }
        window.onresize = res; res(); draw(); initApp();
    </script>
</body>
</html>
