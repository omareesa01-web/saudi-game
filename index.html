<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | الإصدار الذهبي الكامل</title>
    
    <style>
        /* [1] CSS ROOT - مصفوفة الألوان والخطوط */
        :root {
            --gold-bg: #C5A059; /* لون الخلفية الذهبي الصحراوي */
            --gold-primary: #D4AF37; /* ذهبي معدني للأيقونات والحدود */
            --gold-glow: #FFD700; /* ذهبي لامع جداً */
            --gold-storm: #7D5B25; /* لون حبات الرمل (أغمق للتباين) */
            --royal-green: #0d2e1c; /* لون القوائم المطلوب */
            --glass-bg: rgba(13, 46, 28, 0.98); /* شفافية القائمة الخضراء */
            --glass-border: rgba(212, 175, 55, 0.6);
            --font-main: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            --transition-smooth: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            --pure-white: #ffffff;
        }

        /* [2] GLOBAL STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            outline: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--gold-bg);
            color: var(--pure-white);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* [3] THE STORM ENGINE CANVAS */
        #titan-storm-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* [4] LANGUAGE HUB */
        .language-hub {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
            display: flex;
            gap: 15px;
        }

        .lang-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.8rem;
            transition: 0.4s;
            backdrop-filter: blur(20px);
        }

        .lang-btn.active {
            background: var(--gold-primary);
            color: #000;
            box-shadow: 0 0 30px var(--gold-primary);
        }

        /* [5] MAIN COMPACT APP - القائمة الخضراء */
        .app-container {
            position: relative;
            z-index: 100;
            width: 90%;
            max-width: 410px;
            background: var(--glass-bg);
            backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border);
            border-top: 7px solid var(--gold-primary);
            border-radius: 40px;
            padding: 45px 35px;
            text-align: center;
            box-shadow: 0 80px 150px rgba(0,0,0,0.6);
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .app-container::-webkit-scrollbar { display: none; }

        /* [6] SCREEN MANAGEMENT */
        .screen {
            display: none;
            opacity: 0;
            transform: scale(0.9) translateY(40px);
            transition: all var(--transition-smooth);
        }

        .screen.active {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .main-title {
            font-size: 2.3rem;
            font-weight: 900;
            color: var(--gold-primary); 
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .description-text {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--pure-white); 
            margin-bottom: 35px;
            opacity: 0.95;
        }

        /* [7] TITAN BUTTONS */
        .btn-epic {
            position: relative;
            width: 100%;
            padding: 18px;
            margin-bottom: 18px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(0,0,0,0.4));
            border: 1px solid var(--gold-primary);
            border-radius: 20px;
            color: var(--pure-white);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            overflow: hidden;
            transition: 0.5s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-epic:hover {
            transform: translateY(-5px);
            background: var(--gold-primary);
            color: var(--royal-green);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }

        /* [8] LORE BOX */
        .lore-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 25px;
            padding: 30px;
            margin: 25px 0;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.05rem;
            color: var(--pure-white);
            border-right: 8px solid var(--gold-primary);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
            white-space: pre-line;
        }

        .back-nav {
            display: inline-block;
            margin-top: 30px;
            color: var(--gold-glow);
            cursor: pointer;
            font-weight: 800;
            text-decoration: underline;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="titan-storm-canvas"></canvas>

    <div class="language-hub">
        <div id="btn-ar" class="lang-btn active" onclick="setGlobalLang('ar')">AR</div>
        <div id="btn-en" class="lang-btn" onclick="setGlobalLang('en')">EN</div>
    </div>

    <div class="app-container" id="app-scroller">
        
        <div id="screen-gate" class="screen active">
            <h1 class="main-title" id="t-gate-h">ملاحم التأسيس</h1>
            <p class="description-text" id="t-gate-d">انغمس في أعماق التاريخ السعودي، وكن القائد الذي يصنع المجد بقراراته الشجاعة.</p>
            <button class="btn-epic" id="t-btn-start" onclick="navigateTo('screen-selection')">ابدأ الرحلة الملحمية</button>
            <button class="btn-epic" id="t-btn-archive" onclick="navigateTo('screen-archive')">الأرشيف التاريخي</button>
        </div>

        <div id="screen-selection" class="screen">
            <h1 class="main-title" id="t-select-h">اختر القائد</h1>
            <div id="hero-injection-point"></div>
            <a class="back-nav" onclick="navigateTo('screen-gate')">العودة للرئيسية</a>
        </div>

        <div id="screen-quest" class="screen">
            <h1 id="quest-title-header" style="color: var(--gold-glow); font-size: 1.5rem; margin-bottom: 20px;"></h1>
            <div id="quest-content-box" class="lore-box"></div>
            <div id="quest-actions-container"></div>
            <a class="back-nav" onclick="navigateTo('screen-selection')">تراجع</a>
        </div>

        <div id="screen-result" class="screen">
            <h1 class="main-title" id="t-res-h">حكم التاريخ</h1>
            <div id="result-text-box" class="lore-box"></div>
            <button class="btn-epic" onclick="navigateTo('screen-selection')">تجربة مسار جديد</button>
        </div>

        <div id="screen-archive" class="screen">
            <h1 class="main-title" id="t-arch-h">سجل الخالدين</h1>
            <div id="arch-injection-point"></div>
            <a class="back-nav" onclick="navigateTo('screen-gate')">الرجوع</a>
        </div>

        <div id="screen-biography" class="screen">
            <h1 id="bio-hero-name" class="main-title"></h1>
            <div id="bio-content-box" class="lore-box"></div>
            <a class="back-nav" onclick="navigateTo('screen-archive')">العودة</a>
        </div>

    </div>

    <script>
        /* [S1] FULL DATA ARCHIVE - 600+ Lines Logic Support */
        const EPIC_DATA = {
            m_saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    epic_title: "يوم ميثاق الدرعية",
                    story_full: "في عام 1727م، تولى الإمام محمد بن سعود الحكم. يأتيك الشيخ محمد بن عبدالوهاب باحثاً عن نصرة التوحيد. هل تعقد الميثاق؟",
                    decisions: [
                        { label: "عقد الميثاق ونصرة العلم", feedback: "✅ 'أبشر بالعزة والمنعة'. بهذه الكلمات تأسست الدولة السعودية الأولى." },
                        { label: "توفير الحماية فقط", feedback: "⚠️ وجد الشيخ الأمان لكن الدولة لم تنطلق بقوة الوحدة." }
                    ],
                    biography: "المؤسس الأول للدولة السعودية وصاحب رؤية التوحيد والوحدة."
                },
                en: { name: "Imam Muhammad bin Saud", epic_title: "The Great Pact", story_full: "The scholar seeks alliance. Do you accept?", decisions: [{ label: "Form Alliance", feedback: "✅ You founded the First Saudi State." },{ label: "Safety only", feedback: "⚠️ Vision delayed." }], biography: "The Great Founder." }
            },
            i_turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    epic_title: "استعادة الرياض",
                    story_full: "الرياض تحت الاحتلال. معك سيفك 'الأجرب' و40 رجلاً. هل تباغتهم ليلاً؟",
                    decisions: [
                        { label: "هجوم فدائي صاعق", feedback: "✅ استعدت الرياض وأعلنت قيام الدولة السعودية الثانية." },
                        { label: "الانسحاب لجمع الجيش", feedback: "❌ عزز المحتل حصونه وضاعت فرصة المباغتة." }
                    ],
                    biography: "مؤسس الدولة السعودية الثانية وبطل السيف الأجرب."
                },
                en: { name: "Imam Turki bin Abdullah", epic_title: "Riyadh Conquest", story_full: "Will you strike with 40 men?", decisions: [{ label: "Night Attack", feedback: "✅ Riyadh is yours!" },{ label: "Wait", feedback: "❌ Opportunity lost." }], biography: "The Restorer." }
            },
            k_aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    epic_title: "فتح المصمك",
                    story_full: "أمام المصمك مع 63 رجلاً. البوابة ستفتح فجراً. هل تقتحم؟",
                    decisions: [
                        { label: "اقتحام المصمك فوراً", feedback: "✅ 'الملك لله ثم لعبد العزيز'. بدأ توحيد المملكة العربية السعودية." },
                        { label: "تطويق المدينة", feedback: "⚠️ صمد الحصن لأشهر وتأخر النصر." }
                    ],
                    biography: "المؤسس العظيم للمملكة العربية السعودية الحديثة."
                },
                en: { name: "King Abdulaziz", epic_title: "Masmak Fort", story_full: "The gate opens. Do you storm?", decisions: [{ label: "Storm Now", feedback: "✅ The Modern Kingdom is born." },{ label: "Wait", feedback: "⚠️ Siege lasted months." }], biography: "The Unifier." }
            }
        };

        const LOCALIZATION = {
            ar: { g_h: "ملاحم التأسيس", g_d: "عش تاريخك المجيد بقراراتك.", s_h: "اختر القائد", r_h: "حكم التاريخ", a_h: "سجل الخالدين", dir: "rtl" },
            en: { g_h: "Founding Epics", g_d: "Lead your history with your choices.", s_h: "Select Leader", r_h: "The Verdict", a_h: "Immortal Archive", dir: "ltr" }
        };

        /* [S2] APP LOGIC */
        let currentLanguage = 'ar';

        function setGlobalLang(l) {
            currentLanguage = l;
            const t = LOCALIZATION[l];
            document.documentElement.dir = t.dir;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + l).classList.add('active');
            document.getElementById('t-gate-h').innerText = t.g_h;
            document.getElementById('t-gate-d').innerText = t.g_d;
            document.getElementById('t-select-h').innerText = t.s_h;
            document.getElementById('t-res-h').innerText = t.r_h;
            document.getElementById('t-arch-h').innerText = t.a_h;
            rebuildInteractiveGrids();
        }

        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                setTimeout(() => { s.style.display = 'none'; }, 400);
            });
            setTimeout(() => {
                const target = document.getElementById(screenId);
                target.style.display = 'block';
                setTimeout(() => { target.classList.add('active'); }, 50);
            }, 450);
        }

        function rebuildInteractiveGrids() {
            const heroContainer = document.getElementById('hero-injection-point');
            const archContainer = document.getElementById('arch-injection-point');
            heroContainer.innerHTML = ''; archContainer.innerHTML = '';
            Object.keys(EPIC_DATA).forEach(key => {
                const hBtn = document.createElement('button'); hBtn.className = 'btn-epic';
                hBtn.innerText = EPIC_DATA[key][currentLanguage].name;
                hBtn.onclick = () => startHeroQuest(key); heroContainer.appendChild(hBtn);
                const aBtn = document.createElement('button'); aBtn.className = 'btn-epic';
                aBtn.innerText = EPIC_DATA[key][currentLanguage].name;
                aBtn.onclick = () => showHeroBio(key); archContainer.appendChild(aBtn);
            });
        }

        function startHeroQuest(heroKey) {
            const data = EPIC_DATA[heroKey][currentLanguage];
            document.getElementById('quest-title-header').innerText = data.epic_title;
            document.getElementById('quest-content-box').innerText = data.story_full;
            const actionArea = document.getElementById('quest-actions-container'); actionArea.innerHTML = '';
            data.decisions.forEach(dec => {
                const btn = document.createElement('button'); btn.className = 'btn-epic';
                btn.innerText = dec.label;
                btn.onclick = () => { document.getElementById('result-text-box').innerText = dec.feedback; navigateTo('screen-result'); };
                actionArea.appendChild(btn);
            });
            navigateTo('screen-quest');
        }

        function showHeroBio(heroKey) {
            const data = EPIC_DATA[heroKey][currentLanguage];
            document.getElementById('bio-hero-name').innerText = data.name;
            document.getElementById('bio-content-box').innerText = data.biography;
            navigateTo('screen-biography');
        }

        /* [S3] TITAN STORM ENGINE - العاصفة الرملية الكثيفة (800+ Particles) */
        const canvas = document.getElementById('titan-storm-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        class Particle {
            constructor() {
                this.init();
            }
            init() {
                this.side = Math.random() > 0.5 ? 'L' : 'R';
                this.x = this.side === 'L' ? -Math.random() * 300 : canvas.width + Math.random() * 300;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 0.5;
                this.speedX = this.side === 'L' ? (Math.random() * 4 + 2) : -(Math.random() * 4 + 2);
                this.speedY = (Math.random() - 0.5) * 1.5;
                this.color = '#7D5B25'; // رمال ذهبية غامقة
                this.opacity = Math.random() * 0.6 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.side === 'L' && this.x > canvas.width + 100) this.init();
                if (this.side === 'R' && this.x < -100) this.init();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
            }
        }

        function initEngine() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesArray = [];
            for (let i = 0; i < 850; i++) particlesArray.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initEngine);
        initEngine(); animate(); setGlobalLang('ar');
    </script>
</body>
</html>
