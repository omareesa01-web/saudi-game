<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - 300 عام من المجد</title>
    
    <style>
        /* --- Root Variables & Theme Colors --- */
        :root {
            --gold-main: #c1a35f;
            --gold-light: #f3cf7a;
            --gold-glow: rgba(193, 163, 95, 0.6);
            --deep-green: #05160d;
            --glass-bg: rgba(0, 0, 0, 0.92);
            --glass-border: rgba(193, 163, 95, 0.45);
            --sword-speed: 0.45s;
            --bg-gradient: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
        }

        /* --- Global Reset --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Layout Structure --- */
        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg-gradient);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Interactive Background (Sand Particles) --- */
        #sand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- Language Switcher UI --- */
        .lang-switcher {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
            display: flex;
            gap: 12px;
        }

        .btn-lang {
            background: var(--glass-bg);
            border: 2px solid var(--gold-main);
            color: var(--gold-light);
            padding: 10px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 800;
            transition: all 0.3s ease;
            backdrop-filter: blur(15px);
            font-size: 0.95rem;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }

        .btn-lang:hover {
            background: var(--gold-main);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .btn-lang.active {
            background: var(--gold-main);
            color: #000;
            box-shadow: 0 0 20px var(--gold-main);
        }

        /* --- Main Application Container --- */
        .app-wrapper {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 620px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 2px solid var(--glass-border);
            border-radius: 40px;
            padding: 45px;
            text-align: center;
            box-shadow: 0 60px 150px rgba(0, 0, 0, 0.95);
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-main) transparent;
        }

        /* --- Animations & Transitions --- */
        .screen {
            display: none;
            opacity: 0;
            transform: translateY(40px);
            transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .screen.fade-in {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Typography --- */
        h1 {
            font-size: 2.4rem;
            color: var(--gold-main);
            margin-bottom: 25px;
            font-weight: 900;
            text-shadow: 0 6px 18px rgba(0,0,0,0.8);
            letter-spacing: 0.5px;
        }

        .description {
            font-size: 1.2rem;
            color: #ececec;
            margin-bottom: 45px;
            line-height: 1.9;
        }

        /* --- Action Buttons (SWORD SLASH EFFECT) --- */
        .btn-action {
            position: relative;
            width: 100%;
            background: linear-gradient(145deg, rgba(193, 163, 95, 0.08), rgba(0,0,0,0.8));
            border: 1.5px solid var(--gold-main);
            padding: 20px;
            border-radius: 18px;
            color: #fff;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            margin-bottom: 18px;
            overflow: hidden; /* Important for sword slash */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        /* The Sword Slash Particle */
        .btn-action::before {
            content: '';
            position: absolute;
            top: 0;
            left: -180%;
            width: 150%;
            height: 100%;
            background: linear-gradient(
                90deg, 
                transparent, 
                rgba(255, 255, 255, 0.1),
                var(--gold-light), 
                #fff, 
                var(--gold-light),
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: skewX(-45deg);
            z-index: -1;
        }

        .btn-action:hover::before {
            left: 180%;
            transition: var(--sword-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-action:hover {
            background: rgba(193, 163, 95, 0.25);
            border-color: #fff;
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(193, 163, 95, 0.3);
        }

        /* --- Content Panels --- */
        .story-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 35px;
            border-radius: 28px;
            text-align: justify;
            line-height: 2.3;
            font-size: 1.2rem;
            border-right: 8px solid var(--gold-main);
            margin: 35px 0;
            color: #ffffff;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.4);
            white-space: pre-line;
        }

        [dir="ltr"] .story-panel {
            border-right: 0;
            border-left: 8px solid var(--gold-main);
        }

        /* --- Navigation Links --- */
        .nav-link {
            display: inline-block;
            margin-top: 35px;
            color: var(--gold-light);
            text-decoration: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.4s ease;
            border-bottom: 2px solid transparent;
            padding: 5px 15px;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(193, 163, 95, 0.1);
            border-radius: 10px;
            border-bottom-color: var(--gold-main);
        }

        /* --- Scrollbar Customization --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--gold-main); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="lang-switcher">
        <button id="btn-ar" class="btn-lang active" onclick="setAppLanguage('ar')">العربية</button>
        <button id="btn-en" class="btn-lang" onclick="setAppLanguage('en')">English</button>
    </div>

    <div class="app-wrapper" id="main-scroll-view">
        
        <div id="scr-home" class="screen" style="display: block;">
            <h1 id="txt-title">ملاحم التأسيس</h1>
            <p id="txt-desc" class="description">سجل تاريخي ناطق يروي أمجاد المملكة العربية السعودية عبر العصور وحكايات الأبطال الذين صنعوا المجد والوحدة.</p>
            <button id="btn-start" class="btn-action" onclick="navTo('scr-heroes')">دخول الملحمة الكبرى</button>
            <button id="btn-lore" class="btn-action" onclick="showLore()">سير الأبطال والخالدين</button>
        </div>

        <div id="scr-heroes" class="screen">
            <h1 id="txt-hero-head">اختر القائد</h1>
            <div id="hero-list"></div>
            <a id="lnk-home" class="nav-link" onclick="navTo('scr-home')">العودة للرئيسية</a>
        </div>

        <div id="scr-mission" class="screen">
            <h1 id="ui-mission-title" style="color: var(--gold-light);"></h1>
            <div id="ui-mission-desc" class="story-panel"></div>
            <div id="ui-btns-area"></div>
            <a id="lnk-cancel" class="nav-link" onclick="stopAudioAndGoBack()">إلغاء والعودة</a>
        </div>

        <div id="scr-result" class="screen">
            <h1 id="txt-res-head">حكم التاريخ</h1>
            <div id="ui-result-body" class="story-panel"></div>
            <a id="lnk-res-home" class="nav-link" onclick="navTo('scr-home')">العودة للرئيسية</a>
        </div>

        <div id="scr-lore" class="screen">
            <h1 id="txt-lore-head">سجل العظماء</h1>
            <div id="ui-lore-list"></div>
            <a id="lnk-lore-back" class="nav-link" onclick="navTo('scr-home')">رجوع للخلف</a>
        </div>

        <div id="scr-bio" class="screen">
            <h1 id="ui-bio-name"></h1>
            <div id="ui-bio-text" class="story-panel"></div>
            <a id="lnk-bio-back" class="nav-link" onclick="navTo('scr-lore')">العودة للسجل</a>
        </div>

    </div>

                start: "دخول الملحمة الكبرى",

                records: "Leaders Archive",
                back: "Back",
                backLore: "Back to List",

            }
        };

        const Characters = {
            saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    title: "ميثاق الدرعية الخالد (1727م)",
                    quest: "نحن في عام 1727م، الدرعية واحة خضراء في قلب نجد، لكنها تعيش في عالم يملؤه التشتت والصراعات القبلية والفقر والجهل.\n\nبصفتك الحاكم الشاب الطموح، أدركت بذكائك أن القوة العسكرية وحدها لا تبني أمة مستقرة، وأن الوحدة القائمة على مبادئ راسخة هي السبيل الوحيد للأمن والازدهار.\n\nهل تختار عقد ميثاق تاريخي قائم على الدعوة للعلم والعدل والوحدة لتكون الدرعية عاصمة لدولة كبرى تجمع شتات العرب، أم تكتفي بتعزيز الأسوار وحماية تجارتك وأهل مدينتك عسكرياً؟",
                    choices: [
                        { t: "عقد ميثاق الوحدة وبناء الدولة", r: "✅ انتصار تاريخي خالد! بقرارك الشجاع، تأسست الدولة السعودية الأولى. بفضل رؤيتك، تحولت القبائل المتناحرة إلى كيان سياسي مهاب، وعمّ الأمن أرجاء الجزيرة العربية بعد عقود من الفوضى." },
                        { t: "حماية حدود الدرعية فقط عسكرياً", r: "⚠️ نجاح محدود ومؤقت. استطعت حماية مدينتك لسنوات، لكن نجد ظلت غارقة في الصراعات، وضاعت فرصة بناء دولة كبرى تجمع الكلمة وترفع راية العلم." }
                    ],
                    bio: "هو الإمام محمد بن سعود بن محمد بن مقرن، مؤسس الدولة السعودية الأولى وعميد أسرة آل سعود.\n\nوُلد في مدينة الدرعية التاريخية عام 1697م ونشأ في بيت مفعم بالإمارة والعلم والسياسة. تولى مقاليد الحكم في الدرعية عام 1727م، وهي لحظة حاسمة غيرت مسار تاريخ الجزيرة العربية للأبد.\n\nيُعد الإمام محمد بن سعود رجل دولة من الطراز الرفيع، حيث اشتهر بالحكمة والعدل والشجاعة النادرة. نجح في تحويل الدرعية من مجرد مدينة صغيرة في وادي حنيفة إلى عاصمة لكيان سياسي عظيم جمع شتات العرب تحت راية واحدة لأول مرة منذ قرون طويلة.\n\nقام ببناء حي 'الطرفية' ليكون مركزاً لإدارة شؤون الحكم، واهتم بتأمين طرق الحج وقوافل التجارة، مما أدى لنهضة اقتصادية وعلمية كبرى استقطبت العلماء والمفكرين من كل مكان، وأرسى قواعد الدولة التي استمر أثرها لقرون."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    title: "The Eternal Diriyah Pact (1727)",
                    quest: "The year is 1727. Diriyah is an oasis in Najd, but the region is plagued by fragmentation and conflict.\n\nAs a young leader, you realize that true strength lies in unity. Will you sign a historic pact to unite the tribes, or focus only on local defense?",
                    choices: [
                        { t: "Sign the Unity Pact", r: "✅ Historic Victory! Your decision established the First Saudi State, bringing security after decades of chaos." },
                        { t: "Focus on Local Defense Only", r: "⚠️ Limited Success. You protected your city, but the region remained fragmented and the opportunity for greatness was missed." }
                    ],
                    bio: "Imam Muhammad bin Saud (1697–1765) was the visionary founder of the First Saudi State and the patriarch of the House of Saud.\n\nBorn in the historical city of Diriyah, he grew up in an environment centered on leadership and wisdom. He assumed power in 1727, a pivotal year that marked a new era for the Arabian Peninsula.\n\nHe was a sophisticated statesman known for his justice and rare courage. He successfully transformed Diriyah from a small oasis along Wadi Hanifa into the capital of a grand political entity, unifying warring tribes under one banner for the first time in centuries. He built the 'At-Tarafiyah' district as a hub for governance and focused on securing Hajj and trade routes, leading to a massive economic renaissance."
                }
            },
            turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    title: "سيف الأجرب واستعادة الحق",
                    quest: "بعد سقوط الدرعية الأليم، ظن الجميع أن آل سعود قد غابوا عن المشهد للأبد. الرياض ترزح تحت وطأة الحاميات الأجنبية.\n\nخرجت أنت من مغارة 'عليا' وحيداً بسيفك 'الأجرب'. القرار المصيري بيدك الآن:\n\nهل تباغت الحصون في الرياض بعملية جريئة رغم قلة رجالك، أم تبتعد لسنوات طويلة لجمع الأنصار والعتاد خوفاً من قوة العدو؟",
                    choices: [
                        { t: "باغت الرياض بسيف الأجرب فوراً", r: "✅ عودة الفارس المظفر! استعدت الرياض وجعلتها عاصمة للدولة السعودية الثانية. سيفك 'الأجرب' أصبح رمزاً لاسترداد السيادة، وبنيت دولة قوية أعادت العدل والهيبة." },
                        { t: "الانسحاب لجمع الأنصار لسنوات", r: "❌ ضياع اللحظة التاريخية. استغل المحتلون تأخرك وقاموا بتحصين الرياض بمدافع إضافية، مما جعل مهمة التحرير لاحقاً شبه مستحيلة." }
                    ],
                    bio: "هو الإمام تركي بن عبدالله بن محمد آل سعود، مؤسس الدولة السعودية الثانية ومسترد ملك آبائه وأجداده.\n\nبعد سقوط الدرعية وانتهاء الدولة الأولى، لم يستسلم لليأس، بل انسحب إلى مغارة 'عليا' في جبل طويق ليخطط بعمق لهزيمة القوات المحتلة واستعادة السيادة السعودية المسلوبة.\n\nاشتهر بسيفه الأسطوري 'الأجرب' الذي صار رمزاً للتحرير والقوة في وجدان الشعب السعودي. في عام 1824م، نجح بذكاء عسكري فذ وشجاعة منقطعة النظير في تحرير الرياض من الحاميات الأجنبية بجيش صغير لكنه عظيم الإرادة.\n\nيُعرف الإمام تركي بعدله المطلق وزهده وتواضعه، وهو الذي اتخذ من الرياض عاصمة دائمة للدولة، وأرسى فيها قواعد الأمن والاستقرار، وأعاد بناء المسجد الجامع وقصر الحكم، لتبدأ مرحلة جديدة من المجد السعودي."

                en: {

                    bio: "King Abdulaziz Al Saud (1876–1953) was the legendary founder of the modern Kingdom of Saudi Arabia. Born in Riyadh, he embarked on his mission with only 63 followers.\n\nAt dawn on January 15, 1902, he successfully captured the Masmak Fortress in Riyadh, a historic moment that marked the rebirth of the nation. He spent over 30 years unifying the regions of the Kingdom, transforming fragmentation into solid national unity.\n\nKnown for his political savvy and mercy, he led the nation into the oil era and established modern governmental institutions, leaving behind a strong, stable, and influential nation on the global stage."
                }
            }
        };

        // --- Core Functions ---

        function setAppLanguage(lang) {
            currentLang = lang;
            const t = Interface[lang];
            
            // Set Document Properties
            document.documentElement.lang = lang;
            document.documentElement.dir = t.dir;
            
            // Update Static Texts
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-desc').innerText = t.desc;
            document.getElementById('btn-start').innerText = t.start;
            document.getElementById('btn-lore').innerText = t.lore;
            document.getElementById('txt-hero-head').innerText = t.choose;
            document.getElementById('lnk-home').innerText = t.home;
            document.getElementById('lnk-cancel').innerText = t.cancel;
            document.getElementById('txt-res-head').innerText = t.judge;
            document.getElementById('lnk-res-home').innerText = t.home;
            document.getElementById('txt-lore-head').innerText = t.records;
            document.getElementById('lnk-lore-back').innerText = t.home;
            document.getElementById('lnk-bio-back').innerText = t.backLore;

            // Update UI State
            document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            // Refresh Lists
            buildHeroScreen();
        }

        function navTo(screenId) {
            const wrapper = document.getElementById('main-scroll-view');
            const screens = document.querySelectorAll('.screen');
            
            screens.forEach(s => {
                s.classList.remove('fade-in');
                setTimeout(() => s.style.display = 'none', 300);
            });

            setTimeout(() => {
                const target = document.getElementById(screenId);
                wrapper.scrollTop = 0;
                target.style.display = 'block';
                setTimeout(() => target.classList.add('fade-in'), 50);
            }, 350);
        }

        function buildHeroScreen() {
            const list = document.getElementById('hero-list');
            list.innerHTML = '';
            
            for(let key in Characters) {
                const btn = document.createElement('button');
                btn.className = 'btn-action';
                btn.innerText = Characters[key][currentLang].name;
                btn.onclick = () => launchMission(key);
                list.appendChild(btn);
            }
        }

        function launchMission(key) {
            const char = Characters[key][currentLang];
            document.getElementById('ui-mission-title').innerText = char.title;
            document.getElementById('ui-mission-desc').innerText = char.quest;
            
            // Audio Playback Handler
            if(audioPlayer) audioPlayer.pause();
            audioPlayer = new Audio(`${key}_${currentLang}.mp3`);
            audioPlayer.play().catch(() => console.log("Audio not provided for this mission."));

            const area = document.getElementById('ui-btns-area');
            area.innerHTML = '';
            
            char.choices.forEach(choice => {
                const cb = document.createElement('button');
                cb.className = 'btn-action';
                cb.innerText = choice.t;
                cb.onclick = () => {
                    document.getElementById('ui-result-body').innerText = choice.r;
                    if(audioPlayer) audioPlayer.pause();
                    navTo('scr-result');
                };
                area.appendChild(cb);
            });
            
            navTo('scr-mission');
        }

        function showLore() {
            const container = document.getElementById('ui-lore-list');
            container.innerHTML = '';
            
            for(let key in Characters) {
                const btn = document.createElement('button');
                btn.className = 'btn-action';
                btn.innerText = Characters[key][currentLang].name;
                btn.onclick = () => {
                    document.getElementById('ui-bio-name').innerText = Characters[key][currentLang].name;
                    document.getElementById('ui-bio-text').innerText = Characters[key][currentLang].bio;
                    navTo('scr-bio');
                };
                container.appendChild(btn);
            }
            navTo('scr-lore');
        }

        function stopAudioAndGoBack() {
            if(audioPlayer) audioPlayer.pause();
            navTo('scr-heroes');
        }

        // --- Particle Animation Logic ---
        const canvas = document.getElementById('sand-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = [];
            for(let i=0; i<100; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5,
                    v: Math.random() * 0.2 + 0.1
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(193, 163, 95, 0.25)";
            dots.forEach(d => {
                d.y -= d.v;
                if(d.y < 0) d.y = canvas.height;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        window.onresize = initParticles;
        initParticles();
        drawParticles();

        // Bootstrapping the Application
        document.addEventListener('DOMContentLoaded', () => {
            setAppLanguage('ar');
        });

    </script>
</body>
</html>
