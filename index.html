<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - العرض النهائي الكامل</title>
    <style>
        :root {
            --gold: #c1a35f;
            --gold-bright: #f3cf7a;
            --glass-panel: rgba(0, 0, 0, 0.88); 
            --glow: 0 0 30px rgba(193, 163, 95, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .lang-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.9);
            padding: 12px;
            border-radius: 35px;
            border: 1.5px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .lang-bar button {
            background: transparent;
            border: 1.5px solid var(--gold);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.4s all ease;
            font-weight: bold;
            font-size: 14px;
        }

        .lang-bar button:hover {
            background: var(--gold);
            color: black;
            transform: scale(1.1);
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }
        
        .glass-panel {
            backdrop-filter: blur(30px);
            border: 2px solid var(--gold);
            border-radius: 40px;
            padding: 40px;
            width: 85%;
            max-width: 750px;
            box-shadow: var(--glow);
            text-align: center;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        /* أنيميشن الدخول للقائمة */
        .glass-panel {
            animation: panelFadeIn 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes panelFadeIn {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(40px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        #home.glass-panel {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none;
            animation: none;
        }

        .glass-panel:not(#home) {
            background: var(--glass-panel);
        }

        h1 {
            font-size: 3.2rem;
            color: var(--gold);
            margin-bottom: 20px;
            text-shadow: 0 0 25px rgba(0, 0, 0, 0.9);
            font-weight: 900;
        }

        .desc {
            font-size: 1.3rem;
            color: #eeeeee;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        
        .action-btn {
            background: linear-gradient(135deg, rgba(193, 163, 95, 0.25), rgba(0, 0, 0, 0.85));
            border: 1.5px solid var(--gold);
            padding: 22px;
            border-radius: 20px;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .action-btn:hover {
            background: var(--gold);
            color: black;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 20px rgba(193, 163, 95, 0.3);
        }

        .back-link { 
            margin-top: 35px;
            color: var(--gold-bright);
            cursor: pointer;
            display: inline-block; 
            font-weight: bold;
            font-size: 1.2rem;
            text-decoration: none;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 5px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: white;
            border-color: white;
            transform: scale(1.1);
        }

        .result-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 35px;
            border-radius: 25px;
            text-align: justify;
            line-height: 2;
            font-size: 1.2rem;
            border-right: 10px solid var(--gold);
            margin-top: 20px;
        }

        [dir="ltr"] .result-box {
            border-right: none;
            border-left: 10px solid var(--gold);
            text-align: left;
        }

        .screen {
            display: none;
        }

        .active {
            display: block;
        }

        /* تحسين السكرول بار */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="lang-bar">
        <button onclick="changeLanguage('ar')">العربية</button>
        <button onclick="changeLanguage('en')">English</button>
        <button onclick="changeLanguage('es')">Español</button>
        <button onclick="changeLanguage('ru')">Русский</button>
        <button onclick="changeLanguage('ko')">한국어</button>
    </div>

    <div class="container">
        
        <div id="home" class="screen glass-panel active">
            <h1 id="txt-main-title">ملاحم التأسيس</h1>
            <p class="desc" id="txt-main-desc">اكتب تاريخك بيدك عبر العصور والأزمان</p>
            <div class="btn-list">
                <button class="action-btn" id="txt-btn-start" onclick="navigateTo('heroes')">دخول الملحمة التاريخية</button>
                <button class="action-btn" id="txt-btn-lore" onclick="openHeroLore()">سجل الأبطال الخالدين</button>
            </div>
        </div>

        <div id="heroes" class="screen glass-panel">
            <h1 id="txt-hero-title">اختر القائد التاريخي</h1>
            <div id="hero-selection-list" class="btn-list"></div>
            <a class="back-link" id="txt-back-home" onclick="navigateTo('home')">العودة للشاشة الرئيسية</a>
        </div>

        <div id="play" class="screen glass-panel">
            <h1 id="txt-mission-title">المهمة القيادية الكبرى</h1>
            <p id="display-quest-text" style="font-size: 1.3rem; margin: 30px 0; line-height: 1.9; text-align: justify; color: #fff;"></p>
            <div id="decision-buttons-container" class="btn-list"></div>
            <a class="back-link" id="txt-back-heroes" onclick="navigateTo('heroes')">الرجوع لقائمة الأبطال</a>
        </div>

        <div id="result" class="screen glass-panel">
            <h1 id="txt-result-title">حكم التاريخ النهائي</h1>
            <div id="display-result-text" class="result-box"></div>
            <div style="margin-top: 40px; display: flex; gap: 30px; justify-content: center;">
                <a class="back-link" id="txt-retry-decision" onclick="navigateTo('play')">تغيير المسار التاريخي</a>
                <a class="back-link" id="txt-final-home" onclick="navigateTo('home')">الرئيسية</a>
            </div>
        </div>

        <div id="lore-list" class="screen glass-panel">
            <h1 id="txt-lore-title">سجل الأبطال الخالدين</h1>
            <div id="lore-selection-list" class="btn-list"></div>
            <a class="back-link" id="txt-back-from-lore" onclick="navigateTo('home')">العودة للرئيسية</a>
        </div>

        <div id="lore-details" class="screen glass-panel">
            <h1 id="display-det-title" style="color: var(--gold-bright);"></h1>
            <div id="display-det-content" style="font-size: 1.25rem; line-height: 2.3; text-align: justify; margin: 30px 0; color: #eee;"></div>
            <a class="back-link" id="txt-back-to-list" onclick="navigateTo('lore-list')">العودة لسجل الأبطال</a>
        </div>

    </div>

        // متغير اللغة الافتراضي
        let currentLang = 'ar';

        // وظيفة التنقل بين الشاشات حرفاً بحرف
        function navigateTo(screenId) {
            const allScreens = document.querySelectorAll('.screen');
            for (let i = 0; i < allScreens.length; i++) {
                allScreens[i].classList.remove('active');
            }
            const targetScreen = document.getElementById(screenId);
            targetScreen.classList.add('active');
        }

        // وظيفة تحديث اللغة وتغيير النصوص بالكامل
        function changeLanguage(langCode) {
            currentLang = langCode;
            const data = GlobalData[langCode];
            
            // تحديث اتجاه الصفحة
            document.body.dir = data.direction;

            // تحديث نصوص الشاشة الرئيسية
            document.getElementById('txt-main-title').innerText = data.mainTitle;
            document.getElementById('txt-main-desc').innerText = data.mainDesc;
            document.getElementById('txt-btn-start').innerText = data.btnStart;
            document.getElementById('txt-btn-lore').innerText = data.btnLore;

            // تحديث نصوص شاشة الأبطال
            document.getElementById('txt-hero-title').innerText = data.heroTitle;
            document.getElementById('txt-back-home').innerText = data.backHome;

            // تحديث نصوص شاشة اللعب
            document.getElementById('txt-mission-title').innerText = data.missionTitle;
            document.getElementById('txt-back-heroes').innerText = data.backHeroes;

            // تحديث نصوص شاشة النتيجة
            document.getElementById('txt-result-title').innerText = data.resultTitle;
            document.getElementById('txt-retry-decision').innerText = data.retryBtn;
            document.getElementById('txt-final-home').innerText = data.finalHome;

            // تحديث نصوص السجل
            document.getElementById('txt-lore-title').innerText = data.loreTitle;
            document.getElementById('txt-back-from-lore').innerText = data.backFromLore;
            document.getElementById('txt-back-to-list').innerText = data.backToList;

            // إعادة بناء القوائم بناءً على اللغة الجديدة
            buildHeroSelection();
            buildLoreSelection();
            
            // العودة للرئيسية عند تغيير اللغة لضمان التحديث
            navigateTo('home');
        }

        // بناء قائمة اختيار الأبطال
        function buildHeroSelection() {
            const container = document.getElementById('hero-selection-list');
            container.innerHTML = '';
            const heroes = GlobalData[currentLang].heroes;
            
            for (let id in heroes) {
                const btn = document.createElement('button');
                btn.className = 'action-btn';
                btn.innerText = heroes[id].name;
                btn.onclick = function() {
                    startMission(id);
                };
                container.appendChild(btn);
            }
        }

        // بدء المهمة وعرض الأسئلة
        function startMission(heroId) {
            const heroData = GlobalData[currentLang].heroes[heroId];
            document.getElementById('display-quest-text').innerText = heroData.quest;
            
            const btnContainer = document.getElementById('decision-buttons-container');
            btnContainer.innerHTML = '';
            
            const choices = heroData.decisions;
            for (let i = 0; i < choices.length; i++) {
                const choiceBtn = document.createElement('button');
                choiceBtn.className = 'action-btn';
                choiceBtn.innerText = choices[i].text;
                choiceBtn.onclick = function() {
                    showFinalResult(choices[i].result);
                };
                btnContainer.appendChild(choiceBtn);
            }
            navigateTo('play');
        }

        // عرض النتيجة النهائية
        function showFinalResult(resultText) {
            document.getElementById('display-result-text').innerText = resultText;
            navigateTo('result');
        }

        // بناء قائمة سجل الأبطال
        function buildLoreSelection() {
            const container = document.getElementById('lore-selection-list');
            container.innerHTML = '';
            const heroes = GlobalData[currentLang].heroes;
            
            for (let id in heroes) {
                const btn = document.createElement('button');
                btn.className = 'action-btn';
                btn.innerText = heroes[id].name;
                btn.onclick = function() {
                    showHeroDetails(id);
                };
                container.appendChild(btn);
            }
        }

        // فتح سجل الأبطال
        function openHeroLore() {
            buildLoreSelection();
            navigateTo('lore-list');
        }

        // عرض تفاصيل السيرة الذاتية
        function showHeroDetails(heroId) {
            const heroData = GlobalData[currentLang].heroes[heroId];
            document.getElementById('display-det-title').innerText = heroData.name;
            document.getElementById('display-det-content').innerText = heroData.biography;
            navigateTo('lore-details');
        }

        // نظام الرمل المتحرك (Canvas) بدون أي اختصار
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesArray = [];
            
            const numberOfParticles = 160;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = Math.random() * 2.8;
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                let speedY = Math.random() * 0.7 + 0.1;
                particlesArray.push({ x: x, y: y, size: size, speedY: speedY });
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(193, 163, 95, 0.55)";
            
            for (let i = 0; i < particlesArray.length; i++) {
                let p = particlesArray[i];
                p.y -= p.speedY;
                
                if (p.y < 0) {
                    p.y = canvas.height;
                    p.x = Math.random() * canvas.width;
                }
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(animateCanvas);
        }

        // مستمعات الأحداث
        window.addEventListener('resize', function() {
            initCanvas();
        });

        // تشغيل التطبيق
        initCanvas();
        animateCanvas();
        changeLanguage('ar');

    </script>
