<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ملحمة التأسيس - النسخة المصححة</title>
    <style>
        :root { 
            --gold: #c1a35f; --dark: #052c19; --glass: rgba(0, 0, 0, 0.9); --sand: #d4b483;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--dark); font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: white; overflow: hidden;
        }
        
        /* الخلفية الديناميكية */
        #dynamic-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -3; background-size: cover; background-position: center; 
            transition: opacity 1s ease, transform 2s ease; 
            filter: brightness(0.3); background-color: var(--dark);
        }

        .bg-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, transparent 20%, var(--dark) 95%); 
            z-index: -2; 
        }

        /* المجسمات السفلية (الدرعية والرياض) */
        .sand-floor {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 40px;
            background: linear-gradient(to top, var(--sand), transparent);
            z-index: 10; opacity: 0.4;
        }

        .monument {
            position: fixed; bottom: 5px; width: 80px; height: auto;
            z-index: 11; transition: 3s ease-in-out;
            filter: drop-shadow(0 0 10px var(--gold));
        }

        #diriyah-model { right: 15px; animation: moveR 8s infinite alternate; }
        #riyadh-model { left: 15px; animation: moveL 8s infinite alternate; }

        @keyframes moveR { from { transform: translateX(0); } to { transform: translateX(15px); } }
        @keyframes moveL { from { transform: translateX(0); } to { transform: translateX(-15px); } }

        /* الشاشات والبطاقات */
        .screen { 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; padding: 20px; text-align: center; 
        }
        .active { display: flex; animation: pageIn 0.6s ease-out forwards; }

        @keyframes pageIn { 
            from { opacity: 0; transform: scale(0.9); filter: blur(10px); } 
            to { opacity: 1; transform: scale(1); filter: blur(0); } 
        }

        .card { 
            background: var(--glass); border: 2px solid var(--gold); 
            padding: 25px; border-radius: 20px; max-width: 500px; width: 90%; 
            backdrop-filter: blur(15px); box-shadow: 0 0 40px rgba(0,0,0,1);
            position: relative; z-index: 20;
        }
        
        .option-btn {
            background: rgba(193, 163, 95, 0.1); border: 1px solid var(--gold);
            color: white; padding: 15px; margin: 8px 0; border-radius: 12px;
            cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: bold;
            transition: 0.3s; display: block;
        }
        .option-btn:hover { background: var(--gold); color: black; transform: translateY(-3px); }

        .result-box { 
            display: none; padding: 20px; border-right: 4px solid var(--gold); 
            background: rgba(255,255,255,0.05); margin-top: 15px; text-align: right;
            animation: slideRight 0.5s ease-out forwards;
        }

        @keyframes slideRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .back-link { margin-top: 20px; color: var(--gold); cursor: pointer; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>
    <div class="bg-overlay"></div>
    <div class="sand-floor"></div>

    <img src="https://cdn-icons-png.flaticon.com/512/11550/11550478.png" id="diriyah-model" class="monument" alt="الدرعية">
    <img src="https://cdn-icons-png.flaticon.com/512/2094/2094498.png" id="riyadh-model" class="monument" alt="الرياض">

    <div id="start-screen" class="screen active">
        <h1 style="font-size: 2.5rem; color: var(--gold);">ملاحم التأسيس</h1>
        <button class="option-btn" style="width:240px" onclick="nav('game-screen')">ابدأ اللعب</button>
        <button class="option-btn" style="width:240px" onclick="nav('history-screen')">سجل الأبطال</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="card">
            <h1 id="g-title">اختر القائد</h1>
            <p id="g-desc">مستقبل الوطن بين يديك..</p>
            <div id="opt-cont">
                <button class="option-btn" onclick="startTask('saud')">الإمام محمد بن سعود</button>
                <button class="option-btn" onclick="startTask('turki')">الإمام تركي بن عبد الله</button>
                <button class="option-btn" onclick="startTask('abdulaziz')">الملك عبد العزيز</button>
            </div>
            <div id="res-box" class="result-box"></div>
            <div class="back-link" onclick="location.reload()">العودة للرئيسية</div>
        </div>
    </div>

    <div id="history-screen" class="screen">
        <div class="card">
            <h1 id="h-title">التاريخ المجيد</h1>
            <div id="h-content" style="line-height: 1.6;">اختر بطلاً لتعرف قصته..</div>
            <div id="h-menu">
                <button class="option-btn" onclick="showH('saud')">محمد بن سعود</button>
                <button class="option-btn" onclick="showH('turki')">تركي بن عبدالله</button>
                <button class="option-btn" onclick="showH('abdulaziz')">عبدالعزيز آل سعود</button>
            </div>
            <div class="back-link" onclick="nav('start-screen')">رجوع</div>
        </div>
    </div>

    <script>
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        const database = {
            saud: {
                q: "تحدي الفكر: الدرعية في بدايتها، ماذا تختار؟",
                img: "https://images.unsplash.com/photo-1580674239581-3fbc1b40eabc?auto=format&fit=crop&w=800&q=80",
                options: [
                    {t: "عقد ميثاق الدرعية", r: "✅ 2026: الدرعية أصبحت منارة العلم الأولى."},
                    {t: "التركيز على التجارة", r: "⚠️ 2026: ضعف المسار الفكري للدولة."}
                ]
            },
            turki: {
                q: "تحدي الأمن: كيف تبسط العدل في الرياض؟",
                img: "https://images.unsplash.com/photo-1549488344-1f9b8d2bd1f3?auto=format&fit=crop&w=800&q=80",
                options: [
                    {t: "سيف الأجرب والعدل", r: "✅ 2026: نحن نعيش في أكثر الأوطان أمناً."},
                    {t: "التهاون مع الفوضى", r: "⚠️ 2026: تأثر الاستقرار الداخلي للدولة."}
                ]
            },
            abdulaziz: {
                q: "تحدي الوحدة: كيف تجمع القبائل؟",
                img: "https://images.unsplash.com/photo-1621245460478-dbdd5893731d?auto=format&fit=crop&w=800&q=80",
                options: [
                    {t: "توطين البادية والتعليم", r: "✅ 2026: الشعب السعودي متلاحم كالبنيان المرصوص."},
                    {t: "تجاهل المناطق البعيدة", r: "⚠️ 2026: تعثرت التنمية في الأطراف."}
                ]
            }
        };

        function startTask(hero) {
            const data = database[hero];
            const bg = document.getElementById('dynamic-bg');
            bg.style.backgroundImage = `url('${data.img}')`;
            bg.style.opacity = 1;
            bg.style.transform = "scale(1.1)";

            document.getElementById('g-title').innerText = "مهمة البطل";
            document.getElementById('g-desc').innerText = data.q;
            
            let btnHtml = "";
            data.options.forEach(o => {
                btnHtml += `<button class="option-btn" onclick="finishTask('${o.r.replace(/'/g, "\\'")}')">${o.t}</button>`;
            });
            document.getElementById('opt-cont').innerHTML = btnHtml;
            document.getElementById('res-box').style.display = 'none';
        }

        function finishTask(result) {
            document.getElementById('opt-cont').innerHTML = ""; // مسح الأزرار فوراً لمنع التعليق
            document.getElementById('g-desc').style.display = 'none';
            const rb = document.getElementById('res-box');
            rb.style.display = 'block';
            rb.innerHTML = `<strong>النتيجة التاريخية:</strong><br><br>${result}`;
        }

        const lore = {
            saud: "في عام 1727م، أرسى الإمام محمد بن سعود قواعد الدولة الأولى في الدرعية، مركزاً على العلم والأمن، لتبدأ أعظم قصة صمود في التاريخ.",
            turki: "بإرادة من حديد، استعاد الإمام تركي بن عبدالله الرياض عام 1824م، وبنى قصر الحكم مؤسساً الدولة الثانية عاصمةً للعدل.",
            abdulaziz: "وحد الملك عبدالعزيز القلوب قبل المدن، موازناً بين التوحيد والتقنية، ليطلق ملحمة بناء المملكة العربية السعودية العظمى."
        };

        function showH(w) {
            document.getElementById('h-content').innerText = lore[w];
            document.getElementById('h-menu').style.display = 'none';
            document.getElementById('h-title').innerText = "ملحمة " + (w==='saud'?'التأسيس':w==='turki'?'الاستعادة':'التوحيد');
        }
    </script>
</body>
</html>
