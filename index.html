<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - 300 عام من المجد</title>
    
    <style>
        /* --- الأساسيات والمتغيرات --- */
        :root {
            --gold-main: #c1a35f;
            --gold-light: #f3cf7a;
            --deep-green: #05160d;
            --glass-bg: rgba(0, 0, 0, 0.9); /* أضفنا شفافية أقل قليلاً لتأثير الزجاج */
            --glass-border: rgba(193, 163, 95, 0.5);
            --sword-speed: 0.4s;
            --transition-speed: 0.6s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; /* يمنع السكرول البار الرئيسي */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- محرك الخلفية: تأثير الرمل المكثف --- */
        #sand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* خلف المحتوى */
            pointer-events: none;
        }

        /* --- محول اللغات --- */
        .lang-switcher {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .btn-lang {
            background: var(--glass-bg);
            border: 1.5px solid var(--gold-main);
            color: var(--gold-light);
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            backdrop-filter: blur(15px);
            font-size: 0.9rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-lang:hover {
            background: var(--gold-main);
            color: #000;
            transform: scale(1.05);
        }

        .btn-lang.active {
            background: var(--gold-main);
            color: #000;
            box-shadow: 0 0 15px var(--gold-main);
        }

        /* --- حاوية التطبيق الرئيسية --- */
        .app-wrapper {
            position: relative;
            z-index: 10; /* فوق الخلفية */
            width: 95%;
            max-width: 630px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px); /* تأثير الزجاج */
            border: 1.8px solid var(--glass-border);
            border-radius: 35px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.9);
            max-height: 88vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-main) transparent;
        }

        /* --- أنظمة العرض والتحريك --- */
        .screen {
            display: none;
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition-speed) cubic-bezier(0.23, 1, 0.32, 1);
        }

        .screen.fade-in {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* --- النصوص --- */
        h1 {
            font-size: 2.3rem;
            color: var(--gold-main);
            margin-bottom: 20px;
            font-weight: 900;
            letter-spacing: 1px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }

        .description {
            font-size: 1.15rem;
            color: #e0e0e0;
            margin-bottom: 40px;
            line-height: 1.8;
            font-weight: 400;
        }

        /* --- أزرار الأكشن (تأثير السيف) --- */
        .btn-action {
            position: relative;
            width: 100%;
            background: linear-gradient(135deg, rgba(193, 163, 95, 0.05), rgba(255, 255, 255, 0.02));
            border: 1.2px solid var(--gold-main);
            padding: 18px;
            border-radius: 15px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تأثير ضربة السيف */
        .btn-action::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 120%;
            height: 100%;
            background: linear-gradient(
                90deg, 
                transparent, 
                rgba(193, 163, 95, 0.8), 
                #fff, 
                rgba(193, 163, 95, 0.8), 
                transparent
            );
            transform: skewX(-45deg);
            transition: 0s;
        }

        .btn-action:hover::before {
            left: 150%;
            transition: var(--sword-speed) ease-in-out;
        }

        .btn-action:hover {
            background: rgba(193, 163, 95, 0.15);
            border-color: var(--gold-light);
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(193, 163, 95, 0.2);
        }

        /* --- لوحات السير والقواعد --- */
        .story-panel {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 25px;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.15rem;
            border-right: 8px solid var(--gold-main);
            border-left: 0px;
            margin: 30px 0;
            color: #f9f9f9;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
            white-space: pre-line;
        }

        [dir="ltr"] .story-panel {
            border-right: 0;
            border-left: 8px solid var(--gold-main);
        }

        /* --- الروابط التفاعلية --- */
        .nav-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--gold-light);
            text-decoration: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.05rem;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
            padding-bottom: 5px;
        }

        .nav-link:hover {
            color: #fff;
            border-bottom-color: var(--gold-main);
        }

        /* --- السكرول بار --- */
        ::-webkit-scrollbar { width: 7px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: var(--gold-main); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="lang-switcher">
        <button id="btn-ar" class="btn-lang active" onclick="setAppLanguage('ar')">العربية</button>
        <button id="btn-en" class="btn-lang" onclick="setAppLanguage('en')">English</button>
    </div>

    <div class="app-wrapper" id="scroll-target">
        
        <div id="scr-home" class="screen" style="display: block;">
            <h1 id="txt-title">ملاحم التأسيس</h1>
            <p id="txt-desc" class="description">سجل تاريخي ناطق يروي رحلة الملوك والأبطال في بناء المملكة العربية السعودية عبر ثلاثة قرون من المجد والشموخ.</p>
            <button id="btn-start" class="btn-action" onclick="navTo('scr-heroes')">دخول الملحمة الكبرى</button>
            <button id="btn-lore" class="btn-action" onclick="showLore()">سير الأبطال والخالدين</button>
        </div>

        <div id="scr-heroes" class="screen">
            <h1 id="txt-hero-head">اختر القائد</h1>
            <div id="hero-list"></div>
            <a id="lnk-home" class="nav-link" onclick="navTo('scr-home')">العودة للواجهة الرئيسية</a>
        </div>

        <div id="scr-mission" class="screen">
            <h1 id="ui-mission-title" style="color: var(--gold-light);"></h1>
            <div id="ui-mission-desc" class="story-panel"></div>
            <div id="ui-btns-area"></div>
            <a id="lnk-cancel" class="nav-link" onclick="stopAudioAndGoBack()">تراجع والعودة</a>
        </div>

        <div id="scr-result" class="screen">
            <h1 id="txt-res-head">حكم التاريخ</h1>
            <div id="ui-result-body" class="story-panel"></div>
            <a id="lnk-res-home" class="nav-link" onclick="navTo('scr-home')">العودة للقائمة الرئيسية</a>
        </div>

        <div id="scr-lore" class="screen">
            <h1 id="txt-lore-head">سجل العظماء</h1>
            <div id="ui-lore-list"></div>
            <a id="lnk-lore-back" class="nav-link" onclick="navTo('scr-home')">رجوع</a>
        </div>

        <div id="scr-bio" class="screen">
            <h1 id="ui-bio-name"></h1>
            <div id="ui-bio-text" class="story-panel"></div>
            <a id="lnk-bio-back" class="nav-link" onclick="navTo('scr-lore')">العودة للسجل</a>
        </div>

    </div>

    <script>
        // --- إدارة البيانات واللغات ---
        let currentLang = 'ar';
        let audioPlayer = null;

        const Interface = {
            ar: {
                title: "ملاحم التأسيس",
                desc: "سجل تاريخي ناطق يروي أمجاد المملكة العربية السعودية عبر العصور وحكايات الأبطال الذين صنعوا المجد والوحدة.",
                start: "دخول الملحمة الكبرى",
                lore: "سير الأبطال والخالدين",
                choose: "اختر القائد",
                home: "العودة للرئيسية",
                cancel: "إلغاء والعودة",
                judge: "حكم التاريخ",
                records: "سجل العظماء",
                back: "رجوع",
                backLore: "العودة للسجل",
                dir: "rtl"
            },
            en: {
                title: "Founding Epics",
                desc: "A narrative historical record recounting the glories of Saudi Arabia and the stories of heroes who crafted glory and unity.",
                start: "Enter Grand Epic",
                lore: "Hall of Immortals",
                choose: "Select Your Leader",
                home: "Return Home",
                cancel: "Cancel & Return",
                judge: "History's Verdict",
                records: "Great Leaders Archive",
                back: "Back",
                backLore: "Back to List",
                dir: "ltr"
            }
        };

        const Characters = {
            saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    title: "ميثاق الدرعية الخالد (1727م)",
                    quest: "الدرعية عام 1727م.. هل تختار عقد ميثاق تاريخي لبناء الدولة السعودية الأولى؟",
                    choices: [{t: "عقد ميثاق الوحدة وبناء الدولة", r: "✅ انتصار تاريخي! بقرارك الشجاع، تأسست الدولة السعودية الأولى."}],
                    bio: "هو الإمام محمد بن سعود بن محمد بن مقرن، مؤسس الدولة السعودية الأولى وعميد أسرة آل سعود. نشأ في الدرعية وتولى الحكم عام 1727م في مرحلة انتقالية. اشتهر بالحكمة والعدل والشجاعة، ونجح في تحويل الدرعية من مدينة صغيرة إلى عاصمة عظمى جمعت شتات العرب، واهتم بتأمين طرق الحج وقوافل التجارة، مما أدى لنهضة اقتصادية وعلمية كبرى استقطبت العلماء، وأرسى قواعد الدولة التي استمر أثرها لقرون."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    title: "Eternal Diriyah Pact (1727)",
                    quest: "Diriyah 1727.. Do you sign the historic pact to build the First Saudi State?",
                    choices: [{t: "Sign Unity Pact & Build State", r: "✅ Historic Victory! Your decision established the First Saudi State."}],
                    bio: "Imam Muhammad bin Saud (1697–1765) was the visionary founder of the First Saudi State and the patriarch of the House of Saud. Born in the historical city of Diriyah, he was a statesman known for justice and courage. He successfully transformed Diriyah into the capital of a grand political entity, unifying warring tribes under one banner. He secured Hajj and trade routes, leading to a massive economic and educational renaissance."
                }
            },
            turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    title: "سيف الأجرب واستعادة الحق",
                    quest: "بعد سقوط الدرعية الأليم، هل تستعيد الرياض بسيف الأجرب؟",
                    choices: [{t: "باغت الرياض بسيف الأجرب", r: "✅ عادت الدولة السعودية الثانية وبنيت عاصمة جديدة!"}],
                    bio: "هو الإمام تركي بن عبدالله آل سعود، مؤسس الدولة السعودية الثانية ومسترد ملك آبائه وأجداده. بعد سقوط الدرعية، لجأ إلى مغارة 'عليا' ليخطط بعمق لهزيمة القوات المحتلة. اشتهر بسيفه الأسطوري 'الأجرب' الذي صار رمزاً للتحرير. في عام 1824م، نجح في تحرير الرياض بج يش صغير، واتخذ منها عاصمة دائمة للدولة، وأعاد بناء المسجد الجامع وقصر الحكم."
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    title: "Al-Ajrab Sword",
                    quest: "After the fall, will you reclaim Riyadh with your sword?",
                    choices: [{t: "Raid Riyadh with Al-Ajrab", r: "✅ Second Saudi State Reborn & Riyadh liberated!"}],
                    bio: "Imam Turki bin Abdullah (1755–1834) was the brave founder of the Second Saudi State. After the fall of Diriyah, he taken refuge in the 'Alia' cave to plan his return. He was famous for his legendary sword 'Al-Ajrab.' In 1824, he liberated Riyadh with a small force, established it as the capital, and restored law and order."
                }
            },
            aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    title: "فجر المصمك وتوحيد المملكة",
                    quest: "فجر 15 يناير 1902م أمام المصمك.. هل تقتحم الحصن وتعلن فجر عهد جديد؟",
                    choices: [{t: "اقتحم المصمك مع خيوط الفجر", r: "✅ الله أكبر! بضربة 'عجلان'، أعلنت للعالم التوحيد!"}],
                    bio: "هو الملك عبدالعزيز بن عبدالرحمن آل سعود، المؤسس العظيم للمملكة العربية السعودية الحديثة. وُلد في الرياض وانطلق في رحلة استعادة ملك آبائه وهو في ريعان شبابه بـ 63 رجلاً فقط. في فجر 15 يناير 1902م، نجح في فتح حصن المصمك، وقضى أكثر من 30 عاماً من الكفاح لتوتحيد المملكة، محولاً الشتات إلى وطن عظيم وقوة عالمية."
                },
                en: {
                    name: "King Abdulaziz",
                    title: "Masmak Dawn & Unification",
                    quest: "Dawn 1902 at Masmak.. Will you storm the fortress?",
                    choices: [{t: "Storm Masmak at Dawn", r: "✅ Victory! Modern Kingdom of Saudi Arabia Founded!"}],
                    bio: "King Abdulaziz Al Saud (1876–1953) was the legendary founder of the modern Kingdom of Saudi Arabia. He embarked on his mission to reclaim his ancestors' throne at a young age with only 63 followers. In 1902, he captured Masmak Fortress, unifying the regions of the Kingdom and leader leading it leading it into the modern era."
                }
            }
        };

        // --- محرك الوظائف ---

        function setAppLanguage(lang) {
            currentLang = lang; const t = Interface[lang];
            document.documentElement.lang = lang; document.documentElement.dir = t.dir;
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-desc').innerText = t.desc;
            document.getElementById('btn-start').innerText = t.start;
            document.getElementById('btn-lore').innerText = t.lore;
            document.getElementById('txt-hero-head').innerText = t.choose;
            document.getElementById('lnk-home').innerText = t.home;
            document.getElementById('lnk-cancel').innerText = t.cancel;
            document.getElementById('txt-res-head').innerText = t.judge;
            document.getElementById('lnk-res-home').innerText = t.home;
            document.getElementById('txt-lore-head').innerText = t.records;
            document.getElementById('lnk-lore-back').innerText = t.home;
            document.getElementById('lnk-bio-back').innerText = t.backLore;
            document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            buildHeroScreen();
        }

        function navTo(id) {
            const wrapper = document.getElementById('scroll-target');
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => { s.classList.remove('fade-in'); setTimeout(() => s.style.display = 'none', 400); });
            setTimeout(() => {
                const target = document.getElementById(id);
                wrapper.scrollTop = 0; target.style.display = 'block';
                setTimeout(() => target.classList.add('fade-in'), 50);
            }, 450);
        }

        function buildHeroScreen() {
            const list = document.getElementById('hero-list'); list.innerHTML = '';
            for(let key in Characters) {
                const b = document.createElement('button'); b.className = 'btn-action'; b.innerText = Characters[key][currentLang].name;
                b.onclick = () => launchMission(key);
                list.appendChild(b);
            }
        }

        function launchMission(key) {
            const char = Characters[key][currentLang];
            document.getElementById('ui-mission-title').innerText = char.title;
            document.getElementById('ui-mission-desc').innerText = char.quest;
            if(audioPlayer) audioPlayer.pause();
            audioPlayer = new Audio(`${key}_${currentLang}.mp3`);
            audioPlayer.play().catch(() => {});
            const btns = document.getElementById('ui-btns-area'); btns.innerHTML = '';
            char.choices.forEach(choice => {
                const cb = document.createElement('button'); cb.className = 'btn-action'; cb.innerText = choice.t;
                cb.onclick = () => { document.getElementById('ui-result-body').innerText = choice.r; if(audioPlayer) audioPlayer.pause(); navTo('scr-result'); };
                btns.appendChild(cb);
            });
            navTo('scr-mission');
        }

        function showLore() {
            const container = document.getElementById('ui-lore-list'); container.innerHTML = '';
            for(let key in Characters) {
                const b = document.createElement('button'); b.className = 'btn-action'; b.innerText = Characters[key][currentLang].name;
                b.onclick = () => {
                    document.getElementById('ui-bio-name').innerText = Characters[key][currentLang].name;
                    document.getElementById('ui-bio-text').innerText = Characters[key][currentLang].bio;
                    navTo('scr-bio');
                };
                container.appendChild(b);
            }
            navTo('scr-lore');
        }

        function stopAudioAndGoBack() { if(audioPlayer) audioPlayer.pause(); navTo('scr-heroes'); }

        // --- محرك الخلفية: ذرات الرمل المكثف 100% ---
        const canvas = document.getElementById('sand-canvas'); const ctx = canvas.getContext('2d');
        let dots = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = [];
            // زدت العدد إلى 250 ذرة لتبين أكثر
            for(let i=0; i<250; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2 + 0.5, // حجم أكبر قليلاً
                    v: Math.random() * 0.4 + 0.1, // سرعة متفاوتة
                    o: Math.random() * 0.5 + 0.2 // شفافية متفاوتة لعمق بصري
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dots.forEach(d => {
                ctx.fillStyle = `rgba(193, 163, 95, ${d.o})`; // استخدام الشفافية المتفاوتة
                d.y -= d.v;
                if(d.y < 0) d.y = canvas.height;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        window.onresize = initParticles;
        initParticles();
        drawParticles();
        setAppLanguage('ar');

    </script>
</body>
</html>
