<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ملحمة التأسيس - الإصدار الأسطوري V4</title>
    <style>
        /* CSS3 Advanced Styling */
        :root {
            --gold: #c1a35f;
            --gold-bright: #f3cf7a;
            --royal-green: #0a2a1a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-glow: 0 0 25px rgba(193, 163, 95, 0.4);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white; overflow: hidden;
        }

        /* جزيئات الذهب المتحركة في الخلفية */
        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        /* شريط تبديل اللغات الاحترافي */
        .nav-header {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between;
            padding: 20px 40px; z-index: 100; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .lang-pills { display: flex; gap: 10px; }
        .lang-pills button {
            background: var(--glass-bg); border: 1px solid var(--gold);
            color: var(--gold); padding: 8px 16px; border-radius: 50px;
            cursor: pointer; transition: 0.4s; font-weight: bold;
            backdrop-filter: blur(5px);
        }
        .lang-pills button:hover, .lang-pills button.active {
            background: var(--gold); color: black; box-shadow: var(--border-glow);
        }

        /* الحاوية الزجاجية الكبرى */
        .main-container {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100%; transition: 0.5s;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            border: 2px solid var(--gold);
            border-radius: 40px;
            padding: 50px;
            width: 90%; max-width: 900px;
            box-shadow: var(--border-glow);
            text-align: center;
            position: relative;
            max-height: 85vh; overflow-y: auto;
            border-bottom: 12px solid var(--gold);
        }

        h1 { font-size: 4rem; margin-bottom: 10px; color: var(--gold); text-shadow: 2px 2px 15px rgba(0,0,0,0.5); }
        p.subtitle { font-size: 1.4rem; color: #ddd; margin-bottom: 40px; }

        .btn-stack { display: flex; flex-direction: column; gap: 20px; }

        .mega-btn {
            background: linear-gradient(135deg, rgba(193, 163, 95, 0.2) 0%, rgba(0,0,0,0.4) 100%);
            border: 1px solid var(--gold);
            padding: 25px; border-radius: 25px;
            color: white; font-size: 1.3rem; font-weight: 600;
            cursor: pointer; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative; overflow: hidden;
        }

        .mega-btn:hover {
            transform: scale(1.03) translateY(-5px);
            background: var(--gold); color: #000;
            box-shadow: 0 15px 40px rgba(193, 163, 95, 0.5);
        }

        .back-link {
            display: inline-block; margin-top: 30px; color: var(--gold);
            text-decoration: none; font-size: 1.2rem; cursor: pointer;
            border-bottom: 1px dashed var(--gold); transition: 0.3s;
        }

        .result-panel {
            background: rgba(255,255,255,0.05); border-radius: 20px;
            padding: 30px; margin-top: 20px; line-height: 2; font-size: 1.2rem;
            text-align: justify; border-inline-start: 8px solid var(--gold);
        }

        /* لغات العرض */
        [dir="ltr"] .result-panel { text-align: left; }

        .screen { display: none; }
        .screen.active { display: block; animation: slideUp 0.7s ease forwards; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="nav-header">
        <div class="lang-pills">
            <button onclick="setGameLang('ar')" id="btn-ar">العربية</button>
            <button onclick="setGameLang('en')" id="btn-en">English</button>
            <button onclick="setGameLang('es')" id="btn-es">Español</button>
            <button onclick="setGameLang('ru')" id="btn-ru">Русский</button>
            <button onclick="setGameLang('ko')" id="btn-ko">한국어</button>
        </div>
    </div>

    <div class="main-container">
        <div id="scr-home" class="screen glass-card active">
            <h1 id="txt-title">ملاحم التأسيس</h1>
            <p class="subtitle" id="txt-subtitle">اكتب تاريخك بيدك عبر العصور</p>
            <div class="btn-stack">
                <button class="mega-btn" id="btn-play" onclick="showScreen('scr-heroes')">دخول الملحمة</button>
                <button class="mega-btn" id="btn-lore" onclick="initLore()">سجل الأبطال</button>
            </div>
        </div>

        <div id="scr-heroes" class="screen glass-card">
            <h1 id="txt-h-title">اختر القائد التاريخي</h1>
            <div id="hero-options" class="btn-stack"></div>
            <a class="back-link" id="lnk-back-home" onclick="showScreen('scr-home')">العودة للرئيسية</a>
        </div>

        <div id="scr-play" class="screen glass-card">
            <h1 id="txt-mission">المهمة القيادية</h1>
            <p id="txt-quest" style="font-size: 1.4rem; line-height: 2; margin-bottom: 30px;"></p>
            <div id="decision-options" class="btn-stack"></div>
            <a class="back-link" id="lnk-back-h" onclick="showScreen('scr-heroes')">العودة للأبطال</a>
        </div>

        <div id="scr-res" class="screen glass-card">
            <h1 id="txt-verdict">حكم التاريخ</h1>
            <div id="txt-res-body" class="result-panel"></div>
            <div style="display:flex; gap:20px; justify-content: center;">
                <a class="back-link" id="lnk-retry" onclick="showScreen('scr-play')">تغيير القرار</a>
                <a class="back-link" id="lnk-home" onclick="showScreen('scr-home')">الرئيسية</a>
            </div>
        </div>

        <div id="scr-lore-list" class="screen glass-card">
            <h1 id="txt-l-title">سجل الأبطال</h1>
            <div id="lore-buttons" class="btn-stack"></div>
            <a class="back-link" id="lnk-l-back" onclick="showScreen('scr-home')">العودة للرئيسية</a>
        </div>

        <div id="scr-lore-detail" class="screen glass-card">
            <h1 id="txt-det-title">التفاصيل الملحمية</h1>
            <div id="txt-det-body" style="font-size: 1.3rem; line-height: 2.2; text-align: justify; margin-bottom: 30px;"></div>
            <button class="mega-btn" id="btn-audio" onclick="playEpicAudio()">🔊 استمع للرواية الملكية</button>
            <a class="back-link" id="lnk-det-back" onclick="showScreen('scr-lore-list')">العودة للسجل</a>
        </div>
    </div>

    <script>
        // --- المحرك الملحمي الجديد ---
        const ENGINE = {
            ar: {
                title: "ملاحم التأسيس", subtitle: "سجل البطولات بقراراتك التاريخية", play: "دخول الملحمة", lore: "سجل الأبطال",
                hTitle: "اختر القائد التاريخي", mission: "مهمة القائد", verdict: "حكم التاريخ", retry: "تغيير القرار", home: "الرئيسية",
                heroes: {
                    saud: {
                        name: "الإمام محمد بن سعود",
                        quest: "عام 1727م.. الدرعية في مفترق طرق. التهديدات الخارجية تحيط بك، والانقسامات الداخلية تضعف الصفوف. المدينة تحتاج إلى رؤية تتجاوز مجرد البقاء. ماذا تقرر لإرساء قواعد الدولة الأولى؟",
                        decisions: [
                            { t: "عقد ميثاق الدرعية التاريخي ونشر العلم والعدل", r: "✅ انتصار تاريخي! بقرارك هذا، لم تؤسس مدينة بل أسست أمة. ميثاق الدرعية أصبح الدستور الروحي والسياسي الذي جذب القبائل ووحد القلوب، لتنطلق من الدرعية أعظم وحدة شهدتها الجزيرة العربية، ممتدة شرراً ونوراً في كل الأرجاء." },
                            { t: "تجهيز جيش ضخم فقط دون ميثاق فكري", r: "⚠️ نجاح مؤقت. القوة العسكرية حمت الحدود لفترة، لكن غياب الوحدة الفكرية جعل الدولة تواجه صعوبات في الاستمرار أمام القوى الكبرى، مما أخر حلم الوحدة الشاملة لسنوات." },
                            { t: "التركيز على تأمين طرق التجارة والأسواق فقط", r: "❌ فشل استراتيجي. تحولت الدرعية لمركز تجاري غني، لكنها افتقرت للحماية والسيادة، مما جعلها لقمة سائغة للأطماع الخارجية التي لا تحترم إلا القوة والوحدة." }
                        ],
                        epic: "في قلب الجزيرة العربية، وتحديداً في الدرعية الصامدة عام 1727م، بدأت ملحمة لم يعرف التاريخ لها مثيلاً. الإمام محمد بن سعود، الرجل ذو الرؤية الثاقبة، قرر أن الوقت قد حان لإنهاء الشتات. لم يكن يبحث عن ملك زائل، بل عن وطن يجمع شتات العرب تحت راية التوحيد والعلم. واجه الحروب بقلب شجاع، وبنى القلاع والأسوار، لكنه بنى قبل ذلك الإنسان. بفضل حكمته، أصبحت الدولة السعودية الأولى قوة يحسب لها ألف حساب، تمتد من الخليج إلى البحر الأحمر، معيدة للأرض هيبتها وللدين صفاؤه."
                    },
                    turki: {
                        name: "الإمام تركي بن عبد الله",
                        quest: "بعد سقوط الدرعية، خيم الظلام. لكنك عدت من الظلال بسيفك 'الأجرب'. الرياض الآن أمامك، هل تقتحمها لتعيد بناء ما تدمر، أم تنتظر اكتمال صفوف القبائل البعيدة؟",
                        decisions: [
                            { t: "اقتحام الرياض فوراً وبسط العدل بسيف الأجرب", r: "✅ عودة الفارس! لقد أعدت الأمل للقلوب الكسيرة. الإمام تركي لم يستعد الرياض فحسب، بل أعاد هيبة الدولة السعودية الثانية، جاعلاً من الرياض عاصمة صامدة ومنطلقاً لتوحيد نجد من جديد تحت راية الحق والعدل." },
                            { t: "الانتظار في الصحراء لجمع المزيد من الأنصار", r: "⚠️ ضياع الفرصة. الأعداء استغلوا تأخرك لتحصين الرياض، مما جعل رحلة الاستعادة أطول وأكثر دموية مما كنت تخطط له." },
                            { t: "محاولة التفاوض السياسي مع القوى المحتلة", r: "❌ خيبة أمل. المحتل لا يفهم إلا لغة القوة، والمفاوضات لم تزدنا إلا ضعفاً وضياعاً للوقت الغالي." },
                        ],
                        epic: "عندما ظن الجميع أن شمس الدولة قد غابت، خرج الإمام تركي بن عبدالله من قلب التحدي. عام 1824م كان شاهداً على شجاعة رجل واحد غير مجرى التاريخ. بسيفه 'الأجرب' وعزيمة لا تلين، استطاع أن يطهر الرياض من المحتلين. لم يكتفِ بالنصر العسكري، بل أرسى قواعد العدل حتى قيل إن الشخص كان يقطع الفيافي آمناً على نفسه وماله. إنه بطل الاستعادة الذي سطر بدمائه وعرقه قصة صمود الدولة السعودية الثانية، ملهمًا الأجيال بأن الحق لا يموت ما دام وراءه مُطالب."
                    },
                    aziz: {
                        name: "الملك عبد العزيز",
                        quest: "ليلة الـ 15 من يناير 1902م. أنت و63 رجلاً فقط أمام أسوار المصمك العالية. الفجر يقترب، والقرار بيدك: هل تقتحم الآن وتخاطر بكل شيء، أم تتراجع لجمع جيش أكبر من البادية؟",
                        decisions: [
                            { t: "اقتحام المصمك مع الفجر والتوكل على الله", r: "✅ الله أكبر! بفتحة المصمك، لم تسترد الرياض فحسب، بل أعلنت فجر الدولة السعودية الثالثة. هذا القرار الجريء كان الشرارة التي وحدت شبه الجزيرة العربية لثلاثين عاماً من الكفاح، لتتأسس المملكة العربية السعودية العظمى." },
                            { t: "الانتظار خلف الأسوار لمراقبة حركة الحراس", r: "⚠️ نجاح جزئي. ضاعت ميزة المباغتة، واضطررت لخوض معركة أطول في شوارع الرياض، مما زاد من عدد التضحيات قبل الوصول للحكم." },
                            { t: "الانسحاب المؤقت لتأمين إمدادات من الكويت", r: "❌ ضياع الحلم. العدو عرف بوجودكم وشدد الحراسة، وأصبحت العودة للرياض حلماً بعيد المنال لسنوات طويلة." }
                        ],
                        epic: "الملك عبدالعزيز بن عبدالرحمن.. اسم حفر في الصخر ليصنع وطناً. بدأت ملحمته في ليلة شاتية عام 1902م، عندما قرر أن المستحيل كلمة لا توجد في قاموسه. بـ 63 رجلاً، واجه المستحيل وفتح المصمك، معلناً 'الملك لله ثم لعبدالعزيز'. استمرت رحلته 31 عاماً من البناء والتوحيد، محولاً الصحراء القاحلة إلى دولة عصرية تجمع بين الأصالة والتقدم. بذكائه وحكمته، وحد القبائل المتناحرة تحت راية 'لا إله إلا الله'، ليصنع أعظم وحدة عربية في العصر الحديث، مؤسساً مملكة الخير التي ننعم بظلالها اليوم."
                    }
                }
            },
            en: {
                title: "Founding Epics", subtitle: "Record heroics through your choices", play: "Enter Epic", lore: "Heroes Record",
                hTitle: "Choose Your Leader", mission: "Leader's Mission", verdict: "Verdict of History", retry: "Change Decision", home: "Home",
                heroes: {
                    saud: {
                        name: "Imam Muhammad bin Saud",
                        quest: "1727 AD.. Diriyah is at a crossroads. External threats surround you. What do you decide to lay the foundations of the First State?",
                        decisions: [
                            { t: "Establish the Historic Diriyah Pact", r: "✅ Historic Victory! You founded a nation, not just a city. This pact became the constitution that united the hearts of all tribes." },
                            { t: "Focus only on the military", r: "⚠️ Temporary success. Lack of ideological unity made the state fragile against global powers." },
                            { t: "Focus on trade only", r: "❌ Strategic failure. Diriyah became wealthy but defenseless, falling prey to greedy invaders." }
                        ],
                        epic: "In the heart of Arabia, 1727, Imam Muhammad bin Saud began an unprecedented epic. He didn't seek a fleeting kingdom, but a homeland united under knowledge and faith. He built forts, but more importantly, he built a people. Under his wisdom, the First Saudi State became a formidable power stretching from the Gulf to the Red Sea."
                    },
                    aziz: {
                        name: "King Abdulaziz",
                        quest: "January 15, 1902. You and 63 men are before the Masmak walls. Dawn is near. What is your decision?",
                        decisions: [
                            { t: "Storm the Masmak now", r: "✅ Victory! You announced the dawn of the Third Saudi State. This bold move led to the unification of the Kingdom over 30 years of struggle." },
                            { t: "Wait for a better moment", r: "⚠️ Partial success. The element of surprise was lost, leading to a bloodier conflict." },
                            { t: "Retreat to gather more supplies", r: "❌ The dream was lost. The enemy reinforced the fort, and the return became nearly impossible for years." }
                        ],
                        epic: "King Abdulaziz Al Saud.. a name etched in stone to create a nation. His epic began in 1902 with only 63 men. He conquered the impossible, uniting scattered tribes under one flag. For 31 years, he built and unified, transforming the desert into a modern state that balances heritage and progress."
                    }
                }
            }
            // (بقية اللغات تضاف بنفس القوة والتفصيل)
        };

        let currentLang = 'ar';
        let currentHero = '';

        function setGameLang(langCode) {
            currentLang = langCode;
            document.body.dir = (langCode === 'ar' ? 'rtl' : 'ltr');
            
            const data = ENGINE[langCode] || ENGINE['ar'];
            document.getElementById('txt-title').innerText = data.title;
            document.getElementById('txt-subtitle').innerText = data.subtitle;
            document.getElementById('btn-play').innerText = data.play;
            document.getElementById('btn-lore').innerText = data.lore;
            document.getElementById('txt-h-title').innerText = data.hTitle;
            document.getElementById('lnk-back-home').innerText = data.home;
            document.getElementById('txt-mission').innerText = data.mission;
            document.getElementById('lnk-back-h').innerText = data.backH || "Back";
            document.getElementById('txt-verdict').innerText = data.verdict;
            document.getElementById('lnk-retry').innerText = data.retry;
            document.getElementById('lnk-home').innerText = data.home;
            document.getElementById('txt-l-title').innerText = data.lore;
            document.getElementById('lnk-l-back').innerText = data.home;

            // تحديث الخيارات
            renderHeroList();
            showScreen('scr-home');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.speechSynthesis.cancel();
        }

        function renderHeroList() {
            const container = document.getElementById('hero-options');
            container.innerHTML = '';
            const heroes = ENGINE[currentLang].heroes;
            for(let key in heroes) {
                const btn = document.createElement('button');
                btn.className = 'mega-btn';
                btn.innerText = heroes[key].name;
                btn.onclick = () => startAdventure(key);
                container.appendChild(btn);
            }
        }

        function startAdventure(key) {
            currentHero = key;
            const hero = ENGINE[currentLang].heroes[key];
            document.getElementById('txt-quest').innerText = hero.quest;
            
            const container = document.getElementById('decision-options');
            container.innerHTML = '';
            hero.decisions.forEach((dec, i) => {
                const btn = document.createElement('button');
                btn.className = 'mega-btn';
                btn.innerText = dec.t;
                btn.onclick = () => showResult(dec.r);
                container.appendChild(btn);
            });
            showScreen('scr-play');
        }

        function showResult(resultTxt) {
            document.getElementById('txt-res-body').innerText = resultTxt;
            showScreen('scr-res');
        }

        function initLore() {
            const container = document.getElementById('lore-buttons');
            container.innerHTML = '';
            const heroes = ENGINE[currentLang].heroes;
            for(let key in heroes) {
                const btn = document.createElement('button');
                btn.className = 'mega-btn';
                btn.innerText = heroes[key].name;
                btn.onclick = () => showLoreDetail(key);
                container.appendChild(btn);
            }
            showScreen('scr-lore-list');
        }

        function showLoreDetail(key) {
            currentHero = key;
            const hero = ENGINE[currentLang].heroes[key];
            document.getElementById('txt-det-title').innerText = hero.name;
            document.getElementById('txt-det-body').innerText = hero.epic;
            showScreen('scr-lore-detail');
        }

        function playEpicAudio() {
            const text = document.getElementById('txt-det-body').innerText;
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = (currentLang === 'ar' ? 'ar-SA' : 'en-US');
            msg.pitch = 0.6; // صوت رجالي عميق
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        // --- محرك الخلفية الجرافيكي ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speedY: Math.random() * -0.5,
                    opacity: Math.random() * 0.5
                });
            }
        }

        function animateParticles() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(193, 163, 95, 0.5)";
            particles.forEach(p => {
                p.y += p.speedY;
                if(p.y < 0) p.y = canvas.height;
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        initParticles();
        animateParticles();
        setGameLang('ar');
    </script>
</body>
</html>
