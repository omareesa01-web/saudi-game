<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | الإصدار التاريخي الموسع</title>
    
    <style>
        /* --- 1. التنسيق البصري والألوان الملكية --- */
        :root {
            --gold-primary: #c1a35f;
            --gold-light: #f3cf7a;
            --bg-dark: #05160d;
            --glass: rgba(0, 0, 0, 0.96);
            --sword-fx: linear-gradient(90deg, transparent, #fff, var(--gold-light), transparent);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #103a24 0%, var(--bg-dark) 100%);
            color: #fff;
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 2. محرك الرمل الذهبي (Sand Graphics) --- */
        #sand-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.8;
        }

        /* --- 3. نظام تبديل اللغات --- */
        .lang-switcher {
            position: fixed;
            top: 25px; left: 25px;
            z-index: 5000;
            display: flex; gap: 12px;
        }

        .lang-node {
            background: var(--glass);
            border: 2px solid var(--gold-primary);
            color: var(--gold-light);
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .lang-node:hover {
            background: var(--gold-primary);
            color: #000;
            transform: scale(1.1);
        }

        .lang-node.active {
            background: var(--gold-primary);
            color: #000;
            box-shadow: 0 0 30px var(--gold-primary);
        }

        /* --- 4. الإطار الزجاجي الرئيسي --- */
        .app-container {
            position: relative;
            z-index: 100;
            width: 95%;
            max-width: 750px;
            background: var(--glass);
            backdrop-filter: blur(50px);
            border: 1.5px solid var(--gold-primary);
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 80px 200px rgba(0, 0, 0, 1);
            max-height: 90vh;
            overflow-y: auto;
            border-top: 8px solid var(--gold-primary);
        }

        /* سكرول بار مخصص */
        .app-container::-webkit-scrollbar { width: 6px; }
        .app-container::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: 20px; }

        /* --- 5. منطق العرض والشاشات --- */
        .screen {
            display: none;
            opacity: 0;
            transform: translateY(40px);
            transition: 0.8s ease;
        }

        .screen.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* --- 6. العناصر النصية --- */
        .hero-title {
            font-size: 2.8rem;
            color: var(--gold-primary);
            margin-bottom: 25px;
            font-weight: 900;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .sub-text {
            font-size: 1.25rem;
            color: #d1d1d1;
            margin-bottom: 45px;
            line-height: 2.1;
        }

        /* --- 7. أزرار ضربة السيف --- */
        .action-btn {
            position: relative;
            width: 100%;
            background: linear-gradient(to right, rgba(193, 163, 95, 0.1), rgba(0,0,0,0.2));
            border: 1.5px solid var(--gold-primary);
            padding: 22px;
            border-radius: 15px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            margin-bottom: 18px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
        }

        .action-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 100%; height: 100%;
            background: var(--sword-fx);
            transform: skewX(-45deg);
        }

        .action-btn:hover::after {
            left: 150%;
            transition: 0.6s ease;
        }

        .action-btn:hover {
            background: rgba(193, 163, 95, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(193, 163, 95, 0.2);
        }

        /* --- 8. لوحة القصة والتفاصيل --- */
        .story-panel {
            background: rgba(255, 255, 255, 0.04);
            padding: 40px;
            border-radius: 25px;
            text-align: justify;
            line-height: 2.3;
            font-size: 1.2rem;
            border-right: 10px solid var(--gold-primary);
            margin: 30px 0;
            color: #f0f0f0;
            white-space: pre-line;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }

        [dir="ltr"] .story-panel {
            border-right: 0;
            border-left: 10px solid var(--gold-primary);
        }

        .footer-nav {
            display: inline-block;
            margin-top: 35px;
            color: var(--gold-light);
            text-decoration: none;
            font-weight: 800;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        .footer-nav:hover { color: #fff; border-bottom-color: var(--gold-primary); }

    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="lang-switcher">
        <button id="ar-btn" class="lang-node active" onclick="setLanguage('ar')">العربية</button>
        <button id="en-btn" class="lang-node" onclick="setLanguage('en')">English</button>
    </div>

    <div class="app-container" id="scroll-top">
        
        <div id="scr-home" class="screen active">
            <h1 id="ui-title" class="hero-title">ملاحم التأسيس</h1>
            <p id="ui-desc" class="sub-text">استكشف تاريخ المملكة العربية السعودية من خلال محاكاة قرارات الأبطال الذين واجهوا الصعاب لبناء هذا الوطن العظيم.</p>
            <button id="ui-btn-start" class="action-btn" onclick="navTo('scr-heroes')">دخول الملحمة التفاعلية</button>
            <button id="ui-btn-lore" class="action-btn" onclick="initLore()">سير الأبطال التاريخية</button>
        </div>

        <div id="scr-heroes" class="screen">
            <h1 id="ui-choose" class="hero-title">اختر القائد</h1>
            <div id="hero-list"></div>
            <a id="ui-back-home" class="footer-nav" onclick="navTo('scr-home')">العودة للقائمة الرئيسية</a>
        </div>

        <div id="scr-quest" class="screen">
            <h1 id="q-head" style="color: var(--gold-light);"></h1>
            <div id="q-body" class="story-panel"></div>
            <div id="q-choices"></div>
            <a id="ui-cancel" class="footer-nav" onclick="navTo('scr-heroes')">تراجع</a>
        </div>

        <div id="scr-result" class="screen">
            <h1 id="ui-verdict" class="hero-title">حكم التاريخ</h1>
            <div id="res-text" class="story-panel"></div>
            <button id="ui-retry" class="action-btn" onclick="navTo('scr-heroes')">تجربة مسار تاريخي آخر</button>
            <a id="ui-res-home" class="footer-nav" onclick="navTo('scr-home')">الرئيسية</a>
        </div>

        <div id="scr-lore" class="screen">
            <h1 id="ui-records" class="hero-title">سجل الخالدين</h1>
            <div id="lore-list"></div>
            <a id="ui-lore-back" class="footer-nav" onclick="navTo('scr-home')">رجوع</a>
        </div>

        <div id="scr-bio" class="screen">
            <h1 id="bio-head" class="hero-title"></h1>
            <div id="bio-content" class="story-panel"></div>
            <a id="ui-bio-back" class="footer-nav" onclick="navTo('scr-lore')">العودة للسجل</a>
        </div>

    </div>

            ar: {
                title: "ملاحم التأسيس", desc: "استكشف تاريخ المملكة العربية السعودية من خلال محاكاة قرارات الأبطال الذين واجهوا الصعاب لبناء هذا الوطن العظيم.",
                start: "دخول الملحمة التفاعلية", lore: "سير الأبطال التاريخية", choose: "اختر القائد", home: "العودة للقائمة الرئيسية", 
                cancel: "تراجع", verdict: "حكم التاريخ", retry: "تجربة مسار تاريخي آخر", main: "الرئيسية", 
                records: "سجل الخالدين", bioBack: "العودة للسجل", dir: "rtl"
            },
            en: {
                title: "Founding Epics", desc: "Explore Saudi history by simulating the decisions of heroes who faced hardships to build this great nation.",
                start: "Enter Interactive Epic", lore: "Historical Bio Records", choose: "Select Leader", home: "Back to Main Menu", 
                cancel: "Go Back", verdict: "History's Verdict", retry: "Try Another Path", main: "Home", 
                records: "Immortal Records", bioBack: "Back to List", dir: "ltr"
            }
        };

        let currentLang = 'ar';

        /**
         * محرك التحكم بالواجهة
         */
        function setLanguage(lang) {
            currentLang = lang;
            const ui = INTERFACE_TEXTS[lang];
            
            document.documentElement.lang = lang;
            document.documentElement.dir = ui.dir;
            document.body.style.direction = ui.dir;

            document.getElementById('ar-btn').classList.toggle('active', lang === 'ar');
            document.getElementById('en-btn').classList.toggle('active', lang === 'en');

            document.getElementById('ui-title').innerText = ui.title;
            document.getElementById('ui-desc').innerText = ui.desc;
            document.getElementById('ui-btn-start').innerText = ui.start;
            document.getElementById('ui-btn-lore').innerText = ui.lore;
            document.getElementById('ui-choose').innerText = ui.choose;
            document.getElementById('ui-back-home').innerText = ui.home;
            document.getElementById('ui-cancel').innerText = ui.cancel;
            document.getElementById('ui-verdict').innerText = ui.verdict;
            document.getElementById('ui-retry').innerText = ui.retry;
            document.getElementById('ui-res-home').innerText = ui.main;
            document.getElementById('ui-records').innerText = ui.records;
            document.getElementById('ui-lore-back').innerText = ui.main;
            document.getElementById('ui-bio-back').innerText = ui.bioBack;

            initHeroButtons();
        }

        function navTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                setTimeout(() => s.style.display = 'none', 500);
            });
            setTimeout(() => {
                const target = document.getElementById(screenId);
                target.style.display = 'block';
                setTimeout(() => target.classList.add('active'), 50);
                document.getElementById('scroll-top').scrollTop = 0;
            }, 550);
        }

        function initHeroButtons() {
            const container = document.getElementById('hero-list');
            container.innerHTML = '';
            Object.keys(HISTORICAL_DATA).forEach(key => {
                const b = document.createElement('button');
                b.className = 'action-btn';
                b.innerText = HISTORICAL_DATA[key][currentLang].name;
                b.onclick = () => startScenario(key);
                container.appendChild(b);
            });
        }

        function startScenario(key) {
            const data = HISTORICAL_DATA[key][currentLang];
            document.getElementById('q-head').innerText = data.title;
            document.getElementById('q-body').innerText = data.quest;
            
            const btnDock = document.getElementById('q-choices');
            btnDock.innerHTML = '';
            
            data.paths.forEach(p => {
                const b = document.createElement('button');
                b.className = 'action-btn';
                b.innerText = p.t;
                b.onclick = () => {
                    document.getElementById('res-text').innerText = p.r;
                    navTo('scr-result');
                };
                btnDock.appendChild(b);
            });
            navTo('scr-quest');
        }

        function initLore() {
            const container = document.getElementById('lore-list');
            container.innerHTML = '';
            Object.keys(HISTORICAL_DATA).forEach(key => {
                const b = document.createElement('button');
                b.className = 'action-btn';
                b.innerText = HISTORICAL_DATA[key][currentLang].name;
                b.onclick = () => {
                    document.getElementById('bio-head').innerText = HISTORICAL_DATA[key][currentLang].name;
                    document.getElementById('bio-content').innerText = HISTORICAL_DATA[key][currentLang].bio;
                    navTo('scr-bio');
                };
                container.appendChild(b);
            });
            navTo('scr-lore');
        }

        // --- محرك جزيئات الرمل ---
        const canvas = document.getElementById('sand-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];

        function createDots() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = [];
            for (let i = 0; i < 320; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.3,
                    speed: Math.random() * 0.4 + 0.1,
                    op: Math.random() * 0.5 + 0.2
                });
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dots.forEach(d => {
                ctx.fillStyle = `rgba(193, 163, 95, ${d.op})`;
                d.y -= d.speed;
                if (d.y < 0) d.y = canvas.height;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(render);
        }

        window.onresize = createDots;
        createDots();
        render();
        setLanguage('ar');
    </script>
</body>
</html>
