<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس | 300 عام من الأمجاد</title>
    
    <style>
        /* --- 1. الستايل العام والمتغيرات --- */
        :root {
            --gold-primary: #c1a35f;
            --gold-light: #f3cf7a;
            --bg-dark: #05160d;
            --glass: rgba(0, 0, 0, 0.95);
            --sword-fx: linear-gradient(90deg, transparent, #fff, var(--gold-light), transparent);
            --font-stack: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #103a24 0%, var(--bg-dark) 100%);
            color: #fff;
            font-family: var(--font-stack);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: direction 0.5s ease;
        }

        /* --- 2. محرك الرمل (Sand Engine) --- */
        #sand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.85;
        }

        /* --- 3. حاوية تبديل اللغات --- */
        .lang-control {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 5000;
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            background: var(--glass);
            border: 2px solid var(--gold-primary);
            color: var(--gold-light);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .lang-btn:hover {
            background: var(--gold-primary);
            color: #000;
            transform: translateY(-2px);
        }

        .lang-btn.active {
            background: var(--gold-primary);
            color: #000;
            box-shadow: 0 0 20px var(--gold-primary);
        }

        /* --- 4. الصندوق الزجاجي الرئيسي --- */
        .main-frame {
            position: relative;
            z-index: 100;
            width: 90%;
            max-width: 680px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1.5px solid var(--gold-primary);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 60px 150px rgba(0, 0, 0, 1);
            max-height: 85vh;
            overflow-y: auto;
            border-top: 5px solid var(--gold-primary);
        }

        /* سكرول بار أنيق */
        .main-frame::-webkit-scrollbar { width: 5px; }
        .main-frame::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: 10px; }

        /* --- 5. نظام التنقل --- */
        .view {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.6s ease-out;
        }

        .view.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* --- 6. النصوص --- */
        .title-gold {
            font-size: 2.5rem;
            color: var(--gold-primary);
            margin-bottom: 20px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .info-text {
            font-size: 1.15rem;
            color: #e0e0e0;
            margin-bottom: 35px;
            line-height: 1.8;
        }

        /* --- 7. أزرار السيف --- */
        .btn-sword {
            position: relative;
            width: 100%;
            background: rgba(193, 163, 95, 0.05);
            border: 1px solid var(--gold-primary);
            padding: 18px;
            border-radius: 12px;
            color: #fff;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-sword::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: var(--sword-fx);
            transform: skewX(-45deg);
        }

        .btn-sword:hover::after {
            left: 150%;
            transition: 0.5s ease;
        }

        .btn-sword:hover {
            background: rgba(193, 163, 95, 0.15);
            transform: scale(1.01);
            border-color: #fff;
        }

        /* --- 8. لوحة القصة --- */
        .story-board {
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 15px;
            text-align: justify;
            line-height: 2.1;
            font-size: 1.1rem;
            border-right: 6px solid var(--gold-primary);
            margin: 25px 0;
            color: #f5f5f5;
        }

        [dir="ltr"] .story-board {
            border-right: 0;
            border-left: 6px solid var(--gold-primary);
        }

        .nav-footer {
            display: inline-block;
            margin-top: 25px;
            color: var(--gold-light);
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 1px solid transparent;
        }

        .nav-footer:hover { color: #fff; border-bottom-color: var(--gold-primary); }

    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="lang-control">
        <button id="ar-trigger" class="lang-btn active" onclick="updateLang('ar')">العربية</button>
        <button id="en-trigger" class="lang-btn" onclick="updateLang('en')">English</button>
    </div>

    <div class="main-frame" id="scroll-anchor">
        
        <div id="v-home" class="view active">
            <h1 id="ui-main-title" class="title-gold">ملاحم التأسيس</h1>
            <p id="ui-main-desc" class="info-text">سجل تاريخي يروي قصص الأبطال الذين بنوا مجد المملكة العربية السعودية عبر ثلاثة قرون.</p>
            <button id="ui-btn-start" class="btn-sword" onclick="changeView('v-heroes')">دخول الملحمة</button>
            <button id="ui-btn-lore" class="btn-sword" onclick="loadLore()">سير الأبطال</button>
        </div>

        <div id="v-heroes" class="view">
            <h1 id="ui-choose-head" class="title-gold">اختر القائد</h1>
            <div id="hero-dock"></div>
            <a id="ui-back-home" class="nav-footer" onclick="changeView('v-home')">رجوع</a>
        </div>

        <div id="v-quest" class="view">
            <h1 id="q-title" style="color: var(--gold-light);"></h1>
            <div id="q-desc" class="story-board"></div>
            <div id="q-options"></div>
            <a id="ui-back-list" class="nav-footer" onclick="changeView('v-heroes')">انسحاب</a>
        </div>

        <div id="v-result" class="view">
            <h1 id="ui-res-head" class="title-gold">حكم التاريخ</h1>
            <div id="res-body" class="story-board"></div>
            <button id="ui-btn-retry" class="btn-sword" onclick="changeView('v-heroes')">تجربة مسار آخر</button>
            <a id="ui-res-home" class="nav-footer" onclick="changeView('v-home')">الرئيسية</a>
        </div>

        <div id="v-lore" class="view">
            <h1 id="ui-lore-head" class="title-gold">سجل الخالدين</h1>
            <div id="lore-dock"></div>
            <a id="ui-lore-back" class="nav-footer" onclick="changeView('v-home')">رجوع</a>
        </div>

        <div id="v-bio" class="view">
            <h1 id="bio-head" class="title-gold"></h1>
            <div id="bio-body" class="story-board"></div>
            <a id="ui-bio-back" class="nav-footer" onclick="changeView('v-lore')">العودة للسجل</a>
        </div>

    </div>

    <script>
        /**
         * نظام البيانات المطور - 3 مسارات لكل بطل
         */
        const DATABASE = {
            saud: {
                ar: {
                    name: "الإمام محمد بن سعود",
                    title: "ميثاق الدرعية (1727م)",
                    quest: "أنت الآن حاكم الدرعية. نجد تعاني من التشتت والنزاعات. كيف ستبني أساساً قوياً لدولتك؟",
                    paths: [
                        { t: "تأسيس ميثاق الوحدة مع الشيخ محمد بن عبدالوهاب", r: "✅ قرار تاريخي عظيم! هذا الميثاق جمع بين القوة السياسية والدعوة العلمية، وبسببه انطلقت الدولة السعودية الأولى كأقوى كيان في المنطقة." },
                        { t: "التركيز على تحصين أسوار المدينة وتطوير الجيش فقط", r: "⚠️ قرار حذر. الدرعية أصبحت قلعة حصينة، لكنها ظلت مدينة مستقلة ولم تتحول إلى دولة كبرى تجمع شتات العرب." },
                        { t: "تجنب النزاعات والتركيز على التجارة فقط", r: "❌ قرار خاطئ. الانعزال جعل الدرعية مطمعاً سهلاً للقوى المجاورة، وضاعت فرصة قيادة المنطقة نحو الوحدة." }
                    ],
                    bio: "مؤسس الدولة السعودية الأولى. جعل من الدرعية منارة للعلم والسياسة وبنى أول وحدة حقيقية في قلب الجزيرة العربية."
                },
                en: {
                    name: "Imam Muhammad bin Saud",
                    title: "Diriyah Pact (1727)",
                    quest: "You are the ruler of Diriyah. Central Arabia is fragmented. How will you build a lasting state?",
                    paths: [
                        { t: "Establish the Pact of Unity and Knowledge", r: "✅ Great Choice! This pact united politics and faith, launching the powerful First Saudi State." },
                        { t: "Focus solely on fortifying the city walls", r: "⚠️ Cautious. Diriyah became safe, but the dream of a grand united nation was delayed." },
                        { t: "Avoid conflicts and focus only on trade", r: "❌ Mistake. Isolation made the city vulnerable and lost the chance to lead the region's unity." }
                    ],
                    bio: "The founder of the First Saudi State. He transformed Diriyah into a center for leadership and security."
                }
            },
            turki: {
                ar: {
                    name: "الإمام تركي بن عبد الله",
                    title: "استعادة الرياض (1824م)",
                    quest: "الرياض تحت الاحتلال. خرجت من مخبئك ومعك سيف 'الأجرب' الملحمي. ما هي خطتك لاسترداد الحق؟",
                    paths: [
                        { t: "مباغتة الحامية الأجنبية داخل الرياض ليلاً", r: "✅ انتصار مذهل! استعدت الرياض بشجاعتك الفائقة، وأسست الدولة السعودية الثانية واتخذت من الرياض عاصمة دائمة." },
                        { t: "الانتظار لجمع جيش ضخم من القبائل المجاورة", r: "⚠️ فرصة ضائعة. العدو استغل وقتك لتحصين الرياض بالمدافع، مما جعل استعادتها لاحقاً تكلف الكثير من الدماء." },
                        { t: "محاولة التفاوض مع المحتل للخروج سلماً", r: "❌ فشل ذريع. اعتبر العدو طلبك ضعفاً، وقاموا بتشديد الرقابة على الأهالي ونفيك بعيداً عن أرض أجدادك." }
                    ],
                    bio: "بطل الدولة السعودية الثانية. استرد ملك آبائه بسيفه الأسطوري 'الأجرب' وثبّت دعائم الدولة من جديد."
                },
                en: {
                    name: "Imam Turki bin Abdullah",
                    title: "Restoring Riyadh (1824)",
                    quest: "Riyadh is occupied. You emerged with your legendary sword 'Al-Ajrab'. What is your plan?",
                    paths: [
                        { t: "Launch a surprise night raid on the fort", r: "✅ Heroic Victory! With immense courage, you reclaimed Riyadh and established the Second Saudi State." },
                        { t: "Wait to gather a massive tribal army", r: "⚠️ Delay. The enemy fortified the city further, making the eventual liberation very costly in lives." },
                        { t: "Attempt to negotiate a peaceful withdrawal", r: "❌ Failure. They saw it as weakness and tightened their grip on the local population." }
                    ],
                    bio: "The founder of the Second Saudi State. He reclaimed the throne with his legendary sword and made Riyadh the capital."
                }
            },
            aziz: {
                ar: {
                    name: "الملك عبد العزيز",
                    title: "فتح المصمك (1902م)",
                    quest: "أنت ورجالك الـ 63 أمام أسوار المصمك العالية. التاريخ ينتظر قرارك الفاصل قبل الفجر. ماذا ستقرر؟",
                    paths: [
                        { t: "اقتحام حصن المصمك مباشرة وقت الفجر", r: "✅ 'الملك لله ثم لعبدالعزيز!'.. نجحت الخطة ببراعة، واسترددت ملك آبائك، ومن هنا انطلقت ملحمة توحيد المملكة." },
                        { t: "التراجع لمشارف المدينة وطلب مدد إضافي", r: "⚠️ حلم مؤجل. كشف الأعداء تحركاتكم في الصحراء، واضطررت للعودة والانتظار لسنوات أخرى لفرصة جديدة." },
                        { t: "فرض حصار طويل لقطع الإمدادات عن الحصن", r: "❌ خطة فاشلة. الحصن كان يملك مؤناً لشهور، بينما نفذ الماء من رجالك في حر الصحراء، مما أدى لانسحابكم." }
                    ],
                    bio: "المؤسس العظيم للمملكة العربية السعودية الحديثة. وحّد القلوب قبل الأرض وبنى وطناً شامخاً."
                },
                en: {
                    name: "King Abdulaziz",
                    title: "Opening of Masmak (1902)",
                    quest: "You and your 63 men are at the Masmak walls. History awaits your call. What will you do?",
                    paths: [
                        { t: "Storm the Masmak fortress at dawn", r: "✅ Success! You reclaimed Riyadh and began the unification of the modern Kingdom of Saudi Arabia." },
                        { t: "Withdraw and wait for more tribal support", r: "⚠️ Delayed. The enemy discovered your tracks, and the opportunity was lost for several years." },
                        { t: "Besiege the fortress to force a surrender", r: "❌ Failed. The garrison had supplies for months, while your men ran out of water, forcing a retreat." }
                    ],
                    bio: "The Great Founder of modern Saudi Arabia. He unified the nation with wisdom and bravery."
                }
            }
        };

        const INTERFACE = {
            ar: {
                title: "ملاحم التأسيس", desc: "سجل تاريخي يروي قصص الأبطال الذين بنوا مجد المملكة العربية السعودية عبر ثلاثة قرون.",
                start: "دخول الملحمة", lore: "سير الأبطال", choose: "اختر القائد", home: "رجوع", cancel: "انسحاب", 
                verdict: "حكم التاريخ", retry: "تجربة مسار آخر", main: "الرئيسية", records: "سجل الخالدين", bioBack: "العودة للسجل", dir: "rtl"
            },
            en: {
                title: "Founding Epics", desc: "A historical record telling the stories of heroes who built the glory of Saudi Arabia over three centuries.",
                start: "Enter the Epic", lore: "Hero Bios", choose: "Select Leader", home: "Back", cancel: "Withdraw", 
                verdict: "History's Verdict", retry: "Try Another Path", main: "Home", records: "Immortal Records", bioBack: "Back to List", dir: "ltr"
            }
        };

        let activeLang = 'ar';

        // --- محرك الوظائف ---
        function updateLang(lang) {
            activeLang = lang;
            const ui = INTERFACE[lang];
            
            // تغيير اتجاه الصفحة ديناميكياً لحل تداخل اللغات
            document.documentElement.lang = lang;
            document.documentElement.dir = ui.dir;
            document.body.style.direction = ui.dir;

            // تحديث الأزرار النشطة
            document.getElementById('ar-trigger').classList.toggle('active', lang === 'ar');
            document.getElementById('en-trigger').classList.toggle('active', lang === 'en');

            // تحديث النصوص
            document.getElementById('ui-main-title').innerText = ui.title;
            document.getElementById('ui-main-desc').innerText = ui.desc;
            document.getElementById('ui-btn-start').innerText = ui.start;
            document.getElementById('ui-btn-lore').innerText = ui.lore;
            document.getElementById('ui-choose-head').innerText = ui.choose;
            document.getElementById('ui-back-home').innerText = ui.home;
            document.getElementById('ui-back-list').innerText = ui.cancel;
            document.getElementById('ui-res-head').innerText = ui.verdict;
            document.getElementById('ui-btn-retry').innerText = ui.retry;
            document.getElementById('ui-res-home').innerText = ui.main;
            document.getElementById('ui-lore-head').innerText = ui.records;
            document.getElementById('ui-lore-back').innerText = ui.main;
            document.getElementById('ui-bio-back').innerText = ui.bioBack;

            buildHeroList();
        }

        function changeView(id) {
            document.querySelectorAll('.view').forEach(v => {
                v.classList.remove('active');
                setTimeout(() => v.style.display = 'none', 400);
            });
            setTimeout(() => {
                const target = document.getElementById(id);
                target.style.display = 'block';
                setTimeout(() => target.classList.add('active'), 50);
                document.getElementById('scroll-anchor').scrollTop = 0;
            }, 450);
        }

        function buildHeroList() {
            const dock = document.getElementById('hero-dock');
            dock.innerHTML = '';
            Object.keys(DATABASE).forEach(key => {
                const b = document.createElement('button');
                b.className = 'btn-sword';
                b.innerText = DATABASE[key][activeLang].name;
                b.onclick = () => startQuest(key);
                dock.appendChild(b);
            });
        }

        function startQuest(key) {
            const data = DATABASE[key][activeLang];
            document.getElementById('q-title').innerText = data.title;
            document.getElementById('q-desc').innerText = data.quest;
            const optDock = document.getElementById('q-options');
            optDock.innerHTML = '';
            data.paths.forEach(p => {
                const b = document.createElement('button');
                b.className = 'btn-sword';
                b.innerText = p.t;
                b.onclick = () => {
                    document.getElementById('res-body').innerText = p.r;
                    changeView('v-result');
                };
                optDock.appendChild(b);
            });
            changeView('v-quest');
        }

        function loadLore() {
            const dock = document.getElementById('lore-dock');
            dock.innerHTML = '';
            Object.keys(DATABASE).forEach(key => {
                const b = document.createElement('button');
                b.className = 'btn-sword';
                b.innerText = DATABASE[key][activeLang].name;
                b.onclick = () => {
                    document.getElementById('bio-head').innerText = DATABASE[key][activeLang].name;
                    document.getElementById('bio-body').innerText = DATABASE[key][activeLang].bio;
                    changeView('v-bio');
                };
                dock.appendChild(b);
            });
            changeView('v-lore');
        }

        // --- محرك الرمل المكثف ---
        const canvas = document.getElementById('sand-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initSand() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 280; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2 + 0.5,
                    v: Math.random() * 0.5 + 0.1,
                    o: Math.random() * 0.6 + 0.2
                });
            }
        }

        function drawSand() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(193, 163, 95, ${p.o})`;
                p.y -= p.v;
                if (p.y < 0) p.y = canvas.height;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(drawSand);
        }

        window.onresize = initSand;
        initSand();
        drawSand();
        updateLang('ar');
    </script>
</body>
</html>
