<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - الإصدار الكامل</title>
    <style>
        :root {
            --gold: #c1a35f;
            --gold-bright: #f3cf7a;
            --glass-panel: rgba(0, 0, 0, 0.85); 
            --glow: 0 0 25px rgba(193, 163, 95, 0.5);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; overflow: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .lang-bar {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            display: flex; gap: 10px; background: rgba(0,0,0,0.9);
            padding: 10px; border-radius: 30px; border: 1px solid var(--gold);
        }

        .lang-bar button {
            background: transparent; border: 1px solid var(--gold); color: white;
            padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: 0.3s;
            font-weight: bold;
        }

        .lang-bar button:hover { background: var(--gold); color: black; }

        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .glass-panel {
            backdrop-filter: blur(20px); border: 1.5px solid var(--gold); border-radius: 30px;
            padding: 30px; width: 85%; max-width: 700px; box-shadow: var(--glow);
            text-align: center; max-height: 80vh; overflow-y: auto;
            animation: fadeIn 0.5s ease-in-out;
        }

        #home.glass-panel { background: transparent !important; border: none !important; box-shadow: none !important; backdrop-filter: none; }
        .glass-panel:not(#home) { background: var(--glass-panel); }

        h1 { font-size: 2.8rem; color: var(--gold); margin-bottom: 15px; text-shadow: 0 0 15px black; }
        .desc { font-size: 1.1rem; color: #ccc; margin-bottom: 30px; }
        .btn-list { display: flex; flex-direction: column; gap: 12px; }
        
        .action-btn {
            background: linear-gradient(135deg, rgba(193,163,95,0.2), rgba(0,0,0,0.8));
            border: 1px solid var(--gold); padding: 18px; border-radius: 15px;
            color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .action-btn:hover { background: var(--gold); color: black; transform: scale(1.02); }

        .back-link { 
            margin-top: 25px; color: var(--gold); cursor: pointer; display: inline-block; 
            font-weight: bold; border-bottom: 1px solid var(--gold); text-decoration: none;
        }

        .result-box { 
            background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; 
            text-align: justify; line-height: 1.8; font-size: 1.1rem; border-right: 6px solid var(--gold); 
        }

        [dir="ltr"] .result-box { border-right: none; border-left: 6px solid var(--gold); text-align: left; }

        .screen { display: none; }
        .active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="lang-bar">
        <button onclick="updateLang('ar')">العربية</button>
        <button onclick="updateLang('en')">English</button>
        <button onclick="updateLang('es')">Español</button>
        <button onclick="updateLang('ru')">Русский</button>
        <button onclick="updateLang('ko')">한국어</button>
    </div>

    <div class="container">
        <div id="home" class="screen glass-panel active">
            <h1 id="L-title">ملاحم التأسيس</h1>
            <p class="desc" id="L-desc">اكتب تاريخك بيدك عبر العصور</p>
            <div class="btn-list">
                <button class="action-btn" id="L-start" onclick="showScreen('heroes')">دخول الملحمة</button>
                <button class="action-btn" id="L-lore" onclick="renderLore()">سجل الأبطال</button>
            </div>
        </div>

        <div id="heroes" class="screen glass-panel">
            <h1 id="L-hTitle">اختر القائد التاريخي</h1>
            <div id="hero-btns" class="btn-list"></div>
            <a class="back-link" id="L-back1" onclick="showScreen('home')">العودة</a>
        </div>

        <div id="play" class="screen glass-panel">
            <h1 id="L-mTitle">المهمة القيادية</h1>
            <p id="quest-text" style="font-size: 1.2rem; margin: 20px 0; line-height: 1.7; text-align: justify;"></p>
            <div id="decision-btns" class="btn-list"></div>
            <a class="back-link" id="L-back2" onclick="showScreen('heroes')">الرجوع</a>
        </div>

        <div id="result" class="screen glass-panel">
            <h1 id="L-vTitle">حكم التاريخ</h1>
            <div id="res-text" class="result-box"></div>
            <div style="margin-top: 30px;">
                <a class="back-link" id="L-retry" onclick="showScreen('play')" style="margin-left: 20px;">تغيير القرار</a>
                <a class="back-link" id="L-home" onclick="showScreen('home')">الرئيسية</a>
            </div>
        </div>

        <div id="lore-list" class="screen glass-panel">
            <h1 id="L-lTitle">سجل الأبطال</h1>
            <div id="lore-btns" class="btn-list"></div>
            <a class="back-link" id="L-back3" onclick="showScreen('home')">العودة</a>
        </div>

        <div id="lore-det" class="screen glass-panel">
            <h1 id="det-title"></h1>
            <div id="det-content" style="font-size: 1.1rem; line-height: 2; text-align: justify; margin: 20px 0;"></div>
            <a class="back-link" id="L-back4" onclick="showScreen('lore-list')">رجوع للسجل</a>
        </div>
    </div>

    <script>

                heroes: {

                    aziz: { name: "Король Абдул-Азиз", q: "1902: 63 человека у стен Масмака. Нападете ли вы на рассвете или отступите?", d: [{t: "Штурм на рассвете", r: "✅ Победа! Вы вернули Эр-Рияд и провозгласили рассвет современного Королевства."}, {t: "Наблюдать", r: "⚠️ Частичный успех. Эффект внезапности потерян, что привело к тяжелым потерям в бою."}, {t: "Отступить", r: "❌ Упущенный шанс. Враг усилил охрану, и возвращение стало невозможным на долгие годы."}], long: "Основатель современного Королевства." }
                }
            },
            ko: {
                dir: 'ltr', title: "건국 서사시", desc: "당신의 손으로 역사를 기록하세요", start: "시작", lore: "기록", hTitle: "선택", mTitle: "미션", vTitle: "판결", retry: "다시", home: "홈",
                heroes: {
                    saud: { name: "사우드 (Saud)", q: "1727년: 아라비아가 혼란에 빠졌습니다. 지식과 정의에 기초한 역사적 조약을 맺겠습니까, 아니면 군사력에만 집중하겠습니까?", d: [{t: "디리야 조약 체결", r: "✅ 영원한 승리! 당신은 위대한 국가를 세웠습니다. 이 조약은 부족들을 하나로 묶고 평화를 가져왔습니다."}, {t: "군사력에만 집중", r: "⚠️ 일시적 성공. 군사력은 국경을 보호했지만, 사상적 통합 없이는 내부적 균열에 직면했습니다."}, {t: "무역에만 집중", r: "❌ 전략적 실패. 주권 없는 부는 침략자들에게 쉬운 표적이 되었습니다."}], long: "제1차 사우디 국가의 건국자." },
                    turki: { name: "투르키 (Turki)", q: "리야드가 점령되었습니다. '알-아즈랍' 검과 함께 홀로 남았습니다. 지금 공격하시겠습니까, 아니면 기다리겠습니까?", d: [{t: "즉시 리야드 공격", r: "✅ 희망의 귀환! 제2차 국가를 재건했습니다. 당신의 검은 정의와 힘의 상징이 되었습니다."}, {t: "지원군 대기", r: "⚠️ 기회 상실. 적들이 성벽을 강화하여 나중에 더 많은 희생을 치러야 했습니다."}, {t: "협상 시도", r: "❌ 처절한 실패. 적은 오직 힘의 논리만 이해하며, 당신은 소중한 시간을 낭비했습니다."}], long: "제2차 사우디 국가 설립자." },
                    aziz: { name: "압둘아지즈 (Abdulaziz)", q: "1902년: 63명의 병사와 마스막 성벽 앞. 새벽에 기습하시겠습니까, 아니면 후퇴하시겠습니까?", d: [{t: "새벽 기습 공격", r: "✅ 승리! 리야드를 탈환하고 현대 왕국의 서막을 열었습니다. 이 결정이 땅을 통일했습니다."}, {t: "관찰 및 대기", r: "⚠️ 부분적 성공. 기습 효과를 잃어 거리 전투에서 많은 충성스러운 병사를 잃었습니다."}, {t: "일시적 후퇴", r: "❌ 기회 상실. 적들이 경비를 강화하여 탈환이 수년간 불가능해졌습니다."}], long: "현대 사우디아라비아 왕국의 건국자." }
                }
            }
        };

        let lang = 'ar';
        function updateLang(l) {
            lang = l; 
            document.body.dir = DB[l].dir;
            document.getElementById('L-title').innerText = DB[l].title;
            document.getElementById('L-desc').innerText = DB[l].desc;
            document.getElementById('L-start').innerText = DB[l].start;
            document.getElementById('L-lore').innerText = DB[l].lore;
            document.getElementById('L-hTitle').innerText = DB[l].hTitle;
            document.getElementById('L-back1').innerText = DB[l].home;
            document.getElementById('L-mTitle').innerText = DB[l].mTitle;
            document.getElementById('L-back2').innerText = DB[l].hTitle;
            document.getElementById('L-vTitle').innerText = DB[l].vTitle;
            document.getElementById('L-retry').innerText = DB[l].retry;
            document.getElementById('L-home').innerText = DB[l].home;
            document.getElementById('L-lTitle').innerText = DB[l].lore;
            document.getElementById('L-back3').innerText = DB[l].home;
            document.getElementById('L-back4').innerText = DB[l].lore;
            renderHeroes(); 
            showScreen('home');
        }

        function showScreen(id) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function renderHeroes() {
            const list = document.getElementById('hero-btns');
            list.innerHTML = '';
            for(let key in DB[lang].heroes) {
                const b = document.createElement('button');
                b.className = 'action-btn';
                b.innerText = DB[lang].heroes[key].name;
                b.onclick = function() { startPlay(key); };
                list.appendChild(b);
            }
        }

        function startPlay(k) {
            const h = DB[lang].heroes[k];
            document.getElementById('quest-text').innerText = h.q;
            const btns = document.getElementById('decision-btns');
            btns.innerHTML = '';
            h.d.forEach(function(dec) {
                const b = document.createElement('button');
                b.className = 'action-btn';
                b.innerText = dec.t;
                b.onclick = function() {
                    document.getElementById('res-text').innerText = dec.r;
                    showScreen('result');
                };
                btns.appendChild(b);
            });
            showScreen('play');
        }

        function renderLore() {
            const list = document.getElementById('lore-btns');
            list.innerHTML = '';
            for(let key in DB[lang].heroes) {
                const b = document.createElement('button');
                b.className = 'action-btn';
                b.innerText = DB[lang].heroes[key].name;
                b.onclick = function() {
                    document.getElementById('det-title').innerText = DB[lang].heroes[key].name;
                    document.getElementById('det-content').innerText = DB[lang].heroes[key].long;
                    showScreen('lore-det');
                };
                list.appendChild(b);
            }
            showScreen('lore-list');
        }

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        
        function initBg() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            pts = [];
            for(let i=0; i<150; i++) {
                pts.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2.5,
                    s: Math.random() * 0.6 + 0.1
                });
            }
        }

        function drawBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(193, 163, 95, 0.5)";
            for(let i=0; i < pts.length; i++) {
                let p = pts[i];
                p.y -= p.s;
                if(p.y < 0) p.y = canvas.height;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(drawBg);
        }

        window.addEventListener('resize', initBg);
        initBg();
        drawBg();
        updateLang('ar');
    </script>
</body>
</html>
