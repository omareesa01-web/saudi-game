<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - نسخة العرض الملكي الجبار</title>
    <style>
        :root {
            --gold: #c1a35f;
            --gold-bright: #f3cf7a;
            /* زجاج شفاف بالكامل للخلفية */
            --glass-transparent: rgba(0, 0, 0, 0); 
            /* خلفية زجاجية داكنة لباقي الشاشات */
            --glass-panel: rgba(0, 0, 0, 0.75); 
            --glow: 0 0 35px rgba(193, 163, 95, 0.5);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; overflow: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .lang-bar {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            display: flex; gap: 10px; background: rgba(0,0,0,0.85);
            padding: 12px; border-radius: 40px; border: 1px solid var(--gold);
        }

        .lang-bar button {
            background: transparent; border: 1px solid var(--gold); color: white;
            padding: 8px 18px; border-radius: 25px; cursor: pointer; 
            transition: 0.4s; font-weight: bold; font-size: 0.9rem;
        }

        .lang-bar button:hover, .lang-bar button.active { 
            background: var(--gold); color: black; box-shadow: var(--glow); 
        }

        .container { 
            display: flex; justify-content: center; align-items: center; height: 100vh; 
        }
        
        .glass-panel {
            backdrop-filter: blur(35px);
            border: 2px solid var(--gold);
            border-radius: 40px;
            padding: 50px;
            width: 90%; max-width: 1000px;
            box-shadow: var(--glow);
            text-align: center;
            max-height: 85vh; overflow-y: auto;
        }

        /* تنسيق خاص للشاشة الرئيسية لتكون شفافة */
        #home.glass-panel {
            background: var(--glass-transparent) !important;
            border: none !important; /* إزالة الحدود الذهبية من على الشفافية لزيادة الشفافية */
            box-shadow: none !important; /* إزالة الظل المشع من على الشفافية */
            backdrop-filter: blur(5px); /* تعتيم بسيط جداً للخلفية المتحركة خلف الأزرار */
        }

        /* تنسيق لباقي الشاشات لتكون داكنة */
        .glass-panel:not(#home) {
            background: var(--glass-panel);
        }

        h1 { font-size: 3.8rem; color: var(--gold); margin-bottom: 15px; text-shadow: 0 0 20px black; }
        .desc { font-size: 1.4rem; color: #eee; margin-bottom: 40px; }

        .btn-list { display: flex; flex-direction: column; gap: 20px; }
        
        .action-btn {
            background: linear-gradient(135deg, rgba(193,163,95,0.2), rgba(0,0,0,0.6));
            border: 1px solid var(--gold);
            padding: 26px; border-radius: 25px;
            color: white; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; transition: 0.4s;
        }

        .action-btn:hover { 
            background: var(--gold); color: black; transform: translateY(-5px); box-shadow: var(--glow); 
        }

        .back-link { 
            margin-top: 35px; color: var(--gold); cursor: pointer; display: inline-block; 
            font-weight: bold; text-decoration: none; border-bottom: 2px solid var(--gold); 
            font-size: 1.2rem; transition: 0.3s;
        }

        .result-box {
            background: rgba(255,255,255,0.08); padding: 40px; border-radius: 25px;
            text-align: justify; line-height: 2.1; font-size: 1.3rem; border-right: 10px solid var(--gold);
        }

        [dir="ltr"] .result-box { border-right: none; border-left: 10px solid var(--gold); text-align: left; }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.8s ease-out; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="lang-bar">
        <button onclick="updateLang('ar')">العربية</button>
        <button onclick="updateLang('en')">English</button>
        <button onclick="updateLang('es')">Español</button>
        <button onclick="updateLang('ru')">Русский</button>
        <button onclick="updateLang('ko')">한국어</button>
    </div>

    <div class="container">
        <div id="home" class="screen glass-panel active">
            <h1 id="L-title">ملاحم التأسيس</h1>
            <p class="desc" id="L-desc">اكتب تاريخك بيدك عبر العصور</p>
            <div class="btn-list">
                <button class="action-btn" id="L-start" onclick="showScreen('heroes')">دخول الملحمة</button>
                <button class="action-btn" id="L-lore" onclick="renderLore()">سجل الأبطال</button>
            </div>
        </div>

        <div id="heroes" class="screen glass-panel">
            <h1 id="L-hTitle">اختر القائد التاريخي</h1>
            <div id="hero-btns" class="btn-list"></div>
            <a class="back-link" id="L-back1" onclick="showScreen('home')">العودة للرئيسية</a>
        </div>

        <div id="play" class="screen glass-panel">
            <h1 id="L-mTitle">المهمة القيادية</h1>
            <p id="quest-text" style="font-size: 1.5rem; margin: 30px 0; line-height: 1.9; text-align: justify;"></p>
            <div id="decision-btns" class="btn-list"></div>
            <a class="back-link" id="L-back2" onclick="showScreen('heroes')">العودة للأبطال</a>
        </div>

        <div id="result" class="screen glass-panel">
            <h1 id="L-vTitle">حكم التاريخ</h1>
            <div id="res-text" class="result-box"></div>
            <div style="margin-top:40px; display:flex; gap:25px; justify-content:center;">
                <a class="back-link" id="L-retry" onclick="showScreen('play')">تغيير القرار</a>
                <a class="back-link" id="L-home" onclick="showScreen('home')">الرئيسية</a>
            </div>
        </div>

        <div id="lore-list" class="screen glass-panel">
            <h1 id="L-lTitle">سجل الأبطال</h1>
            <div id="lore-btns" class="btn-list"></div>
            <a class="back-link" id="L-back3" onclick="showScreen('home')">العودة للرئيسية</a>
        </div>

        <div id="lore-det" class="screen glass-panel">
            <h1 id="det-title"></h1>
            <div id="det-content" style="font-size: 1.4rem; line-height: 2.3; text-align: justify; margin: 20px 0;"></div>
            <button class="action-btn" id="L-audio" onclick="playVoice()">🔊 استمع للرواية الكاملة</button>
            <a class="back-link" id="L-back4" onclick="showScreen('lore-list')">العودة للسجل</a>
        </div>
    </div>

            ko: {
                dir: 'ltr', title: "건국 이야기", desc: "역사를 쓰세요", start: "시작", lore: "기록", hTitle: "선택", mTitle: "미션", vTitle: "판결", retry: "다시 시도", home: "홈", audio: "🔊 듣기",
                heroes: {
                    saud: { name: "사우드", q: "1727: 정의의 조약입니까, 아니면 군대입니까?", d: [{t: "디리야 조약 체결", r: "✅ 영원한 승리! 당신은 단순한 도시가 아닌 국가를 세웠습니다."}, {t: "군대만", r: "⚠️ 일시적 성공. 통합이 부족해 불안정했습니다."}, {t: "무역", r: "❌ 전략적 실패. 주권 없는 부는 침략의 표적이 되었습니다."}], long: "1727년 제1차 사우디 국가 건국자." },
                    turki: { name: "투르키", q: "리야드가 점령되었습니다. 검으로 탈환하시겠습니까?", d: [{t: "즉시 공격", r: "✅ 영웅의 귀환! 제2차 사우디 국가를 재건했습니다."}, {t: "지원군 대기", r: "⚠️ 기회 상실. 적들이 방어선을 강화했습니다."}, {t: "협상 시도", r: "❌ 실패. 힘의 논리만이 통합니다."}], long: "1824년 제2차 사우디 국가 설립자." },
                    aziz: { name: "압둘아지즈", q: "1902: 63명과 마스막. 공격?", d: [{t: "새벽 공격", r: "✅ 대승리! 사우디 왕국의 서막을 열었습니다."}, {t: "감시", r: "⚠️ 부분적 성공. 거리 전투에서 많은 이들을 잃었습니다."}, {t: "후퇴", r: "❌ 꿈이 사라짐. 요새가 강화되어 탈환 기회를 잃었습니다."}], long: "사우디 왕국 건국자." }

        let lang = 'ar';
        let curHero = '';

        function updateLang(l) {
            lang = l;
            document.body.dir = DB[l].dir;
            document.getElementById('L-title').innerText = DB[l].title;
            document.getElementById('L-desc').innerText = DB[l].desc;
            document.getElementById('L-start').innerText = DB[l].start;
            document.getElementById('L-lore').innerText = DB[l].lore;
            document.getElementById('L-hTitle').innerText = DB[l].hTitle;
            document.getElementById('L-back1').innerText = DB[l].home;
            document.getElementById('L-mTitle').innerText = DB[l].mTitle;
            document.getElementById('L-back2').innerText = DB[l].hTitle;
            document.getElementById('L-vTitle').innerText = DB[l].vTitle;
            document.getElementById('L-retry').innerText = DB[l].retry;
            document.getElementById('L-home').innerText = DB[l].home;
            document.getElementById('L-lTitle').innerText = DB[l].lore;
            document.getElementById('L-back3').innerText = DB[l].home;
            document.getElementById('L-audio').innerText = DB[l].audio;
            document.getElementById('L-back4').innerText = DB[l].lore;
            
            document.querySelectorAll('.lang-bar button').forEach(b => {
                b.classList.remove('active');
                if(b.innerText.toLowerCase().includes(l) || (l === 'ar' && b.innerText === 'العربية')) b.classList.add('active');
            });

            renderHeroes();
            showScreen('home');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.speechSynthesis.cancel();
        }

        function renderHeroes() {
            const list = document.getElementById('hero-btns');
            list.innerHTML = '';
            for(let key in DB[lang].heroes) {
                const b = document.createElement('button');
                b.className = 'action-btn';
                b.innerText = DB[lang].heroes[key].name;
                b.onclick = () => startPlay(key);
                list.appendChild(b);
            }
        }

        function startPlay(k) {
            curHero = k;
            const h = DB[lang].heroes[k];
            document.getElementById('quest-text').innerText = h.q;
            const btns = document.getElementById('decision-btns');
            btns.innerHTML = '';
            h.d.forEach((dec) => {
                const b = document.createElement('button');
                b.className = 'action-btn';
                b.innerText = dec.t;
                b.onclick = () => {
                    document.getElementById('res-text').innerText = dec.r;
                    showScreen('result');
                };
                btns.appendChild(b);
            });
            showScreen('play');
        }

        function renderLore() {
            const list = document.getElementById('lore-btns');
            list.innerHTML = '';
            for(let key in DB[lang].heroes) {
                const b = document.createElement('button');
                b.className = 'action-btn';
                b.innerText = DB[lang].heroes[key].name;
                b.onclick = () => {
                    curHero = key;
                    document.getElementById('det-title').innerText = DB[lang].heroes[key].name;
                    document.getElementById('det-content').innerText = DB[lang].heroes[key].long;
                    showScreen('lore-det');
                };
                list.appendChild(b);
            }
            showScreen('lore-list');
        }

        function playVoice() {
            const content = document.getElementById('det-content').innerText;
            const m = new SpeechSynthesisUtterance(content);
            const voiceMap = { 'ar': 'ar-SA', 'en': 'en-US', 'es': 'es-ES', 'ru': 'ru-RU', 'ko': 'ko-KR' };
            m.lang = voiceMap[lang]; m.pitch = 0.85; m.rate = 0.85;
            window.speechSynthesis.speak(m);
        }

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        
        function initBg() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            pts = [];
            for(let i=0; i<120; i++) {
                pts.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2.5,
                    s: Math.random() * 0.6
                });
            }
        }

        function drawBg() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(193, 163, 95, 0.45)";
            pts.forEach(p => {
                p.y -= p.s;
                if(p.y < 0) p.y = canvas.height;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(drawBg);
        }

        window.onresize = initBg;
        initBg();
        drawBg();
        updateLang('ar');
    </script>
</body>
