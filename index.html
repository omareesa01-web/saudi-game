<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - النسخة الاحترافية المستقرة</title>
    
    <style>
        /* --- الأساسيات الملكية --- */
        :root {
            --gold-main: #c1a35f;
            --gold-light: #f3cf7a;
            --deep-green: #05160d;
            --glass-bg: rgba(0, 0, 0, 0.55);
            --glass-border: rgba(193, 163, 95, 0.45);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- محرك جزيئات الرمل (بدون لاق) --- */
        #sand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- الحاوية الرئيسية (إصلاح القلتش) --- */
        .app-wrapper {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            max-height: 85vh;
            overflow-y: auto;
            overflow-x: hidden; /* لمنع القلتش الجانبي */
            transition: all 0.5s ease;
        }

        /* --- أنيميشن الانتقال الناعم (إصلاح القلتش البصري) --- */
        .screen {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .screen.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* --- النصوص والعناوين --- */
        h1 {
            font-size: 3.5rem;
            color: var(--gold-main);
            margin-bottom: 30px;
            font-weight: 900;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .sub-text {
            font-size: 1.4rem;
            color: #e0e0e0;
            margin-bottom: 45px;
            line-height: 1.7;
        }

        /* --- الأزرار التفاعلية --- */
        .btn-gold {
            width: 100%;
            background: linear-gradient(145deg, rgba(193, 163, 95, 0.2), rgba(0, 0, 0, 0.7));
            border: 2px solid var(--gold-main);
            padding: 25px;
            border-radius: 20px;
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 20px;
            display: block;
        }

        .btn-gold:hover {
            background: var(--gold-main);
            color: #000;
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(193, 163, 95, 0.3);
        }

        /* --- لوحات المحتوى --- */
        .story-box {
            background: rgba(255, 255, 255, 0.07);
            padding: 35px;
            border-radius: 25px;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.25rem;
            border-right: 8px solid var(--gold-main);
            margin: 30px 0;
        }

        /* --- مؤشر الصوت --- */
        .audio-wave {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--gold-light);
            font-weight: bold;
        }

        .dot {
            width: 8px; height: 8px; background: var(--gold-light);
            border-radius: 50%; animation: wave 1.2s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        .back-link {
            display: inline-block;
            margin-top: 35px;
            color: var(--gold-light);
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .back-link:hover { border-bottom-color: #fff; color: #fff; }

        /* --- سكرول بار أنيق --- */
        .app-wrapper::-webkit-scrollbar { width: 8px; }
        .app-wrapper::-webkit-scrollbar-thumb { background: var(--gold-main); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="sand-canvas"></canvas>

    <div class="app-wrapper" id="main-scroller">
        
        <div id="scr-home" class="screen active">
            <h1>ملاحم التأسيس</h1>
            <p class="sub-text">مشروع ناطق وتفاعلي يروي تاريخ الأجداد للأجيال القادمة</p>
            <button class="btn-gold" onclick="smoothNav('scr-heroes')">دخول الملحمة التفاعلية</button>
            <button class="btn-gold" onclick="loadLoreData()">سجل سير الأبطال</button>
        </div>

        <div id="scr-heroes" class="screen">
            <h1>اختر القائد التاريخي</h1>
            <p class="sub-text">استمع لصوت التاريخ واختر بطلك</p>
            <div id="hero-list"></div>
            <a class="back-link" onclick="smoothNav('scr-home')">العودة للرئيسية</a>
        </div>

        <div id="scr-mission" class="screen">
            <h1 id="mission-title-ui">المهمة</h1>
            <div class="audio-wave">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <span>الراوي الصوتي يعمل الآن...</span>
            </div>
            <div id="mission-desc-ui" class="story-box"></div>
            <div id="decision-list-ui"></div>
            <a class="back-link" onclick="killAudioAndBack()">إيقاف الصوت والرجوع</a>
        </div>

        <div id="scr-result" class="screen">
            <h1>حكم التاريخ</h1>
            <div id="result-desc-ui" class="story-box"></div>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <a class="back-link" onclick="smoothNav('scr-mission')">تغيير القرار</a>
                <a class="back-link" onclick="smoothNav('scr-home')">الرئيسية</a>
            </div>
        </div>

        <div id="scr-lore" class="screen">
            <h1>سجل الأبطال</h1>
            <div id="lore-list"></div>
            <a class="back-link" onclick="smoothNav('scr-home')">رجوع</a>
        </div>

        <div id="scr-bio" class="screen">
            <h1 id="bio-name-ui"></h1>
            <div id="bio-desc-ui" class="story-box"></div>
            <a class="back-link" onclick="smoothNav('scr-lore')">العودة للسجل</a>
        </div>

    </div>

    <script>
        // --- متغيرات النظام المحسن ---
        let currentAudioInstance = null;

        const FullData = {
            saud: {
                name: "الإمام محمد بن سعود",
                title: "فجر الدولة الأولى",
                story: "في عام 1727م، وفي قلب الدرعية، الجزيرة العربية تعيش في شتات وخوف. أمامك يا إمام خيار مفصلي: هل تعقد ميثاق الدرعية التاريخي القائم على العدل والعلم لتوحيد القلوب وبناء دولة قوية، أم تركز على التحصينات العسكرية لمدينتك فقط وتترك جيرانك في صراعاتهم؟",
                options: [
                    { t: "عقد ميثاق الدرعية والوحدة", r: "✅ قرار حكيم! بفضلك تأسست الدولة السعودية الأولى، وانتشر الأمن والعلم في أرجاء الجزيرة العربية، وأصبحت الدرعية منارة للعز." },
                    { t: "حماية أسوار الدرعية فقط", r: "⚠️ نجاح محدود. حفظت أمن مدينتك، ولكن الجزيرة ظلت في حالة تمزق وصراع لعقود طويلة أخرى." }
                ],
                bio: "الإمام محمد بن سعود هو المؤسس الأول، رجل الحكمة والرؤية الذي وضع اللبنة الأولى لهذا الكيان العظيم."
            },
            turki: {
                name: "الإمام تركي بن عبد الله",
                title: "استعادة المجد والرياض",
                story: "بعد سنوات من سقوط الدرعية، الرياض تحت الاحتلال. خرجت ومعك سيفك 'الأجرب'. هل تباغت الحصن الآن بعملية فدائية مع ثلة من أبطالك، أم تنسحب وتنتظر سنوات لجمع جيش ضخم؟",
                options: [
                    { t: "اقتحام الرياض بسيف الأجرب", r: "✅ عاد الحق! بفضل شجاعتك استعدت الرياض وأسست الدولة السعودية الثانية وأعدت الأمل للناس." },
                    { t: "الانتظار لجمع جيش أكبر", r: "❌ ضياع الفرصة. حصن الأعداء أنفسهم أكثر، وظلت الرياض محتلة لفترة أطول بكثير." }
                ],
                bio: "الإمام تركي بن عبدالله، بطل الصمود ومؤسس الدولة الثانية، صاحب السيف الأجرب الشهير."
            },
            aziz: {
                name: "الملك عبد العزيز",
                title: "توحيد المملكة الحديثة",
                story: "ليلة 15 يناير 1902م، أنت و63 رجلاً أمام أسوار المصمك. الفجر يوشك على البزوغ. هل تقتحم الحصن الآن لتسترد ملك آبائك، أم تتراجع بانتظار مدد من القبائل؟",
                options: [
                    { t: "اقتحام المصمك مع الفجر", r: "✅ الله أكبر! بفتحة المصمك أعلنت فجر الدولة السعودية الحديثة، وبدأت أعظم ملحمة توحيد في العصر الحديث." },
                    { t: "التراجع لطلب المدد", r: "❌ ضياع اللحظة. كشف الأعداء أمركم، وبقيت الرياض بعيدة المنال لسنوات طويلة." }
                ],
                bio: "الملك عبدالعزيز بن عبدالرحمن آل سعود، المؤسس الموحد وباني نهضة المملكة العربية السعودية الحديثة."
            }
        };

        // --- وظيفة التنقل المستقرة (إصلاح القلتش) ---
        function smoothNav(targetId) {
            // 1. تصفير السكرول فوراً
            document.getElementById('main-scroller').scrollTop = 0;

            // 2. إخفاء كل الشاشات بنعومة
            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach(s => {
                s.classList.remove('active');
            });

            // 3. تفعيل الشاشة المطلوبة
            setTimeout(() => {
                document.getElementById(targetId).classList.add('active');
            }, 50); // تأخير بسيط جداً لضمان سلاسة المتصفح
        }

        function killAudioAndBack() {
            if(currentAudioInstance) {
                currentAudioInstance.pause();
                currentAudioInstance.currentTime = 0;
            }
            smoothNav('scr-heroes');
        }

        function initHeroes() {
            const list = document.getElementById('hero-list');
            list.innerHTML = '';
            for(let key in FullData) {
                const b = document.createElement('button');
                b.className = 'btn-gold';
                b.innerText = FullData[key].name;
                b.onclick = () => startTheMission(key);
                list.appendChild(b);
            }
        }

        function startTheMission(key) {
            const hero = FullData[key];
            document.getElementById('mission-title-ui').innerText = hero.title;
            document.getElementById('mission-desc-ui').innerText = hero.story;

            // الصوت
            if(currentAudioInstance) currentAudioInstance.pause();
            currentAudioInstance = new Audio(key + '.mp3');
            currentAudioInstance.play().catch(e => console.log("الصوت جاهز للعمل"));

            const btnArea = document.getElementById('decision-list-ui');
            btnArea.innerHTML = '';
            hero.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn-gold';
                b.innerText = opt.t;
                b.onclick = () => {
                    document.getElementById('result-desc-ui').innerText = opt.r;
                    if(currentAudioInstance) currentAudioInstance.pause();
                    smoothNav('scr-result');
                };
                btnArea.appendChild(b);
            });
            smoothNav('scr-mission');
        }

        function loadLoreData() {
            const list = document.getElementById('lore-list');
            list.innerHTML = '';
            for(let key in FullData) {
                const b = document.createElement('button');
                b.className = 'btn-gold';
                b.innerText = FullData[key].name;
                b.onclick = () => {
                    document.getElementById('bio-name-ui').innerText = FullData[key].name;
                    document.getElementById('bio-desc-ui').innerText = FullData[key].bio;
                    smoothNav('scr-bio');
                };
                list.appendChild(b);
            }
            smoothNav('scr-lore');
        }

        // --- محرك الرمل (كود مفصل للجمالية) ---
        const canvas = document.getElementById('sand-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = [];
            for(let i=0; i<180; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, s: Math.random()*0.5+0.1});
        }
        function loop() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(193, 163, 95, 0.4)";
            dots.forEach(d => {
                d.y -= d.s; if(d.y < 0) d.y = canvas.height;
                ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(loop);
        }
        window.onresize = setup;
        setup(); loop(); initHeroes();
    </script>
</body>
</html>
