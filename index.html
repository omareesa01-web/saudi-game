<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>ملحمة التأسيس</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- خط عربي -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Particles.js -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    :root {
      --saudi-green: #006C35;
      --saudi-green-light: #00b85a;
      --bg-dark: #02140a;
      --text-light: #ffffff;
      --border-radius: 999px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Cairo", sans-serif;
      background: radial-gradient(circle at top, #024d28 0, #02140a 40%, #000);
      color: var(--text-light);
      min-height: 100vh;
      overflow: hidden;
    }

    #particles-js {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    /* اللغة */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .lang-toggle {
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.4);
      padding: 4px;
      border-radius: 999px;
      box-shadow: 0 0 12px rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
    }

    .lang-btn {
      border: 1px solid var(--saudi-green);
      background: transparent;
      padding: 4px 10px;
      border-radius: 999px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-size: 12px;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    .lang-btn.active {
      background: rgba(0,108,53,0.9);
      box-shadow:
        0 0 8px var(--saudi-green-light),
        0 0 16px rgba(0,184,90,0.7);
      font-weight: 700;
      text-shadow:
        0 0 6px var(--saudi-green-light),
        0 0 12px rgba(0,184,90,0.9);
    }

    .lang-btn:hover {
      box-shadow: 0 0 8px var(--saudi-green-light);
    }

    /* الشاشات + مؤثرات الدخول */
    .screen {
      display: none;
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      transition:
        opacity 0.45s ease,
        transform 0.45s ease,
        filter 0.45s ease;
      background: linear-gradient(145deg, rgba(0,0,0,0.65), rgba(0,40,20,0.9));
      border-radius: 24px;
      padding: 20px;
      border: 1px solid rgba(0,108,53,0.6);
      box-shadow:
        0 0 18px rgba(0,0,0,0.9),
        0 0 24px rgba(0,108,53,0.4);
      backdrop-filter: blur(10px);
    }

    .screen.active {
      display: block;
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: drop-shadow(0 0 12px rgba(0,184,90,0.4));
      animation: glowPulse 2.5s infinite ease-in-out;
    }

    @keyframes glowPulse {
      0%   { box-shadow: 0 0 10px rgba(0,184,90,0.4); }
      50%  { box-shadow: 0 0 22px rgba(0,184,90,0.9); }
      100% { box-shadow: 0 0 10px rgba(0,184,90,0.4); }
    }

    .screen-title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
      text-shadow:
        0 0 6px var(--saudi-green-light),
        0 0 18px rgba(0,184,90,0.9);
    }

    .screen-subtitle {
      text-align: center;
      font-size: 14px;
      margin-bottom: 20px;
      opacity: 0.9;
      color: #e6fff3;
      text-shadow: 0 0 4px rgba(0,0,0,0.9);
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: var(--border-radius);
      border: 1px solid var(--saudi-green);
      background: rgba(0,0,0,0.4);
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition:
        background 0.25s ease,
        box-shadow 0.25s ease,
        transform 0.2s ease;
      box-shadow:
        0 0 6px rgba(0,108,53,0.4),
        inset 0 0 0 rgba(0,0,0,0);
      text-shadow: 0 0 4px rgba(0,0,0,0.9);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 0 14px var(--saudi-green-light);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(0,108,53,0.95), rgba(0,184,90,0.9));
      box-shadow:
        0 0 10px var(--saudi-green-light),
        0 0 20px rgba(0,184,90,0.8);
    }

    .btn-ghost {
      background: transparent;
      border-style: dashed;
      opacity: 0.8;
    }

    .list { margin-top: 10px; }

    .link {
      display: block;
      text-align: center;
      margin-top: 10px;
      color: #b8ffe0;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .link:hover {
      color: var(--saudi-green-light);
      text-shadow: 0 0 6px var(--saudi-green-light);
    }

    .bio-card {
      margin-top: 15px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(0,108,53,0.7);
      background: rgba(0,0,0,0.55);
      box-shadow:
        0 0 10px rgba(0,108,53,0.6),
        0 0 18px rgba(0,184,90,0.5);
      display: none;
      font-size: 13px;
      line-height: 1.7;
      color: #eafff5;
    }

    .bio-title { font-weight: 700; margin-bottom: 5px; text-shadow: 0 0 6px var(--saudi-green-light); }
    .bio-dates { font-size: 12px; opacity: 0.8; margin-bottom: 8px; }

    @media (max-width: 480px) {
      .app { padding-inline: 12px; }
      .screen { padding: 18px 16px; }
      .screen-title { font-size: 20px; }
      .btn { font-size: 14px; }
    }
  </style>
</head>

<body>

<div id="particles-js"></div>

<div class="app">

  <!-- اللغة -->
  <div class="top-bar">
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="ar">AR</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>

  <!-- الرئيسية -->
  <section id="screen-home" class="screen active">
    <h1 class="screen-title">ملحمة التأسيس</h1>
    <p class="screen-subtitle">واجه مصيرك في تاريخ المجد السعودي.</p>

    <button class="btn btn-primary" id="btn-start">ابدأ الرحلة</button>
    <button class="btn btn-secondary" id="btn-archive">الأرشيف</button>
  </section>

  <!-- اختيار القائد -->
  <section id="screen-leader" class="screen">
    <h2 class="screen-title">اختر القائد</h2>

    <div class="list">
      <button class="btn leader-btn" data-leader="muhammad">الإمام محمد بن سعود</button>
      <button class="btn leader-btn" data-leader="turki">الإمام تركي بن عبدالله</button>
      <button class="btn leader-btn" data-leader="abdulaziz">الملك عبدالعزيز</button>
    </div>

    <button class="btn btn-ghost" id="btn-back-from-leader">رجوع</button>
  </section>

  <!-- اختيار الموقف -->
  <section id="screen-scenario" class="screen">
    <h2 class="screen-title">اختر الموقف</h2>

    <div class="list" id="scenario-list"></div>

    <span class="link" id="link-change-leader">تغيير القائد</span>
  </section>

  <!-- شاشة القصة والقرارات -->
  <section id="screen-story" class="screen">
    <h2 class="screen-title" id="story-title"></h2>
    <p class="screen-subtitle" id="story-text"></p>

    <div id="choices-container"></div>

    <p class="screen-subtitle" id="story-result" style="display:none; margin-top:20px;"></p>

    <button class="btn btn-ghost" id="btn-back-to-scenarios">عودة للمواقف</button>
  </section>

  <!-- الأرشيف -->
  <section id="screen-archive" class="screen">
    <h2 class="screen-title">سجل الخالدين</h2>

    <div class="list">
      <button class="btn archive-leader-btn" data-leader="muhammad">الإمام محمد بن سعود</button>
      <button class="btn archive-leader-btn" data-leader="turki">الإمام تركي بن عبدالله</button>
      <button class="btn archive-leader-btn" data-leader="abdulaziz">الملك عبدالعزيز</button>
    </div>

    <div id="bio-container" class="bio-card">
      <div id="bio-name" class="bio-title"></div>
      <div id="bio-dates" class="bio-dates"></div>
      <div id="bio-text"></div>
    </div>

    <button class="btn btn-ghost" id="btn-back-from-archive">العودة للسجل</button>
  </section>

</div>

<script>
/* ------------------ السيناريوهات ------------------ */
const scenarios = {
  muhammad: [
    "ميثاق الدرعية التاريخي (1744م)",
    "توسّع الدولة السعودية الأولى",
    "تأسيس نظام الحكم والإدارة"
  ],
  turki: [
    "استعادة الرياض",
    "إعادة بناء الدولة السعودية الثانية",
    "تعزيز الأمن وتوحيد المناطق"
  ],
  abdulaziz: [
    "استرداد الرياض (1902)",
    "توحيد المملكة العربية السعودية",
    "تأسيس مؤسسات الدولة الحديثة"
  ]
};

/* ------------------ قصص السيناريوهات والقرارات ------------------ */
const scenarioStories = {
  "ميثاق الدرعية التاريخي (1744م)": {
    story: "في عام 1744م، التقى الإمام محمد بن سعود بالشيخ محمد بن عبدالوهاب في الدرعية، وكان هذا اللقاء نقطة تحول تاريخية وضعت أساس الدولة السعودية الأولى.",
    choices: [
      { text: "تأييد الميثاق وتوسيع النفوذ", result: "بدأت الدولة السعودية الأولى في التوسع وتوحيد المناطق." },
      { text: "التريث قبل اتخاذ القرار", result: "تأخر التوسع قليلاً، لكن الاستقرار الداخلي ازداد." }
    ]
  },
  "توسّع الدولة السعودية الأولى": {
    story: "بعد تأسيس الدولة، بدأ الإمام محمد بن سعود بتوسيع نفوذ الدرعية عبر التحالفات والفتوحات.",
    choices: [
      { text: "التوسع السريع", result: "ازدادت قوة الدولة لكن واجهت تحديات عسكرية." },
      { text: "التوسع التدريجي", result: "تحقق الاستقرار ونمت الدولة بثبات." }
    ]
  },
  "تأسيس نظام الحكم والإدارة": {
    story: "عمل الإمام محمد بن سعود على تنظيم شؤون الدولة ووضع أسس الإدارة والعدل.",
    choices: [
      { text: "تعزيز القضاء", result: "أصبحت الدولة أكثر استقراراً وعدلاً." },
      { text: "تعزيز الجيش", result: "ازدادت قوة الدولة وقدرتها على الدفاع." }
    ]
  },
  "استعادة الرياض": {
    story: "قاد الإمام تركي بن عبدالله جهوداً كبيرة لاستعادة الرياض بعد سقوط الدولة الأولى.",
    choices: [
      { text: "الهجوم المباشر", result: "تم استعادة الرياض بسرعة لكن بخسائر." },
      { text: "الحصار التدريجي", result: "استعيدت الرياض بأقل خسائر ممكنة." }
    ]
  },
  "إعادة بناء الدولة السعودية الثانية": {
    story: "بعد استعادة الرياض، بدأ الإمام تركي بإعادة بناء الدولة السعودية الثانية.",
    choices: [
      { text: "إعادة تنظيم الجيش", result: "ازدادت قوة الدولة وقدرتها على الدفاع." },
      { text: "تعزيز التحالفات", result: "ازدادت قوة الدولة السياسية." }
    ]
  },
  "تعزيز الأمن وتوحيد المناطق": {
    story: "عمل الإمام تركي على تعزيز الأمن وتوحيد المناطق تحت راية الدولة.",
    choices: [
      { text: "إرسال الحملات العسكرية", result: "تم توحيد مناطق واسعة بسرعة." },
      { text: "عقد التحالفات", result: "تحقق الاستقرار دون قتال." }
    ]
  },
  "استرداد الرياض (1902)": {
    story: "قاد الملك عبدالعزيز عملية استرداد الرياض في واحدة من أشهر العمليات في التاريخ السعودي.",
    choices: [
      { text: "الهجوم الليلي", result: "نجحت العملية بسرعة وبشكل مفاجئ." },
      { text: "التخطيط الطويل", result: "تمت العملية بدقة عالية وبدون خسائر." }
    ]
  },
  "توحيد المملكة العربية السعودية": {
    story: "بدأ الملك عبدالعزيز رحلة طويلة لتوحيد معظم مناطق الجزيرة العربية.",
    choices: [
      { text: "التقدم العسكري", result: "تم التوحيد بسرعة." },
      { text: "التحالفات القبلية", result: "تم التوحيد بسلاسة واستقرار." }
    ]
  },
  "تأسيس مؤسسات الدولة الحديثة": {
    story: "أسس الملك عبدالعزيز الوزارات والأنظمة الحديثة التي شكلت أساس الدولة اليوم.",
    choices: [
      { text: "تأسيس وزارة الدفاع", result: "ازدادت قوة الدولة العسكرية." },
      { text: "تأسيس وزارة المالية", result: "ازدادت قوة الدولة الاقتصادية." }
    ]
  }
};

/* ------------------ بيانات القادة ------------------ */
const leadersBio = {
  muhammad: {
    name: "الإمام محمد بن سعود",
    dates: "توفي 1179هـ / 1765م",
    text: "يُعد الإمام محمد بن سعود مؤسس الدولة السعودية الأولى، حيث وحّد الدرعية وما حولها، وأرسى أسس الحكم والإدارة، وفتح الباب أمام مرحلة جديدة من الاستقرار السياسي في قلب الجزيرة العربية."
  },
  turki: {
    name: "الإمام تركي بن عبدالله",
    dates: "توفي 1249هـ / 1834م",
    text: "أعاد الإمام تركي بن عبدالله بناء الدولة السعودية بعد سقوط الدولة الأولى، واتخذ من الرياض عاصمة له، وأسهم في استعادة الأمن والاستقرار، مما مهد لقيام الدولة السعودية الثانية."
  },
  abdulaziz: {
    name: "الملك عبدالعزيز بن عبدالرحمن آل سعود",
    dates: "1876م – 1953م",
    text: "أسس الملك عبدالعزيز المملكة العربية السعودية الحديثة، ووحّد معظم أقاليم الجزيرة العربية تحت راية واحدة، وأرسى دعائم الدولة المعاصرة في مجالات الحكم والاقتصاد والمجتمع."
  }
};

let currentLeader = null;

/* ------------------ التنقل بين الشاشات مع مؤثرات ------------------ */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => {
    s.classList.remove("active");
  });

  const target = document.getElementById("screen-" + id);

  setTimeout(() => {
    target.classList.add("active");
  }, 20);
}

/* الرئيسية → القادة */
document.getElementById("btn-start").onclick = () => showScreen("leader");

/* الرئيسية → الأرشيف */
document.getElementById("btn-archive").onclick = () => showScreen("archive");

/* رجوع من القادة */
document.getElementById("btn-back-from-leader").onclick = () => showScreen("home");

/* رجوع من الأرشيف */
document.getElementById("btn-back-from-archive").onclick = () => {
  document.getElementById("bio-container").style.display = "none";
  showScreen("home");
};

/* تغيير القائد */
document.getElementById("link-change-leader").onclick = () => showScreen("leader");

/* رجوع من القصة إلى المواقف */
document.getElementById("btn-back-to-scenarios").onclick = () => {
  document.getElementById("story-result").style.display = "none";
  showScreen("scenario");
};

/* ------------------ اختيار القائد → توليد السيناريوهات ------------------ */
document.querySelectorAll(".leader-btn").forEach(btn => {
  btn.onclick = () => {
    currentLeader = btn.dataset.leader;

    const list = document.getElementById("scenario-list");
    list.innerHTML = "";

    scenarios[currentLeader].forEach(text => {
      const b = document.createElement("button");
      b.className = "btn";
      b.textContent = text;

      b.onclick = () => {
        const data = scenarioStories[text];
        if (!data) return;

        document.getElementById("story-title").textContent = text;
        document.getElementById("story-text").textContent = data.story;

        const choicesBox = document.getElementById("choices-container");
        choicesBox.innerHTML = "";

        data.choices.forEach(choice => {
          const c = document.createElement("button");
          c.className = "btn btn-primary";
          c.textContent = choice.text;

          c.onclick = () => {
            const resultEl = document.getElementById("story-result");
            resultEl.style.display = "block";
            resultEl.textContent = choice.result;
          };

          choicesBox.appendChild(c);
        });

        document.getElementById("story-result").style.display = "none";
        showScreen("story");
      };

      list.appendChild(b);
    });

    showScreen("scenario");
  };
});

/* ------------------ الأرشيف ------------------ */
document.querySelectorAll(".archive-leader-btn").forEach(btn => {
  btn.onclick = () => {
    const key = btn.dataset.leader;
    const bio = leadersBio[key];

    document.getElementById("bio-name").textContent = bio.name;
    document.getElementById("bio-dates").textContent = bio.dates;
    document.getElementById("bio-text").textContent = bio.text;

    document.getElementById("bio-container").style.display = "block";
  };
});

/* ------------------ Particles ------------------ */
particlesJS("particles-js", {
  particles: {
    number: { value: 80, density: { enable: true, value_area: 800 } },
    color: { value: "#00ff99" },
    shape: { type: "circle" },
    opacity: { value: 0.6, random: true },
    size: { value: 2.5, random: true },
    line_linked: { enable: false },
    move: {
      enable: true,
      speed: 0.8,
      direction: "none",
      random: true,
      straight: false,
      out_mode: "out",
      bounce: false
    }
  },
  interactivity: {
    detect_on: "canvas",
    events: {
      onhover: { enable: false },
      onclick: { enable: false },
      resize: true
    }
  },
  retina_detect: true
});
</script>

</body>
</html>
