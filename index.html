<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملحمة التأسيس - النسخة التاريخية الشاملة</title>
    
    <style>
        /* إعدادات الخطوط والألوان الملكية */
        :root {
            --gold-primary: #c1a35f;
            --gold-bright: #f3cf7a;
            --deep-green: #05160d;
            --overlay: rgba(0, 0, 0, 0.4);
            --glass-border: rgba(193, 163, 95, 0.3);
        }

        /* تنسيق الجسم ليكون متجاوباً وفخماً */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #103a24 0%, #05160d 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* كانفاس الرمل - محرك الجسيمات */
        #sand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* شريط اختيار اللغات - تصميم زجاجي */
        .language-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid var(--gold-primary);
            display: flex;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .language-nav button {
            background: transparent;
            border: 1px solid transparent;
            color: #fff;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.4s;
        }

        .language-nav button:hover {
            background: var(--gold-primary);
            color: #000;
        }

        /* الحاوية الرئيسية - زجاجية وشفافة */
        .main-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 750px;
            background: var(--overlay);
            backdrop-filter: blur(25px);
            border: 2px solid var(--glass-border);
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0,0,0,0.7);
            max-height: 85vh;
            overflow-y: auto;
        }

        /* أنيميشن الدخول للقائمة الرئيسية */
        #screen-home.active {
            animation: slideEntrance 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes slideEntrance {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* أنيميشن أزرار القائمة - تظهر واحداً تلو الآخر */
        .menu-btn-anim {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .btn-delay-1 { animation-delay: 0.5s; }
        .btn-delay-2 { animation-delay: 0.8s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3.5rem;
            color: var(--gold-primary);
            margin-bottom: 25px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            font-weight: 900;
        }

        .description {
            font-size: 1.4rem;
            color: #e0e0e0;
            margin-bottom: 45px;
            line-height: 1.8;
        }

        /* تصميم الأزرار التفاعلية */
        .action-button {
            width: 100%;
            background: linear-gradient(145deg, rgba(193, 163, 95, 0.3), rgba(0, 0, 0, 0.8));
            border: 2px solid var(--gold-primary);
            padding: 25px;
            border-radius: 20px;
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 20px;
        }

        .action-button:hover {
            background: var(--gold-primary);
            color: #000;
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(193, 163, 95, 0.4);
        }

        /* صندوق النتائج والسير الذاتية */
        .content-panel {
            background: rgba(255, 255, 255, 0.07);
            padding: 35px;
            border-radius: 25px;
            text-align: justify;
            line-height: 2.2;
            font-size: 1.2rem;
            border-right: 10px solid var(--gold-primary);
            margin-top: 30px;
        }

        [dir="ltr"] .content-panel {
            border-right: none;
            border-left: 10px solid var(--gold-primary);
            text-align: left;
        }

        .footer-link {
            display: inline-block;
            margin-top: 40px;
            color: var(--gold-bright);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }

        .footer-link:hover {
            color: #fff;
            border-bottom-color: #fff;
            transform: translateX(5px);
        }

        /* التحكم في عرض الشاشات */
        .screen { display: none; }
        .active { display: block; }

        /* تخصيص السكرول بار */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }

    </style>
</head>

                        name: "압둘아지즈 국왕", 
                        q: "1902년: 63명의 전사들과 마스막 성벽 앞. 새벽에 공격하시겠습니까, 아니면 후퇴하시겠습니까?", 
                        d: [
                            {t: "새벽 마스막 기습", r: "✅ 성공! 리야드를 탈환하고 현대 사우디아라비아 왕국의 통일을 시작했습니다."}, 
                            {t: "일시적 후퇴", r: "❌ 기회 상실. 적들이 경비를 강화하여 리야드 탈환이 수년간 지연되었습니다."}
                        ], 
                        bio: "현대 사우디아라비아 왕국의 위대한 통일자이자 건국자입니다." 
                    }
                }
            }
        };

        let currentLanguage = 'ar';
        let selectedHeroKey = null;

        // وظيفة تبديل الشاشات
        function changeScreen(id) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // إعادة تشغيل أنيميشن القائمة الرئيسية
            if(id === 'screen-home') {
                const anims = document.querySelectorAll('.menu-btn-anim');
                anims.forEach(a => {
                    a.style.animation = 'none';
                    a.offsetHeight; 
                    a.style.animation = null;
                });
            }
        }

        // تحديث لغة الواجهة
        function switchLang(lang) {
            currentLanguage = lang;
            const data = FoundationDB[lang];
            document.body.dir = data.dir;

            document.getElementById('ui-home-title').innerText = data.hTitle;
            document.getElementById('ui-home-desc').innerText = data.hDesc;
            document.getElementById('ui-btn-start').innerText = data.bStart;
            document.getElementById('ui-btn-lore').innerText = data.bLore;
            document.getElementById('ui-hero-head').innerText = data.heroH;
            document.getElementById('ui-mission-head').innerText = data.missH;
            document.getElementById('ui-result-head').innerText = data.resH;
            document.getElementById('ui-back-home').innerText = data.back;
            document.getElementById('ui-back-hero').innerText = data.back;
            document.getElementById('ui-retry').innerText = data.retry;
            document.getElementById('ui-final-home').innerText = data.home;
            document.getElementById('ui-lore-head').innerText = data.loreH;
            document.getElementById('ui-back-lore').innerText = data.back;
            document.getElementById('ui-back-to-list').innerText = data.back;

            renderHeroButtons();
            changeScreen('screen-home');
        }

        // بناء قائمة الأبطال
        function renderHeroButtons() {
            const container = document.getElementById('hero-list-render');
            container.innerHTML = '';
            const heroes = FoundationDB[currentLanguage].heroes;
            for(let key in heroes) {
                const btn = document.createElement('button');
                btn.className = 'action-button';
                btn.innerText = heroes[key].name;
                btn.onclick = () => launchMission(key);
                container.appendChild(btn);
            }
        }

        // بدء المهمة
        function launchMission(key) {
            selectedHeroKey = key;
            const h = FoundationDB[currentLanguage].heroes[key];
            document.getElementById('mission-text-area').innerText = h.q;
            const container = document.getElementById('decision-list-render');
            container.innerHTML = '';
            h.d.forEach(dec => {
                const b = document.createElement('button');
                b.className = 'action-button';
                b.innerText = dec.t;
                b.onclick = () => {
                    document.getElementById('result-text-area').innerText = dec.r;
                    changeScreen('screen-result');
                };
                container.appendChild(b);
            });
            changeScreen('screen-mission');
        }

        // عرض السجل التاريخي
        function loadLoreList() {
            const container = document.getElementById('lore-list-render');
            container.innerHTML = '';
            const heroes = FoundationDB[currentLanguage].heroes;
            for(let key in heroes) {
                const b = document.createElement('button');
                b.className = 'action-button';
                b.innerText = heroes[key].name;
                b.onclick = () => {
                    document.getElementById('bio-hero-name').innerText = heroes[key].name;
                    document.getElementById('bio-hero-content').innerText = heroes[key].bio;
                    changeScreen('screen-bio');
                };
                container.appendChild(b);
            }
            changeScreen('screen-lore-list');
        }

        // نظام الرمل (محرك الجسيمات)
        const canvas = document.getElementById('sand-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<180; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2.5,
                    speed: Math.random() * 0.7 + 0.1,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(193, 163, 95, 0.5)";
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) {
                    p.y = canvas.height;
                    p.x = Math.random() * canvas.width;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        window.onresize = initParticles;
        initParticles();
        drawParticles();
        switchLang('ar');

    </script>
</body>
</html>
